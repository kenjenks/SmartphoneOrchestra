<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Receiver - Single Frequency Detector</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff3366;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .frequency-badge {
            background: #ff3366;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
            letter-spacing: 4px;
        }
        .status-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .mic-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .mic-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }
        .mic-led.active {
            background: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
        .mic-led.listening {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .detection-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        .signal-led {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            border: 3px solid #444;
        }
        .signal-led.detected {
            background: #ff3366;
            box-shadow: 0 0 80px #ff3366;
            animation: pulse-fast 0.2s infinite;
            border-color: white;
        }
        @keyframes pulse-fast {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .signal-strength {
            font-size: 2rem;
            font-weight: bold;
            color: #ff3366;
            font-family: monospace;
        }
        .detection-count {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 10px 0;
        }
        button.primary {
            background: #ff3366;
            color: white;
            border: none;
        }
        button.primary:hover {
            background: #cc2952;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .threshold-slider {
            width: 100%;
            margin: 20px 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #ff3366;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .fft-viz {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #333;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dotted #222;
        }
        .log-entry.detection {
            color: #ff3366;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 Zynth Receiver</h1>
        <div class="subtitle">Single frequency detector - 1234 Hz only</div>

        <div class="frequency-badge">1234 Hz</div>

        <div class="status-card">
            <div class="mic-status">
                <span>Microphone</span>
                <div class="mic-led" id="mic-led"></div>
            </div>
            <button id="mic-btn" class="primary">🎤 Enable Microphone</button>
            <button id="stop-mic-btn" disabled>⏹️ Stop Listening</button>
        </div>

        <div>
            <label style="color: #888; display: block; margin-bottom: 5px;">Detection Threshold</label>
            <input type="range" id="threshold-slider" class="threshold-slider" min="0.01" max="0.3" step="0.01" value="0.08">
            <div style="display: flex; justify-content: space-between; color: #888; font-size: 0.8rem;">
                <span>Lower (sensitive)</span>
                <span id="threshold-value">0.08</span>
                <span>Higher (specific)</span>
            </div>
        </div>

        <div class="detection-indicator">
            <div class="signal-led" id="signal-led">📡</div>
            <div class="signal-strength" id="signal-strength">0.00</div>
            <div class="detection-count" id="detection-count">Detections: 0</div>
        </div>

        <canvas id="fft-viz" class="fft-viz"></canvas>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Energy at 1234Hz</div>
                <div class="stat-value" id="target-energy">0.000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Noise floor</div>
                <div class="stat-value" id="noise-floor">0.000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Signal/Noise</div>
                <div class="stat-value" id="snr">0.0 dB</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Peak freq</div>
                <div class="stat-value" id="peak-freq">---</div>
            </div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] Zynth Receiver ready - listening for 1234 Hz</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let detectionCount = 0;
        let lastDetectionTime = 0;
        let detectionThreshold = 0.08;

        // Fixed target frequency - 1234 Hz (unlikely to occur naturally)
        const TARGET_FREQUENCY = 1234;
        const FFT_SIZE = 8192; // Larger FFT for better frequency resolution
        const DETECTION_COOLDOWN = 500; // ms between detections
        const TOLERANCE_HZ = 15; // Accept frequencies within ±15 Hz of target

        // ============================================
        // DOM elements
        // ============================================
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const micLed = document.getElementById('mic-led');
        const signalLed = document.getElementById('signal-led');
        const signalStrengthSpan = document.getElementById('signal-strength');
        const detectionCountSpan = document.getElementById('detection-count');
        const targetEnergySpan = document.getElementById('target-energy');
        const noiseFloorSpan = document.getElementById('noise-floor');
        const snrSpan = document.getElementById('snr');
        const peakFreqSpan = document.getElementById('peak-freq');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdValue = document.getElementById('threshold-value');
        const canvas = document.getElementById('fft-viz');
        const canvasCtx = canvas.getContext('2d');

        // ============================================
        // Threshold control
        // ============================================
        thresholdSlider.addEventListener('input', (e) => {
            detectionThreshold = parseFloat(e.target.value);
            thresholdValue.innerText = detectionThreshold.toFixed(3);
        });

        // ============================================
        // Enable microphone
        // ============================================
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                log("🎤 Requesting microphone access...");

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                mediaStream = stream;

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.2;

                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                micLed.className = 'mic-led listening';
                micBtn.disabled = true;
                stopMicBtn.disabled = false;

                log("✅ Microphone active - listening for 1234 Hz signal");

                // Start visualization and detection
                drawFFT();
                detectSignal();

            } catch (e) {
                log(`❌ Mic error: ${e.message}`);
                micLed.className = 'mic-led';
            }
        });

        // ============================================
        // Stop listening
        // ============================================
        stopMicBtn.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;
            micLed.className = 'mic-led';
            micBtn.disabled = false;
            stopMicBtn.disabled = true;

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            // Clear canvas
            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            log("⏹️ Stopped listening");
        });

        // ============================================
        // Draw FFT visualization
        // ============================================
        function drawFFT() {
            if (!isListening || !analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;

            // Draw frequency spectrum (focus on 0-2000 Hz)
            const nyquist = audioCtx.sampleRate / 2;
            const maxBin = Math.min(bufferLength, Math.floor(2000 / nyquist * bufferLength));

            for (let i = 0; i < maxBin; i++) {
                const barHeight = dataArray[i] / 2;
                const freq = (i / bufferLength) * nyquist;

                // Highlight target frequency band
                if (Math.abs(freq - TARGET_FREQUENCY) < TOLERANCE_HZ) {
                    canvasCtx.fillStyle = `rgb(255, 51, 102)`;
                } else {
                    canvasCtx.fillStyle = `rgb(100, 100, 100)`;
                }

                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }

            // Draw target frequency line
            const targetBin = Math.floor(TARGET_FREQUENCY / nyquist * bufferLength);
            if (targetBin < maxBin) {
                const targetX = targetBin * (barWidth + 1);
                canvasCtx.strokeStyle = '#ff3366';
                canvasCtx.lineWidth = 3;
                canvasCtx.beginPath();
                canvasCtx.moveTo(targetX, 0);
                canvasCtx.lineTo(targetX, canvas.height);
                canvasCtx.stroke();
            }

            animationFrame = requestAnimationFrame(drawFFT);
        }

        // ============================================
        // Signal detection - simple energy threshold
        // ============================================
        function detectSignal() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(detectSignal);
                return;
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;
            const targetBin = Math.floor(TARGET_FREQUENCY / nyquist * bufferLength);
            const binTolerance = Math.floor(TOLERANCE_HZ / nyquist * bufferLength);

            // Calculate energy at target frequency (average of surrounding bins)
            let targetEnergy = 0;
            let binCount = 0;

            for (let i = -binTolerance; i <= binTolerance; i++) {
                const idx = targetBin + i;
                if (idx >= 0 && idx < bufferLength) {
                    targetEnergy += dataArray[idx] / 255;
                    binCount++;
                }
            }
            targetEnergy = targetEnergy / binCount;

            // Calculate noise floor (average of all frequencies except target band)
            let noiseEnergy = 0;
            let noiseCount = 0;

            for (let i = 0; i < bufferLength; i++) {
                // Skip the target frequency band
                if (Math.abs(i - targetBin) <= binTolerance + 5) continue;

                noiseEnergy += dataArray[i] / 255;
                noiseCount++;
            }
            noiseEnergy = noiseEnergy / noiseCount;

            // Calculate SNR
            const snr = 20 * Math.log10((targetEnergy + 0.001) / (noiseEnergy + 0.001));

            // Update displays
            targetEnergySpan.innerText = targetEnergy.toFixed(3);
            noiseFloorSpan.innerText = noiseEnergy.toFixed(3);
            snrSpan.innerText = snr.toFixed(1) + ' dB';
            signalStrengthSpan.innerText = targetEnergy.toFixed(3);

            // Find peak frequency in the target range
            let maxEnergy = 0;
            let maxBin = targetBin;

            for (let i = targetBin - binTolerance; i <= targetBin + binTolerance; i++) {
                if (i >= 0 && i < bufferLength && dataArray[i] / 255 > maxEnergy) {
                    maxEnergy = dataArray[i] / 255;
                    maxBin = i;
                }
            }

            const peakFreq = (maxBin / bufferLength) * nyquist;
            peakFreqSpan.innerText = Math.round(peakFreq) + ' Hz';

            // Check if signal exceeds threshold
            const now = Date.now();
            if (targetEnergy > detectionThreshold && targetEnergy > noiseEnergy * 2) {
                // Signal detected!
                signalLed.className = 'signal-led detected';

                // Log detection with cooldown to avoid duplicates
                if (now - lastDetectionTime > DETECTION_COOLDOWN) {
                    detectionCount++;
                    detectionCountSpan.innerText = `Detections: ${detectionCount}`;

                    log(`🔴 SIGNAL DETECTED! Energy: ${targetEnergy.toFixed(3)}, SNR: ${snr.toFixed(1)}dB`, 'detection');

                    lastDetectionTime = now;
                }
            } else {
                signalLed.className = 'signal-led';
            }

            requestAnimationFrame(detectSignal);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' : 'log-entry';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });

        // Initial log
        log("System ready - listening for 1234 Hz signal");
    </script>
</body>
</html>
