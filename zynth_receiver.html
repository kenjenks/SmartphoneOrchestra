<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Receiver - Tri-Tone Pattern Detector</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff3366;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .pattern-badge {
            background: #ff3366;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
        }
        .status-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .mic-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .mic-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }
        .mic-led.active {
            background: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
        .mic-led.listening {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .detection-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        .signal-led {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            border: 3px solid #444;
        }
        .signal-led.detected {
            background: #ff3366;
            box-shadow: 0 0 80px #ff3366;
            animation: pulse-fast 0.2s infinite;
            border-color: white;
        }
        @keyframes pulse-fast {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .pattern-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff3366;
            font-family: monospace;
            margin-bottom: 10px;
        }
        .detection-count {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 10px 0;
        }
        button.primary {
            background: #ff3366;
            color: white;
            border: none;
        }
        button.primary:hover {
            background: #cc2952;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #ff3366;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .pattern-viz {
            width: 100%;
            height: 60px;
            background: #000;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #333;
            position: relative;
        }
        .pattern-bar {
            position: absolute;
            bottom: 0;
            width: 30%;
            height: 0px;
            background: #ff3366;
            transition: height 0.1s;
        }
        .pattern-bar:nth-child(1) { left: 5%; }
        .pattern-bar:nth-child(2) { left: 35%; }
        .pattern-bar:nth-child(3) { left: 65%; }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dotted #222;
        }
        .log-entry.detection {
            color: #ff3366;
            font-weight: bold;
        }
        .pattern-guide {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            color: #888;
            font-size: 0.9rem;
        }
        .pattern-guide span {
            color: #ff3366;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 Zynth Receiver</h1>
        <div class="subtitle">Tri-Tone Pattern Detector</div>

        <div class="pattern-badge">1234 Hz → 900 Hz → 1234 Hz</div>

        <div class="pattern-guide">
            <span>⬆️ High</span>
            <span>⬇️ Low</span>
            <span>⬆️ High</span>
        </div>

        <div class="status-card">
            <div class="mic-status">
                <span>Microphone</span>
                <div class="mic-led" id="mic-led"></div>
            </div>
            <button id="mic-btn" class="primary">🎤 Enable Microphone</button>
            <button id="stop-mic-btn" disabled>⏹️ Stop Listening</button>
        </div>

        <div class="detection-indicator">
            <div class="signal-led" id="signal-led">📡</div>
            <div class="pattern-display" id="pattern-status">Waiting for pattern...</div>
            <div class="detection-count" id="detection-count">Detections: 0</div>
        </div>

        <div class="pattern-viz" id="pattern-viz">
            <div class="pattern-bar" id="bar1"></div>
            <div class="pattern-bar" id="bar2"></div>
            <div class="pattern-bar" id="bar3"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Pattern Match</div>
                <div class="stat-value" id="pattern-match">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Sequence Progress</div>
                <div class="stat-value" id="sequence-progress">0/3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Current Freq</div>
                <div class="stat-value" id="current-freq">---</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Confidence</div>
                <div class="stat-value" id="confidence">0.0</div>
            </div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] Zynth Receiver ready - listening for tri-tone pattern</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let detectionCount = 0;

        // Pattern detection state
        let sequenceState = {
            stage: 0, // 0=waiting for first high, 1=waiting for low, 2=waiting for final high, 3=complete
            highDetected: false,
            lowDetected: false,
            finalHighDetected: false,
            detectionWindow: null,
            highFreqs: [],
            lowFreqs: [],
            confidence: 0
        };

        // Pattern definition
        const PATTERN = {
            HIGH_FREQ: 1234,
            LOW_FREQ: 900,
            TOLERANCE: 20, // Hz
            STAGE1_DURATION: 300, // ms to detect first high
            STAGE2_DURATION: 300, // ms to detect low
            STAGE3_DURATION: 300, // ms to detect final high
            MAX_PATTERN_DURATION: 1500, // Total max time for pattern
            MIN_ENERGY: 0.03, // Minimum energy to consider a detection
            CONFIDENCE_THRESHOLD: 0.7 // Minimum confidence to trigger
        };

        const FFT_SIZE = 8192;

        // ============================================
        // DOM elements
        // ============================================
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const micLed = document.getElementById('mic-led');
        const signalLed = document.getElementById('signal-led');
        const patternStatus = document.getElementById('pattern-status');
        const detectionCountSpan = document.getElementById('detection-count');
        const patternMatchSpan = document.getElementById('pattern-match');
        const sequenceProgressSpan = document.getElementById('sequence-progress');
        const currentFreqSpan = document.getElementById('current-freq');
        const confidenceSpan = document.getElementById('confidence');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');

        // ============================================
        // Enable microphone
        // ============================================
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                log("🎤 Requesting microphone access...");

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                mediaStream = stream;

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;

                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                micLed.className = 'mic-led listening';
                micBtn.disabled = true;
                stopMicBtn.disabled = false;

                log("✅ Microphone active - listening for tri-tone pattern");

                // Reset sequence
                resetSequence();

                // Start detection
                detectPattern();

            } catch (e) {
                log(`❌ Mic error: ${e.message}`);
                micLed.className = 'mic-led';
            }
        });

        // ============================================
        // Stop listening
        // ============================================
        stopMicBtn.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;
            micLed.className = 'mic-led';
            micBtn.disabled = false;
            stopMicBtn.disabled = true;

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            log("⏹️ Stopped listening");
        });

        // ============================================
        // Reset pattern sequence
        // ============================================
        function resetSequence() {
            sequenceState = {
                stage: 0,
                highDetected: false,
                lowDetected: false,
                finalHighDetected: false,
                detectionWindow: Date.now(),
                highFreqs: [],
                lowFreqs: [],
                confidence: 0
            };
            updateUI();
        }

        // ============================================
        // Update visualization
        // ============================================
        function updateUI() {
            // Update progress bars
            bar1.style.height = sequenceState.highDetected ? '40px' : '10px';
            bar1.style.background = sequenceState.highDetected ? '#ff3366' : '#333';

            bar2.style.height = sequenceState.lowDetected ? '40px' : '10px';
            bar2.style.background = sequenceState.lowDetected ? '#ff3366' : '#333';

            bar3.style.height = sequenceState.finalHighDetected ? '40px' : '10px';
            bar3.style.background = sequenceState.finalHighDetected ? '#ff3366' : '#333';

            // Update progress text
            let progress = 0;
            if (sequenceState.highDetected) progress = 1;
            if (sequenceState.lowDetected) progress = 2;
            if (sequenceState.finalHighDetected) progress = 3;
            sequenceProgressSpan.innerText = progress + '/3';

            // Update pattern match percentage
            if (sequenceState.finalHighDetected) {
                patternMatchSpan.innerText = Math.round(sequenceState.confidence * 100) + '%';
            } else {
                patternMatchSpan.innerText = '0%';
            }

            confidenceSpan.innerText = sequenceState.confidence.toFixed(2);

            // Update status message
            if (sequenceState.finalHighDetected) {
                patternStatus.innerText = '🎯 PATTERN DETECTED!';
                patternStatus.style.color = '#ff3366';
            } else if (sequenceState.lowDetected) {
                patternStatus.innerText = '⬇️ Looking for final high tone...';
                patternStatus.style.color = '#ffcc00';
            } else if (sequenceState.highDetected) {
                patternStatus.innerText = '⬇️ Looking for low tone...';
                patternStatus.style.color = '#ffcc00';
            } else {
                patternStatus.innerText = '⬆️ Waiting for first high tone...';
                patternStatus.style.color = '#888';
            }
        }

        // ============================================
        // Check if frequency matches target
        // ============================================
        function frequencyMatches(freq, target) {
            return Math.abs(freq - target) <= PATTERN.TOLERANCE;
        }

        // ============================================
        // Pattern detection
        // ============================================
        function detectPattern() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(detectPattern);
                return;
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Find dominant frequency in our bands of interest
            const highBin = Math.floor(PATTERN.HIGH_FREQ / nyquist * bufferLength);
            const lowBin = Math.floor(PATTERN.LOW_FREQ / nyquist * bufferLength);
            const toleranceBins = Math.floor(PATTERN.TOLERANCE / nyquist * bufferLength);

            // Check energy at high frequency band
            let highEnergy = 0;
            let highBinMax = highBin;
            let highMaxEnergy = 0;

            for (let i = highBin - toleranceBins; i <= highBin + toleranceBins; i++) {
                if (i >= 0 && i < bufferLength) {
                    const energy = dataArray[i] / 255;
                    highEnergy += energy;
                    if (energy > highMaxEnergy) {
                        highMaxEnergy = energy;
                        highBinMax = i;
                    }
                }
            }
            highEnergy = highEnergy / (toleranceBins * 2 + 1);

            // Check energy at low frequency band
            let lowEnergy = 0;
            let lowBinMax = lowBin;
            let lowMaxEnergy = 0;

            for (let i = lowBin - toleranceBins; i <= lowBin + toleranceBins; i++) {
                if (i >= 0 && i < bufferLength) {
                    const energy = dataArray[i] / 255;
                    lowEnergy += energy;
                    if (energy > lowMaxEnergy) {
                        lowMaxEnergy = energy;
                        lowBinMax = i;
                    }
                }
            }
            lowEnergy = lowEnergy / (toleranceBins * 2 + 1);

            // Get current dominant frequency
            const highFreq = (highBinMax / bufferLength) * nyquist;
            const lowFreq = (lowBinMax / bufferLength) * nyquist;

            // Determine what we're hearing now
            let currentFreq = 0;
            let currentEnergy = 0;
            let currentBand = 'none';

            if (highEnergy > PATTERN.MIN_ENERGY && highEnergy > lowEnergy * 1.5) {
                currentFreq = highFreq;
                currentEnergy = highEnergy;
                currentBand = 'high';
            } else if (lowEnergy > PATTERN.MIN_ENERGY && lowEnergy > highEnergy * 1.5) {
                currentFreq = lowFreq;
                currentEnergy = lowEnergy;
                currentBand = 'low';
            }

            currentFreqSpan.innerText = currentFreq > 0 ? Math.round(currentFreq) + ' Hz' : '---';

            const now = Date.now();

            // Pattern matching state machine
            if (currentBand !== 'none') {
                switch (sequenceState.stage) {
                    case 0: // Waiting for first high tone
                        if (currentBand === 'high' && frequencyMatches(currentFreq, PATTERN.HIGH_FREQ)) {
                            sequenceState.highDetected = true;
                            sequenceState.stage = 1;
                            sequenceState.detectionWindow = now;
                            sequenceState.highFreqs.push(currentFreq);
                            log(`⬆️ First high tone detected: ${Math.round(currentFreq)} Hz`, 'detection');
                        }
                        break;

                    case 1: // Waiting for low tone
                        if (currentBand === 'low' && frequencyMatches(currentFreq, PATTERN.LOW_FREQ)) {
                            sequenceState.lowDetected = true;
                            sequenceState.stage = 2;
                            sequenceState.detectionWindow = now;
                            sequenceState.lowFreqs.push(currentFreq);
                            log(`⬇️ Low tone detected: ${Math.round(currentFreq)} Hz`, 'detection');
                        } else if (now - sequenceState.detectionWindow > PATTERN.STAGE2_DURATION) {
                            // Timeout - reset
                            resetSequence();
                        }
                        break;

                    case 2: // Waiting for final high tone
                        if (currentBand === 'high' && frequencyMatches(currentFreq, PATTERN.HIGH_FREQ)) {
                            sequenceState.finalHighDetected = true;
                            sequenceState.stage = 3;

                            // Calculate confidence based on frequency accuracy
                            const firstHighAvg = sequenceState.highFreqs.reduce((a, b) => a + b, 0) / sequenceState.highFreqs.length;
                            const lowAvg = sequenceState.lowFreqs.reduce((a, b) => a + b, 0) / sequenceState.lowFreqs.length;

                            const highAccuracy = 1 - Math.min(1, Math.abs(firstHighAvg - PATTERN.HIGH_FREQ) / PATTERN.TOLERANCE);
                            const lowAccuracy = 1 - Math.min(1, Math.abs(lowAvg - PATTERN.LOW_FREQ) / PATTERN.TOLERANCE);
                            const finalHighAccuracy = 1 - Math.min(1, Math.abs(currentFreq - PATTERN.HIGH_FREQ) / PATTERN.TOLERANCE);

                            sequenceState.confidence = (highAccuracy + lowAccuracy + finalHighAccuracy) / 3;

                            log(`⬆️ Final high tone detected: ${Math.round(currentFreq)} Hz`, 'detection');

                            // Check if pattern is complete and confidence is high enough
                            if (sequenceState.confidence >= PATTERN.CONFIDENCE_THRESHOLD) {
                                detectionCount++;
                                detectionCountSpan.innerText = `Detections: ${detectionCount}`;

                                signalLed.className = 'signal-led detected';
                                setTimeout(() => {
                                    signalLed.className = 'signal-led';
                                }, 1000);

                                log(`🎯 TRI-TONE PATTERN MATCHED! Confidence: ${Math.round(sequenceState.confidence * 100)}%`, 'detection');
                            }

                            // Auto-reset after detection
                            setTimeout(resetSequence, 2000);
                        } else if (now - sequenceState.detectionWindow > PATTERN.STAGE3_DURATION) {
                            // Timeout - reset
                            resetSequence();
                        }
                        break;
                }
            } else if (sequenceState.stage > 0) {
                // No signal detected but we're in a sequence - check timeout
                if (now - sequenceState.detectionWindow > PATTERN.MAX_PATTERN_DURATION) {
                    resetSequence();
                }
            }

            updateUI();
            requestAnimationFrame(detectPattern);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' : 'log-entry';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });

        // Initial log
        log("System ready - listening for 1234Hz → 900Hz → 1234Hz pattern");
    </script>
</body>
</html>
