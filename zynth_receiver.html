<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Flute Receiver - Warble Detection</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ffcc;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .detection-icon {
            text-align: center;
            font-size: 2rem;
            margin: 10px 0;
        }
        .code-display {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
            min-height: 80px;
        }
        .frame-diagram {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .frame-part {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .listening { background: #ff3366; color: white; animation: pulse 1s infinite; }
        .detected { background: #00ffcc; color: black; }
        .status-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .mic-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .mic-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }
        .mic-led.listening {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        .binary-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            min-height: 50px;
        }
        .bit {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.1s;
            margin: 2px;
        }
        .bit.received {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 10px #00ffcc;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #000;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #00ffcc;
            width: 0%;
            transition: width 0.1s;
        }
        .modulation-meter {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffcc00;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 5px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #ffcc00;
            width: 0%;
            transition: width 0.1s;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 10px 0;
        }
        button.primary {
            background: #00ffcc;
            color: #000;
            border: none;
        }
        button.primary:hover {
            background: #00cca3;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-entry.detection {
            color: #00ffcc;
            font-weight: bold;
        }
        .log-entry.warble {
            color: #ffcc00;
        }
        .visualizer {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 Zynth Flute Receiver</h1>
        <div class="subtitle">Warble Pattern Detection (sounds like flute)</div>

        <div class="detection-icon">🎵🔍🎵</div>

        <div class="code-display" id="received-code">---</div>

        <div class="frame-diagram">
            <span class="frame-part" id="status-listening">LISTENING</span>
            <span class="frame-part" id="status-detected">DETECTED</span>
        </div>

        <div class="status-card">
            <div class="mic-status">
                <span>🎤 Ear (listening for warbles)</span>
                <div class="mic-led" id="mic-led"></div>
            </div>
            <button id="mic-btn" class="primary">🎤 Wake the Ear</button>
            <button id="stop-mic-btn" disabled>⏹️ Stop Listening</button>
        </div>

        <div class="modulation-meter">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span>🎵 Warble Confidence</span>
                <span id="confidence-value" style="color: #ffcc00;">0%</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="confidence-meter" style="width: 0%;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: #888;">
                <span>Vibrato rate: <span id="detected-rate">---</span> Hz</span>
                <span>Depth: <span id="detected-depth">---</span> Hz</span>
            </div>
        </div>

        <canvas id="visualizer" class="visualizer"></canvas>

        <div class="binary-row" id="binary-row"></div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">State</div>
                <div class="stat-value" id="decoder-state">Idle</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Modulation Score</div>
                <div class="stat-value" id="modulation-score">0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Bits Received</div>
                <div class="stat-value" id="bits-received">0/16</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Valid Frames</div>
                <div class="stat-value" id="valid-frames">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="note-progress"></div>
        </div>

        <button onclick="resetDecoder()">🔄 Reset Decoder</button>

        <div class="log" id="log">
            <div class="log-entry">[System] Flute warble decoder ready</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;

        // Warble detection parameters (from conductor.html)
        const BASE_FLUTE_FREQ = 440;  // A4 - we're listening for modulation around this
        const WARBLE_ENERGY_THRESHOLD = 0.02;
        const WARBLE_FREQ_BINS = 5;    // Look at ±5 FFT bins
        const WARBLE_MIN_CONFIDENCE = 0.6;
        const WARBLE_LOOKBACK_FRAMES = 15;  // Need 15 frames for modulation analysis
        const WARBLE_COOLDOWN_MS = 200;      // Min time between detections

        // Detection thresholds (from bach_analyzer.py)
        const MIN_WARBLE_DEPTH = 15;    // Hz
        const MAX_WARBLE_DEPTH = 80;    // Hz
        const MIN_VIBRATO_RATE = 1.5;   // Hz
        const MAX_VIBRATO_RATE = 4.5;   // Hz
        const MIN_SIGN_CHANGES = 3;      // Need at least 3 direction changes

        // Note timing
        const NOTE_DURATION = 300;       // ms per note
        const FRAME_HOP_MS = 23;         // ~23ms per frame (matches bach_analyzer)

        // Decoder state
        const STATE_IDLE = 0;
        const STATE_LISTENING = 1;
        const STATE_DETECTING = 2;
        const STATE_COMPLETE = 3;

        let decoderState = STATE_IDLE;
        let stateStartTime = 0;
        let currentBits = [];
        let warbleBuffer = [];
        let validFrameCount = 0;
        let currentNoteIndex = 0;
        let detectionConfidence = 0;

        const FFT_SIZE = 4096;

        // DOM elements
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const micLed = document.getElementById('mic-led');
        const receivedCodeSpan = document.getElementById('received-code');
        const decoderStateSpan = document.getElementById('decoder-state');
        const modulationScoreSpan = document.getElementById('modulation-score');
        const bitsReceivedSpan = document.getElementById('bits-received');
        const validFramesSpan = document.getElementById('valid-frames');
        const binaryRow = document.getElementById('binary-row');
        const noteProgress = document.getElementById('note-progress');
        const confidenceMeter = document.getElementById('confidence-meter');
        const confidenceValue = document.getElementById('confidence-value');
        const detectedRate = document.getElementById('detected-rate');
        const detectedDepth = document.getElementById('detected-depth');
        const statusListening = document.getElementById('status-listening');
        const statusDetected = document.getElementById('status-detected');

        // ============================================
        // Reset decoder
        // ============================================
        function resetDecoder() {
            decoderState = STATE_IDLE;
            stateStartTime = 0;
            currentBits = [];
            warbleBuffer = [];
            currentNoteIndex = 0;
            detectionConfidence = 0;

            updateBinaryRow([]);
            updateFrameStatus();

            noteProgress.style.width = '0%';
            confidenceMeter.style.width = '0%';
            confidenceValue.innerText = '0%';
            decoderStateSpan.innerText = 'Idle';

            log("🔄 Decoder reset");
        }

        // ============================================
        // Update binary row display
        // ============================================
        function updateBinaryRow(bits) {
            binaryRow.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                if (i < bits.length && bits[i] !== undefined) {
                    bit.innerText = bits[i];
                    bit.classList.add('received');
                } else {
                    bit.innerText = '?';
                }
                binaryRow.appendChild(bit);
            }
        }

        // ============================================
        // Update frame status display
        // ============================================
        function updateFrameStatus() {
            statusListening.className = 'frame-part';
            statusDetected.className = 'frame-part';

            switch(decoderState) {
                case STATE_LISTENING:
                    statusListening.className = 'frame-part listening';
                    break;
                case STATE_DETECTING:
                case STATE_COMPLETE:
                    statusListening.className = 'frame-part listening';
                    statusDetected.className = 'frame-part detected';
                    break;
            }
        }

        // ============================================
        // Enable microphone
        // ============================================
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                mediaStream = stream;
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.2;
                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                micLed.className = 'mic-led listening';
                micBtn.disabled = true;
                stopMicBtn.disabled = false;

                log("✅ Ear is listening for flute warbles");
                resetDecoder();
                decoderState = STATE_LISTENING;
                stateStartTime = Date.now();
                detectWarble();
                drawVisualizer();

            } catch (e) {
                log(`❌ Mic error: ${e.message}`);
            }
        });

        // ============================================
        // Stop listening
        // ============================================
        stopMicBtn.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;
            micLed.className = 'mic-led';
            micBtn.disabled = false;
            stopMicBtn.disabled = true;

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }

            decoderState = STATE_IDLE;
            log("⏹️ Stopped listening");
        });

        // ============================================
        // Detect frequency modulation (warble)
        // ============================================
        function detectWarble() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const now = Date.now();

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Convert to float [0,1]
            const floatData = new Float32Array(bufferLength);
            for (let i = 0; i < bufferLength; i++) {
                floatData[i] = dataArray[i] / 255;
            }

            // Store in buffer for temporal analysis
            warbleBuffer.push({
                time: now,
                data: floatData.slice()
            });

            // Keep buffer at reasonable size
            if (warbleBuffer.length > WARBLE_LOOKBACK_FRAMES * 2) {
                warbleBuffer.shift();
            }

            // Need enough history for analysis
            if (warbleBuffer.length < WARBLE_LOOKBACK_FRAMES) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Get recent frames
            const recentFrames = warbleBuffer.slice(-WARBLE_LOOKBACK_FRAMES);

            // Calculate frequency bin for base flute tone (A4 = 440Hz)
            const nyquist = audioCtx.sampleRate / 2;
            const binIndex = Math.floor(BASE_FLUTE_FREQ / nyquist * bufferLength);

            if (binIndex < 0 || binIndex >= bufferLength) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Get energy in surrounding bins
            let energy = 0;
            let binCount = 0;
            for (let i = -WARBLE_FREQ_BINS; i <= WARBLE_FREQ_BINS; i++) {
                const idx = binIndex + i;
                if (idx >= 0 && idx < bufferLength) {
                    energy += floatData[idx];
                    binCount++;
                }
            }
            energy = energy / binCount;

            // Update modulation score display
            modulationScoreSpan.innerText = energy.toFixed(3);

            // Only proceed if we have enough energy
            if (energy < WARBLE_ENERGY_THRESHOLD) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Extract frequency peaks over time to detect modulation
            const peakFreqs = [];
            for (let i = 0; i < recentFrames.length; i++) {
                const frame = recentFrames[i];

                // Find peak in region around base frequency
                let maxEnergy = 0;
                let maxIdx = binIndex;
                for (let j = -WARBLE_FREQ_BINS * 2; j <= WARBLE_FREQ_BINS * 2; j++) {
                    const idx = binIndex + j;
                    if (idx >= 0 && idx < frame.data.length && frame.data[idx] > maxEnergy) {
                        maxEnergy = frame.data[idx];
                        maxIdx = idx;
                    }
                }

                const peakFreq = (maxIdx / bufferLength) * nyquist;
                peakFreqs.push(peakFreq);
            }

            // Calculate frequency variation over time
            if (peakFreqs.length < 5) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const freqChanges = [];
            for (let i = 1; i < peakFreqs.length; i++) {
                freqChanges.push(peakFreqs[i] - peakFreqs[i-1]);
            }

            // Look for alternating sign changes (characteristic of warble)
            let signChanges = 0;
            for (let i = 1; i < freqChanges.length; i++) {
                if (Math.sign(freqChanges[i]) !== Math.sign(freqChanges[i-1]) &&
                    Math.abs(freqChanges[i]) > 2) {  // Ignore tiny changes
                    signChanges++;
                }
            }

            // Calculate frequency range
            const freqRange = Math.max(...peakFreqs) - Math.min(...peakFreqs);

            // Calculate vibrato rate (zero crossings)
            let zeroCrossings = 0;
            for (let i = 1; i < peakFreqs.length; i++) {
                if ((peakFreqs[i] - BASE_FLUTE_FREQ) * (peakFreqs[i-1] - BASE_FLUTE_FREQ) < 0) {
                    zeroCrossings++;
                }
            }
            const vibratoRate = (zeroCrossings / 2) / (WARBLE_LOOKBACK_FRAMES * FRAME_HOP_MS / 1000);

            // Update detected parameters
            detectedRate.innerText = vibratoRate.toFixed(1);
            detectedDepth.innerText = Math.round(freqRange);

            // Warble detection logic:
            // 1. Frequency range of 15-80Hz (our encoded depth)
            // 2. At least 3 sign changes (up-down-up-down pattern)
            // 3. Vibrato rate between 1.5-4.5 Hz
            let modulationScore = 0;

            if (freqRange >= MIN_WARBLE_DEPTH && freqRange <= MAX_WARBLE_DEPTH) {
                modulationScore += 0.4;
            }

            if (signChanges >= MIN_SIGN_CHANGES) {
                modulationScore += 0.3;
            }

            if (vibratoRate >= MIN_VIBRATO_RATE && vibratoRate <= MAX_VIBRATO_RATE) {
                modulationScore += 0.3;
            }

            // Energy bonus
            if (energy > WARBLE_ENERGY_THRESHOLD * 2) {
                modulationScore += 0.1;
            }

            // Clamp to 0-1
            modulationScore = Math.min(1, modulationScore);

            // Update confidence meter
            confidenceMeter.style.width = (modulationScore * 100) + '%';
            confidenceValue.innerText = Math.round(modulationScore * 100) + '%';

            // If modulation score is high enough, this is a warble detection
            if (modulationScore >= WARBLE_MIN_CONFIDENCE) {
                // Avoid duplicate detections within cooldown period
                if (now - stateStartTime > WARBLE_COOLDOWN_MS) {
                    processWarbleDetection(modulationScore, vibratoRate, freqRange);
                    stateStartTime = now;
                }
            }

            requestAnimationFrame(detectWarble);
        }

        // ============================================
        // Process a detected warble
        // ============================================
        function processWarbleDetection(confidence, rate, depth) {
            // Flash the visualizer
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#00ffcc';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;

            // State machine for bit reception
            switch(decoderState) {
                case STATE_LISTENING:
                    // Start of a new frame
                    decoderState = STATE_DETECTING;
                    currentBits = [];
                    currentNoteIndex = 0;
                    log(`🎯 Warble detected! Starting frame (conf: ${Math.round(confidence*100)}%)`, 'warble');
                    // Fall through to process first bit

                case STATE_DETECTING:
                    // We're in the middle of receiving bits
                    if (currentNoteIndex < 16) {
                        // Determine bit value
                        // Warble = 1, No warble = 0
                        // But we're only called when warble is detected, so this is a 1
                        const bitValue = 1;

                        currentBits[currentNoteIndex] = bitValue;

                        log(`   Bit ${currentNoteIndex + 1}/16: 1 (warble)`, 'detection');

                        updateBinaryRow(currentBits);
                        bitsReceivedSpan.innerText = `${currentBits.filter(b => b !== undefined).length}/16`;

                        // Update progress
                        const progress = ((currentNoteIndex + 1) / 16) * 100;
                        noteProgress.style.width = progress + '%';

                        currentNoteIndex++;

                        // Check if we've received all bits
                        if (currentNoteIndex >= 16) {
                            completeFrame();
                        }
                    }
                    break;
            }
        }

        // ============================================
        // Complete a frame (all bits received)
        // ============================================
        function completeFrame() {
            // For now, we assume missing bits are 0
            // In a real implementation, we'd have timeouts for each note position
            for (let i = 0; i < 16; i++) {
                if (currentBits[i] === undefined) {
                    currentBits[i] = 0;
                    log(`   Bit ${i + 1}/16: 0 (no warble - assumed)`, 'detection');
                }
            }

            // Sort by index
            currentBits.sort((a, b) => a.index - b.index);

            const codeString = currentBits.join('');
            receivedCodeSpan.innerText = codeString;

            validFrameCount++;
            validFramesSpan.innerText = validFrameCount;

            log(`🎯 VALID FRAME: ${codeString}`, 'detection');

            decoderState = STATE_COMPLETE;
            updateFrameStatus();

            // Auto-reset after 3 seconds
            setTimeout(() => {
                if (decoderState === STATE_COMPLETE) {
                    resetDecoder();
                    decoderState = STATE_LISTENING;
                    decoderStateSpan.innerText = 'Listening';
                }
            }, 3000);
        }

        // ============================================
        // Draw FFT visualizer
        // ============================================
        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw frequency spectrum (focus on 200-800Hz range)
            ctx.fillStyle = '#00ffcc';
            const barWidth = 3;

            const startBin = Math.floor(200 / (audioCtx.sampleRate / FFT_SIZE));
            const endBin = Math.floor(800 / (audioCtx.sampleRate / FFT_SIZE));

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;

                const x = (i - startBin) * (barWidth + 1);
                const value = dataArray[i];
                const barHeight = (value / 255) * height;

                ctx.fillRect(x, height - barHeight, barWidth, barHeight);
            }

            // Highlight the base flute frequency
            const baseBin = Math.floor(BASE_FLUTE_FREQ / (audioCtx.sampleRate / FFT_SIZE));
            if (baseBin >= startBin && baseBin < endBin) {
                const x = (baseBin - startBin) * (barWidth + 1);
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(x, 0, barWidth, height);
            }

            requestAnimationFrame(drawVisualizer);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' :
                             type === 'warble' ? 'log-entry warble' : 'log-entry';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });

        log("System ready - Flute warble decoder (listening for natural vibrato)");
    </script>
</body>
</html>
