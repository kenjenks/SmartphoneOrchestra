<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Receiver - FSK with Start/Stop Bits</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ffcc;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .code-display {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
            min-height: 80px;
        }
        .frame-diagram {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .frame-part {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .wakeup-detected { background: #ff3366; color: white; }
        .start-detected { background: #ffcc00; color: black; }
        .data-detected { background: #00ffcc; color: black; }
        .stop-detected { background: #9933ff; color: white; }
        .status-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .mic-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .mic-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }
        .mic-led.listening {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .binary-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            min-height: 50px;
        }
        .bit {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.1s;
            margin: 2px;
        }
        .bit.received {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 10px #00ffcc;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #000;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #00ffcc;
            width: 0%;
            transition: width 0.1s;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 10px 0;
        }
        button.primary {
            background: #00ffcc;
            color: #000;
            border: none;
        }
        button.primary:hover {
            background: #00cca3;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-entry.detection {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 Zynth Receiver</h1>
        <div class="subtitle">FSK with Start/Stop Bit Detection</div>

        <div class="code-display" id="received-code">---</div>

        <div class="frame-diagram" id="frame-status">
            <span class="frame-part" id="status-wake">WAKE</span>
            <span class="frame-part" id="status-start">START</span>
            <span class="frame-part" id="status-data">DATA</span>
            <span class="frame-part" id="status-stop">STOP</span>
        </div>

        <div class="status-card">
            <div class="mic-status">
                <span>Microphone</span>
                <div class="mic-led" id="mic-led"></div>
            </div>
            <button id="mic-btn" class="primary">🎤 Enable Microphone</button>
            <button id="stop-mic-btn" disabled>⏹️ Stop Listening</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="wake-progress"></div>
        </div>

        <div class="binary-row" id="binary-row"></div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">State</div>
                <div class="stat-value" id="decoder-state">Waiting</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Signal Strength</div>
                <div class="stat-value" id="signal-strength">0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Bits Received</div>
                <div class="stat-value" id="bits-received">0/16</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Valid Frames</div>
                <div class="stat-value" id="valid-frames">0</div>
            </div>
        </div>

        <button onclick="resetDecoder()">🔄 Reset Decoder</button>

        <div class="log" id="log">
            <div class="log-entry">[System] FSK decoder ready</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;

        // FSK parameters (must match player)
        const FREQ_0 = 900;
        const FREQ_1 = 1234;
        const FREQ_TOLERANCE = 25; // Hz
        const WAKE_DURATION = 500;  // ms
        const START_DURATION = 200; // ms
        const BIT_DURATION = 150;   // ms
        const STOP_DURATION = 200;  // ms

        // Decoder state
        const STATE_IDLE = 0;
        const STATE_WAKE = 1;
        const STATE_START = 2;
        const STATE_DATA = 3;
        const STATE_STOP = 4;
        const STATE_COMPLETE = 5;

        let decoderState = STATE_IDLE;
        let stateStartTime = 0;
        let currentBits = [];
        let bitSamples = [];
        let validFrameCount = 0;
        let wakeConfidence = 0;

        const FFT_SIZE = 8192;
        const MIN_ENERGY = 0.02;
        const SAMPLES_PER_BIT = 5; // Take 5 samples per bit for majority voting

        // ============================================
        // DOM elements
        // ============================================
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const micLed = document.getElementById('mic-led');
        const receivedCodeSpan = document.getElementById('received-code');
        const decoderStateSpan = document.getElementById('decoder-state');
        const signalStrengthSpan = document.getElementById('signal-strength');
        const bitsReceivedSpan = document.getElementById('bits-received');
        const validFramesSpan = document.getElementById('valid-frames');
        const binaryRow = document.getElementById('binary-row');
        const wakeProgress = document.getElementById('wake-progress');
        const statusWake = document.getElementById('status-wake');
        const statusStart = document.getElementById('status-start');
        const statusData = document.getElementById('status-data');
        const statusStop = document.getElementById('status-stop');

        // ============================================
        // Reset decoder
        // ============================================
        function resetDecoder() {
            decoderState = STATE_IDLE;
            stateStartTime = 0;
            currentBits = [];
            bitSamples = [];
            wakeConfidence = 0;
            updateBinaryRow([]);
            updateFrameStatus();
            wakeProgress.style.width = '0%';
            decoderStateSpan.innerText = 'Idle';
            log("🔄 Decoder reset");
        }

        // ============================================
        // Update binary row display
        // ============================================
        function updateBinaryRow(bits) {
            binaryRow.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                if (i < bits.length && bits[i] !== undefined) {
                    bit.innerText = bits[i];
                    bit.classList.add('received');
                } else {
                    bit.innerText = '?';
                }
                binaryRow.appendChild(bit);
            }
        }

        // ============================================
        // Update frame status display
        // ============================================
        function updateFrameStatus() {
            statusWake.className = 'frame-part';
            statusStart.className = 'frame-part';
            statusData.className = 'frame-part';
            statusStop.className = 'frame-part';

            switch(decoderState) {
                case STATE_WAKE:
                    statusWake.className = 'frame-part wakeup-detected';
                    break;
                case STATE_START:
                    statusWake.className = 'frame-part wakeup-detected';
                    statusStart.className = 'frame-part start-detected';
                    break;
                case STATE_DATA:
                    statusWake.className = 'frame-part wakeup-detected';
                    statusStart.className = 'frame-part start-detected';
                    statusData.className = 'frame-part data-detected';
                    break;
                case STATE_STOP:
                case STATE_COMPLETE:
                    statusWake.className = 'frame-part wakeup-detected';
                    statusStart.className = 'frame-part start-detected';
                    statusData.className = 'frame-part data-detected';
                    statusStop.className = 'frame-part stop-detected';
                    break;
            }
        }

        // ============================================
        // Enable microphone
        // ============================================
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                mediaStream = stream;
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                micLed.className = 'mic-led listening';
                micBtn.disabled = true;
                stopMicBtn.disabled = false;

                log("✅ Microphone active");
                resetDecoder();
                decodeSignal();

            } catch (e) {
                log(`❌ Mic error: ${e.message}`);
            }
        });

        // ============================================
        // Stop listening
        // ============================================
        stopMicBtn.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;
            micLed.className = 'mic-led';
            micBtn.disabled = false;
            stopMicBtn.disabled = true;

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            log("⏹️ Stopped listening");
        });

        // ============================================
        // Detect current frequency and strength
        // ============================================
        function detectFrequency() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            const bin0 = Math.floor(FREQ_0 / nyquist * bufferLength);
            const bin1 = Math.floor(FREQ_1 / nyquist * bufferLength);
            const tolerance = Math.floor(FREQ_TOLERANCE / nyquist * bufferLength);

            // Energy at 900 Hz
            let energy0 = 0;
            for (let i = bin0 - tolerance; i <= bin0 + tolerance; i++) {
                if (i >= 0 && i < bufferLength) {
                    energy0 += dataArray[i] / 255;
                }
            }
            energy0 = energy0 / (tolerance * 2 + 1);

            // Energy at 1234 Hz
            let energy1 = 0;
            for (let i = bin1 - tolerance; i <= bin1 + tolerance; i++) {
                if (i >= 0 && i < bufferLength) {
                    energy1 += dataArray[i] / 255;
                }
            }
            energy1 = energy1 / (tolerance * 2 + 1);

            const maxEnergy = Math.max(energy0, energy1);
            signalStrengthSpan.innerText = maxEnergy.toFixed(3);

            if (maxEnergy < MIN_ENERGY) {
                return { bit: null, confidence: 0, energy0, energy1 };
            }

            if (energy1 > energy0 * 1.8) {
                return { bit: 1, confidence: energy1 / (energy0 + 0.01), energy0, energy1 };
            } else if (energy0 > energy1 * 1.8) {
                return { bit: 0, confidence: energy0 / (energy1 + 0.01), energy0, energy1 };
            }

            return { bit: null, confidence: 0, energy0, energy1 };
        }

        // ============================================
        // Main decoding loop
        // ============================================
        function decodeSignal() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(decodeSignal);
                return;
            }

            const detection = detectFrequency();
            const now = Date.now();

            // State machine
            switch(decoderState) {
                case STATE_IDLE:
                    decoderStateSpan.innerText = 'Idle';
                    // Look for wake-up tone (long 1234 Hz)
                    if (detection.bit === 1 && detection.confidence > 0.8) {
                        decoderState = STATE_WAKE;
                        stateStartTime = now;
                        wakeConfidence = 0;
                        log("🔴 Wake-up tone detected", 'detection');
                    }
                    break;

                case STATE_WAKE:
                    decoderStateSpan.innerText = 'Wake';
                    if (detection.bit === 1 && detection.confidence > 0.7) {
                        // Update progress
                        const wakeProgressPercent = Math.min(100, ((now - stateStartTime) / WAKE_DURATION) * 100);
                        wakeProgress.style.width = wakeProgressPercent + '%';

                        // After enough wake time, look for start bit
                        if (now - stateStartTime >= WAKE_DURATION * 0.8) {
                            decoderState = STATE_START;
                            stateStartTime = now;
                            log("✅ Wake complete, waiting for start bit", 'detection');
                        }
                    } else {
                        // Lost wake signal - reset
                        resetDecoder();
                    }
                    break;

                case STATE_START:
                    decoderStateSpan.innerText = 'Start';
                    if (detection.bit === 1 && detection.confidence > 0.7) {
                        if (now - stateStartTime >= START_DURATION * 0.8) {
                            decoderState = STATE_DATA;
                            stateStartTime = now;
                            currentBits = [];
                            bitSamples = [];
                            log("✅ Start bit detected, receiving data...", 'detection');
                        }
                    } else if (detection.bit !== null) {
                        // Wrong bit during start - reset
                        resetDecoder();
                    }
                    break;

                case STATE_DATA:
                    decoderStateSpan.innerText = 'Data';
                    if (detection.bit !== null && detection.confidence > 0.6) {
                        // Calculate which bit we're on
                        const elapsedSinceStart = now - stateStartTime;
                        const bitIndex = Math.floor(elapsedSinceStart / BIT_DURATION);

                        if (bitIndex >= 0 && bitIndex < 16) {
                            // Store sample for this bit position
                            if (!bitSamples[bitIndex]) {
                                bitSamples[bitIndex] = [];
                            }
                            bitSamples[bitIndex].push({
                                bit: detection.bit,
                                time: now,
                                confidence: detection.confidence
                            });

                            // Keep only recent samples
                            if (bitSamples[bitIndex].length > SAMPLES_PER_BIT) {
                                bitSamples[bitIndex].shift();
                            }

                            // Determine bit value by majority vote
                            if (bitSamples[bitIndex].length >= 3) {
                                const ones = bitSamples[bitIndex].filter(s => s.bit === 1).length;
                                const zeros = bitSamples[bitIndex].filter(s => s.bit === 0).length;
                                const majorityBit = ones > zeros ? 1 : 0;
                                const confidence = Math.max(ones, zeros) / bitSamples[bitIndex].length;

                                if (currentBits[bitIndex] === undefined || confidence > 0.8) {
                                    currentBits[bitIndex] = majorityBit;
                                    updateBinaryRow(currentBits);
                                    bitsReceivedSpan.innerText = `${currentBits.filter(b => b !== undefined).length}/16`;
                                    log(`Bit ${bitIndex + 1}: ${majorityBit} (${Math.round(confidence*100)}%)`);
                                }
                            }
                        }

                        // Check if we've received all bits
                        if (currentBits.filter(b => b !== undefined).length === 16) {
                            decoderState = STATE_STOP;
                            stateStartTime = now;
                            log("✅ All bits received, waiting for stop bit", 'detection');
                        }
                    }
                    break;

                case STATE_STOP:
                    decoderStateSpan.innerText = 'Stop';
                    if (detection.bit === 1 && detection.confidence > 0.7) {
                        if (now - stateStartTime >= STOP_DURATION * 0.8) {
                            // Valid frame received!
                            const codeString = currentBits.join('');
                            receivedCodeSpan.innerText = codeString;

                            validFrameCount++;
                            validFramesSpan.innerText = validFrameCount;

                            // Calculate overall confidence
                            const avgConfidence = bitSamples.reduce((sum, samples, i) => {
                                if (samples && samples.length > 0) {
                                    const bit = currentBits[i];
                                    const matches = samples.filter(s => s.bit === bit).length;
                                    return sum + (matches / samples.length);
                                }
                                return sum + 0.5;
                            }, 0) / 16;

                            log(`🎯 VALID FRAME: ${codeString} (${Math.round(avgConfidence*100)}% confidence)`, 'detection');

                            decoderState = STATE_COMPLETE;
                        }
                    } else if (detection.bit !== null) {
                        // Lost stop signal - reset
                        resetDecoder();
                    }
                    break;

                case STATE_COMPLETE:
                    decoderStateSpan.innerText = 'Complete';
                    // Auto-reset after 3 seconds
                    setTimeout(() => {
                        if (decoderState === STATE_COMPLETE) {
                            resetDecoder();
                        }
                    }, 3000);
                    break;
            }

            updateFrameStatus();
            requestAnimationFrame(decodeSignal);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' : 'log-entry';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });

        log("System ready - FSK with start/stop bits");
    </script>
</body>
</html>
