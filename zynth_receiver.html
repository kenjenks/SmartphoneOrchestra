<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Receiver - Digital Decoder</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ffcc;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .code-display {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
            min-height: 80px;
        }
        .status-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .mic-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .mic-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }
        .mic-led.listening {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .decoding-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        .signal-led {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            border: 3px solid #444;
        }
        .signal-led.detected {
            background: #00ffcc;
            box-shadow: 0 0 80px #00ffcc;
            animation: pulse-fast 0.2s infinite;
            border-color: white;
        }
        @keyframes pulse-fast {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .binary-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            min-height: 50px;
        }
        .bit {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.1s;
        }
        .bit.received {
            background: #00ffcc;
            color: #000;
        }
        .bit.preamble {
            background: #ffcc00;
            color: #000;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .sync-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .sync-led {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s;
        }
        .sync-led.active {
            background: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
        }
        .sync-led.preamble {
            background: #ffcc00;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin: 10px 0;
        }
        button.primary {
            background: #00ffcc;
            color: #000;
            border: none;
        }
        button.primary:hover {
            background: #00cca3;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dotted #222;
        }
        .log-entry.detection {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 Zynth Receiver</h1>
        <div class="subtitle">Digital Decoder - FSK Demodulator</div>

        <div class="code-display" id="received-code">---</div>

        <div class="status-card">
            <div class="mic-status">
                <span>Microphone</span>
                <div class="mic-led" id="mic-led"></div>
            </div>
            <button id="mic-btn" class="primary">🎤 Enable Microphone</button>
            <button id="stop-mic-btn" disabled>⏹️ Stop Listening</button>
        </div>

        <div class="sync-indicator">
            <div class="sync-led" id="sync-preamble"></div>
            <div class="sync-led" id="sync-data"></div>
            <div class="sync-led" id="sync-postamble"></div>
            <div class="sync-led" id="sync-valid"></div>
        </div>

        <div class="decoding-indicator">
            <div class="signal-led" id="signal-led">📡</div>
            <div class="binary-row" id="binary-row"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">State</div>
                <div class="stat-value" id="decoder-state">Waiting</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Confidence</div>
                <div class="stat-value" id="confidence">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Bits Received</div>
                <div class="stat-value" id="bits-received">0/16</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Valid Codes</div>
                <div class="stat-value" id="valid-codes">0</div>
            </div>
        </div>

        <button id="reset-decoder" onclick="resetDecoder()">🔄 Reset Decoder</button>

        <div class="log" id="log">
            <div class="log-entry">[System] Digital decoder ready</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;

        // FSK parameters (must match player)
        const FREQ_0 = 900;
        const FREQ_1 = 1234;
        const FREQ_TOLERANCE = 30; // Hz
        const BIT_DURATION = 100; // ms
        const PREAMBLE_DURATION = 200; // ms
        const POSTAMBLE_DURATION = 200; // ms

        // Decoder state machine
        const STATE_IDLE = 0;
        const STATE_PREAMBLE = 1;
        const STATE_DATA = 2;
        const STATE_POSTAMBLE = 3;
        const STATE_COMPLETE = 4;

        let decoderState = STATE_IDLE;
        let preambleStartTime = 0;
        let currentBits = [];
        let receivedCodes = [];
        let bitBuffer = [];
        let lastFrequency = 0;
        let validCodeCount = 0;

        const FFT_SIZE = 8192;
        const MIN_ENERGY = 0.02;
        const REQUIRED_PREAMBLE_MATCHES = 3; // Need 3 consecutive preamble detections
        let preambleMatchCount = 0;

        // ============================================
        // DOM elements
        // ============================================
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const micLed = document.getElementById('mic-led');
        const signalLed = document.getElementById('signal-led');
        const receivedCodeSpan = document.getElementById('received-code');
        const decoderStateSpan = document.getElementById('decoder-state');
        const confidenceSpan = document.getElementById('confidence');
        const bitsReceivedSpan = document.getElementById('bits-received');
        const validCodesSpan = document.getElementById('valid-codes');
        const binaryRow = document.getElementById('binary-row');
        const syncPreamble = document.getElementById('sync-preamble');
        const syncData = document.getElementById('sync-data');
        const syncPostamble = document.getElementById('sync-postamble');
        const syncValid = document.getElementById('sync-valid');

        // ============================================
        // Reset decoder
        // ============================================
        function resetDecoder() {
            decoderState = STATE_IDLE;
            preambleStartTime = 0;
            currentBits = [];
            bitBuffer = [];
            preambleMatchCount = 0;
            updateBinaryRow([]);
            updateSyncLEDs();
            decoderStateSpan.innerText = 'Idle';
            log("🔄 Decoder reset");
        }

        // ============================================
        // Update binary row display
        // ============================================
        function updateBinaryRow(bits) {
            binaryRow.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                if (i < bits.length) {
                    bit.innerText = bits[i];
                    bit.classList.add('received');
                } else {
                    bit.innerText = '?';
                }
                binaryRow.appendChild(bit);
            }
        }

        // ============================================
        // Update sync LEDs
        // ============================================
        function updateSyncLEDs() {
            syncPreamble.classList.remove('active', 'preamble');
            syncData.classList.remove('active');
            syncPostamble.classList.remove('active');
            syncValid.classList.remove('active');

            switch(decoderState) {
                case STATE_PREAMBLE:
                    syncPreamble.classList.add('preamble');
                    break;
                case STATE_DATA:
                    syncData.classList.add('active');
                    break;
                case STATE_POSTAMBLE:
                    syncPostamble.classList.add('active');
                    break;
                case STATE_COMPLETE:
                    syncValid.classList.add('active');
                    break;
            }
        }

        // ============================================
        // Enable microphone
        // ============================================
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                log("🎤 Requesting microphone access...");

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                mediaStream = stream;

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;

                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                micLed.className = 'mic-led listening';
                micBtn.disabled = true;
                stopMicBtn.disabled = false;

                log("✅ Microphone active - decoding FSK signal");

                resetDecoder();
                decodeSignal();

            } catch (e) {
                log(`❌ Mic error: ${e.message}`);
                micLed.className = 'mic-led';
            }
        });

        // ============================================
        // Stop listening
        // ============================================
        stopMicBtn.addEventListener('click', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;
            micLed.className = 'mic-led';
            micBtn.disabled = false;
            stopMicBtn.disabled = true;

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            log("⏹️ Stopped listening");
        });

        // ============================================
        // Detect current frequency
        // ============================================
        function detectFrequency() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Check both frequencies
            const bin0 = Math.floor(FREQ_0 / nyquist * bufferLength);
            const bin1 = Math.floor(FREQ_1 / nyquist * bufferLength);
            const tolerance = Math.floor(FREQ_TOLERANCE / nyquist * bufferLength);

            // Energy at 900 Hz
            let energy0 = 0;
            for (let i = bin0 - tolerance; i <= bin0 + tolerance; i++) {
                if (i >= 0 && i < bufferLength) {
                    energy0 += dataArray[i] / 255;
                }
            }
            energy0 = energy0 / (tolerance * 2 + 1);

            // Energy at 1234 Hz
            let energy1 = 0;
            for (let i = bin1 - tolerance; i <= bin1 + tolerance; i++) {
                if (i >= 0 && i < bufferLength) {
                    energy1 += dataArray[i] / 255;
                }
            }
            energy1 = energy1 / (tolerance * 2 + 1);

            // Determine dominant frequency
            if (energy0 < MIN_ENERGY && energy1 < MIN_ENERGY) {
                return { freq: 0, bit: null, confidence: 0 };
            }

            if (energy1 > energy0 * 1.5) {
                return {
                    freq: FREQ_1,
                    bit: 1,
                    confidence: Math.min(1, energy1 / (energy0 + 0.01)),
                    energy: energy1
                };
            } else if (energy0 > energy1 * 1.5) {
                return {
                    freq: FREQ_0,
                    bit: 0,
                    confidence: Math.min(1, energy0 / (energy1 + 0.01)),
                    energy: energy0
                };
            }

            return { freq: 0, bit: null, confidence: 0 };
        }

        // ============================================
        // Main decoding loop
        // ============================================
        function decodeSignal() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(decodeSignal);
                return;
            }

            const detection = detectFrequency();
            const now = Date.now();

            // Update signal LED based on detection
            if (detection.bit !== null) {
                signalLed.className = 'signal-led detected';
                lastFrequency = detection.freq;
            } else {
                signalLed.className = 'signal-led';
            }

            // State machine
            switch(decoderState) {
                case STATE_IDLE:
                    decoderStateSpan.innerText = 'Idle';
                    if (detection.bit === 1 && detection.confidence > 0.7) {
                        // Possible preamble detected
                        preambleMatchCount++;
                        if (preambleMatchCount >= REQUIRED_PREAMBLE_MATCHES) {
                            decoderState = STATE_PREAMBLE;
                            preambleStartTime = now;
                            preambleMatchCount = 0;
                            log("🔴 Preamble detected - starting decode", 'detection');
                        }
                    } else {
                        preambleMatchCount = 0;
                    }
                    break;

                case STATE_PREAMBLE:
                    decoderStateSpan.innerText = 'Preamble';
                    // Look for continuous 1234 Hz for PREAMBLE_DURATION
                    if (detection.bit === 1 && detection.confidence > 0.6) {
                        if (now - preambleStartTime >= PREAMBLE_DURATION * 0.8) {
                            decoderState = STATE_DATA;
                            currentBits = [];
                            bitBuffer = [];
                            log("📡 Preamble complete - starting data reception", 'detection');
                        }
                    } else if (detection.bit !== null) {
                        // Reset if we lose the signal
                        preambleStartTime = now;
                    }
                    break;

                case STATE_DATA:
                    decoderStateSpan.innerText = 'Data';
                    if (detection.bit !== null && detection.confidence > 0.5) {
                        // Sample at expected bit rate
                        const bitIndex = Math.floor((now - preambleStartTime - PREAMBLE_DURATION) / BIT_DURATION);

                        if (bitIndex >= 0 && bitIndex < 16) {
                            // Store this bit with timestamp
                            bitBuffer.push({
                                bit: detection.bit,
                                time: now,
                                confidence: detection.confidence,
                                index: bitIndex
                            });

                            // Clean up old samples
                            bitBuffer = bitBuffer.filter(b => b.time > now - BIT_DURATION * 2);

                            // Determine majority bit for this position
                            const samplesForIndex = bitBuffer.filter(b => b.index === bitIndex);
                            if (samplesForIndex.length > 3) {
                                const ones = samplesForIndex.filter(b => b.bit === 1).length;
                                const zeros = samplesForIndex.filter(b => b.bit === 0).length;
                                const majorityBit = ones > zeros ? 1 : 0;
                                const confidence = Math.max(ones, zeros) / samplesForIndex.length;

                                if (!currentBits[bitIndex] || confidence > 0.8) {
                                    currentBits[bitIndex] = majorityBit;
                                    updateBinaryRow(currentBits);
                                    bitsReceivedSpan.innerText = `${currentBits.filter(b => b !== undefined).length}/16`;
                                    log(`Bit ${bitIndex + 1}: ${majorityBit} (${Math.round(confidence*100)}%)`);
                                }
                            }
                        }

                        // Check if we have all bits
                        if (currentBits.filter(b => b !== undefined).length === 16) {
                            decoderState = STATE_POSTAMBLE;
                            preambleStartTime = now; // Reuse for postamble timing
                            log("✅ All 16 bits received, waiting for postamble", 'detection');
                        }
                    }
                    break;

                case STATE_POSTAMBLE:
                    decoderStateSpan.innerText = 'Postamble';
                    // Look for postamble (1234 Hz for 200ms)
                    if (detection.bit === 1 && detection.confidence > 0.6) {
                        if (now - preambleStartTime >= POSTAMBLE_DURATION * 0.8) {
                            // Valid code received!
                            const codeString = currentBits.join('');

                            // Verify it's a valid 16-bit code
                            if (codeString.length === 16 && !codeString.includes(undefined)) {
                                receivedCodeSpan.innerText = codeString;

                                // Calculate confidence
                                const avgConfidence = currentBits.reduce((sum, bit, i) => {
                                    const bitSamples = bitBuffer.filter(b => b.index === i);
                                    if (bitSamples.length > 0) {
                                        const matchCount = bitSamples.filter(b => b.bit === bit).length;
                                        return sum + (matchCount / bitSamples.length);
                                    }
                                    return sum + 0.5;
                                }, 0) / 16;

                                confidenceSpan.innerText = Math.round(avgConfidence * 100) + '%';

                                validCodeCount++;
                                validCodesSpan.innerText = validCodeCount;

                                log(`🎯 VALID CODE RECEIVED: ${codeString} (${Math.round(avgConfidence*100)}% confidence)`, 'detection');

                                decoderState = STATE_COMPLETE;
                            }
                        }
                    } else if (detection.bit !== null) {
                        // Reset postamble timer if signal lost
                        preambleStartTime = now;
                    }
                    break;

                case STATE_COMPLETE:
                    decoderStateSpan.innerText = 'Complete';
                    // Auto-reset after 2 seconds
                    setTimeout(() => {
                        if (decoderState === STATE_COMPLETE) {
                            resetDecoder();
                        }
                    }, 2000);
                    break;
            }

            updateSyncLEDs();
            requestAnimationFrame(decodeSignal);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' : 'log-entry';
            logDiv.innerHTML = `<div class="${className}">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });

        log("System ready - digital FSK decoder");
    </script>
</body>
</html>
