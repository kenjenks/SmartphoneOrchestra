<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra - xplay (Pillar Player)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #eee;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #ffaa44;
            font-weight: 300;
        }
        .status {
            background: #1a1a1a;
            border-left: 4px solid #ffaa44;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .status-connected {
            border-left-color: #00ffcc;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            background: #ffaa44;
            color: #000;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcc66;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-family: monospace;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            color: #ffaa44;
            font-weight: bold;
        }
        .log-area {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #111;
        }
        .timestamp {
            color: #666;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 xplay - Pillar Music Player</h1>
        <p style="color: #888;">Plays pillar music and logs timing. Use <strong>?seat=PILLAR_FL</strong> (or FR, BL, BR) in URL.</p>

        <div id="connection-status" class="status">
            🔌 Firebase: Disconnected
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">📡 Pillar ID:</span>
                <span class="info-value" id="pillar-id">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎵 Audio URL:</span>
                <span class="info-value" id="audio-url">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">⏱️ Start Time:</span>
                <span class="info-value" id="start-time">--</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔊 Playback Status:</span>
                <span class="info-value" id="playback-status">Not started</span>
            </div>
        </div>

        <div class="button-group">
            <button id="play-btn">▶️ PLAY PILLAR MUSIC</button>
        </div>

        <div class="log-area" id="log-area">
            <div class="log-entry">[System] xplay started. Waiting for play button...</div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
            messagingSenderId: "722537253165",
            appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx = null;
        let mySeat = null;
        let pillarAudioUrl = null;
        let serverOffset = 0;
        let playbackStarted = false;
        let logRef = null;
        let logQueue = [];
        let logFlushTimer = null;

        // Pillar URLs from tuning_mode.json
        const PILLAR_URLS = {
            "PILLAR_FL": "https://static.wixstatic.com/mp3/9178d1_865189a6de11407188075d651d03f4c9.mp3",
            "PILLAR_FR": "https://static.wixstatic.com/mp3/9178d1_f2fb55f02d204f55b8c9e8b711a8a290.mp3",
            "PILLAR_BL": "https://static.wixstatic.com/mp3/9178d1_dfdab53807c5453fb1009568960e94c6.mp3",
            "PILLAR_BR": "https://static.wixstatic.com/mp3/9178d1_0f17b2b18ea74f7db54ce3ca3d10c0f6.mp3"
        };

        // Logging function
        function log(message, type = 'info') {
            const timestamp = Date.now() + serverOffset;
            const timeStr = new Date(timestamp).toISOString().substr(11, 12);
            const logDiv = document.createElement('div');
            logDiv.className = 'log-entry';
            logDiv.innerHTML = `<span class="timestamp">[${timeStr}]</span> ${message}`;
            document.getElementById('log-area').appendChild(logDiv);
            logDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            console.log(`[${timeStr}] ${message}`);

            // Send to Firebase log
            if (logRef) {
                const logEntry = {
                    timestamp: timestamp,
                    timeStr: timeStr,
                    message: message,
                    seatId: mySeat ? mySeat.id : 'xplay',
                    type: type
                };
                logQueue.push(logEntry);
                if (logQueue.length >= 10) flushLogs();
            }
        }

        function flushLogs() {
            if (logQueue.length === 0 || !logRef) return;
            const logsToSend = [...logQueue];
            logQueue = [];
            const batch = {};
            logsToSend.forEach((logEntry, index) => {
                batch[`${logEntry.timestamp}_${index}`] = logEntry;
            });
            logRef.update(batch).catch(e => console.error("Failed to send logs:", e));
        }

        // Clock sync
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            log(`⏱️ Server offset: ${serverOffset}ms`);
        });

        // Connection status
        db.ref(".info/connected").on("value", snap => {
            const statusDiv = document.getElementById('connection-status');
            if (snap.val() === true) {
                statusDiv.innerHTML = "✅ Firebase: Connected";
                statusDiv.className = "status status-connected";
                log("Firebase connected");
            } else {
                statusDiv.innerHTML = "🔌 Firebase: Disconnected";
                statusDiv.className = "status";
                log("Firebase disconnected");
            }
        });

        // Resolve identity from URL
        function resolveIdentity() {
            const urlParams = new URLSearchParams(window.location.search);
            const seatId = urlParams.get('seat');
            
            if (!seatId) {
                log("❌ No seat ID in URL. Use ?seat=PILLAR_FL (or FR, BL, BR)");
                return false;
            }
            
            if (!seatId.startsWith('PILLAR_')) {
                log(`❌ Seat ID must be a pillar (PILLAR_FL, PILLAR_FR, PILLAR_BL, PILLAR_BR). Got: ${seatId}`);
                return false;
            }
            
            mySeat = { id: seatId };
            pillarAudioUrl = PILLAR_URLS[seatId];
            
            if (!pillarAudioUrl) {
                log(`❌ No audio URL found for ${seatId}`);
                return false;
            }
            
            document.getElementById('pillar-id').innerHTML = mySeat.id;
            document.getElementById('audio-url').innerHTML = pillarAudioUrl.split('/').pop();
            
            log(`✅ Resolved pillar: ${mySeat.id}`);
            log(`🎵 Audio URL: ${pillarAudioUrl.split('/').pop()}`);
            
            // Initialize log reference
            logRef = db.ref(`device_logs/${mySeat.id}`);
            
            return true;
        }

        // Play the pillar audio
        async function playPillarAudio() {
            if (playbackStarted) {
                log("⚠️ Playback already started");
                return;
            }
            
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
                log("🎧 AudioContext resumed");
            }
            
            log(`🎵 Loading pillar audio: ${pillarAudioUrl.split('/').pop()}`);
            document.getElementById('playback-status').innerHTML = "Loading...";
            
            try {
                const loadStart = performance.now();
                const res = await fetch(pillarAudioUrl);
                const arrayBuf = await res.arrayBuffer();
                const loadTime = performance.now() - loadStart;
                
                log(`📦 Downloaded ${arrayBuf.byteLength} bytes in ${loadTime.toFixed(0)}ms`);
                
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
                const decodeTime = performance.now() - loadStart - loadTime;
                log(`🎵 Decoded audio: ${audioBuffer.duration.toFixed(2)}s, ${audioBuffer.numberOfChannels} channels, sample rate ${audioBuffer.sampleRate}Hz (decode: ${decodeTime.toFixed(0)}ms)`);
                
                // Check if audio has content
                let maxSample = 0;
                for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
                    const channelData = audioBuffer.getChannelData(channel);
                    for (let i = 0; i < Math.min(10000, channelData.length); i++) {
                        maxSample = Math.max(maxSample, Math.abs(channelData[i]));
                    }
                }
                log(`📊 Peak sample amplitude: ${maxSample.toFixed(4)} ${maxSample < 0.01 ? '(⚠️ POSSIBLY SILENT)' : '(✅ has audio)'}`);
                
                const nowWall = Date.now() + serverOffset;
                const startTime = nowWall + 500; // Start in 500ms for consistent logging
                
                document.getElementById('start-time').innerHTML = new Date(startTime).toISOString().substr(11, 12);
                document.getElementById('playback-status').innerHTML = `Scheduled at ${new Date(startTime).toISOString().substr(11, 12)}`;
                
                log(`⏰ Scheduling playback at ${new Date(startTime).toISOString().substr(11, 12)}.${String(startTime % 1000).padStart(3, '0')} (in 500ms)`);
                
                // Warm-up pulse (optional)
                const warmUpSource = audioCtx.createBufferSource();
                warmUpSource.buffer = audioBuffer;
                const warmUpGain = audioCtx.createGain();
                warmUpGain.gain.setValueAtTime(0, audioCtx.currentTime);
                warmUpSource.connect(warmUpGain).connect(audioCtx.destination);
                const warmUpDelay = (startTime - 100) - nowWall;
                if (warmUpDelay > 0) {
                    setTimeout(() => {
                        warmUpSource.start(0);
                        warmUpSource.stop(audioCtx.currentTime + 0.05);
                        log("🔇 Warm-up pulse sent (silent)");
                    }, warmUpDelay);
                }
                
                // Schedule main playback
                const startDelay = startTime - nowWall;
                setTimeout(() => {
                    const actualStartTime = Date.now() + serverOffset;
                    const source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.loop = true;
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                    source.connect(gainNode).connect(audioCtx.destination);
                    source.start(0);
                    
                    const timingError = actualStartTime - startTime;
                    log(`🏛️ ${mySeat.id} STARTED at ${new Date(actualStartTime).toISOString().substr(11, 12)}.${String(actualStartTime % 1000).padStart(3, '0')}`);
                    log(`   Scheduled: ${new Date(startTime).toISOString().substr(11, 12)}.${String(startTime % 1000).padStart(3, '0')}`);
                    log(`   Timing error: ${timingError > 0 ? '+' : ''}${timingError}ms`);
                    
                    document.getElementById('playback-status').innerHTML = `Playing (started at ${new Date(actualStartTime).toISOString().substr(11, 12)})`;
                    
                    // Log to Firebase diagnostic
                    db.ref(`diagnostics/${mySeat.id}/playback`).set({
                        scheduledTime: startTime,
                        actualTime: actualStartTime,
                        errorMs: timingError,
                        audioDuration: audioBuffer.duration,
                        maxSample: maxSample,
                        timestamp: actualStartTime
                    });
                    
                    playbackStarted = true;
                }, startDelay);
                
                log(`✅ Playback scheduled in ${startDelay}ms`);
                
            } catch (e) {
                log(`❌ Failed to load/play audio: ${e.message}`);
                document.getElementById('playback-status').innerHTML = `Error: ${e.message}`;
            }
        }

        // Initialize
        window.onload = async () => {
            log("🎵 xplay started");
            
            if (!resolveIdentity()) {
                log("❌ Identity resolution failed. Check URL parameters.");
                document.getElementById('play-btn').disabled = true;
                return;
            }
            
            // Set up periodic log flush
            setInterval(flushLogs, 2000);
            
            // Play button
            document.getElementById('play-btn').onclick = async () => {
                document.getElementById('play-btn').disabled = true;
                await playPillarAudio();
                document.getElementById('play-btn').disabled = false;
            };
        };
        
        window.addEventListener('beforeunload', () => {
            flushLogs();
        });
    </script>
</body>
</html>
