<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - MP3 Detector</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.7rem;
        }
        .stat-value {
            color: #00ccff;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.1s;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            flex: 1;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .log-container {
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - MP3 Detector</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="status">Ready</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Detected</div>
                <div class="stat-value" id="detectedCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Energy</div>
                <div class="stat-value" id="energyLevel">0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">State</div>
                <div class="stat-value" id="noteState">---</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio state
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Test sequence state
        let sequenceActive = false;
        let sequenceStartTime = 0;
        let expectedNotes = [];
        let expectedNoteIndex = 0;
        let isNoteActive = false;
        let detectedCount = 0;

        // Detection parameters
        const ENERGY_THRESHOLD = 0.08;
        const MIN_NOTE_DURATION = 100;
        const MAX_NOTE_DURATION = 2000;
        const DETECTION_WINDOW_MS = 500;

        // FFT setup
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // Energy history for onset detection
        let energyHistory = [];
        let lastEnergy = 0;

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');
            if (snap.val()) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
            }
        });

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // Listen for test sequence from conductor - UPDATED PATH
        db.ref('zynth/mp3_test').on('value', snap => {
            const sequence = snap.val();
            if (sequence && sequence.status === 'ACTIVE') {
                // New sequence starting
                sequenceActive = true;
                sequenceStartTime = sequence.startTime;
                expectedNotes = sequence.notes;
                expectedNoteIndex = 0;
                detectedCount = 0;

                document.getElementById('detectedCount').innerText = '0';

                const startTimeStr = new Date(sequenceStartTime).toLocaleTimeString() +
                    `.${String(sequenceStartTime % 1000).padStart(3, '0')}`;
                log(`🎬 GO signal received - sequence starting at ${startTimeStr}`);
                log(`📊 Expecting ${expectedNotes.length} notes from MP3`);

            } else if (!sequence) {
                // Sequence ended
                sequenceActive = false;
                expectedNoteIndex = 0;
                document.getElementById('noteState').innerText = '---';
                log('⏹️ Sequence ended');
            }
        });

        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for MP3 test');

                detectNote();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        function detectNote() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectNote);
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Calculate average energy in flute range
            let totalEnergy = 0;
            let binCount = 0;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
                binCount++;
            }
            const avgEnergy = totalEnergy / binCount;

            document.getElementById('energyLevel').innerText = avgEnergy.toFixed(3);

            // Update progress if sequence active
            if (sequenceActive && expectedNotes.length > 0) {
                const progress = (expectedNoteIndex / expectedNotes.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
            }

            // Simple onset detection - when energy rises significantly
            if (!isNoteActive && avgEnergy > ENERGY_THRESHOLD) {
                // Check if this is a new note onset
                const timeSinceLastNote = now - (detectedCount > 0 ? lastNoteTime : 0);

                if (timeSinceLastNote > MIN_NOTE_DURATION) {
                    // Note started!
                    isNoteActive = true;
                    const noteStartTime = now;
                    lastNoteTime = now;

                    document.getElementById('noteState').innerText = 'ACTIVE';

                    // If sequence is active, match to expected note
                    if (sequenceActive && expectedNoteIndex < expectedNotes.length) {
                        const expectedNote = expectedNotes[expectedNoteIndex];
                        const expectedTime = sequenceStartTime + expectedNote.offset;
                        const delay = now - expectedTime;

                        detectedCount++;
                        document.getElementById('detectedCount').innerText = detectedCount;

                        log(`🔊 NOTE ${expectedNoteIndex} DETECTED: ${expectedNote.pitch} at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')} (delay: ${delay}ms)`);
                    } else {
                        log(`🔊 NOTE DETECTED at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                    }
                }
            }

            // Note ending detection
            if (isNoteActive && avgEnergy < ENERGY_THRESHOLD * 0.5) {
                isNoteActive = false;
                document.getElementById('noteState').innerText = '---';

                if (sequenceActive) {
                    expectedNoteIndex++;
                    log(`✅ Note ended - ${expectedNoteIndex}/${expectedNotes.length}`);
                } else {
                    log(`✅ Note ended`);
                }
            }

            // Store energy for history
            energyHistory.push(avgEnergy);
            if (energyHistory.length > 10) energyHistory.shift();

            requestAnimationFrame(detectNote);
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('enableBtn').onclick = enableMicrophone;
        document.getElementById('disableBtn').onclick = disableMicrophone;
        document.getElementById('copyLogBtn').onclick = copyLog;

        window.onload = () => {
            log('⏱️ MP3 Detector ready');
            log('🎯 Listening for MP3 test on zynth/mp3_test');
        };
    </script>
</body>
</html>
