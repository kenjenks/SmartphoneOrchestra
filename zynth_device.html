<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Two Note Tester</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .note-indicator {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
        }
        .note-dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #333;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .note-dot.active {
            background: #00ccff;
            color: #000;
            box-shadow: 0 0 30px #00ccff;
        }
        .note-dot.playing {
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .timing-display {
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            color: #00ccff;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ccff;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .meter-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.05s;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-row button {
            margin: 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        canvas {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - Two Note Tester</h1>

    <div class="panel">
        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status">Ready</span>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="note-indicator">
            <div class="note-dot" id="note0Dot">G4</div>
            <div class="note-dot" id="note1Dot">A4</div>
        </div>

        <div class="timing-display" id="timingDisplay">
            Waiting for notes...
        </div>

        <div class="energy-meter">
            <div style="display: flex; justify-content: space-between;">
                <span>Energy at 440Hz</span>
                <span id="energyValue">0.00</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="energyMeter"></div>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Current frequency:</span>
            <span class="value" id="currentFreq">--- Hz</span>
        </div>

        <div class="status-row">
            <span class="label">Last note:</span>
            <span class="value" id="lastNote">---</span>
        </div>
        <div class="status-row">
            <span class="label">Onset time:</span>
            <span class="value" id="lastOnset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Duration:</span>
            <span class="value" id="lastDuration">---</span>
        </div>
        <div class="status-row">
            <span class="label">Notes detected:</span>
            <span class="value" id="noteCount">0/2</span>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="log-container">
            <div class="log-header">
                <span style="color: #888;">Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio state
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Note definitions
        const notes = [
            { name: 'G4', freq: 392, duration: 371.5, dot: document.getElementById('note0Dot') },
            { name: 'A4', freq: 440, duration: 278.6, dot: document.getElementById('note1Dot') }
        ];

        // Timing detection state
        let isNoteActive = false;
        let noteStartTime = 0;
        let currentNoteIndex = -1;
        let energyHistory = [];
        const ENERGY_THRESHOLD = 0.15;
        const MIN_NOTE_DURATION = 100;
        const MIN_TIME_BETWEEN_NOTES = 2000;
        const MAX_NOTE_DURATION = 2000;
        const FREQ_TOLERANCE = 15; // Hz tolerance for each note

        // Statistics
        let detectedNotes = [];
        let noteCount = 0;

        // FFT setup
        const FFT_SIZE = 2048;

        // Flute frequency range (A3 to C6)
        const FLUTE_RANGE = {
            min: 220,  // A3
            max: 1046  // C6
        };

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - listening for G4 (392Hz) and A4 (440Hz)');

                // Reset UI
                notes.forEach(note => note.dot.classList.remove('active', 'playing'));
                detectedNotes = [];
                noteCount = 0;
                document.getElementById('noteCount').innerText = '0/2';

                detectNote();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function getNoteIndexFromFreq(freq) {
            for (let i = 0; i < notes.length; i++) {
                if (Math.abs(freq - notes[i].freq) < FREQ_TOLERANCE) {
                    return i;
                }
            }
            return -1;
        }

        function detectNote() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectNote);
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Find dominant frequency within flute range
            let maxVal = 0;
            let maxIdx = minBin;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIdx = i;
                }
            }
            const dominantFreq = (maxIdx / bufferLength) * nyquist;
            document.getElementById('currentFreq').innerText = Math.round(dominantFreq) + ' Hz';

            // Calculate energy at both target frequencies
            const binIndex392 = Math.floor(392 / nyquist * bufferLength);
            const binIndex440 = Math.floor(440 / nyquist * bufferLength);

            // Get energy at 440Hz (primary for display)
            let energy440 = 0;
            let binCount = 0;
            if (binIndex440 >= minBin && binIndex440 <= maxBin) {
                for (let i = -1; i <= 1; i++) {
                    const idx = binIndex440 + i;
                    if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                        energy440 += dataArray[idx] / 255;
                        binCount++;
                    }
                }
                energy440 = binCount > 0 ? energy440 / binCount : 0;
            }

            // Get energy at 392Hz for note detection
            let energy392 = 0;
            binCount = 0;
            if (binIndex392 >= minBin && binIndex392 <= maxBin) {
                for (let i = -1; i <= 1; i++) {
                    const idx = binIndex392 + i;
                    if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                        energy392 += dataArray[idx] / 255;
                        binCount++;
                    }
                }
                energy392 = binCount > 0 ? energy392 / binCount : 0;
            }

            // Update meter with 440Hz energy
            document.getElementById('energyValue').innerText = energy440.toFixed(3);
            document.getElementById('energyMeter').style.width = (energy440 * 100) + '%';

            // Simple state machine for note detection
            if (!isNoteActive) {
                // Look for either note
                let detectedFreq = -1;
                let energy = 0;

                if (energy392 > ENERGY_THRESHOLD && Math.abs(dominantFreq - 392) < FREQ_TOLERANCE) {
                    detectedFreq = 392;
                    energy = energy392;
                } else if (energy440 > ENERGY_THRESHOLD && Math.abs(dominantFreq - 440) < FREQ_TOLERANCE) {
                    detectedFreq = 440;
                    energy = energy440;
                }

                if (detectedFreq > 0) {
                    const timeSinceLastNote = now - (detectedNotes.length > 0 ? detectedNotes[detectedNotes.length - 1].onset : 0);

                    if (timeSinceLastNote > MIN_TIME_BETWEEN_NOTES) {
                        const noteIndex = getNoteIndexFromFreq(detectedFreq);

                        isNoteActive = true;
                        noteStartTime = now;
                        currentNoteIndex = noteIndex;

                        // Update UI
                        notes[noteIndex].dot.classList.add('active', 'playing');
                        document.getElementById('timingDisplay').innerText = `🔴 ${notes[noteIndex].name}`;

                        log(`🔊 NOTE ${noteIndex} ONSET: ${notes[noteIndex].name} at ${new Date(noteStartTime).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')} (freq: ${Math.round(dominantFreq)}Hz)`);
                    }
                }
            } else {
                // Currently in a note - check if it's still playing
                const currentFreq = notes[currentNoteIndex].freq;
                const binIndex = Math.floor(currentFreq / nyquist * bufferLength);

                let energy = 0;
                let binCount = 0;
                if (binIndex >= minBin && binIndex <= maxBin) {
                    for (let i = -1; i <= 1; i++) {
                        const idx = binIndex + i;
                        if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                            energy += dataArray[idx] / 255;
                            binCount++;
                        }
                    }
                    energy = binCount > 0 ? energy / binCount : 0;
                }

                const noteDuration = now - noteStartTime;

                if (noteDuration > MAX_NOTE_DURATION) {
                    // Force end
                    isNoteActive = false;
                    notes[currentNoteIndex].dot.classList.remove('active', 'playing');
                    document.getElementById('timingDisplay').innerText = `⚠️ TIMEOUT ${noteDuration}ms`;
                    log(`⚠️ Note ${currentNoteIndex} timeout after ${noteDuration}ms`);

                    detectedNotes.push({
                        index: currentNoteIndex,
                        onset: noteStartTime,
                        offset: now,
                        duration: noteDuration,
                        forced: true
                    });

                    noteCount++;
                    document.getElementById('noteCount').innerText = `${noteCount}/2`;
                    currentNoteIndex = -1;

                } else if (energy < ENERGY_THRESHOLD) {
                    // Check history to confirm end
                    let recentLowEnergy = true;
                    const historyToCheck = 5;

                    for (let i = Math.max(0, energyHistory.length - historyToCheck); i < energyHistory.length; i++) {
                        if (energyHistory[i] && energyHistory[i].energy > ENERGY_THRESHOLD) {
                            recentLowEnergy = false;
                            break;
                        }
                    }

                    if (recentLowEnergy && noteDuration > MIN_NOTE_DURATION) {
                        // Note ended
                        isNoteActive = false;
                        notes[currentNoteIndex].dot.classList.remove('active', 'playing');

                        detectedNotes.push({
                            index: currentNoteIndex,
                            onset: noteStartTime,
                            offset: now,
                            duration: noteDuration
                        });

                        noteCount++;

                        document.getElementById('timingDisplay').innerText = `✅ ${notes[currentNoteIndex].name} ${Math.round(noteDuration)}ms`;
                        document.getElementById('lastNote').innerText = notes[currentNoteIndex].name;
                        document.getElementById('lastOnset').innerText = new Date(noteStartTime).toLocaleTimeString() +
                            `.${String(noteStartTime % 1000).padStart(3, '0')}`;
                        document.getElementById('lastDuration').innerText = Math.round(noteDuration) + ' ms';
                        document.getElementById('noteCount').innerText = `${noteCount}/2`;

                        log(`✅ NOTE ${currentNoteIndex} ENDED: ${notes[currentNoteIndex].name} - duration: ${Math.round(noteDuration)}ms`);

                        currentNoteIndex = -1;
                    }
                }
            }

            // Store energy history (using 440Hz energy as reference)
            energyHistory.push({ time: now, energy: energy440 });
            if (energyHistory.length > 50) energyHistory.shift();

            requestAnimationFrame(detectNote);
        }

        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw spectrum
            ctx.fillStyle = '#00ccff';
            const nyquist = audioCtx.sampleRate / 2;
            const startBin = Math.floor(300 / nyquist * analyser.frequencyBinCount);
            const endBin = Math.floor(600 / nyquist * analyser.frequencyBinCount);

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;
                const x = (i - startBin) * (width / (endBin - startBin));
                const barHeight = (dataArray[i] / 255) * height;
                ctx.fillRect(x, height - barHeight, 4, barHeight);
            }

            // Mark target frequencies
            const targetBins = [392, 440].map(f => Math.floor(f / nyquist * analyser.frequencyBinCount));
            targetBins.forEach(bin => {
                if (bin >= startBin && bin < endBin) {
                    const x = (bin - startBin) * (width / (endBin - startBin));
                    ctx.fillStyle = '#ff3366';
                    ctx.fillRect(x, 0, 4, height);
                }
            });

            requestAnimationFrame(drawVisualizer);
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('enableBtn').onclick = enableMicrophone;
        document.getElementById('disableBtn').onclick = disableMicrophone;
        document.getElementById('copyLogBtn').onclick = copyLog;

        window.onload = () => {
            log('⏱️ Two Note Tester ready');
            log('🎯 Listening for G4 (392Hz) and A4 (440Hz)');
        };
    </script>
</body>
</html>
