<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Sensitive Pattern Detector</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #ff3366;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .panel {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            font-family: monospace;
        }
        .label {
            color: #888;
        }
        .value {
            color: #ff3366;
            font-weight: bold;
        }
        .detection-panel {
            background: #0a0a0a;
            border: 2px solid #ff3366;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }
        .pattern-visualization {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        .pattern-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            transition: all 0.2s;
        }
        .pattern-dot.detected {
            background: #ff3366;
            box-shadow: 0 0 30px #ff3366;
            animation: pulse 0.3s ease;
        }
        .pattern-dot.expected {
            border: 2px solid #ffaa00;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .timeline {
            background: #000;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            position: relative;
            height: 80px;
        }
        .timeline-marker {
            position: absolute;
            width: 6px;
            transform: translateX(-50%);
        }
        .timeline-marker.expected {
            background: #666;
            height: 20px;
            bottom: 30px;
        }
        .timeline-marker.detected {
            background: #ff3366;
            height: 40px;
            bottom: 10px;
            z-index: 2;
            box-shadow: 0 0 10px #ff3366;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .stat-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.7rem;
        }
        .stat-number {
            color: #ffaa00;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ff3366;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #ff3366;
            width: 0%;
            transition: width 0.1s;
        }
        button {
            background: #ff3366;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            width: 100%;
        }
        button:hover {
            background: #ff5577;
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        .visualizer {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #333;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            color: #888;
            margin-top: 20px;
        }
        .success-badge {
            background: #00cc00;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
        .raw-energy {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff3366;
            text-align: center;
            margin: 10px 0;
        }
        .test-mode {
            background: #330000;
            border-left: 4px solid #ff3366;
            padding: 15px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>🔴 Zynth Device - Sensitive Detector</h1>

    <div class="panel">
        <div class="test-mode">
            <strong>🧪 TEST MODE</strong> - Very sensitive, low thresholds
        </div>

        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status-value">Ready</span>
        </div>

        <button id="enableMicBtn" class="secondary">🎤 Enable Super-Sensitive Detection</button>
        <button id="disableMicBtn" style="background:#600;">⏹️ Disable</button>

        <div class="detection-panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span style="color: #ff3366;">🔴 Pattern Detection</span>
                <span id="detectionStatus" class="status-badge">Waiting for sound</span>
            </div>

            <div class="raw-energy" id="rawEnergy">0.00</div>

            <div class="pattern-visualization" id="patternDots">
                <!-- Generated by JavaScript -->
            </div>

            <div class="timeline" id="timeline">
                <!-- Timeline markers will be added here -->
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Energy</div>
                    <div class="stat-number" id="energyValue">0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Warbles</div>
                    <div class="stat-number" id="warbleCount">0/3</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Patterns</div>
                    <div class="stat-number" id="patternCount">0</div>
                </div>
            </div>

            <div class="energy-meter">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Signal Energy</span>
                    <span id="energyLevel">0.00</span>
                </div>
                <div class="meter-bar">
                    <div class="meter-fill" id="energyMeter"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <span>Freq: <span id="currentFreq">---</span> Hz</span>
                    <span>Peak: <span id="peakFreq">---</span> Hz</span>
                </div>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Last valid pattern:</span>
            <span class="value" id="lastPattern">---</span>
        </div>
        <div class="status-row">
            <span class="label">Pattern intervals:</span>
            <span class="value" id="lastIntervals">---</span>
        </div>

        <canvas id="visualizer" class="visualizer"></canvas>

        <div class="log" id="log"></div>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // Global State
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // SUPER SENSITIVE detection parameters
        const ENERGY_THRESHOLD = 0.001;  // Much lower threshold
        const FREQ_TOLERANCE = 100;       // Very wide frequency tolerance
        const LOOKBACK_FRAMES = 10;
        const DETECTION_COOLDOWN = 50;    // Very short cooldown

        // Pattern detection
        const PATTERN_TOLERANCE_MS = 200;  // Very generous tolerance
        const NOTE_TIMEOUT_MS = 5000;       // Wait up to 5 seconds for pattern

        const FFT_SIZE = 2048;  // Smaller FFT = faster response

        // Pattern detection state
        let patternState = {
            isInNote: false,
            noteStartTime: 0,
            detectedWarbles: [],
            expectedPattern: null,
            expectedTimes: [300, 600, 900], // Default 101 at 300ms spacing
            patternLength: 3,
            validPatternCount: 0,
            pendingTimeout: null
        };

        // Current expected values from conductor
        let currentExpectedFreq = 440;

        // ============================================
        // UI Setup
        // ============================================
        function updatePatternDots(count, detected = 0) {
            const container = document.getElementById('patternDots');
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = `pattern-dot ${i < detected ? 'detected' : ''}`;
                container.appendChild(dot);
            }
        }

        function updateTimeline(expectedTimes, detectedWarbles) {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            const width = timeline.clientWidth - 40;
            const maxTime = 3000;

            // Draw expected positions
            if (expectedTimes && expectedTimes.length) {
                expectedTimes.forEach(time => {
                    if (time >= 0 && time <= maxTime) {
                        const left = (time / maxTime) * width + 20;
                        const marker = document.createElement('div');
                        marker.className = 'timeline-marker expected';
                        marker.style.left = left + 'px';
                        timeline.appendChild(marker);
                    }
                });
            }

            // Draw detected positions
            if (detectedWarbles && detectedWarbles.length) {
                detectedWarbles.forEach(warble => {
                    if (warble.time >= 0 && warble.time <= maxTime) {
                        const left = (warble.time / maxTime) * width + 20;
                        const marker = document.createElement('div');
                        marker.className = 'timeline-marker detected';
                        marker.style.left = left + 'px';
                        timeline.appendChild(marker);
                    }
                });
            }
        }

        // ============================================
        // Listen for conductor's notes
        // ============================================
        function listenForConductor() {
            db.ref('zynth/loud_pattern').on('value', snap => {
                const note = snap.val();
                if (note) {
                    currentExpectedFreq = note.frequency;

                    // Update expected times from conductor
                    if (note.warbleTimes) {
                        patternState.expectedTimes = note.warbleTimes;
                    }

                    const timeStr = new Date(note.timestamp).toLocaleTimeString();
                    log(`📡 Conductor: ${note.frequency}Hz, pattern ${note.pattern} at ${timeStr}`);

                    // Update pattern visualization
                    const warbleCount = note.pattern.split('').filter(b => b === '1').length;
                    updatePatternDots(warbleCount, 0);

                    if (note.warbleTimes) {
                        log(`   Expecting warbles at: ${note.warbleTimes.join(', ')}ms`);
                        updateTimeline(note.warbleTimes, []);
                    }
                }
            });
        }

        // ============================================
        // Enable microphone (VERY sensitive)
        // ============================================
        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0; // No smoothing = faster response
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status-value').innerText = '🔴 SUPER SENSITIVE';
                log("✅ SUPER SENSITIVE mode active - thresholds very low");

                detectPattern();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status-value').innerText = 'Ready';
            log("⏹️ Stopped");
        }

        // ============================================
        // Pattern Detection (VERY sensitive)
        // ============================================
        function detectPattern() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectPattern);
                return;
            }

            const now = Date.now();

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Calculate total energy
            let totalEnergy = 0;
            for (let i = 0; i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
            }
            totalEnergy /= bufferLength;

            // Update energy display
            document.getElementById('rawEnergy').innerText = totalEnergy.toFixed(3);
            document.getElementById('energyValue').innerText = totalEnergy.toFixed(3);
            document.getElementById('energyLevel').innerText = totalEnergy.toFixed(3);
            document.getElementById('energyMeter').style.width = (totalEnergy * 100) + '%';

            // Find peak frequency
            let maxVal = 0;
            let maxIdx = 0;
            for (let i = 0; i < bufferLength; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIdx = i;
                }
            }

            const nyquist = audioCtx.sampleRate / 2;
            const peakFreq = (maxIdx / bufferLength) * nyquist;
            document.getElementById('peakFreq').innerText = Math.round(peakFreq);
            document.getElementById('currentFreq').innerText = Math.round(currentExpectedFreq);

            // VERY SENSITIVE detection - if we have ANY significant energy
            if (totalEnergy > ENERGY_THRESHOLD) {

                // Check if energy is in the ballpark of our expected frequency
                const freqDiff = Math.abs(peakFreq - currentExpectedFreq);

                if (freqDiff < FREQ_TOLERANCE) {

                    if (!patternState.isInNote) {
                        // Start a new note
                        patternState.isInNote = true;
                        patternState.noteStartTime = now;
                        patternState.detectedWarbles = [{ time: 0, energy: totalEnergy }];

                        document.getElementById('detectionStatus').innerText = 'NOTE STARTED';
                        updatePatternDots(patternState.expectedTimes.length, 1);

                        log(`🔴 NOTE STARTED - energy: ${totalEnergy.toFixed(3)} at ${peakFreq.toFixed(0)}Hz`);

                        // Set timeout
                        if (patternState.pendingTimeout) clearTimeout(patternState.pendingTimeout);
                        patternState.pendingTimeout = setTimeout(() => {
                            if (patternState.isInNote) {
                                log("⏰ Note timeout");
                                patternState.isInNote = false;
                                patternState.detectedWarbles = [];
                                document.getElementById('detectionStatus').innerText = 'Timeout';
                                updatePatternDots(patternState.expectedTimes.length, 0);
                            }
                        }, NOTE_TIMEOUT_MS);

                    } else {
                        // Already in a note - check if this is a new warble
                        const timeSinceStart = now - patternState.noteStartTime;
                        const lastWarbleTime = patternState.detectedWarbles.length > 0
                            ? patternState.detectedWarbles[patternState.detectedWarbles.length - 1].time
                            : -1000;

                        // Only count if enough time has passed since last detection
                        if (timeSinceStart - lastWarbleTime > 100) {
                            patternState.detectedWarbles.push({
                                time: timeSinceStart,
                                energy: totalEnergy
                            });

                            // Update visualization
                            updatePatternDots(
                                patternState.expectedTimes.length,
                                patternState.detectedWarbles.length
                            );

                            updateTimeline(patternState.expectedTimes, patternState.detectedWarbles);

                            log(`   🔴 Warble ${patternState.detectedWarbles.length} at +${Math.round(timeSinceStart)}ms`);

                            document.getElementById('warbleCount').innerText =
                                `${patternState.detectedWarbles.length}/${patternState.expectedTimes.length}`;

                            // Check if we have all expected warbles
                            if (patternState.detectedWarbles.length === patternState.expectedTimes.length) {
                                validatePattern();
                            }
                        }
                    }
                }
            }

            requestAnimationFrame(detectPattern);
        }

        // ============================================
        // Validate detected pattern (VERY generous)
        // ============================================
        function validatePattern() {
            if (!patternState.isInNote) return;

            const detected = patternState.detectedWarbles.map(w => w.time);
            const expected = patternState.expectedTimes;

            if (detected.length !== expected.length) {
                log(`❌ Length mismatch: got ${detected.length}, expected ${expected.length}`);
                resetPatternState();
                return;
            }

            // Calculate intervals
            let detectedIntervals = [];
            let expectedIntervals = [];

            for (let i = 1; i < detected.length; i++) {
                detectedIntervals.push(detected[i] - detected[i-1]);
                expectedIntervals.push(expected[i] - expected[i-1]);
            }

            // Compare intervals with generous tolerance
            let patternValid = true;
            let maxDeviation = 0;
            let deviations = [];

            for (let i = 0; i < detectedIntervals.length; i++) {
                const deviation = Math.abs(detectedIntervals[i] - expectedIntervals[i]);
                deviations.push(deviation);
                maxDeviation = Math.max(maxDeviation, deviation);

                if (deviation > PATTERN_TOLERANCE_MS) {
                    patternValid = false;
                }
            }

            if (patternValid) {
                // SUCCESS!
                patternState.validPatternCount++;

                document.getElementById('patternCount').innerText = patternState.validPatternCount;
                document.getElementById('lastPattern').innerText = detected.map(t => `${Math.round(t)}`).join(' → ');
                document.getElementById('lastIntervals').innerText = detectedIntervals.map(i => `${Math.round(i)}`).join(' → ');
                document.getElementById('detectionStatus').innerHTML = '<span class="success-badge">✓ PATTERN MATCHED!</span>';

                log(`🎯✅✅✅ VALID PATTERN! Intervals: ${detectedIntervals.map(i => Math.round(i)).join('-')}ms`);
                log(`   Deviations: ${deviations.map(d => Math.round(d)).join('-')}ms (max: ${Math.round(maxDeviation)}ms)`);

                // Flash all dots
                const dots = document.querySelectorAll('.pattern-dot');
                dots.forEach(dot => {
                    dot.classList.add('detected');
                    setTimeout(() => dot.classList.remove('detected'), 500);
                });

            } else {
                log(`❌ Pattern rejected - intervals off by up to ${Math.round(maxDeviation)}ms`);
                log(`   Expected: ${expectedIntervals.map(i => Math.round(i)).join('-')}ms`);
                log(`   Got: ${detectedIntervals.map(i => Math.round(i)).join('-')}ms`);
                document.getElementById('detectionStatus').innerText = 'Pattern rejected';
            }

            // Reset for next note
            resetPatternState();
        }

        function resetPatternState() {
            patternState.isInNote = false;
            patternState.detectedWarbles = [];
            if (patternState.pendingTimeout) {
                clearTimeout(patternState.pendingTimeout);
                patternState.pendingTimeout = null;
            }

            setTimeout(() => {
                if (!patternState.isInNote) {
                    document.getElementById('detectionStatus').innerText = 'Waiting for sound';
                    updatePatternDots(patternState.expectedTimes.length, 0);
                    updateTimeline(patternState.expectedTimes, []);
                    document.getElementById('warbleCount').innerText = `0/${patternState.expectedTimes.length}`;
                }
            }, 1000);
        }

        // ============================================
        // Visualizer
        // ============================================
        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#ff3366';
            for (let i = 0; i < 100; i++) {
                const x = i * 4;
                const value = dataArray[i * 10] || 0;
                const barHeight = (value / 255) * height;
                ctx.fillRect(x, height - barHeight, 3, barHeight);
            }

            requestAnimationFrame(drawVisualizer);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        // ============================================
        // Initialize
        // ============================================
        window.onload = () => {
            document.getElementById('enableMicBtn').onclick = enableMicrophone;
            document.getElementById('disableMicBtn').onclick = disableMicrophone;

            // Initialize pattern display
            updatePatternDots(3, 0);

            log("🔴 Zynth Device - SUPER SENSITIVE MODE");
            log("   • Energy threshold: VERY LOW (0.001)");
            log("   • Frequency tolerance: VERY WIDE (100Hz)");
            log("   • Pattern tolerance: GENEROUS (200ms)");
            log("   • Any sound near 440Hz will trigger detection!");

            listenForConductor();
        };
    </script>
</body>
</html>
