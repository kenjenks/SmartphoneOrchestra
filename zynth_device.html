<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Two Note Detector (Fixed)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* ... same styles as before ... */
    </style>
</head>
<body>
    <!-- ... same HTML as before ... -->

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== LOG FUNCTION - DEFINED FIRST! ==========
        function log(message) {
            const logDiv = document.getElementById('log');
            if (!logDiv) {
                console.log('Log div not ready:', message);
                return;
            }
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        // ========== OTHER HELPER FUNCTIONS ==========
        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }
            selection.removeAllRanges();
        }

        function updateDebugInfo(message) {
            const debugDiv = document.getElementById('debugInfo');
            if (!debugDiv) return;
            if (message) {
                debugDiv.innerHTML = `🔍 ${message}<br>` + debugDiv.innerHTML;
            } else {
                debugDiv.innerHTML = `
                    <div>🔍 Audio: ${audioCtx?.state || 'null'}</div>
                    <div>🔍 Listening: ${isListening}</div>
                    <div>🔍 Sequence: ${sequenceActive}</div>
                    <div>🔍 Note: ${expectedNoteIndex}/2</div>
                    <div>🔍 Window: ${windowEntered}</div>
                `;
            }
        }

        function updateSensitivityStatus(saved = false) {
            const status = document.getElementById('sensitivityStatus');
            if (!status) return;
            status.innerHTML = `Current: ${BASELINE_THRESHOLD_MULTIPLIER.toFixed(2)}x, ${WINDOW_BEFORE_MS}/${WINDOW_AFTER_MS}ms, ${BASELINE_SAMPLES_MS}ms samples${saved ? ' (saved)' : ''}`;
        }

        // ========== GLOBAL VARIABLES ==========
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;
        let lastLogTime = 0;
        let currentAvgEnergy = 0;
        let ambientLogInterval = null;
        let windowEntered = false;
        let lastHeartbeat = 0;
        let lastFrameTime = 0;

        // Test sequence state
        let sequenceActive = false;
        let sequenceStartWallTime = 0;
        let expectedNotes = null;
        let expectedNoteIndex = 0;
        let detectedCount = 0;

        // Note tracking state
        let isNoteActive = false;
        let noteStartTime = 0;
        let lastEnergy = 0.01;
        let lastNoteTime = 0;

        // Baseline adaptation
        let baselineEnergy = 0;
        let baselineSamples = [];
        let baselineComplete = false;
        let baselineStartTime = 0;

        // ========== SENSITIVITY CONTROLS ==========
        let BASELINE_THRESHOLD_MULTIPLIER = 1.1;
        let WINDOW_BEFORE_MS = 4000;
        let WINDOW_AFTER_MS = 6000;
        let BASELINE_SAMPLES_MS = 1000;

        // ========== FFT SETUP ==========
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // ========== LOAD/SAVE SETTINGS ==========
        function loadSensitivitySettings() {
            try {
                const saved = localStorage.getItem('zynth_sensitivity');
                if (saved) {
                    const settings = JSON.parse(saved);
                    BASELINE_THRESHOLD_MULTIPLIER = settings.threshold || 1.1;
                    WINDOW_BEFORE_MS = settings.before || 4000;
                    WINDOW_AFTER_MS = settings.after || 6000;
                    BASELINE_SAMPLES_MS = settings.samples || 1000;

                    const thresholdSlider = document.getElementById('thresholdSlider');
                    const beforeSlider = document.getElementById('beforeSlider');
                    const afterSlider = document.getElementById('afterSlider');
                    const samplesSlider = document.getElementById('samplesSlider');

                    if (thresholdSlider) thresholdSlider.value = BASELINE_THRESHOLD_MULTIPLIER;
                    if (beforeSlider) beforeSlider.value = WINDOW_BEFORE_MS;
                    if (afterSlider) afterSlider.value = WINDOW_AFTER_MS;
                    if (samplesSlider) samplesSlider.value = BASELINE_SAMPLES_MS;

                    const thresholdValue = document.getElementById('thresholdValue');
                    const beforeValue = document.getElementById('beforeValue');
                    const afterValue = document.getElementById('afterValue');
                    const samplesValue = document.getElementById('samplesValue');

                    if (thresholdValue) thresholdValue.innerText = BASELINE_THRESHOLD_MULTIPLIER.toFixed(2) + 'x';
                    if (beforeValue) beforeValue.innerText = WINDOW_BEFORE_MS + ' ms';
                    if (afterValue) afterValue.innerText = WINDOW_AFTER_MS + ' ms';
                    if (samplesValue) samplesValue.innerText = BASELINE_SAMPLES_MS + ' ms';

                    updateSensitivityStatus();
                }
            } catch (e) {
                console.log('No saved settings');
            }
        }

        function saveSensitivitySettings() {
            const settings = {
                threshold: BASELINE_THRESHOLD_MULTIPLIER,
                before: WINDOW_BEFORE_MS,
                after: WINDOW_AFTER_MS,
                samples: BASELINE_SAMPLES_MS
            };
            localStorage.setItem('zynth_sensitivity', JSON.stringify(settings));
            updateSensitivityStatus(true);
            log('⚙️ Sensitivity settings saved');
        }

        // ========== FIREBASE LISTENERS ==========
        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const connected = snap.val();
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');

            if (connected) {
                if (statusEl) statusEl.className = 'firebase-status connected';
                if (textEl) textEl.innerText = 'Firebase Connected';
                log('🔌 Firebase connected');
            } else {
                if (statusEl) statusEl.className = 'firebase-status disconnected';
                if (textEl) textEl.innerText = 'Firebase Disconnected';
                log('🔌 Firebase disconnected');
            }
        });

        // Server time offset
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            log(`⏱️ Server offset: ${serverOffset}ms`);
        });

        // Listen for two-note test
        db.ref('zynth/two_note_test').on('value', snap => {
            const sequence = snap.val();
            const now = Date.now() + serverOffset;

            log(`🔥 Firebase update received: ${sequence ? 'ACTIVE' : 'CLEARED'}`);

            if (sequence && sequence.status === 'ACTIVE') {
                const startTime = sequence.scheduledWallTime;

                log(`🕐 Device current: ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                log(`🕐 Sequence start: ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);

                sequenceActive = true;
                sequenceStartWallTime = startTime;
                expectedNotes = sequence.notes;
                expectedNoteIndex = 0;
                detectedCount = 0;
                isNoteActive = false;
                windowEntered = false;

                if (expectedNotes) {
                    expectedNotes.forEach((note, i) => {
                        const windowStart = note.expectedPlayTime - WINDOW_BEFORE_MS;
                        const windowEnd = note.expectedPlayTime + WINDOW_AFTER_MS;
                        log(`🎯 Note ${i} (${note.pitch}) at: ${new Date(note.expectedPlayTime).toLocaleTimeString()}.${String(note.expectedPlayTime % 1000).padStart(3, '0')}`);
                        log(`   Window: ${new Date(windowStart).toLocaleTimeString()}.${String(windowStart % 1000).padStart(3, '0')} → ${new Date(windowEnd).toLocaleTimeString()}.${String(windowEnd % 1000).padStart(3, '0')}`);
                    });
                }

                log(`✅ Sequence ACTIVE - listening for 2 notes`);
                updateDebugInfo(`Sequence active, waiting for note 0`);

            } else if (!sequence) {
                sequenceActive = false;
                expectedNotes = null;
                log('⏹️ Sequence ended');
                updateDebugInfo('Sequence ended');
            }
        });

        // ========== MICROPHONE FUNCTIONS ==========
        async function enableMicrophone() {
            try {
                log('🎤 Requesting microphone...');

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                log('🔊 AudioContext created');

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for two-note test');

                if (ambientLogInterval) clearInterval(ambientLogInterval);
                ambientLogInterval = setInterval(() => {
                    if (isListening && !sequenceActive) {
                        log(`📊 Ambient energy: ${currentAvgEnergy.toFixed(4)}`);
                    }
                }, 3000);

                lastEnergy = 0.01;

                if (!animationFrame) {
                    detectNote();
                }

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (ambientLogInterval) {
                clearInterval(ambientLogInterval);
                ambientLogInterval = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        // ========== NOTE DETECTION ==========
        function detectNote() {
            const loopStart = performance.now();
            if (lastFrameTime) {
                const frameGap = loopStart - lastFrameTime;
                if (frameGap > 100) {
                    console.warn(`⚠️ Slow loop: ${frameGap.toFixed(0)}ms`);
                }
            }
            lastFrameTime = loopStart;

            if (Math.floor(Date.now()/5000) !== Math.floor(lastHeartbeat/5000)) {
                lastHeartbeat = Date.now();
                log(`💓 Loop running (active: ${sequenceActive}, note: ${expectedNoteIndex}/2)`);
                updateDebugInfo();
            }

            if (!isListening || !analyser) {
                animationFrame = null;
                return;
            }

            const now = Date.now() + serverOffset;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            let totalEnergy = 0;
            let binCount = 0;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
                binCount++;
            }
            const avgEnergy = binCount > 0 ? totalEnergy / binCount : 0;

            currentAvgEnergy = avgEnergy;

            const energyEl = document.getElementById('energyValue');
            const meterEl = document.getElementById('energyMeter');
            const baselineEl = document.getElementById('baselineValue');
            const ratioEl = document.getElementById('energyRatio');

            if (energyEl) energyEl.innerText = avgEnergy.toFixed(4);
            if (meterEl) meterEl.style.width = (avgEnergy * 100) + '%';
            if (baselineEl) baselineEl.innerText = baselineEnergy.toFixed(4);

            let ratioToBaseline = baselineEnergy > 0 ? avgEnergy / baselineEnergy : 1.0;
            if (ratioEl) ratioEl.innerText = ratioToBaseline.toFixed(2);

            // Detect notes
            if (sequenceActive && expectedNotes && expectedNoteIndex < expectedNotes.length && !isNoteActive) {
                const currentNote = expectedNotes[expectedNoteIndex];
                const expectedTime = currentNote.expectedPlayTime;
                const windowStart = expectedTime - WINDOW_BEFORE_MS;
                const windowEnd = expectedTime + WINDOW_AFTER_MS;

                if (now >= windowStart && now <= windowEnd) {
                    if (!windowEntered) {
                        windowEntered = true;
                        baselineStartTime = now;
                        baselineSamples = [];
                        baselineComplete = false;
                        const currentNoteEl = document.getElementById('currentNote');
                        if (currentNoteEl) currentNoteEl.innerText = currentNote.pitch;
                        log(`🔍 WINDOW ${expectedNoteIndex} at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                        log(`   Window: ${new Date(windowStart).toLocaleTimeString()}.${String(windowStart % 1000).padStart(3, '0')} → ${new Date(windowEnd).toLocaleTimeString()}.${String(windowEnd % 1000).padStart(3, '0')}`);
                    }

                    if (!baselineComplete) {
                        if (now - baselineStartTime < BASELINE_SAMPLES_MS) {
                            baselineSamples.push(avgEnergy);
                        } else {
                            if (baselineSamples.length > 0) {
                                baselineSamples.sort((a, b) => a - b);
                                baselineEnergy = baselineSamples[Math.floor(baselineSamples.length / 2)];
                                baselineComplete = true;
                                log(`📊 Baseline ${expectedNoteIndex}: ${baselineEnergy.toFixed(4)}`);
                            }
                        }
                    }

                    if (Math.floor(now/1000) !== Math.floor(lastLogTime/1000)) {
                        lastLogTime = now;
                        log(`📊 Energy: ${avgEnergy.toFixed(4)}, ratio: ${ratioToBaseline.toFixed(2)}`);
                    }

                    if (baselineComplete && ratioToBaseline > BASELINE_THRESHOLD_MULTIPLIER) {
                        log(`📈 SPIKE! ${avgEnergy.toFixed(4)} (${(ratioToBaseline*100-100).toFixed(1)}%)`);

                        if (now - lastNoteTime > 2000) {
                            isNoteActive = true;
                            noteStartTime = now;
                            lastNoteTime = now;
                            detectedCount++;

                            const delay = now - expectedTime;

                            const noteCountEl = document.getElementById('noteCount');
                            const lastDelayEl = document.getElementById('lastDelay');
                            if (noteCountEl) noteCountEl.innerText = `${detectedCount}/2`;
                            if (lastDelayEl) lastDelayEl.innerText = delay + ' ms';

                            log(`🔊 NOTE ${expectedNoteIndex} DETECTED: ${currentNote.pitch} at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                            log(`   Delay: ${delay}ms`);

                            db.ref('zynth/device_feedback').set({
                                noteIndex: expectedNoteIndex,
                                pitch: currentNote.pitch,
                                delay: delay,
                                detectedAt: now,
                                expectedAt: expectedTime,
                                timestamp: now
                            });

                            const noteDot = document.getElementById(`note${expectedNoteIndex}Dot`);
                            if (noteDot) noteDot.classList.add('active');

                            expectedNoteIndex++;
                            windowEntered = false;
                            baselineComplete = false;

                            if (expectedNoteIndex >= expectedNotes.length) {
                                log('✅ All notes detected');
                                const currentNoteEl = document.getElementById('currentNote');
                                if (currentNoteEl) currentNoteEl.innerText = 'Complete';
                            } else {
                                const currentNoteEl = document.getElementById('currentNote');
                                if (currentNoteEl) currentNoteEl.innerText = expectedNotes[expectedNoteIndex].pitch;
                            }
                        }
                    }
                } else if (windowEntered) {
                    windowEntered = false;
                    log(`🚪 Window ${expectedNoteIndex} closed without detection`);
                }
            }

            if (isNoteActive && avgEnergy < baselineEnergy * 0.5) {
                isNoteActive = false;
                log(`✅ Note ended - duration: ${now - noteStartTime}ms`);
            }

            lastEnergy = avgEnergy;
            animationFrame = requestAnimationFrame(detectNote);
        }

        // ========== SENSITIVITY CONTROLS EVENT LISTENERS ==========
        function setupSensitivityControls() {
            const thresholdSlider = document.getElementById('thresholdSlider');
            const beforeSlider = document.getElementById('beforeSlider');
            const afterSlider = document.getElementById('afterSlider');
            const samplesSlider = document.getElementById('samplesSlider');
            const applyBtn = document.getElementById('applySensitivityBtn');
            const resetBtn = document.getElementById('resetSensitivityBtn');

            if (thresholdSlider) {
                thresholdSlider.addEventListener('input', (e) => {
                    BASELINE_THRESHOLD_MULTIPLIER = parseFloat(e.target.value);
                    const thresholdValue = document.getElementById('thresholdValue');
                    if (thresholdValue) thresholdValue.innerText = BASELINE_THRESHOLD_MULTIPLIER.toFixed(2) + 'x';
                });
            }

            if (beforeSlider) {
                beforeSlider.addEventListener('input', (e) => {
                    WINDOW_BEFORE_MS = parseInt(e.target.value);
                    const beforeValue = document.getElementById('beforeValue');
                    if (beforeValue) beforeValue.innerText = WINDOW_BEFORE_MS + ' ms';
                });
            }

            if (afterSlider) {
                afterSlider.addEventListener('input', (e) => {
                    WINDOW_AFTER_MS = parseInt(e.target.value);
                    const afterValue = document.getElementById('afterValue');
                    if (afterValue) afterValue.innerText = WINDOW_AFTER_MS + ' ms';
                });
            }

            if (samplesSlider) {
                samplesSlider.addEventListener('input', (e) => {
                    BASELINE_SAMPLES_MS = parseInt(e.target.value);
                    const samplesValue = document.getElementById('samplesValue');
                    if (samplesValue) samplesValue.innerText = BASELINE_SAMPLES_MS + ' ms';
                });
            }

            if (applyBtn) {
                applyBtn.addEventListener('click', saveSensitivitySettings);
            }

            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    BASELINE_THRESHOLD_MULTIPLIER = 1.1;
                    WINDOW_BEFORE_MS = 4000;
                    WINDOW_AFTER_MS = 6000;
                    BASELINE_SAMPLES_MS = 1000;

                    if (thresholdSlider) thresholdSlider.value = 1.1;
                    if (beforeSlider) beforeSlider.value = 4000;
                    if (afterSlider) afterSlider.value = 6000;
                    if (samplesSlider) samplesSlider.value = 1000;

                    const thresholdValue = document.getElementById('thresholdValue');
                    const beforeValue = document.getElementById('beforeValue');
                    const afterValue = document.getElementById('afterValue');
                    const samplesValue = document.getElementById('samplesValue');

                    if (thresholdValue) thresholdValue.innerText = '1.10x';
                    if (beforeValue) beforeValue.innerText = '4000 ms';
                    if (afterValue) afterValue.innerText = '6000 ms';
                    if (samplesValue) samplesValue.innerText = '1000 ms';

                    saveSensitivitySettings();
                });
            }
        }

        // ========== INITIALIZATION ==========
        window.onload = () => {
            log('⏱️ Zynth Device - Two Note Detector (Fixed) ready');

            // Load saved settings
            loadSensitivitySettings();

            // Set up UI controls
            setupSensitivityControls();

            // Set up button handlers
            document.getElementById('enableBtn').onclick = enableMicrophone;
            document.getElementById('disableBtn').onclick = disableMicrophone;
            document.getElementById('copyLogBtn').onclick = copyLog;

            // Start debug updates
            setInterval(() => {
                if (isListening) updateDebugInfo();
            }, 2000);
        };
    </script>
</body>
</html>
