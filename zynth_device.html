<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Baseline Adaptation (FIXED)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ccff;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .meter-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.05s;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-row button {
            margin: 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - Baseline Adaptation (FIXED)</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status">Ready</span>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="energy-meter">
            <div style="display: flex; justify-content: space-between;">
                <span>Current Energy</span>
                <span id="energyValue">0.00</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="energyMeter"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <span>Baseline: <span id="baselineValue">0.00</span></span>
                <span>Ratio: <span id="energyRatio">1.00</span></span>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Last onset:</span>
            <span class="value" id="lastOnset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Detected notes:</span>
            <span class="value" id="noteCount">0</span>
        </div>
        <div class="status-row">
            <span class="label">Last delay:</span>
            <span class="value" id="lastDelay">---</span>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== GLOBAL VARIABLES ==========
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;
        let lastLogTime = 0;
        let currentAvgEnergy = 0;
        let ambientLogInterval = null;
        let windowEntered = false;
        let lastHeartbeat = 0;

        // Test sequence state
        let sequenceActive = false;
        let sequenceStartWallTime = 0;
        let expectedNote = null;
        let detectedCount = 0;

        // Note tracking state
        let isNoteActive = false;
        let noteStartTime = 0;
        let lastEnergy = 0.01;
        let lastNoteTime = 0;

        // Baseline adaptation
        let baselineEnergy = 0;
        let baselineSamples = [];
        let baselineComplete = false;
        let baselineStartTime = 0;

        // Detection parameters
        let MIN_TIME_BETWEEN_NOTES = 2000;
        let DETECTION_WINDOW_MS = 3000;
        let BASELINE_SAMPLES_MS = 500;
        let BASELINE_THRESHOLD_MULTIPLIER = 1.5;

        // FFT setup
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // ========== HELPER FUNCTIONS ==========
        function log(message) {
            const logDiv = document.getElementById('log');
            if (!logDiv) return;
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        // ========== FIREBASE LISTENERS ==========
        db.ref('.info/connected').on('value', snap => {
            const connected = snap.val();
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');

            if (connected) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
                log('🔌 Firebase connected');
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
                log('🔌 Firebase disconnected');
            }
        });

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            log(`⏱️ Server offset: ${serverOffset}ms`);
        });

        // Listen for test sequence from conductor
        db.ref('zynth/single_note_test').on('value', snap => {
            const sequence = snap.val();
            const now = Date.now() + serverOffset;

            log(`🔥 Firebase update received: ${sequence ? 'ACTIVE' : 'CLEARED'}`);

            if (sequence && sequence.status === 'ACTIVE') {
                const startTime = sequence.scheduledWallTime;
                const expectedPlayTime = startTime + sequence.note.jitter;

                const timeUntilStart = (startTime - now) / 1000;
                const timeUntilNote = (expectedPlayTime - now) / 1000;

                log(`🕐 Device current time: ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                log(`🕐 Sequence scheduled: ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);
                log(`🕐 Time until start: ${timeUntilStart.toFixed(1)}s`);
                log(`🎯 Expected play time: ${new Date(expectedPlayTime).toLocaleTimeString()}.${String(expectedPlayTime % 1000).padStart(3, '0')}`);
                log(`   Time until note: ${timeUntilNote.toFixed(1)}s`);
                log(`   (MP3 seek position: ${sequence.note.offset}ms)`);

                if (expectedPlayTime < now) {
                    log(`⚠️ WARNING: Expected play time is ${(now - expectedPlayTime).toFixed(0)}ms in the past!`);
                }

                // ========== CRITICAL FIX: Set all sequence state variables ==========
                sequenceActive = true;
                sequenceStartWallTime = startTime;
                expectedNote = {
                    ...sequence.note,
                    expectedPlayTime: expectedPlayTime
                };
                detectedCount = 0;
                isNoteActive = false;
                windowEntered = false;
                baselineEnergy = 0;
                baselineSamples = [];
                baselineComplete = false;

                // Log that sequence is now active
                log(`✅ Sequence ACTIVE - ready to detect`);

            } else if (!sequence) {
                sequenceActive = false;
                expectedNote = null;
                log('⏹️ Sequence ended');
            }
        });

        // ========== MICROPHONE FUNCTIONS ==========
        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for single note test');

                // Start ambient energy logging
                if (ambientLogInterval) clearInterval(ambientLogInterval);
                ambientLogInterval = setInterval(() => {
                    if (isListening && !sequenceActive) {
                        log(`📊 Ambient energy: ${currentAvgEnergy.toFixed(4)}`);
                    }
                }, 3000);

                lastEnergy = 0.01;

                if (!animationFrame) {
                    detectNote();
                }

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (ambientLogInterval) {
                clearInterval(ambientLogInterval);
                ambientLogInterval = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        // ========== NOTE DETECTION ==========
        function detectNote() {
            // Heartbeat to prove loop is running
            if (Math.floor(Date.now()/1000) !== Math.floor(lastHeartbeat/1000)) {
                lastHeartbeat = Date.now();
                console.log('💓 detectNote heartbeat', { isListening, sequenceActive });
            }

            if (!isListening || !analyser) {
                animationFrame = null;
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Calculate average energy in flute range
            let totalEnergy = 0;
            let binCount = 0;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
                binCount++;
            }
            const avgEnergy = binCount > 0 ? totalEnergy / binCount : 0;

            currentAvgEnergy = avgEnergy;

            // Update displays
            document.getElementById('energyValue').innerText = avgEnergy.toFixed(4);
            document.getElementById('energyMeter').style.width = (avgEnergy * 100) + '%';
            document.getElementById('baselineValue').innerText = baselineEnergy.toFixed(4);

            let ratioToBaseline = baselineEnergy > 0 ? avgEnergy / baselineEnergy : 1.0;
            document.getElementById('energyRatio').innerText = ratioToBaseline.toFixed(2);

            // Look for onset during active sequence
            if (sequenceActive && expectedNote && !isNoteActive) {
                const expectedTime = expectedNote.expectedPlayTime;

                // Define fixed window boundaries centered on expected time
                const windowStart = expectedTime - DETECTION_WINDOW_MS/2;
                const windowEnd = expectedTime + DETECTION_WINDOW_MS/2;

                // Check if we're inside the window using fixed boundaries
                if (now >= windowStart && now <= windowEnd) {
                    // Log when we enter the window (first time only)
                    if (!windowEntered) {
                        windowEntered = true;
                        baselineStartTime = now;
                        baselineSamples = [];
                        baselineComplete = false;
                        log(`🔍 ENTERED WINDOW at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                        log(`   Window: ${new Date(windowStart).toLocaleTimeString()}.${String(windowStart % 1000).padStart(3, '0')} → ${new Date(windowEnd).toLocaleTimeString()}.${String(windowEnd % 1000).padStart(3, '0')}`);
                        log(`   Expected: ${new Date(expectedTime).toLocaleTimeString()}.${String(expectedTime % 1000).padStart(3, '0')}`);
                        log(`   Starting baseline measurement...`);
                    }

                    // Measure baseline for first 500ms
                    if (!baselineComplete) {
                        if (now - baselineStartTime < BASELINE_SAMPLES_MS) {
                            baselineSamples.push(avgEnergy);
                        } else {
                            // Calculate baseline as median of samples
                            if (baselineSamples.length > 0) {
                                baselineSamples.sort((a, b) => a - b);
                                baselineEnergy = baselineSamples[Math.floor(baselineSamples.length / 2)];
                                baselineComplete = true;
                                log(`📊 Baseline established: ${baselineEnergy.toFixed(4)} (${baselineSamples.length} samples)`);
                            }
                        }
                    }

                    // Log energy occasionally for debugging
                    if (Math.floor(now/1000) !== Math.floor(lastLogTime/1000)) {
                        lastLogTime = now;
                        log(`📊 Window energy: ${avgEnergy.toFixed(4)}, baseline ratio: ${ratioToBaseline.toFixed(2)}`);
                    }

                    // Once baseline is established, look for energy above threshold
                    if (baselineComplete && ratioToBaseline > BASELINE_THRESHOLD_MULTIPLIER) {
                        log(`📈 ENERGY SPIKE! ${avgEnergy.toFixed(4)} (${(ratioToBaseline*100-100).toFixed(1)}% above baseline)`);

                        if (now - lastNoteTime > MIN_TIME_BETWEEN_NOTES) {
                            // Note started!
                            isNoteActive = true;
                            noteStartTime = now;
                            lastNoteTime = now;
                            detectedCount++;

                            const delay = now - expectedTime;

                            document.getElementById('lastOnset').innerText =
                                new Date(now).toLocaleTimeString() + `.${String(now % 1000).padStart(3, '0')}`;
                            document.getElementById('noteCount').innerText = detectedCount;
                            document.getElementById('lastDelay').innerText = delay + ' ms';

                            log(`🔊 NOTE DETECTED at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                            log(`   Expected: ${new Date(expectedTime).toLocaleTimeString()}.${String(expectedTime % 1000).padStart(3, '0')}`);
                            log(`   Delay: ${delay}ms, Energy: ${avgEnergy.toFixed(4)}, Baseline: ${baselineEnergy.toFixed(4)}`);

                            // Send feedback to conductor
                            db.ref('zynth/device_feedback').set({
                                delay: delay,
                                detectedAt: now,
                                expectedAt: expectedTime,
                                note: expectedNote.pitch,
                                timestamp: now
                            });
                        }
                    }
                } else if (windowEntered) {
                    // We just exited the window
                    windowEntered = false;
                    log(`🚪 EXITED WINDOW at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                }
            }

            // Note ending
            if (isNoteActive && avgEnergy < baselineEnergy * 0.5) {
                isNoteActive = false;
                log(`✅ Note ended - duration: ${now - noteStartTime}ms`);
            }

            lastEnergy = avgEnergy;
            animationFrame = requestAnimationFrame(detectNote);
        }

        // ========== INITIALIZATION ==========
        window.onload = () => {
            log('⏱️ Zynth Device - Baseline Adaptation (FIXED) ready');

            document.getElementById('enableBtn').onclick = enableMicrophone;
            document.getElementById('disableBtn').onclick = disableMicrophone;
            document.getElementById('copyLogBtn').onclick = copyLog;
        };
    </script>
</body>
</html>
