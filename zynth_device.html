<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Fully Corrected</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ccff;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .meter-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.05s;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-row button {
            margin: 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - Fully Corrected</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status">Ready</span>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="energy-meter">
            <div style="display: flex; justify-content: space-between;">
                <span>Flute Range Energy</span>
                <span id="energyValue">0.00</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="energyMeter"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <span>Energy Ratio: <span id="energyRatio">1.00</span></span>
                <span>Threshold: <span id="threshold">0.10</span></span>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Last onset:</span>
            <span class="value" id="lastOnset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Detected notes:</span>
            <span class="value" id="noteCount">0</span>
        </div>
        <div class="status-row">
            <span class="label">Last delay:</span>
            <span class="value" id="lastDelay">---</span>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== GLOBAL VARIABLES ==========
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;
        let lastLogTime = 0;
        let currentAvgEnergy = 0;
        let ambientLogInterval = null;
        let windowEntered = false;

        // Test sequence state
        let sequenceActive = false;
        let sequenceStartWallTime = 0;  // When the sequence should start (Firebase time)
        let expectedNote = null;
        let detectedCount = 0;

        // Note tracking state
        let isNoteActive = false;
        let noteStartTime = 0;
        let lastEnergy = 0.01; // Start with small non-zero value to prevent division issues
        let lastNoteTime = 0;

        // Detection parameters - use let (not const) so we can modify
        let ENERGY_THRESHOLD = 0.10;     // Minimum energy to consider
        let MIN_RATIO = 1.5;              // Need 50% increase to trigger
        let MIN_TIME_BETWEEN_NOTES = 2000; // 2 seconds between notes
        let DETECTION_WINDOW_MS = 3000;    // 3 second window (wider to catch drift)

        // FFT setup
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // ========== HELPER FUNCTIONS ==========
        function log(message) {
            const logDiv = document.getElementById('log');
            if (!logDiv) return;
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        // ========== FIREBASE LISTENERS ==========
        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const connected = snap.val();
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');

            if (connected) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
                log('🔌 Firebase connected');
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
                log('🔌 Firebase disconnected');
            }
        });

        // Server time offset
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            log(`⏱️ Server offset: ${serverOffset}ms`);
        });

        // Listen for test sequence from conductor
        db.ref('zynth/single_note_test').on('value', snap => {
            const sequence = snap.val();
            const now = Date.now() + serverOffset;

            log(`🔥 Firebase update received: ${sequence ? 'ACTIVE' : 'CLEARED'}`);

            if (sequence && sequence.status === 'ACTIVE') {
                // Store the scheduled wall time (when sequence starts)
                // Use a different variable name to avoid collision
                const startTime = sequence.scheduledWallTime;

                // IMPORTANT: The note plays at startTime + jitter
                // The offset is a SEEK POSITION in the MP3, not an additional delay
                // Add a safety margin: if jitter is negative, expectedPlayTime could be before now
                // We'll still listen, but log a warning
                const expectedPlayTime = startTime + sequence.note.jitter;

                const timeUntilStart = (startTime - now) / 1000;
                const timeUntilNote = (expectedPlayTime - now) / 1000;

                log(`🕐 Device current time: ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                log(`🕐 Sequence scheduled: ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);
                log(`🕐 Time until start: ${timeUntilStart.toFixed(1)}s`);
                log(`🎯 Expected play time: ${new Date(expectedPlayTime).toLocaleTimeString()}.${String(expectedPlayTime % 1000).padStart(3, '0')}`);
                log(`   Time until note: ${timeUntilNote.toFixed(1)}s`);
                log(`   (MP3 seek position: ${sequence.note.offset}ms)`);

                if (expectedPlayTime < now) {
                    log(`⚠️ WARNING: Expected play time is ${(now - expectedPlayTime).toFixed(0)}ms in the past!`);
                    log(`   Detection window may be missed.`);
                }

                sequenceActive = true;
                sequenceStartWallTime = startTime;
                expectedNote = {
                    ...sequence.note,
                    expectedPlayTime: expectedPlayTime  // Device-computed
                };
                detectedCount = 0;
                isNoteActive = false;
                windowEntered = false; // Reset window flag for new sequence

            } else if (!sequence) {
                sequenceActive = false;
                expectedNote = null;
                log('⏹️ Sequence ended');
            }
        });

        // ========== MICROPHONE FUNCTIONS ==========
        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for single note test');

                // Start ambient energy logging
                if (ambientLogInterval) clearInterval(ambientLogInterval);
                ambientLogInterval = setInterval(() => {
                    if (isListening && !sequenceActive) {
                        log(`📊 Ambient energy: ${currentAvgEnergy.toFixed(4)}`);
                    }
                }, 3000);

                // Reset lastEnergy to avoid division by zero on first frame
                lastEnergy = 0.01; // Small non-zero value to prevent Infinity ratio

                // Start detection loop only if listening
                if (!animationFrame) {
                    detectNote();
                }

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (ambientLogInterval) {
                clearInterval(ambientLogInterval);
                ambientLogInterval = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            // Cancel animation frame
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        // ========== NOTE DETECTION ==========
        function detectNote() {
            // Only continue if still listening
            if (!isListening || !analyser) {
                animationFrame = null;
                return; // Don't re-queue
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Calculate average energy in flute range
            let totalEnergy = 0;
            let binCount = 0;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
                binCount++;
            }
            const avgEnergy = binCount > 0 ? totalEnergy / binCount : 0;

            // Store current energy for ambient logging
            currentAvgEnergy = avgEnergy;

            // Calculate energy ratio safely (avoid division by zero)
            let energyRatio = 1.0;
            if (lastEnergy > 0.001) {
                energyRatio = avgEnergy / lastEnergy;
            } else if (avgEnergy > ENERGY_THRESHOLD) {
                // If lastEnergy is very small, consider any significant energy as a spike
                energyRatio = 2.0; // Trigger detection
            }

            // Update displays
            document.getElementById('energyValue').innerText = avgEnergy.toFixed(4);
            document.getElementById('energyMeter').style.width = (avgEnergy * 100) + '%';
            document.getElementById('energyRatio').innerText = energyRatio.toFixed(2);
            document.getElementById('threshold').innerText = ENERGY_THRESHOLD.toFixed(2);

            // Look for onset during active sequence
            if (sequenceActive && expectedNote && !isNoteActive) {
                const expectedTime = expectedNote.expectedPlayTime;

                // Only look for onsets around the expected time
                if (Math.abs(now - expectedTime) < DETECTION_WINDOW_MS) {
                    // Log when we enter the window (first time only)
                    if (!windowEntered) {
                        windowEntered = true;
                        log(`🔍 ENTERED WINDOW at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                        log(`   Expected: ${new Date(expectedTime).toLocaleTimeString()}.${String(expectedTime % 1000).padStart(3, '0')}`);
                        log(`   Current energy: ${avgEnergy.toFixed(4)}, ratio: ${energyRatio.toFixed(2)}`);
                    }

                    // Log energy during the window (once per second)
                    if (Math.floor(now/1000) !== Math.floor(lastLogTime/1000)) {
                        lastLogTime = now;
                        log(`📊 Window energy: ${avgEnergy.toFixed(4)}, ratio: ${energyRatio.toFixed(2)}`);
                    }

                    // Look for sudden increase in energy
                    if (avgEnergy > ENERGY_THRESHOLD && energyRatio > MIN_RATIO) {
                        log(`📈 ENERGY SPIKE! ${avgEnergy.toFixed(4)} vs ${lastEnergy.toFixed(4)} (${(energyRatio*100-100).toFixed(1)}% increase)`);

                        // Check if enough time has passed since last note
                        if (now - lastNoteTime > MIN_TIME_BETWEEN_NOTES) {
                            // Note started!
                            isNoteActive = true;
                            noteStartTime = now;
                            lastNoteTime = now;
                            detectedCount++;

                            const delay = now - expectedTime;

                            document.getElementById('lastOnset').innerText =
                                new Date(now).toLocaleTimeString() + `.${String(now % 1000).padStart(3, '0')}`;
                            document.getElementById('noteCount').innerText = detectedCount;
                            document.getElementById('lastDelay').innerText = delay + ' ms';

                            log(`🔊 NOTE DETECTED at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                            log(`   Expected: ${new Date(expectedTime).toLocaleTimeString()}.${String(expectedTime % 1000).padStart(3, '0')}`);
                            log(`   Delay: ${delay}ms, Energy: ${avgEnergy.toFixed(4)}, Ratio: ${energyRatio.toFixed(2)}`);

                            // Send feedback to conductor
                            db.ref('zynth/device_feedback').set({
                                delay: delay,
                                detectedAt: now,
                                expectedAt: expectedTime,
                                note: expectedNote.pitch,
                                timestamp: now
                            });
                        }
                    }
                }
                // Note: we DON'T reset windowEntered here - it persists for the entire sequence
                // It will be reset when a new sequence arrives
            }

            // Note ending
            if (isNoteActive && avgEnergy < ENERGY_THRESHOLD * 0.5) {
                isNoteActive = false;
                log(`✅ Note ended - duration: ${now - noteStartTime}ms`);
            }

            lastEnergy = avgEnergy;

            // Re-queue the next frame
            animationFrame = requestAnimationFrame(detectNote);
        }

        // ========== INITIALIZATION ==========
        window.onload = () => {
            log('⏱️ Zynth Device - Fully Corrected ready');
            log(`⚡ Threshold: ${ENERGY_THRESHOLD}, min ratio: ${MIN_RATIO}`);

            // Set up button handlers
            document.getElementById('enableBtn').onclick = enableMicrophone;
            document.getElementById('disableBtn').onclick = disableMicrophone;
            document.getElementById('copyLogBtn').onclick = copyLog;
        };
    </script>
</body>
</html>
