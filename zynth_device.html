<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zynth Device - Single Flute Warbling Note Receiver</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        #header {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #seat-label {
            color: #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        #device-type {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        #status-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            font-family: monospace;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ffcc;
            font-weight: bold;
        }
        .detection-panel {
            background: #0a0a0a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }
        .note-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .note-light {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s ease;
            box-shadow: 0 0 20px rgba(0,255,204,0);
        }
        .note-light.detected {
            background: #00ffcc;
            box-shadow: 0 0 60px #00ffcc;
            animation: pulse 0.3s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .modulation-meter {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffcc00;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 5px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #ffcc00;
            width: 0%;
            transition: width 0.1s;
        }
        .warble-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        .stat-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.7rem;
        }
        .stat-number {
            color: #ffcc00;
            font-size: 1.2rem;
            font-weight: bold;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        .visualizer {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #333;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            color: #888;
            margin-top: 20px;
        }
        .permission-status {
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 15px;
            text-align: center;
            margin-top: 10px;
        }
        .granted {
            background: #1e4d1e;
            color: #8bc34a;
        }
        .detection-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .warble-detected {
            background: #ffcc00;
            color: #000;
        }
        .pure-detected {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <div id="seat-label">Flute Note Receiver</div>
            <div id="device-type">Listening for single flute notes</div>
        </div>

        <div id="status-panel">
            <div class="status-row">
                <span class="label">Status:</span>
                <span class="value" id="status-value">Ready</span>
            </div>

            <!-- Mic Section -->
            <div style="margin: 10px 0;">
                <button id="enableMicBtn" class="secondary">🎤 Enable Ear</button>
                <button id="disableMicBtn" style="background:#600;">⏹️ Disable</button>
            </div>

            <!-- Detection Panel -->
            <div class="detection-panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="color: #00ffcc; font-weight: bold;">🎵 Last Detection</span>
                    <span id="detectionType" class="detection-badge">---</span>
                </div>

                <div class="note-indicator">
                    <div id="noteLight" class="note-light"></div>
                </div>

                <div class="warble-stats">
                    <div class="stat-box">
                        <div class="stat-label">Detected Frequency</div>
                        <div class="stat-number" id="detectedFreq">--- Hz</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Confidence</div>
                        <div class="stat-number" id="confidenceValue">0%</div>
                    </div>
                </div>

                <div class="modulation-meter">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>🎵 Warble Analysis</span>
                        <span id="warbleStatus" style="color: #888;">No signal</span>
                    </div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="confidenceMeter" style="width: 0%;"></div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                        <div>
                            <span style="color: #888;">Vibrato rate:</span>
                            <span style="color: #ffcc00;" id="detectedRate">---</span> Hz
                        </div>
                        <div>
                            <span style="color: #888;">Depth:</span>
                            <span style="color: #ffcc00;" id="detectedDepth">---</span> Hz
                        </div>
                    </div>
                </div>
            </div>

            <!-- Last Note Info -->
            <div class="status-row">
                <span class="label">Last note from conductor:</span>
                <span class="value" id="lastNoteInfo">---</span>
            </div>
            <div class="status-row">
                <span class="label">Detections today:</span>
                <span class="value" id="detectionCount">0</span>
            </div>

            <canvas id="visualizer" class="visualizer"></canvas>

            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // Global State
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Warble detection parameters (from successful test)
        const BASE_FLUTE_FREQ = 440;  // Will be updated from detected note
        const WARBLE_ENERGY_THRESHOLD = 0.02;
        const WARBLE_FREQ_BINS = 3;
        const WARBLE_MIN_CONFIDENCE = 0.6;
        const WARBLE_LOOKBACK_FRAMES = 15;
        const WARBLE_COOLDOWN_MS = 200;

        const MIN_WARBLE_DEPTH = 15;
        const MAX_WARBLE_DEPTH = 80;
        const MIN_VIBRATO_RATE = 1.5;
        const MAX_VIBRATO_RATE = 4.5;
        const MIN_SIGN_CHANGES = 3;

        const FFT_SIZE = 4096;

        // Detection state
        let warbleBuffer = [];
        let lastDetectionTime = 0;
        let detectionCount = 0;
        let currentBaseFreq = 440;

        // ============================================
        // Clock sync
        // ============================================
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // ============================================
        // Listen for conductor's notes
        // ============================================
        function listenForConductor() {
            db.ref('zynth/last_note').on('value', snap => {
                const note = snap.val();
                if (note) {
                    const timeStr = new Date(note.timestamp).toLocaleTimeString();
                    const warbleStr = note.hasWarble ? 'with warble' : 'pure tone';
                    document.getElementById('lastNoteInfo').innerHTML =
                        `${note.frequency}Hz ${warbleStr} at ${timeStr}`;

                    // Update expected base frequency
                    currentBaseFreq = note.frequency;

                    log(`📡 Conductor played: ${note.frequency}Hz ${warbleStr}`);
                }
            });
        }

        // ============================================
        // Enable microphone
        // ============================================
        async function enableMicrophone() {
            try {
                log("🎤 Requesting microphone...");

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.2;
                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                mediaStream = stream;

                isListening = true;
                document.getElementById('status-value').innerText = 'Listening...';

                log("✅ Ear activated - listening for flute notes");

                // Start detection
                detectWarble();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        // ============================================
        // Disable microphone
        // ============================================
        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;

            document.getElementById('status-value').innerText = 'Ready';

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            log("⏹️ Stopped listening");
        }

        // ============================================
        // Warble Detection (from successful test)
        // ============================================
        function detectWarble() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const now = Date.now();

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Convert to float [0,1]
            const floatData = new Float32Array(bufferLength);
            for (let i = 0; i < bufferLength; i++) {
                floatData[i] = dataArray[i] / 255;
            }

            // Store in buffer
            warbleBuffer.push({
                time: now,
                data: floatData.slice()
            });

            if (warbleBuffer.length > WARBLE_LOOKBACK_FRAMES * 2) {
                warbleBuffer.shift();
            }

            if (warbleBuffer.length < WARBLE_LOOKBACK_FRAMES) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const recentFrames = warbleBuffer.slice(-WARBLE_LOOKBACK_FRAMES);

            // Calculate frequency bin for current base frequency
            const nyquist = audioCtx.sampleRate / 2;
            const binIndex = Math.floor(currentBaseFreq / nyquist * bufferLength);

            if (binIndex < 0 || binIndex >= bufferLength) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Get energy
            let energy = 0;
            let binCount = 0;
            for (let i = -WARBLE_FREQ_BINS; i <= WARBLE_FREQ_BINS; i++) {
                const idx = binIndex + i;
                if (idx >= 0 && idx < bufferLength) {
                    energy += floatData[idx];
                    binCount++;
                }
            }
            energy = energy / binCount;

            if (energy < WARBLE_ENERGY_THRESHOLD) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Extract frequency peaks
            const peakFreqs = [];
            for (let i = 0; i < recentFrames.length; i++) {
                const frame = recentFrames[i];

                let maxEnergy = 0;
                let maxIdx = binIndex;

                for (let j = -3; j <= 3; j++) {
                    const idx = binIndex + j;
                    if (idx >= 0 && idx < frame.data.length && frame.data[idx] > maxEnergy) {
                        maxEnergy = frame.data[idx];
                        maxIdx = idx;
                    }
                }

                const peakFreq = (maxIdx / bufferLength) * nyquist;
                peakFreqs.push(peakFreq);
            }

            if (peakFreqs.length < 5) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Calculate modulation characteristics
            const freqChanges = [];
            for (let i = 1; i < peakFreqs.length; i++) {
                freqChanges.push(peakFreqs[i] - peakFreqs[i-1]);
            }

            let signChanges = 0;
            for (let i = 1; i < freqChanges.length; i++) {
                if (Math.sign(freqChanges[i]) !== Math.sign(freqChanges[i-1]) &&
                    Math.abs(freqChanges[i]) > 2) {
                    signChanges++;
                }
            }

            const rawFreqRange = Math.max(...peakFreqs) - Math.min(...peakFreqs);
            const freqRange = Math.min(MAX_WARBLE_DEPTH, rawFreqRange);

            let zeroCrossings = 0;
            for (let i = 1; i < peakFreqs.length; i++) {
                if ((peakFreqs[i] - currentBaseFreq) * (peakFreqs[i-1] - currentBaseFreq) < 0) {
                    zeroCrossings++;
                }
            }
            const vibratoRate = (zeroCrossings / 2) / (WARBLE_LOOKBACK_FRAMES * 23 / 1000);

            // Update UI
            document.getElementById('detectedRate').innerText = vibratoRate.toFixed(1);
            document.getElementById('detectedDepth').innerText = Math.round(freqRange);

            // Calculate confidence
            let modulationScore = 0;
            let isWarble = false;

            if (freqRange >= MIN_WARBLE_DEPTH && freqRange <= MAX_WARBLE_DEPTH) {
                modulationScore += 0.4;
            }
            if (signChanges >= MIN_SIGN_CHANGES) {
                modulationScore += 0.3;
            }
            if (vibratoRate >= MIN_VIBRATO_RATE && vibratoRate <= MAX_VIBRATO_RATE) {
                modulationScore += 0.3;
            }
            if (energy > WARBLE_ENERGY_THRESHOLD * 2) {
                modulationScore += 0.1;
            }

            modulationScore = Math.min(1, modulationScore);

            document.getElementById('confidenceMeter').style.width = (modulationScore * 100) + '%';
            document.getElementById('confidenceValue').innerText = Math.round(modulationScore * 100) + '%';

            // Check if this is a warble or pure tone
            if (modulationScore >= WARBLE_MIN_CONFIDENCE) {
                // Warble detected!
                if (now - lastDetectionTime > WARBLE_COOLDOWN_MS) {
                    lastDetectionTime = now;

                    // Flash the light
                    const light = document.getElementById('noteLight');
                    light.classList.add('detected');
                    setTimeout(() => light.classList.remove('detected'), 300);

                    document.getElementById('detectionType').innerHTML =
                        '<span class="detection-badge warble-detected">WARBLE DETECTED</span>';
                    document.getElementById('warbleStatus').innerText = 'Warble!';
                    document.getElementById('detectedFreq').innerText = Math.round(currentBaseFreq) + ' Hz';

                    detectionCount++;
                    document.getElementById('detectionCount').innerText = detectionCount;

                    log(`🎯 WARBLE DETECTED! Depth: ${Math.round(freqRange)}Hz, Rate: ${vibratoRate.toFixed(1)}Hz`, 'detection');
                }
            } else if (energy > WARBLE_ENERGY_THRESHOLD) {
                // Pure tone detected (energy but no warble)
                if (now - lastDetectionTime > WARBLE_COOLDOWN_MS) {
                    lastDetectionTime = now;

                    // Subtle flash for pure tone
                    const light = document.getElementById('noteLight');
                    light.classList.add('detected');
                    setTimeout(() => light.classList.remove('detected'), 200);

                    document.getElementById('detectionType').innerHTML =
                        '<span class="detection-badge pure-detected">PURE TONE</span>';
                    document.getElementById('warbleStatus').innerText = 'Pure tone';
                    document.getElementById('detectedFreq').innerText = Math.round(currentBaseFreq) + ' Hz';

                    detectionCount++;
                    document.getElementById('detectionCount').innerText = detectionCount;

                    log(`🎵 Pure tone detected: ${Math.round(currentBaseFreq)}Hz`, 'detection');
                }
            }

            requestAnimationFrame(detectWarble);
        }

        // ============================================
        // Visualizer
        // ============================================
        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw frequency spectrum
            ctx.fillStyle = '#00ffcc';
            const barWidth = 3;

            const startBin = Math.floor(200 / (audioCtx.sampleRate / FFT_SIZE));
            const endBin = Math.floor(800 / (audioCtx.sampleRate / FFT_SIZE));

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;

                const x = (i - startBin) * (barWidth + 1);
                const value = dataArray[i];
                const barHeight = (value / 255) * height;

                ctx.fillRect(x, height - barHeight, barWidth, barHeight);
            }

            // Highlight current base frequency
            const baseBin = Math.floor(currentBaseFreq / (audioCtx.sampleRate / FFT_SIZE));
            if (baseBin >= startBin && baseBin < endBin) {
                const x = (baseBin - startBin) * (barWidth + 1);
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(x, 0, barWidth, height);
            }

            requestAnimationFrame(drawVisualizer);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Button handlers
        // ============================================
        document.getElementById('enableMicBtn').onclick = enableMicrophone;
        document.getElementById('disableMicBtn').onclick = disableMicrophone;

        // ============================================
        // Initialize
        // ============================================
        window.onload = () => {
            log("🎵 Zynth Device ready - Single Flute Note Receiver");
            log("   • Listening for flute notes from conductor");
            log("   • Detects both pure tones and warbles");
            log("   • Warble parameters from bach_baker.py: 2.5Hz rate, 30Hz depth");

            // Start listening for conductor
            listenForConductor();
        };
    </script>
</body>
</html>
