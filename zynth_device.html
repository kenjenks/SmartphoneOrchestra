<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Single Note Detector with Feedback</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ccff;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .meter-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.05s;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-row button {
            margin: 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - Single Note Detector with Feedback</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status">Ready</span>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="energy-meter">
            <div style="display: flex; justify-content: space-between;">
                <span>Flute Range Energy</span>
                <span id="energyValue">0.00</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="energyMeter"></div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <span>Change: <span id="energyChange">0.00</span></span>
                <span>Threshold: <span id="threshold">0.03</span></span>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Last onset:</span>
            <span class="value" id="lastOnset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Detected notes:</span>
            <span class="value" id="noteCount">0</span>
        </div>
        <div class="status-row">
            <span class="label">Last delay:</span>
            <span class="value" id="lastDelay">---</span>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        setTimeout(() => {
            db.ref('zynth/test').set({
                message: 'Hello from device',
                timestamp: Date.now() + serverOffset
            });
            log('📤 Sent test message to Firebase');
        }, 2000);

        // And listen for the test
        db.ref('zynth/test').on('value', snap => {
            const test = snap.val();
            if (test) {
                log(`📥 Received test: ${test.message}`);
            }
        });

        // Audio state
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Test sequence state
        let sequenceActive = false;
        let scheduledWallTime = 0;  // When the sequence starts
        let expectedNote = null;
        let detectedCount = 0;

        // Note tracking state
        let isNoteActive = false;
        let noteStartTime = 0;
        let lastEnergy = 0;
        let lastNoteTime = 0;
        let energyHistory = [];
        const ENERGY_THRESHOLD = 0.03;  // Raised to avoid false positives
        const MIN_CHANGE = 0.02;         // Raised to require sharper onset
        const MIN_TIME_BETWEEN_NOTES = 2000; // 2 seconds between notes

        // FFT setup
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const connected = snap.val();
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');

            console.log('🔥 Firebase connection:', connected);

            if (connected) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
                log(`Firebase Connected`);
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
                log(`Firebase Not Yet Connected`);
            }
        });

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // Listen for test sequence from conductor
        db.ref('zynth/single_note_test').on('value', snap => {
            const sequence = snap.val();

            if (sequence && sequence.status === 'ACTIVE') {
                // New sequence starting
                sequenceActive = true;
                scheduledWallTime = sequence.scheduledWallTime;
                expectedNote = sequence.note;
                detectedCount = 0;
                isNoteActive = false;

                const startTimeStr = new Date(scheduledWallTime).toLocaleTimeString() +
                    `.${String(scheduledWallTime % 1000).padStart(3, '0')}`;
                log(`🎬 GO signal received - sequence starts at ${startTimeStr}`);
                log(`📊 Expecting one note: ${expectedNote.pitch} at offset ${expectedNote.offset}ms (jitter: ${expectedNote.jitter > 0 ? '+' : ''}${expectedNote.jitter}ms)`);
                log(`🎯 Expected play time: ${new Date(expectedNote.expectedPlayTime).toLocaleTimeString()}.${String(expectedNote.expectedPlayTime % 1000).padStart(3, '0')}`);

            } else if (!sequence) {
                // Sequence ended
                sequenceActive = false;
                expectedNote = null;
                log('⏹️ Sequence ended');
            }
        });

        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for single note test');

                detectNote();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function detectNote() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectNote);
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Calculate average energy in flute range
            let totalEnergy = 0;
            let binCount = 0;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                totalEnergy += dataArray[i] / 255;
                binCount++;
            }
            const avgEnergy = binCount > 0 ? totalEnergy / binCount : 0;

            // Calculate energy change
            const energyChange = avgEnergy - lastEnergy;

            // Update displays
            document.getElementById('energyValue').innerText = avgEnergy.toFixed(3);
            document.getElementById('energyMeter').style.width = (avgEnergy * 100) + '%';
            document.getElementById('energyChange').innerText = energyChange.toFixed(3);
            document.getElementById('threshold').innerText = ENERGY_THRESHOLD.toFixed(3);

            // Look for onset during active sequence
            if (sequenceActive && expectedNote && !isNoteActive) {
                // Only look for onsets around the expected time (±1 second)
                const expectedTime = expectedNote.expectedPlayTime;

                if (Math.abs(now - expectedTime) < 1000) {
                    if (avgEnergy > ENERGY_THRESHOLD && energyChange > MIN_CHANGE) {
                        // Check if enough time has passed since last note
                        if (now - lastNoteTime > MIN_TIME_BETWEEN_NOTES) {
                            // Note started!
                            isNoteActive = true;
                            noteStartTime = now;
                            lastNoteTime = now;
                            detectedCount++;

                            const delay = now - expectedTime;

                            document.getElementById('lastOnset').innerText =
                                new Date(now).toLocaleTimeString() + `.${String(now % 1000).padStart(3, '0')}`;
                            document.getElementById('noteCount').innerText = detectedCount;
                            document.getElementById('lastDelay').innerText = delay + ' ms';

                            log(`🔊 NOTE DETECTED at ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
                            log(`   Expected: ${new Date(expectedTime).toLocaleTimeString()}.${String(expectedTime % 1000).padStart(3, '0')}`);
                            log(`   Delay: ${delay}ms, Energy: ${avgEnergy.toFixed(3)}, Change: ${energyChange.toFixed(3)}`);

                            // Send feedback to conductor
                            db.ref('zynth/device_feedback').set({
                                delay: delay,
                                detectedAt: now,
                                expectedAt: expectedTime,
                                note: expectedNote.pitch,
                                timestamp: now
                            });
                        }
                    }
                }
            }

            // Note ending
            if (isNoteActive && avgEnergy < ENERGY_THRESHOLD * 0.5) {
                isNoteActive = false;
                log(`✅ Note ended - duration: ${now - noteStartTime}ms`);
            }

            lastEnergy = avgEnergy;

            requestAnimationFrame(detectNote);
        }

        document.getElementById('enableBtn').onclick = enableMicrophone;
        document.getElementById('disableBtn').onclick = disableMicrophone;
        document.getElementById('copyLogBtn').onclick = copyLog;

        window.onload = () => {
            log('⏱️ Single Note Detector with Feedback ready');
            log(`⚡ Threshold: ${ENERGY_THRESHOLD}, min change: ${MIN_CHANGE}`);
        };
    </script>
</body>
</html>
