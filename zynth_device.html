<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - 30 Second Test with Delay Measurement</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.7rem;
        }
        .stat-value {
            color: #00ccff;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.1s;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            margin: 20px 0;
        }
        .comparison-table th {
            background: #1a1a1a;
            color: #00ccff;
            padding: 8px;
            text-align: left;
        }
        .comparison-table td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .comparison-table .match {
            color: #00ff00;
        }
        .comparison-table .mismatch {
            color: #ff6600;
        }
        .note-indicator {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 20px 0;
            justify-content: center;
        }
        .note-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: all 0.1s;
        }
        .note-dot.active {
            background: #00ccff;
            color: #000;
            box-shadow: 0 0 20px #00ccff;
        }
        .note-dot.playing {
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            flex: 1;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .log-container {
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - 30 Second Test with Delay Measurement</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="status">Ready</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Notes Detected</div>
                <div class="stat-value" id="detectedCount">0/0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Delay</div>
                <div class="stat-value" id="avgDelay">0ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="note-indicator" id="noteIndicator"></div>

        <h3>Delay Comparison</h3>
        <table class="comparison-table" id="comparisonTable">
            <thead>
                <tr>
                    <th>Note</th>
                    <th>Pitch</th>
                    <th>Simulated Delay</th>
                    <th>Measured Delay</th>
                    <th>Difference</th>
                </tr>
            </thead>
            <tbody id="comparisonBody">
                <!-- Filled by JavaScript -->
            </tbody>
        </table>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio state
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Test sequence state
        let sequenceActive = false;
        let sequenceStartTime = 0;
        let expectedNotes = [];
        let detectedNotes = [];
        let expectedNoteIndex = 0;
        let isNoteActive = false;
        let noteStartTime = 0;
        let currentNoteIndex = -1;

        // Detection parameters
        const ENERGY_THRESHOLD = 0.15;
        const MIN_NOTE_DURATION = 100;
        const MAX_NOTE_DURATION = 2000;
        const DETECTION_WINDOW_MS = 500;
        const FREQ_TOLERANCE = 15;

        // FFT setup
        const FFT_SIZE = 2048;
        const FLUTE_RANGE = { min: 220, max: 1046 };

        // Statistics
        let energyHistory = [];
        let delays = [];
        let comparisonData = [];

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');
            if (snap.val()) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
            }
        });

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // Listen for test sequence from conductor
        db.ref('zynth/mp3_test').on('value', snap => {  // ← Changed from 'zynth/30sec_test'
            const sequence = snap.val();
            if (sequence && sequence.status === 'ACTIVE') {
                // New sequence starting
                sequenceActive = true;
                sequenceStartTime = sequence.startTime;
                expectedNotes = sequence.notes;
                expectedNoteIndex = 0;
                detectedNotes = new Array(expectedNotes.length).fill(null);
                jitterMeasurements = [];
                totalAbsJitter = 0;
                maxMeasuredJitter = 0;

                document.getElementById('maxJitter').innerText = `±${sequence.maxJitter}ms`;
                document.getElementById('detectedCount').innerText = `0/${expectedNotes.length}`;

                const startTimeStr = new Date(sequenceStartTime).toLocaleTimeString() +
                    `.${String(sequenceStartTime % 1000).padStart(3, '0')}`;
                log(`🎬 GO signal received - sequence starting at ${startTimeStr}`);
                log(`📊 Expecting ${expectedNotes.length} notes with ±${sequence.maxJitter}ms jitter from MP3`);

            } else if (!sequence) {
                // Sequence ended
                sequenceActive = false;
                expectedNoteIndex = 0;
                log('⏹️ Sequence ended');
            }
        });

        function createNoteIndicators() {
            const container = document.getElementById('noteIndicator');
            container.innerHTML = '';
            for (let i = 0; i < expectedNotes.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'note-dot';
                dot.id = `note-${i}`;
                dot.innerText = i;
                container.appendChild(dot);
            }
        }

        function updateNoteIndicator(index, state) {
            const dot = document.getElementById(`note-${index}`);
            if (dot) {
                dot.classList.remove('active', 'playing');
                if (state === 'active') dot.classList.add('active');
                if (state === 'playing') dot.classList.add('playing');
            }
        }

        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - waiting for 30-second test');

                detectNote();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        function updateComparisonTable() {
            const tbody = document.getElementById('comparisonBody');
            tbody.innerHTML = '';

            let totalDiff = 0;
            let matchCount = 0;

            comparisonData.forEach(item => {
                const diff = Math.abs(item.measured - item.simulated);
                totalDiff += diff;
                if (diff < 20) matchCount++; // Within 20ms is a match

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.index}</td>
                    <td>${item.pitch}</td>
                    <td>${item.simulated} ms</td>
                    <td>${item.measured !== null ? item.measured + ' ms' : '---'}</td>
                    <td class="${diff < 20 ? 'match' : 'mismatch'}">${item.measured !== null ? diff + ' ms' : '---'}</td>
                `;
                tbody.appendChild(row);
            });

            if (comparisonData.length > 0) {
                const avgDelay = delays.reduce((a, b) => a + b, 0) / delays.length;
                const accuracy = (matchCount / comparisonData.length) * 100;
                document.getElementById('avgDelay').innerText = Math.round(avgDelay) + 'ms';
                document.getElementById('accuracy').innerText = Math.round(accuracy) + '%';
            }
        }

        function detectNote() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectNote);
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Find dominant frequency within flute range
            let maxVal = 0;
            let maxIdx = minBin;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIdx = i;
                }
            }
            const dominantFreq = (maxIdx / bufferLength) * nyquist;

            // Update progress if sequence active
            if (sequenceActive && expectedNotes.length > 0) {
                const progress = (expectedNoteIndex / expectedNotes.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
            }

            // Only detect notes if sequence is active
            if (sequenceActive && expectedNoteIndex < expectedNotes.length) {
                const expectedNote = expectedNotes[expectedNoteIndex];
                const expectedTime = sequenceStartTime + expectedNote.offset;

                // Only look for notes within the expected time window
                if (Math.abs(now - expectedTime) < DETECTION_WINDOW_MS) {

                    if (!isNoteActive) {
                        // Look for the expected note
                        const targetFreq = expectedNote.freq;
                        const binIndex = Math.floor(targetFreq / nyquist * bufferLength);

                        let energy = 0;
                        let binCount = 0;
                        if (binIndex >= minBin && binIndex <= maxBin) {
                            for (let i = -1; i <= 1; i++) {
                                const idx = binIndex + i;
                                if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                                    energy += dataArray[idx] / 255;
                                    binCount++;
                                }
                            }
                            energy = binCount > 0 ? energy / binCount : 0;
                        }

                        if (energy > ENERGY_THRESHOLD && Math.abs(dominantFreq - targetFreq) < FREQ_TOLERANCE) {
                            // Note detected!
                            isNoteActive = true;
                            noteStartTime = now;
                            currentNoteIndex = expectedNoteIndex;

                            // Calculate measured delay
                            const measuredDelay = now - expectedTime;
                            delays.push(measuredDelay);

                            // Store for comparison
                            comparisonData.push({
                                index: expectedNoteIndex,
                                pitch: expectedNote.pitch,
                                simulated: expectedNote.simulatedDelay,
                                measured: measuredDelay
                            });

                            // Update UI
                            updateNoteIndicator(expectedNoteIndex, 'playing');
                            document.getElementById('detectedCount').innerText = `${expectedNoteIndex + 1}/${expectedNotes.length}`;
                            updateComparisonTable();

                            log(`🔊 NOTE ${expectedNoteIndex} (${expectedNote.pitch}) - Simulated: ${expectedNote.simulatedDelay}ms, Measured: ${measuredDelay}ms, Diff: ${Math.abs(measuredDelay - expectedNote.simulatedDelay)}ms`);
                        }
                    }
                }
            }

            // Handle active note ending
            if (isNoteActive && currentNoteIndex >= 0) {
                const expectedNote = expectedNotes[currentNoteIndex];
                const targetFreq = expectedNote.freq;
                const binIndex = Math.floor(targetFreq / nyquist * bufferLength);

                let energy = 0;
                let binCount = 0;
                if (binIndex >= minBin && binIndex <= maxBin) {
                    for (let i = -1; i <= 1; i++) {
                        const idx = binIndex + i;
                        if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                            energy += dataArray[idx] / 255;
                            binCount++;
                        }
                    }
                    energy = binCount > 0 ? energy / binCount : 0;
                }

                const noteDuration = now - noteStartTime;

                if (noteDuration > MAX_NOTE_DURATION || energy < ENERGY_THRESHOLD) {
                    // Note ended
                    isNoteActive = false;
                    updateNoteIndicator(currentNoteIndex, 'active');
                    expectedNoteIndex++;
                    currentNoteIndex = -1;

                    log(`✅ Note ${expectedNoteIndex - 1} ended`);

                    // Check if sequence complete
                    if (expectedNoteIndex >= expectedNotes.length) {
                        log('🎯 Sequence complete - all notes detected');
                        log('📊 Final delay comparison:');
                        comparisonData.forEach(item => {
                            log(`   Note ${item.index}: Sim=${item.simulated}ms, Meas=${item.measured}ms, Diff=${Math.abs(item.measured - item.simulated)}ms`);
                        });
                    }
                }
            }

            // Store energy history
            energyHistory.push({ time: now, energy: maxVal / 255 });
            if (energyHistory.length > 50) energyHistory.shift();

            requestAnimationFrame(detectNote);
        }

        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw spectrum
            ctx.fillStyle = '#00ccff';
            const nyquist = audioCtx.sampleRate / 2;
            const startBin = Math.floor(300 / nyquist * analyser.frequencyBinCount);
            const endBin = Math.floor(600 / nyquist * analyser.frequencyBinCount);

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;
                const x = (i - startBin) * (width / (endBin - startBin));
                const barHeight = (dataArray[i] / 255) * height;
                ctx.fillRect(x, height - barHeight, 4, barHeight);
            }

            requestAnimationFrame(drawVisualizer);
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('enableBtn').onclick = enableMicrophone;
        document.getElementById('disableBtn').onclick = disableMicrophone;
        document.getElementById('copyLogBtn').onclick = copyLog;

        window.onload = () => {
            log('⏱️ 30 Second Test with Delay Measurement ready');
            log('🎯 Will compare simulated vs measured delays');
        };
    </script>
</body>
</html>
