<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zynth Device - Warble Receiver</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        #header {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #seat-label {
            color: #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        #device-type {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        #status-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            font-family: monospace;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ffcc;
            font-weight: bold;
        }
        .detection-panel {
            background: #0a0a0a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }
        .detection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .detection-bit {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .detection-bit.detected {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
        }
        .detection-bit.zero {
            background: #442288;
            color: #fff;
        }
        .detection-bit.pending {
            background: #333;
            color: #666;
        }
        .modulation-meter {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffcc00;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 5px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #ffcc00;
            width: 0%;
            transition: width 0.1s;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .visualizer {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #333;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            color: #888;
            margin-top: 20px;
        }
        .permission-status {
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 15px;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
        .granted {
            background: #1e4d1e;
            color: #8bc34a;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <div id="seat-label">Loading...</div>
            <div id="device-type">Initializing...</div>
        </div>

        <div id="status-panel">
            <div class="status-row">
                <span class="label">Status:</span>
                <span class="value" id="status-value">Starting up...</span>
            </div>

            <!-- Mic Section -->
            <div id="mic-section">
                <div class="status-row" style="flex-direction: column; align-items: stretch;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span class="label">🎤 Ear status:</span>
                        <span class="value" id="mic-status">checking...</span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button id="request-mic-btn" class="secondary">🎤 Enable Ear</button>
                        <button id="stop-mic-btn" class="danger">⏹️ Disable</button>
                    </div>
                </div>
            </div>

            <!-- Detection Panel -->
            <div class="detection-panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="color: #00ffcc; font-weight: bold;">🎵 Received Data</span>
                    <span id="frame-complete" style="color: #ffcc00;">Waiting...</span>
                </div>

                <div class="detection-grid" id="bitGrid">
                    <!-- 16 bits go here -->
                </div>

                <div class="modulation-meter">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>🎵 Warble Confidence</span>
                        <span id="confidence-value" style="color: #ffcc00;">0%</span>
                    </div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="confidence-meter" style="width: 0%;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem;">
                        <span>Vibrato: <span id="detected-rate">---</span> Hz</span>
                        <span>Depth: <span id="detected-depth">---</span> Hz</span>
                    </div>
                </div>
            </div>

            <!-- Audio Status -->
            <div class="status-row">
                <span class="label">Audio context:</span>
                <span class="value" id="audio-state">uninitialized</span>
            </div>

            <!-- Visualizer -->
            <canvas id="visualizer" class="visualizer"></canvas>

            <!-- Control Buttons -->
            <div style="display: flex; gap: 10px; margin: 10px 0;">
                <button id="prime-audio-btn" class="secondary">🔊 Prime Audio</button>
                <button id="reset-btn" class="danger">🔄 Reset</button>
            </div>

            <!-- Last Frame -->
            <div class="status-row">
                <span class="label">Last received frame:</span>
                <span class="value" id="last-frame">---</span>
            </div>
            <div class="status-row">
                <span class="label">Valid frames:</span>
                <span class="value" id="frame-count">0</span>
            </div>

            <!-- Event Log -->
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // Global State
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;
        let seatId = null;
        let isPillar = false;
        let micPermission = false;
        let audioPrimed = false;

        // Warble detection parameters (from successful receiver test)
        const BASE_FLUTE_FREQ = 440;
        const WARBLE_ENERGY_THRESHOLD = 0.02;
        const WARBLE_FREQ_BINS = 3;
        const WARBLE_MIN_CONFIDENCE = 0.6;
        const WARBLE_LOOKBACK_FRAMES = 15;
        const WARBLE_COOLDOWN_MS = 200;

        const MIN_WARBLE_DEPTH = 15;
        const MAX_WARBLE_DEPTH = 80;
        const MIN_VIBRATO_RATE = 1.5;
        const MAX_VIBRATO_RATE = 4.5;
        const MIN_SIGN_CHANGES = 3;

        const NOTE_DURATION = 300;      // ms per note
        const GAP_DURATION = 50;         // ms gap between notes
        const FRAME_SIZE = 16;            // 16 bits per frame
        const FRAME_TIMEOUT = 6000;       // 6 seconds max for full frame

        // Decoder state
        const STATE_IDLE = 0;
        const STATE_LISTENING = 1;
        const STATE_DETECTING = 2;
        const STATE_COMPLETE = 3;

        let decoderState = STATE_IDLE;
        let currentBits = new Array(FRAME_SIZE).fill(undefined);
        let warbleBuffer = [];
        let validFrameCount = 0;
        let currentNoteIndex = 0;
        let lastDetectionTime = 0;
        let frameStartTime = 0;
        let frameTimeout = null;

        const FFT_SIZE = 4096;

        // ============================================
        // Clock sync
        // ============================================
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // ============================================
        // Initialize
        // ============================================
        window.onload = () => {
            log("🚀 Zynth Device starting up...");

            // Get seat ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            seatId = urlParams.get('seat');
            isPillar = seatId?.startsWith('PILLAR_') || false;

            document.getElementById('seat-label').innerText = seatId || 'No Seat ID';
            document.getElementById('device-type').innerText = isPillar ? '🏛️ Pillar (Transmit Only)' : '📱 Patron (Receiver)';

            if (isPillar) {
                document.getElementById('mic-section').style.display = 'none';
                document.getElementById('status-value').innerText = 'Pillar mode - transmit only';
            } else {
                document.getElementById('status-value').innerText = 'Ready - enable ear';
            }

            // Initialize bit grid
            updateBitGrid();

            // Start listening for frames from conductor
            listenForFrames();

            log(`✅ Startup complete. Device: ${seatId}`);
        };

        // ============================================
        // Bit Grid UI
        // ============================================
        function updateBitGrid() {
            const grid = document.getElementById('bitGrid');
            grid.innerHTML = '';

            for (let i = 0; i < FRAME_SIZE; i++) {
                const bit = currentBits[i];
                const cell = document.createElement('div');
                cell.className = 'detection-bit';

                if (bit === 1) {
                    cell.classList.add('detected');
                    cell.innerText = '1';
                } else if (bit === 0) {
                    cell.classList.add('zero');
                    cell.innerText = '0';
                } else {
                    cell.classList.add('pending');
                    cell.innerText = '?';
                }

                grid.appendChild(cell);
            }

            // Update frame status
            const receivedCount = currentBits.filter(b => b !== undefined).length;
            if (receivedCount === FRAME_SIZE) {
                document.getElementById('frame-complete').innerHTML = '✅ Frame Complete';
                document.getElementById('last-frame').innerText = currentBits.join('');
            } else {
                document.getElementById('frame-complete').innerHTML = `⏳ ${receivedCount}/16 bits`;
            }
        }

        // ============================================
        // Reset decoder
        // ============================================
        function resetDecoder() {
            currentBits = new Array(FRAME_SIZE).fill(undefined);
            currentNoteIndex = 0;
            decoderState = STATE_IDLE;
            lastDetectionTime = 0;

            if (frameTimeout) {
                clearTimeout(frameTimeout);
                frameTimeout = null;
            }

            updateBitGrid();
            log("🔄 Decoder reset");
        }

        // ============================================
        // Listen for frames from conductor
        // ============================================
        function listenForFrames() {
            db.ref('zynth/last_frame').on('value', snap => {
                const frame = snap.val();
                if (frame && !isPillar) {
                    log(`📡 Frame detected from conductor: ${frame.data}`);
                    // The actual detection happens via microphone
                    // This just notifies us that a transmission occurred
                }
            });
        }

        // ============================================
        // Request microphone permission
        // ============================================
        async function requestMicrophone() {
            if (isPillar) return;

            log("🎤 Requesting microphone permission...");
            document.getElementById('mic-status').innerText = 'requesting...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                micPermission = true;
                document.getElementById('mic-status').innerHTML = '✅ Active';

                // Store stream for later use
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                mediaStream = stream;

                // Initialize audio context if needed
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // Create analyser for detection
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.2;
                source.connect(analyser);

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                isListening = true;
                decoderState = STATE_LISTENING;
                resetDecoder();

                log("✅ Ear activated - listening for warbles");
                document.getElementById('status-value').innerText = 'Listening...';

                // Start detection loop
                detectWarble();
                drawVisualizer();

            } catch (err) {
                micPermission = false;
                document.getElementById('mic-status').innerHTML = '❌ Denied';
                log(`🎤 Permission denied: ${err.message}`);
            }
        }

        // ============================================
        // Stop listening
        // ============================================
        function stopListening() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isListening = false;
            analyser = null;

            document.getElementById('mic-status').innerHTML = '🔇 Off';
            document.getElementById('status-value').innerText = 'Ear disabled';

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            resetDecoder();
            log("⏹️ Stopped listening");
        }

        // ============================================
        // Prime audio (silent warm-up)
        // ============================================
        async function primeAudio() {
            log("🔊 Priming audio system...");

            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                // Play silent tone to wake hardware
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.frequency.value = 440;
                gainNode.gain.value = 0; // Silent

                oscillator.connect(gainNode).connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);

                audioPrimed = true;
                document.getElementById('audio-state').innerText = audioCtx.state;
                log("🔊 Audio primed");

                // Suspend to save power
                await audioCtx.suspend();
                document.getElementById('audio-state').innerText = audioCtx.state;

            } catch (e) {
                log(`❌ Audio priming failed: ${e.message}`);
            }
        }

        // ============================================
        // Warble Detection (from working receiver)
        // ============================================
        function detectWarble() {
            if (!isListening || !analyser || !audioCtx) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const now = Date.now();

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Convert to float [0,1]
            const floatData = new Float32Array(bufferLength);
            for (let i = 0; i < bufferLength; i++) {
                floatData[i] = dataArray[i] / 255;
            }

            // Store in buffer for temporal analysis
            warbleBuffer.push({
                time: now,
                data: floatData.slice()
            });

            if (warbleBuffer.length > WARBLE_LOOKBACK_FRAMES * 2) {
                warbleBuffer.shift();
            }

            if (warbleBuffer.length < WARBLE_LOOKBACK_FRAMES) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const recentFrames = warbleBuffer.slice(-WARBLE_LOOKBACK_FRAMES);

            // Calculate frequency bin for base flute tone
            const nyquist = audioCtx.sampleRate / 2;
            const binIndex = Math.floor(BASE_FLUTE_FREQ / nyquist * bufferLength);

            if (binIndex < 0 || binIndex >= bufferLength) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Get energy in surrounding bins
            let energy = 0;
            let binCount = 0;
            for (let i = -WARBLE_FREQ_BINS; i <= WARBLE_FREQ_BINS; i++) {
                const idx = binIndex + i;
                if (idx >= 0 && idx < bufferLength) {
                    energy += floatData[idx];
                    binCount++;
                }
            }
            energy = energy / binCount;

            // Check for note timeout (if we're in DETECTING state)
            if (decoderState === STATE_DETECTING && currentNoteIndex < FRAME_SIZE) {
                const timeSinceLastDetection = now - lastDetectionTime;

                // If we've waited too long for next note, assume it's a 0
                if (timeSinceLastDetection > NOTE_DURATION + GAP_DURATION + 100) {
                    log(`   Bit ${currentNoteIndex + 1}/16: 0 (timeout)`, 'detection');

                    currentBits[currentNoteIndex] = 0;
                    updateBitGrid();

                    currentNoteIndex++;
                    lastDetectionTime = now;

                    if (currentNoteIndex >= FRAME_SIZE) {
                        completeFrame();
                    }
                }
            }

            if (energy < WARBLE_ENERGY_THRESHOLD) {
                requestAnimationFrame(detectWarble);
                return;
            }

            // Extract frequency peaks
            const peakFreqs = [];
            for (let i = 0; i < recentFrames.length; i++) {
                const frame = recentFrames[i];

                let maxEnergy = 0;
                let maxIdx = binIndex;

                for (let j = -3; j <= 3; j++) {
                    const idx = binIndex + j;
                    if (idx >= 0 && idx < frame.data.length && frame.data[idx] > maxEnergy) {
                        maxEnergy = frame.data[idx];
                        maxIdx = idx;
                    }
                }

                const peakFreq = (maxIdx / bufferLength) * nyquist;
                peakFreqs.push(peakFreq);
            }

            if (peakFreqs.length < 5) {
                requestAnimationFrame(detectWarble);
                return;
            }

            const freqChanges = [];
            for (let i = 1; i < peakFreqs.length; i++) {
                freqChanges.push(peakFreqs[i] - peakFreqs[i-1]);
            }

            // Look for alternating sign changes
            let signChanges = 0;
            for (let i = 1; i < freqChanges.length; i++) {
                if (Math.sign(freqChanges[i]) !== Math.sign(freqChanges[i-1]) &&
                    Math.abs(freqChanges[i]) > 2) {
                    signChanges++;
                }
            }

            // Calculate frequency range and clamp
            const rawFreqRange = Math.max(...peakFreqs) - Math.min(...peakFreqs);
            const freqRange = Math.min(MAX_WARBLE_DEPTH, rawFreqRange);

            // Calculate vibrato rate
            let zeroCrossings = 0;
            for (let i = 1; i < peakFreqs.length; i++) {
                if ((peakFreqs[i] - BASE_FLUTE_FREQ) * (peakFreqs[i-1] - BASE_FLUTE_FREQ) < 0) {
                    zeroCrossings++;
                }
            }
            const vibratoRate = (zeroCrossings / 2) / (WARBLE_LOOKBACK_FRAMES * 23 / 1000);

            // Update display
            document.getElementById('detected-rate').innerText = vibratoRate.toFixed(1);
            document.getElementById('detected-depth').innerText = Math.round(freqRange);

            // Calculate confidence score
            let modulationScore = 0;

            if (freqRange >= MIN_WARBLE_DEPTH && freqRange <= MAX_WARBLE_DEPTH) {
                modulationScore += 0.4;
            }
            if (signChanges >= MIN_SIGN_CHANGES) {
                modulationScore += 0.3;
            }
            if (vibratoRate >= MIN_VIBRATO_RATE && vibratoRate <= MAX_VIBRATO_RATE) {
                modulationScore += 0.3;
            }
            if (energy > WARBLE_ENERGY_THRESHOLD * 2) {
                modulationScore += 0.1;
            }

            modulationScore = Math.min(1, modulationScore);

            document.getElementById('confidence-meter').style.width = (modulationScore * 100) + '%';
            document.getElementById('confidence-value').innerText = Math.round(modulationScore * 100) + '%';

            // If warble detected with good confidence
            if (modulationScore >= WARBLE_MIN_CONFIDENCE) {
                if (now - lastDetectionTime > WARBLE_COOLDOWN_MS) {
                    processWarbleDetection(modulationScore);
                    lastDetectionTime = now;
                }
            }

            requestAnimationFrame(detectWarble);
        }

        // ============================================
        // Process a detected warble
        // ============================================
        function processWarbleDetection(confidence) {
            // Flash visualizer
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#00ffcc';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;

            switch(decoderState) {
                case STATE_LISTENING:
                    // Start of new frame
                    decoderState = STATE_DETECTING;
                    currentBits = new Array(FRAME_SIZE).fill(undefined);
                    currentNoteIndex = 0;
                    frameStartTime = Date.now();

                    // Set timeout for frame completion
                    if (frameTimeout) clearTimeout(frameTimeout);
                    frameTimeout = setTimeout(() => {
                        if (decoderState === STATE_DETECTING) {
                            log("⚠️ Frame timeout - resetting");
                            resetDecoder();
                            decoderState = STATE_LISTENING;
                        }
                    }, FRAME_TIMEOUT);

                    log(`🎯 Frame started! (conf: ${Math.round(confidence*100)}%)`);
                    // Fall through

                case STATE_DETECTING:
                    if (currentNoteIndex < FRAME_SIZE) {
                        currentBits[currentNoteIndex] = 1;
                        log(`   Bit ${currentNoteIndex + 1}/16: 1 (warble)`);

                        updateBitGrid();
                        currentNoteIndex++;

                        if (currentNoteIndex >= FRAME_SIZE) {
                            completeFrame();
                        }
                    }
                    break;
            }
        }

        // ============================================
        // Complete a frame
        // ============================================
        function completeFrame() {
            // Fill any missing bits as 0
            for (let i = 0; i < FRAME_SIZE; i++) {
                if (currentBits[i] === undefined) {
                    currentBits[i] = 0;
                    log(`   Bit ${i + 1}/16: 0 (filling missing)`);
                }
            }

            const frameData = currentBits.join('');
            document.getElementById('last-frame').innerText = frameData;

            validFrameCount++;
            document.getElementById('frame-count').innerText = validFrameCount;

            log(`🎯 VALID FRAME: ${frameData}`, 'detection');

            decoderState = STATE_COMPLETE;

            // Auto-reset after 2 seconds
            setTimeout(() => {
                if (decoderState === STATE_COMPLETE) {
                    resetDecoder();
                    decoderState = STATE_LISTENING;
                }
            }, 2000);

            // Report back to Firebase
            if (seatId && !isPillar) {
                db.ref(`zynth/detections/${seatId}`).push({
                    frame: frameData,
                    timestamp: Date.now() + serverOffset,
                    confidence: parseInt(document.getElementById('confidence-value').innerText)
                });
            }
        }

        // ============================================
        // Visualizer
        // ============================================
        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw frequency spectrum
            ctx.fillStyle = '#00ffcc';
            const barWidth = 3;

            const startBin = Math.floor(200 / (audioCtx.sampleRate / FFT_SIZE));
            const endBin = Math.floor(800 / (audioCtx.sampleRate / FFT_SIZE));

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;

                const x = (i - startBin) * (barWidth + 1);
                const value = dataArray[i];
                const barHeight = (value / 255) * height;

                ctx.fillRect(x, height - barHeight, barWidth, barHeight);
            }

            // Highlight base frequency
            const baseBin = Math.floor(BASE_FLUTE_FREQ / (audioCtx.sampleRate / FFT_SIZE));
            if (baseBin >= startBin && baseBin < endBin) {
                const x = (baseBin - startBin) * (barWidth + 1);
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(x, 0, barWidth, height);
            }

            requestAnimationFrame(drawVisualizer);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message, type = 'normal') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'detection' ? 'log-entry detection' : 'log-entry';
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Button handlers
        // ============================================
        document.getElementById('request-mic-btn').onclick = requestMicrophone;
        document.getElementById('stop-mic-btn').onclick = stopListening;
        document.getElementById('prime-audio-btn').onclick = primeAudio;

        document.getElementById('reset-btn').onclick = () => {
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            audioPrimed = false;
            stopListening();
            resetDecoder();
            document.getElementById('audio-state').innerText = 'closed';
            log("🔄 System reset");
        };

        // ============================================
        // Cleanup
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            if (audioCtx) {
                audioCtx.close();
            }
        });
    </script>
</body>
</html>
