<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Warble Detector</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .panel {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            font-family: monospace;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ffcc;
            font-weight: bold;
        }
        .detection-panel {
            background: #0a0a0a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }
        .warble-indicator {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .warble-light {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            transition: all 0.1s;
        }
        .warble-light.active {
            background: #ffcc00;
            box-shadow: 0 0 30px #ffcc00;
            animation: flash 0.2s ease;
        }
        @keyframes flash {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        .modulation-meter {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffcc00;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #ffcc00;
            width: 0%;
            transition: width 0.1s;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .stat-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-label {
            color: #888;
            font-size: 0.7rem;
        }
        .stat-number {
            color: #ffcc00;
            font-size: 1.2rem;
            font-weight: bold;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            width: 100%;
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        .visualizer {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #333;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Device - Warble Detector</h1>

    <div class="panel">
        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status-value">Ready</span>
        </div>

        <button id="enableMicBtn" class="secondary">🎤 Enable Detection</button>
        <button id="disableMicBtn" style="background:#600;">⏹️ Disable</button>

        <div class="detection-panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span style="color: #00ffcc;">🎵 Warble Detection</span>
                <span id="detectionStatus">No signal</span>
            </div>

            <div class="warble-indicator" id="warbleLights">
                <div class="warble-light"></div>
                <div class="warble-light"></div>
                <div class="warble-light"></div>
                <div class="warble-light"></div>
                <div class="warble-light"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Confidence</div>
                    <div class="stat-number" id="confidenceValue">0%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Vibrato Rate</div>
                    <div class="stat-number" id="vibratoRate">0.0 Hz</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Depth</div>
                    <div class="stat-number" id="warbleDepth">0 Hz</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Warbles</div>
                    <div class="stat-number" id="warbleCount">0</div>
                </div>
            </div>

            <div class="modulation-meter">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Modulation Score</span>
                    <span id="modulationScore">0.00</span>
                </div>
                <div class="meter-bar">
                    <div class="meter-fill" id="confidenceMeter"></div>
                </div>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Last pattern:</span>
            <span class="value" id="lastPattern">---</span>
        </div>
        <div class="status-row">
            <span class="label">Detections:</span>
            <span class="value" id="detectionCount">0</span>
        </div>

        <canvas id="visualizer" class="visualizer"></canvas>

        <div class="log" id="log"></div>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // Global State
        // ============================================
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Detection parameters
        const VIBRATO_TARGET = 2.5;  // 2.5Hz from bach_baker.py
        const VIBRATO_TOLERANCE = 1.0;  // ±1.0Hz
        const DEPTH_TARGET = 30;  // 30Hz from bach_baker.py
        const DEPTH_TOLERANCE = 15;  // ±15Hz
        const ENERGY_THRESHOLD = 0.02;
        const LOOKBACK_FRAMES = 15;
        const COOLDOWN_MS = 300;  // Minimum time between detections

        const FFT_SIZE = 4096;

        // Detection state
        let warbleBuffer = [];
        let lastDetectionTime = 0;
        let detectionCount = 0;
        let currentPattern = [];
        let patternStartTime = 0;
        let expectedFreq = 440;

        // ============================================
        // Listen for conductor
        // ============================================
        function listenForConductor() {
            db.ref('zynth/note').on('value', snap => {
                const note = snap.val();
                if (note) {
                    expectedFreq = note.frequency;
                    log(`📡 Conductor playing: ${note.frequency}Hz, pattern ${note.pattern}`);

                    // Reset for new note
                    currentPattern = [];
                    patternStartTime = Date.now();
                }
            });
        }

        // ============================================
        // Enable microphone
        // ============================================
        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status-value').innerText = 'Listening';
                log("✅ Detection active");

                detectWarbles();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status-value').innerText = 'Ready';
            log("⏹️ Stopped");
        }

        // ============================================
        // Warble Detection
        // ============================================
        function detectWarbles() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectWarbles);
                return;
            }

            const now = Date.now();

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            const floatData = new Float32Array(bufferLength);
            for (let i = 0; i < bufferLength; i++) floatData[i] = dataArray[i] / 255;

            // Store in buffer
            warbleBuffer.push({ time: now, data: floatData.slice() });
            if (warbleBuffer.length > LOOKBACK_FRAMES * 2) warbleBuffer.shift();
            if (warbleBuffer.length < LOOKBACK_FRAMES) {
                requestAnimationFrame(detectWarbles);
                return;
            }

            const recentFrames = warbleBuffer.slice(-LOOKBACK_FRAMES);

            // Analyze expected frequency
            const nyquist = audioCtx.sampleRate / 2;
            const binIndex = Math.floor(expectedFreq / nyquist * bufferLength);
            if (binIndex < 0 || binIndex >= bufferLength) {
                requestAnimationFrame(detectWarbles);
                return;
            }

            // Get energy
            let energy = 0;
            for (let i = -2; i <= 2; i++) {
                const idx = binIndex + i;
                if (idx >= 0 && idx < bufferLength) energy += floatData[idx];
            }
            energy /= 5;

            // Track frequency peaks
            const peakFreqs = [];
            for (let i = 0; i < recentFrames.length; i++) {
                const frame = recentFrames[i];
                let maxEnergy = 0, maxIdx = binIndex;
                for (let j = -3; j <= 3; j++) {
                    const idx = binIndex + j;
                    if (idx >= 0 && idx < frame.data.length && frame.data[idx] > maxEnergy) {
                        maxEnergy = frame.data[idx];
                        maxIdx = idx;
                    }
                }
                peakFreqs.push((maxIdx / bufferLength) * nyquist);
            }

            // Calculate modulation characteristics
            const freqRange = Math.max(...peakFreqs) - Math.min(...peakFreqs);

            let zeroCrossings = 0;
            for (let i = 1; i < peakFreqs.length; i++) {
                if ((peakFreqs[i] - expectedFreq) * (peakFreqs[i-1] - expectedFreq) < 0) {
                    zeroCrossings++;
                }
            }
            const vibratoRate = (zeroCrossings / 2) / (LOOKBACK_FRAMES * 23 / 1000);

            // Calculate confidence
            let confidence = 0;
            if (energy > ENERGY_THRESHOLD) confidence += 0.2;

            // Check if vibrato rate matches target (2.5Hz)
            if (Math.abs(vibratoRate - VIBRATO_TARGET) < VIBRATO_TOLERANCE) {
                confidence += 0.4;
            }

            // Check if depth matches target (30Hz)
            if (Math.abs(freqRange - DEPTH_TARGET) < DEPTH_TOLERANCE) {
                confidence += 0.4;
            }

            confidence = Math.min(1, confidence);

            // Update UI
            document.getElementById('confidenceMeter').style.width = (confidence * 100) + '%';
            document.getElementById('confidenceValue').innerText = Math.round(confidence * 100) + '%';
            document.getElementById('vibratoRate').innerText = vibratoRate.toFixed(1) + ' Hz';
            document.getElementById('warbleDepth').innerText = Math.round(freqRange) + ' Hz';
            document.getElementById('modulationScore').innerText = confidence.toFixed(2);

            // Detect warble
            if (confidence > 0.7 && now - lastDetectionTime > COOLDOWN_MS) {
                lastDetectionTime = now;
                detectionCount++;

                // Add to pattern
                const timeInNote = now - patternStartTime;
                currentPattern.push(timeInNote);

                // Update lights
                const lights = document.querySelectorAll('.warble-light');
                for (let i = 0; i < Math.min(currentPattern.length, 5); i++) {
                    lights[i].classList.add('active');
                    setTimeout(() => lights[i].classList.remove('active'), 200);
                }

                document.getElementById('warbleCount').innerText = currentPattern.length;
                document.getElementById('detectionCount').innerText = detectionCount;
                document.getElementById('detectionStatus').innerText = 'WARBLE!';

                log(`🔊 Warble detected! (conf: ${Math.round(confidence*100)}%, rate: ${vibratoRate.toFixed(1)}Hz, depth: ${Math.round(freqRange)}Hz)`);

                // Update last pattern
                if (currentPattern.length > 0) {
                    const patternStr = currentPattern.map((t, i) => i > 0 ? `${Math.round(t - currentPattern[i-1])}` : '0').join('-');
                    document.getElementById('lastPattern').innerText = patternStr + 'ms';
                }

                setTimeout(() => document.getElementById('detectionStatus').innerText = 'Listening', 500);
            }

            requestAnimationFrame(detectWarbles);
        }

        // ============================================
        // Visualizer
        // ============================================
        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#00ffcc';
            for (let i = 0; i < 100; i++) {
                const x = i * 4;
                const value = dataArray[i * 10] || 0;
                const barHeight = (value / 255) * height;
                ctx.fillRect(x, height - barHeight, 3, barHeight);
            }

            requestAnimationFrame(drawVisualizer);
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        // ============================================
        // Initialize
        // ============================================
        window.onload = () => {
            document.getElementById('enableMicBtn').onclick = enableMicrophone;
            document.getElementById('disableMicBtn').onclick = disableMicrophone;

            log("🎵 Zynth Device - Warble Detector");
            log("   • Looking for 2.5Hz vibrato, 30Hz depth");
            log("   • Detects subtle warbles overlaid on tone");

            listenForConductor();
        };
    </script>
</body>
</html>
