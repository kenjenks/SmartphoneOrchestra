<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Device - Note Timing Tester</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .timing-display {
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            color: #00ccff;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ccff;
            font-weight: bold;
        }
        .energy-meter {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .meter-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            background: #00ccff;
            width: 0%;
            transition: width 0.05s;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-row button {
            margin: 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        canvas {
            width: 100%;
            height: 100px;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>⏱️ Zynth Device - Note Timing Tester</h1>

    <div class="panel">
        <div class="status-row">
            <span class="label">Status:</span>
            <span class="value" id="status">Ready</span>
        </div>

        <div class="button-row">
            <button id="enableBtn">🎤 Enable Mic</button>
            <button id="disableBtn" class="danger">⏹️ Disable</button>
        </div>

        <div class="timing-display" id="timingDisplay">
            ---
        </div>

        <div class="energy-meter">
            <div style="display: flex; justify-content: space-between;">
                <span>Energy at 440Hz</span>
                <span id="energyValue">0.00</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="energyMeter"></div>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Dominant frequency (flute range):</span>
            <span class="value" id="dominantFreq">--- Hz</span>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="status-row">
            <span class="label">Last onset:</span>
            <span class="value" id="lastOnset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Last offset:</span>
            <span class="value" id="lastOffset">---</span>
        </div>
        <div class="status-row">
            <span class="label">Duration:</span>
            <span class="value" id="lastDuration">---</span>
        </div>
        <div class="status-row">
            <span class="label">Detected notes:</span>
            <span class="value" id="noteCount">0</span>
        </div>

        <div class="log-container">
            <div class="log-header">
                <span style="color: #888;">Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio state
        let audioCtx = null;
        let analyser = null;
        let mediaStream = null;
        let isListening = false;
        let animationFrame = null;
        let serverOffset = 0;

        // Timing detection state
        let isNoteActive = false;
        let noteStartTime = 0;
        let energyHistory = [];
        const ENERGY_THRESHOLD = 0.15;  // Raised threshold to ignore ambient noise
        const MIN_NOTE_DURATION = 100; // ms
        const MIN_TIME_BETWEEN_NOTES = 2000; // 2 seconds between notes
        const MAX_NOTE_DURATION = 2000; // Max note length
        const TARGET_FREQ = 440; // A4
        const FREQ_TOLERANCE = 10; // Only accept frequencies within 10Hz of 440Hz

        // Statistics
        let detectedNotes = [];
        let noteCount = 0;

        // FFT setup
        const FFT_SIZE = 2048;

        // Flute frequency range (A3 to C6)
        const FLUTE_RANGE = {
            min: 220,  // A3
            max: 1046  // C6
        };

        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        async function enableMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });

                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.1; // Fast response
                source.connect(analyser);

                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = stream;

                isListening = true;
                document.getElementById('status').innerText = 'Listening';
                log('✅ Mic enabled - listening for A4 (440Hz)');

                detectNote();
                drawVisualizer();

            } catch (err) {
                log(`❌ Mic error: ${err.message}`);
            }
        }

        function disableMicrophone() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            isListening = false;
            analyser = null;
            document.getElementById('status').innerText = 'Ready';
            log('⏹️ Stopped');
        }

        function copyLog() {
            const logDiv = document.getElementById('log');

            // Create a range and select the log contents
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                // Copy to clipboard
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            // Deselect
            selection.removeAllRanges();
        }

        function detectNote() {
            if (!isListening || !analyser) {
                requestAnimationFrame(detectNote);
                return;
            }

            const now = Date.now() + serverOffset;

            // Get frequency data
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const nyquist = audioCtx.sampleRate / 2;

            // Only scan bins within flute frequency range for dominant frequency
            const minBin = Math.floor(FLUTE_RANGE.min / nyquist * bufferLength);
            const maxBin = Math.ceil(FLUTE_RANGE.max / nyquist * bufferLength);

            // Find the actual dominant frequency WITHIN FLUTE RANGE
            let maxVal = 0;
            let maxIdx = minBin;
            for (let i = minBin; i < maxBin && i < bufferLength; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIdx = i;
                }
            }
            const dominantFreq = (maxIdx / bufferLength) * nyquist;
            document.getElementById('dominantFreq').innerText = Math.round(dominantFreq) + ' Hz';

            // Calculate energy at target frequency (440Hz) - WITHIN FLUTE RANGE
            const binIndex = Math.floor(TARGET_FREQ / nyquist * bufferLength);

            // Make sure binIndex is within flute range
            if (binIndex >= minBin && binIndex <= maxBin) {
                // Only look at ±1 bin
                let energy = 0;
                let binCount = 0;
                for (let i = -1; i <= 1; i++) {
                    const idx = binIndex + i;
                    if (idx >= minBin && idx <= maxBin && idx >= 0 && idx < bufferLength) {
                        energy += dataArray[idx] / 255;
                        binCount++;
                    }
                }
                energy = binCount > 0 ? energy / binCount : 0;

                // Update meter
                document.getElementById('energyValue').innerText = energy.toFixed(3);
                document.getElementById('energyMeter').style.width = (energy * 100) + '%';

                // Simple state machine for note detection
                if (!isNoteActive && energy > ENERGY_THRESHOLD) {
                    // Check if enough time has passed since last note
                    const timeSinceLastNote = now - (detectedNotes.length > 0 ? detectedNotes[detectedNotes.length - 1].start : 0);

                    if (timeSinceLastNote > MIN_TIME_BETWEEN_NOTES) {
                        // TIGHTENED frequency check - only accept within 10Hz of 440
                        if (Math.abs(dominantFreq - TARGET_FREQ) < FREQ_TOLERANCE) {
                            // Note started
                            isNoteActive = true;
                            noteStartTime = now;
                            document.getElementById('timingDisplay').innerText = '🔴 NOTE ACTIVE';
                            log(`🔊 NOTE ONSET at ${new Date(noteStartTime).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')} (energy: ${energy.toFixed(3)}, freq: ${Math.round(dominantFreq)}Hz)`);
                        }
                        // Removed the "wrong frequency" log - we don't need to see these
                    }
                    // Removed the "too soon" log

                } else if (isNoteActive) {
                    // Check if note has been active too long (stuck detection)
                    const noteDuration = now - noteStartTime;

                    if (noteDuration > MAX_NOTE_DURATION) {
                        // Force end the note
                        isNoteActive = false;
                        document.getElementById('timingDisplay').innerText = `⚠️ TIMEOUT ${noteDuration}ms`;
                        log(`⚠️ Note timeout after ${noteDuration}ms`);

                        detectedNotes.push({
                            start: noteStartTime,
                            end: now,
                            duration: noteDuration,
                            forced: true
                        });

                        noteCount++;
                        document.getElementById('noteCount').innerText = noteCount;

                    }
                    // ONLY end the note if 440Hz energy drops below threshold
                    else if (energy < ENERGY_THRESHOLD) {
                        // Check if it's really the end (look at recent history of 440Hz energy)
                        let recentLowEnergy = true;
                        const historyToCheck = 5; // Check last 5 samples

                        for (let i = Math.max(0, energyHistory.length - historyToCheck); i < energyHistory.length; i++) {
                            if (energyHistory[i] && energyHistory[i].energy > ENERGY_THRESHOLD) {
                                recentLowEnergy = false;
                                break;
                            }
                        }

                        if (recentLowEnergy && noteDuration > MIN_NOTE_DURATION) {
                            // Note ended
                            isNoteActive = false;

                            detectedNotes.push({
                                start: noteStartTime,
                                end: now,
                                duration: noteDuration
                            });

                            noteCount++;

                            document.getElementById('timingDisplay').innerText = `✅ ${noteDuration}ms`;
                            document.getElementById('lastOnset').innerText = new Date(noteStartTime).toLocaleTimeString() +
                                `.${String(noteStartTime % 1000).padStart(3, '0')}`;
                            document.getElementById('lastOffset').innerText = new Date(now).toLocaleTimeString() +
                                `.${String(now % 1000).padStart(3, '0')}`;
                            document.getElementById('lastDuration').innerText = noteDuration + ' ms';
                            document.getElementById('noteCount').innerText = noteCount;

                            log(`✅ NOTE ENDED - duration: ${noteDuration}ms`);

                            // Report to Firebase
                            db.ref('timing_tests').push({
                                start: noteStartTime,
                                end: now,
                                duration: noteDuration,
                                timestamp: now
                            });
                        }
                    }
                    // If we get here, note is still active - do nothing
                }

                // Store in history (keep last 50 samples)
                energyHistory.push({ time: now, energy });
                if (energyHistory.length > 50) energyHistory.shift();
            }

            requestAnimationFrame(detectNote);
        }

        function drawVisualizer() {
            if (!analyser || !isListening) {
                requestAnimationFrame(drawVisualizer);
                return;
            }

            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Draw spectrum around 440Hz
            ctx.fillStyle = '#00ccff';
            const nyquist = audioCtx.sampleRate / 2;
            const startBin = Math.floor(300 / nyquist * analyser.frequencyBinCount);
            const endBin = Math.floor(600 / nyquist * analyser.frequencyBinCount);

            for (let i = startBin; i < endBin; i++) {
                if (i >= dataArray.length) break;
                const x = (i - startBin) * (width / (endBin - startBin));
                const barHeight = (dataArray[i] / 255) * height;
                ctx.fillRect(x, height - barHeight, 4, barHeight);
            }

            // Highlight target frequency
            const targetBin = Math.floor(TARGET_FREQ / nyquist * analyser.frequencyBinCount);
            if (targetBin >= startBin && targetBin < endBin) {
                const x = (targetBin - startBin) * (width / (endBin - startBin));
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(x, 0, 4, height);
            }

            requestAnimationFrame(drawVisualizer);
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('enableBtn').onclick = enableMicrophone;
        document.getElementById('disableBtn').onclick = disableMicrophone;
        document.getElementById('copyLogBtn').onclick = copyLog;

        window.onload = () => {
            log('⏱️ Note Timing Tester ready');
            log('🎯 Listening for A4 (440Hz) notes');
            log('⚡ Will measure onset, offset, and duration');
        };
    </script>
</body>
</html>
