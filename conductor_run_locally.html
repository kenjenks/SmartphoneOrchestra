<!DOCTYPE html>
<!--
conductor_run_locally.html

Webapp for leading the Smarphone Orchestra, sending cues to patro devices over Firebase.

This is run locally from the Stage Manager or Sound Tech laptop. Open the local file in 
your browser. (Double click on conductor_run_locally.html file in Windows Explorer.)

These files must be in the same folder:

- cues.json
- pillar_config.json
- timeline.json

The clock of the laptop provides the timebase for all devices.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SM Conductor: Scheduled Trigger</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #eee; padding: 20px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 450px; gap: 20px; height: 90vh; }

        .timeline-panel { background: #111; border: 1px solid #333; padding: 20px; overflow-y: auto; border-radius: 8px; }
        .control-panel { background: #1a1a1a; border: 1px solid #444; padding: 20px; display: flex; flex-direction: column; border-radius: 8px; }

        h2 { margin-top: 0; color: #4CAF50; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2em; }

        #master-clock { font-family: 'Courier New', monospace; font-size: 4em; color: #00ff00; text-align: center; margin: 20px 0; background: #000; padding: 10px; border-radius: 4px; border: 1px solid #222; }

        .timeline-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; font-size: 0.95em; }
        .timeline-item.next { background: #223322; border: 1px solid #4CAF50; border-radius: 4px; }
        .timeline-item.past { opacity: 0.4; }
        .status { font-weight: bold; color: #888; }
        .next .status { color: #00ff00; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        .big-btn { width: 100%; padding: 25px; font-size: 1.5em; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; margin-bottom: 15px; text-transform: uppercase; transition: transform 0.1s; }
        .big-btn:active { transform: scale(0.98); }
        .trigger-btn { background: #4CAF50; color: white; }
        .stop-btn { background: #f44336; color: white; font-size: 1em; padding: 15px; }

        .stats { margin-top: auto; font-size: 0.85em; color: #666; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #000; padding: 10px; border-radius: 4px; border: 1px solid #333; }
        .stat-label { display: block; font-size: 0.8em; text-transform: uppercase; }
        .stat-val { font-size: 1.2em; color: #aaa; }
    </style>
</head>
<body>

<div class="grid">
    <div class="timeline-panel">
        <h2>Show Timeline</h2>
        <div id="timeline-list">Loading timeline.json...</div>
    </div>

    <div class="control-panel">
        <h2>Master Control</h2>
        <div id="master-clock">00:00:00.000</div>

        <button class="big-btn trigger-btn" onclick="confirmTrigger()">Trigger Next Cue [Space]</button>
        <button class="big-btn stop-btn" onclick="emergencyStop()">Emergency Stop [K]</button>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Bridge Status</span>
                <span class="stat-val" id="bridge-val">Disconnected</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Firebase Sync</span>
                <span class="stat-val" id="sync-val">---</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Connected Patrons</span>
                <span class="stat-val" id="patron-val">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Next Cue ID</span>
                <span class="stat-val" id="next-cue-val">None</span>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt",
        storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
        messagingSenderId: "722537253165",
        appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let timeline = [];
    let nextIndex = 0;

    // --- Float-aware time conversion ---
    function timeToSecs(hms) {
        if (!hms) return 0;
        const a = hms.split(':');
        // parseFloat ensures milliseconds like :40.909 are preserved
        return (+a[0]) * 3600 + (+a[1]) * 60 + parseFloat(a[2]);
    }

    async function loadConfig() {
        try {
            const res = await fetch('timeline.json');
            timeline = await res.json();
            renderTimeline();
        } catch (e) {
            document.getElementById('timeline-list').innerText = "Error loading timeline.json";
        }
    }

    function renderTimeline() {
        const list = document.getElementById('timeline-list');
        list.innerHTML = '';

        const now = new Date();
        const nowSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + (now.getMilliseconds() / 1000);

        timeline.forEach((item, i) => {
            const itemSecs = timeToSecs(item.time);
            const diff = itemSecs - nowSecs;

            const div = document.createElement('div');
            div.className = `timeline-item ${i === nextIndex ? 'next' : ''} ${i < nextIndex ? 'past' : ''}`;

            let statusText = "";
            if (i < nextIndex) {
                statusText = "EXECUTED";
            } else {
                statusText = diff > 0 ? `In ${diff.toFixed(1)}s` : "READY";
            }

            div.innerHTML = `
                <span><strong>${item.time}</strong></span>
                <span>${item.label}</span>
                <span class="status">${statusText}</span>
            `;
            list.appendChild(div);
        });

        if (timeline[nextIndex]) {
            document.getElementById('next-cue-val').innerText = timeline[nextIndex].cueLabel;
        }
    }

    function confirmTrigger() {
        if (nextIndex >= timeline.length) return;

        const cue = timeline[nextIndex];
        console.log("Triggering:", cue.cueLabel);

        // Send to Firebase
        db.ref('show/currentCue').set({
            label: cue.cueLabel,
            timestamp: Date.now(),
            serverTime: firebase.database.ServerValue.TIMESTAMP
        });

        nextIndex++;
        renderTimeline();
    }

    function emergencyStop() {
        db.ref('show/currentCue').set({ type: 'SYSTEM', action: 'KILL', triggerTime: Date.now() });
        document.getElementById('countdown-overlay').innerText = "KILLED";
    }

    // High-frequency UI Heartbeat (50ms for 20fps precision)
    setInterval(() => {
        const now = new Date();
        const ms = String(now.getMilliseconds()).padStart(3, '0');
        // Update the visual clock with milliseconds
        document.getElementById('master-clock').innerText = now.toTimeString().split(' ')[0] + "." + ms;

        // Push heart-beat to Firebase to keep patron devices in sync
        db.ref('laptop/clock').set(Date.now());
        document.getElementById('sync-val').innerText = db.ref(".info/connected") ? "OK" : "LOST";

        // Refresh the timeline countdowns
        renderTimeline();
    }, 50);

    // Track patron count
    db.ref('devices').on('value', snap => {
        document.getElementById('patron-val').innerText = snap.numChildren() || 0;
    });

    // Keyboard Shortcuts
    window.onkeydown = (e) => {
        if (e.code === "Space") { e.preventDefault(); confirmTrigger(); }
        if (e.key === "k" || e.key === "K") { emergencyStop(); }
    };


    // ─── OSC/Chataigne bridge listener ───────────────────────────────────────────
const evtSource = new EventSource('http://localhost:3000/events');

evtSource.onmessage = (e) => {
    const { label, buffer } = JSON.parse(e.data);
    if (label === '0.0 SILENCE') {
        emergencyStop();
        return;
    }
    const idx = timeline.findIndex(t => t.cueLabel === label);
    if (idx !== -1) {
        nextIndex = idx;
        confirmTrigger();
    } else {
        console.warn('Bridge: cue label not found in timeline:', label);
    }
};

evtSource.onopen = () => {
    document.getElementById('bridge-val').innerText = 'BRIDGE: OK';
    document.getElementById('bridge-val').style.color = '#00ff00';
};

evtSource.onerror = () => {
    document.getElementById('bridge-val').innerText = 'BRIDGE: OFFLINE';
    document.getElementById('bridge-val').style.color = '#ff4444';
};


</script>

</body>
</html>
