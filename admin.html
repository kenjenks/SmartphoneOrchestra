<!DOCTYPE html>
<!--
admin.html

System janitor.

Global Blackout: This sends a specific KILL action to the show/currentCue path. This ensures that even if a device is mid-script, it receives a command to instantly close its AudioContext and black out the screen.

Pillar Monitoring: The Admin panel lets you see if all 4 pillars have successfully claimed a slot and are "Checking in."

Survey Purge: During setup, you might do several "test walks." This button allows the Sound Tech to wipe the survey_results node so the final, clean data for the seat_config.tsv can be generated without old test noise.

Database Health: Keeping the devices node empty when the show isn't running prevents Firebase from racking up unnecessary "Simultaneous Connection" charges.

Operational SOP for Admin:

* Pre-Show:
  (1)Upload pillar_config.json with the
  current XY locations of the 4 pillars in meters
  from front left of house.

  (2) Check Admin to ensure Pillars = 0 and Devices = 0
  (a clean slate).

  (3) Upload visual_timeline.json, which schedules the audio and visual cues.

* During Onboarding: Watch the Patron Nodes count climb.

* Post-Show: Hit Purge Device Registry as the audience
leaves to reset for the next performance.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Orchestra: Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #0f0; padding: 15px; background: #050505; border-radius: 8px; }
        h3 { color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 0; }
        .status-box { padding: 5px; margin: 5px 0; font-size: 0.8rem; border-left: 3px solid #333; }
        .status-ok { border-color: #0f0; color: #0f0; }
        .status-empty { border-color: #f00; color: #f00; }
        .stat-val { font-size: 2.5rem; font-weight: bold; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
        button.danger { color: #f00; border-color: #f00; }
        button.danger:hover { background: #f00; color: #fff; }
        #log { height: 180px; overflow-y: scroll; background: #111; padding: 10px; font-size: 11px; margin-top: 20px; border: 1px solid #222; grid-column: span 2; }
        label { display: block; margin-top: 15px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>SYSTEM ADMINISTRATION</h1>

    <div class="grid">
        <div class="card">
            <h3>1. Show Configuration</h3>

            <label>Visual Timeline (.json)</label>
            <div id="stat-timeline" class="status-box">checking...</div>
            <input type="file" id="file-timeline" accept=".json" onchange="uploadTimeline()">

            <label>Seat/Pillar Config (.tsv)</label>
            <div id="stat-tsv" class="status-box">checking...</div>
            <input type="file" id="file-tsv" accept=".tsv,.txt" onchange="uploadTSV()">
        </div>

        <div class="card">
            <h3>2. Performance Registry</h3>
            <div style="display:flex; justify-content: space-around; text-align: center; margin: 20px 0;">
                <div>
                    <div class="stat-val" id="count-beacons">0</div>
                    <div style="color:#666; font-size:0.7rem;">ACTIVE PILLARS</div>
                </div>
                <div>
                    <div class="stat-val" id="count-patrons">0</div>
                    <div style="color:#666; font-size:0.7rem;">DEVICES</div>
                </div>
            </div>
            <button onclick="purgeDevices()">PURGE DEVICE REGISTRY</button>
            <button onclick="purgeSurvey()" class="danger">WIPE SURVEY RESULTS</button>
        </div>

        <div class="card">
            <h3>3. Maintenance & Backup</h3>
            <button onclick="downloadBackup()">DOWNLOAD DB BACKUP (.JSON)</button>
            <button onclick="purgeEverything()" class="danger">WIPE ENTIRE CLOUD</button>
        </div>

        <div class="card">
            <h3>4. Emergency</h3>
            <button onclick="sendKillSignal()" class="danger" style="padding:20px; font-size:1.2rem;">GLOBAL BLACKOUT / KILL</button>
            <p style="font-size:0.7rem; color:#555; margin-top:5px;">*Instantly kills AudioContexts and blacks screens on all connected devices.</p>
        </div>

        <div id="log"></div>
    </div>

    <script>
        // Use the explicit config from your previous files
        const firebaseConfig = {
            apiKey: "AIzaSyAs-ActualKeyFromYourConfig",
            authDomain: "smartphone-orchestra-b1063.firebaseapp.com",
            databaseURL: "https://smartphone-orchestra-b1063-default-rtdb.firebaseio.com",
            projectId: "smartphone-orchestra-b1063",
            storageBucket: "smartphone-orchestra-b1063.appspot.com",
            messagingSenderId: "389274035651",
            appId: "1:389274035651:web:5d2432616212df8b1f5926"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- REAL-TIME LISTENERS ---
        db.ref('active_pillars').on('value', s => {
            document.getElementById('count-beacons').innerText = s.numChildren();
        });

        db.ref('devices').on('value', s => {
            document.getElementById('count-patrons').innerText = s.numChildren();
        });

        db.ref('show/visual_timeline').on('value', s => {
            const el = document.getElementById('stat-timeline');
            if(s.exists()) {
                el.innerText = `LOADED: ${s.val()[0].label}`;
                el.className = "status-box status-ok";
            } else {
                el.innerText = "EMPTY - UPLOAD REQUIRED";
                el.className = "status-box status-empty";
            }
        });

        db.ref('show/pillar_config').on('value', s => {
            const el = document.getElementById('stat-tsv');
            el.innerText = s.exists() ? `LOADED: ${s.numChildren()} PILLARS` : "EMPTY";
            el.className = s.exists() ? "status-box status-ok" : "status-box status-empty";
        });

        // --- CORE FUNCTIONS ---
        async function uploadTimeline() {
            const file = document.getElementById('file-timeline').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.ref('show/visual_timeline').set(data);
                    log(`SUCCESS: Uploaded timeline for "${data[0].label}"`);
                } catch(err) { log(`ERROR: ${err.message}`); }
            };
            reader.readAsText(file);
        }

        async function uploadTSV() {
            const file = document.getElementById('file-tsv').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n');
                const pillarConfig = {};
                const seatMap = {};
                lines.slice(1).forEach(line => {
                    const cols = line.split('\t');
                    if(cols.length < 5) return;
                    const entry = { id: cols[0], x: parseFloat(cols[3]), y: parseFloat(cols[4]) };
                    if(cols[1] === 'Pillar') pillarConfig[entry.id] = entry;
                    else seatMap[entry.id] = entry;
                });
                await db.ref('show/pillar_config').set(pillarConfig);
                await db.ref('show/seat_map').set(seatMap);
                log(`SUCCESS: Synced ${Object.keys(pillarConfig).length} Pillars and ${Object.keys(seatMap).length} Seats.`);
            };
            reader.readAsText(file);
        }

        function sendKillSignal() {
            db.ref('show/currentCue').set({ action: 'KILL', timestamp: Date.now() });
            log("COMMAND: Global Kill signal sent.");
        }

        async function purgeDevices() {
            if(confirm("Clear patron registry?")) {
                await db.ref('devices').remove();
                log("ACTION: Device registry cleared.");
            }
        }

        async function purgeSurvey() {
            if(confirm("Wipe all survey results?")) {
                await db.ref('survey_results').remove();
                log("ACTION: Survey results wiped.");
            }
        }

        async function purgeEverything() {
            if(confirm("DANGER: WIPE ENTIRE DATABASE?")) {
                await db.ref('/').remove();
                log("ACTION: DATABASE WIPED.");
            }
        }

        async function downloadBackup() {
            const snap = await db.ref('/').once('value');
            const blob = new Blob([JSON.stringify(snap.val(), null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `orchestra_backup_${Date.now()}.json`;
            a.click();
            log("SUCCESS: Backup downloaded.");
        }

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
