<!DOCTYPE html>
<!--
admin.html

System janitor.

Global Blackout: This sends a specific KILL action to the show/currentCue path. This ensures that even if a device is mid-script, it receives a command to instantly close its AudioContext and black out the screen.

Pillar Monitoring: The Admin panel lets you see if all 4 pillars have successfully claimed a slot and are "Checking in."

Survey Purge: During setup, you might do several "test walks." This button allows the Sound Tech to wipe the survey_results node so the final, clean data for the seat_config.tsv can be generated without old test noise.

Database Health: Keeping the devices node empty when the show isn't running prevents Firebase from racking up unnecessary "Simultaneous Connection" charges.

Operational SOP for Admin:

* Pre-Show:
  (1)Upload pillar_config.json with the
  current XY locations of the 4 pillars in meters
  from front left of house.

  (2) Check Admin to ensure Pillars = 0 and Devices = 0
  (a clean slate).

  (3) Upload visual_timeline.json, which schedules the audio and visual cues.

* During Onboarding: Watch the Patron Nodes count climb.

* Post-Show: Hit Purge Device Registry as the audience
leaves to reset for the next performance.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Orchestra: Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #333; }
        h1 { grid-column: span 2; color: #00ff00; text-align: center; letter-spacing: 2px; }
        h3 { margin-top: 0; color: #888; font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-box { background: #000; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; margin-bottom: 10px; border-left: 4px solid #444; }
        .status-online { border-left-color: #00ff00; color: #00ff00; }
        .status-offline { border-left-color: #ff3333; color: #ff3333; }
        .stat-grid { display: flex; justify-content: space-around; text-align: center; margin: 20px 0; }
        .stat-item .val { font-size: 2.5rem; font-weight: bold; color: #fff; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-danger { background: #600; color: #fff; }
        /* THE LOG STYLE */
        #log {
            grid-column: span 2;
            background: #000;
            border: 1px solid #222;
            height: 180px;
            overflow-y: scroll;
            padding: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ff00;
            border-radius: 6px;
            margin-top: 20px;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; }
        input[type="file"] { display: block; margin: 10px 0; color: #888; }
    </style>
</head>
<body>

    <h1>CONTROL CENTER</h1>

    <div class="admin-container">

        <div class="card">
            <h3>1. Show Data Upload</h3>
            <label style="font-size: 0.8rem; color: #aaa;">Pillar Configuration (.json)</label>
            <div id="stat-pillar" class="status-box">checking...</div>
            <input type="file" id="file-pillar" accept=".json" onchange="handleFile(this, 'show/pillar_config', 'stat-pillar')">

            <label style="font-size: 0.8rem; color: #aaa;">Visual Timeline (.json)</label>
            <div id="stat-timeline" class="status-box">checking...</div>
            <input type="file" id="file-timeline" accept=".json" onchange="handleFile(this, 'show/visual_timeline', 'stat-timeline')">
        </div>

        <div class="card">
            <h3>2. Performance Registry</h3>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="val" id="count-beacons">0</div>
                    <div style="font-size: 0.7rem; color: #666;">PILLARS</div>
                </div>
                <div class="stat-item">
                    <div class="val" id="count-patrons">0</div>
                    <div style="font-size: 0.7rem; color: #666;">DEVICES</div>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="purgeDevices()">PURGE DEVICE REGISTRY</button>
            <button class="btn btn-secondary" onclick="purgeSurvey()">WIPE SURVEY RESULTS</button>
        </div>

        <div class="card">
            <h3>3. Maintenance</h3>
            <button class="btn btn-secondary" onclick="downloadDatabaseBackup()">DOWNLOAD DB BACKUP</button>
            <button class="btn btn-danger" onclick="purgeEverything()">WIPE ALL CLOUD DATA</button>
        </div>

        <div class="card">
            <h3>4. Emergency</h3>
            <button class="btn btn-danger" style="padding:25px; font-size:1.1rem;" onclick="sendKillSignal()">
                GLOBAL BLACKOUT / KILL
            </button>
        </div>

        <div id="log"></div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs-ActualKeyFromYourConfig",
            authDomain: "smartphone-orchestra-b1063.firebaseapp.com",
            databaseURL: "https://smartphone-orchestra-b1063-default-rtdb.firebaseio.com",
            projectId: "smartphone-orchestra-b1063",
            storageBucket: "smartphone-orchestra-b1063.appspot.com",
            messagingSenderId: "389274035651",
            appId: "1:389274035651:web:5d2432616212df8b1f5926"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Status Listeners
        db.ref('active_pillars').on('value', s => { document.getElementById('count-beacons').innerText = s.numChildren(); });
        db.ref('devices').on('value', s => { document.getElementById('count-patrons').innerText = s.numChildren(); });

        db.ref('show/pillar_config').on('value', s => {
            const el = document.getElementById('stat-pillar');
            el.innerText = s.exists() ? `LOADED: ${s.val().pillars.length} Pillars` : "EMPTY";
            el.className = s.exists() ? "status-box status-online" : "status-box status-offline";
        });

        db.ref('show/visual_timeline').on('value', s => {
            const el = document.getElementById('stat-timeline');
            el.innerText = s.exists() ? `LOADED: ${s.val()[0].label}` : "EMPTY";
            el.className = s.exists() ? "status-box status-online" : "status-box status-offline";
        });

        // Functions
        async function handleFile(input, path, statusId) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.ref(path).set(data);
                    log(`SUCCESS: Published ${file.name} to ${path}`);
                } catch (err) { log(`ERROR: Failed to parse ${file.name}`); }
            };
            reader.readAsText(file);
        }

        async function downloadDatabaseBackup() {
            try {
                const snapshot = await db.ref('/').once('value');
                const blob = new Blob([JSON.stringify(snapshot.val(), null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_${Date.now()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                log("SUCCESS: Backup downloaded.");
            } catch (e) { log(`ERROR: Backup failed: ${e.message}`); }
        }

        function sendKillSignal() {
            db.ref('show/currentCue').set({ action: 'KILL', triggerTime: Date.now() });
            log("COMMAND: Global Kill Signal sent.");
        }

        async function purgeDevices() {
            if (confirm("Clear patrons?")) { await db.ref('devices').remove(); log("ACTION: Devices cleared."); }
        }

        async function purgeSurvey() {
            if (confirm("Wipe survey?")) { await db.ref('survey_results').remove(); log("ACTION: Survey wiped."); }
        }

        async function purgeEverything() {
            if (confirm("DANGER: WIPE ALL?")) { await db.ref('/').remove(); log("ACTION: DATABASE WIPED."); location.reload(); }
        }

        function log(msg) {
            const box = document.getElementById('log');
            box.innerHTML += `<div class="log-entry">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
