<!DOCTYPE html>
<!--
admin.html

System janitor.

Global Blackout: This sends a specific KILL action to the show/currentCue path. This ensures that even if a device is mid-script, it receives a command to instantly close its AudioContext and black out the screen.

Pillar Monitoring: The Admin panel lets you see if all 4 pillars have successfully claimed a slot and are "Checking in."

Survey Purge: During setup, you might do several "test walks." This button allows the Sound Tech to wipe the survey_results node so the final, clean data for the seat_config.tsv can be generated without old test noise.

Database Health: Keeping the devices node empty when the show isn't running prevents Firebase from racking up unnecessary "Simultaneous Connection" charges.

Operational SOP for Admin:

* Pre-Show:
  (1)Upload pillar_config.json with the
  current XY locations of the 4 pillars in meters
  from front left of house.

  (2) Check Admin to ensure Pillars = 0 and Devices = 0
  (a clean slate).

  (3) Upload visual_timeline.json, which schedules the audio and visual cues.

* During Onboarding: Watch the Patron Nodes count climb.

* Post-Show: Hit Purge Device Registry as the audience
leaves to reset for the next performance.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Orchestra: Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #eee; padding: 20px; line-height: 1.4; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: #888; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .stat-grid { display: flex; gap: 20px; margin-bottom: 15px; }
        .stat-item { flex: 1; text-align: center; background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid #222; }
        .val { font-size: 1.8rem; font-weight: bold; color: #00ffcc; font-family: 'Courier New', monospace; }
        .label { font-size: 0.7rem; color: #666; margin-top: 5px; }

        .btn { display: inline-block; background: #333; color: #fff; border: 1px solid #555; padding: 10px 15px; cursor: pointer; border-radius: 4px; margin-right: 5px; margin-bottom: 5px; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; font-weight: 600; }
        .btn:hover { background: #444; }
        .btn-secondary { background: #222; }
        .btn-danger { background: #600; border-color: #a00; color: #fff; }
        .btn-danger:hover { background: #800; }

        #log { background: #000; color: #0f0; font-family: 'Consolas', 'Monaco', monospace; height: 150px; overflow-y: scroll; padding: 10px; border: 1px solid #333; margin-top: 20px; font-size: 12px; border-radius: 8px; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; background: #000; }
        th, td { border: 1px solid #222; padding: 8px; text-align: left; }
        th { background: #1a1a1a; color: #888; font-weight: normal; }

        .config-status { margin-top: 15px; padding: 10px; border: 1px dotted #444; border-radius: 4px; }
        .status-title { font-size: 0.75rem; color: #00ffcc; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header style="margin-bottom: 20px;">
        <h1 style="margin:0; font-weight: 300;">Smartphone Orchestra <span style="color:#444;">|</span> <span style="font-weight: 800; color:#00ffcc;">ADMIN</span></h1>
        <p style="color:#666; margin:5px 0;">Production: <span id="active-show-display">No Production Loaded</span></p>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>1. Show Setup</h3>
            <button class="btn" onclick="document.getElementById('pillar-input').click()">Upload pillar_config.json</button>
            <input type="file" id="pillar-input" style="display:none" onchange="uploadPillarConfig(this)">

            <button class="btn" onclick="document.getElementById('file-input').click()">Upload visual_timeline.json</button>
            <input type="file" id="file-input" style="display:none" onchange="uploadTimeline(this)">

            <div class="config-status">
                <div class="status-title">LIVE PILLAR COORDINATES (METERS)</div>
                <div id="pillar-view">
                    <div style="color: #444; font-style: italic; font-size: 0.8rem;">No Pillar Config Detected in Cloud</div>
                </div>
            </div>

            <div class="config-status">
                <div class="status-title">MOVEMENT TIMELINE</div>
                <div id="timeline-view" style="max-height: 150px; overflow-y: auto;">
                    <div style="color: #444; font-style: italic; font-size: 0.8rem;">No Timeline Loaded</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>2. Performance Registry</h3>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="val" id="count-beacons">0</div>
                    <div class="label">PILLARS (A9)</div>
                </div>
                <div class="stat-item">
                    <div class="val" id="count-patrons">0</div>
                    <div class="label">PATRON DEVICES</div>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="purgeDevices()">Purge Device Registry</button>
            <button class="btn btn-secondary" onclick="purgeSurvey()">Wipe Survey Results</button>
        </div>

        <div class="card">
            <h3>3. Maintenance</h3>
            <button class="btn btn-secondary" onclick="downloadDatabaseBackup()">Download DB Backup</button>
            <button class="btn btn-danger" onclick="purgeEverything()">Wipe All Cloud Data</button>
        </div>

        <div class="card">
            <h3>4. Emergency</h3>
            <button class="btn btn-danger" style="padding:25px; font-size:1.1rem; width:100%;" onclick="sendKillSignal()">
                GLOBAL BLACKOUT / KILL
            </button>
        </div>
    </div>

    <div id="log"></div>

    <script>
        // PROTECTED BLOCK: Firebase Configuration
        // Security restricted to authorized domains in Google Cloud Console
        const firebaseConfig = {
            apiKey: "YOUR_RESTRICTED_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- DATA OBSERVERS ---

        // Observe Timeline and Show Title
        db.ref('show').on('value', snap => {
            const data = snap.val();
            if (!data) {
                document.getElementById('active-show-display').innerText = "No Production Loaded";
                document.getElementById('timeline-view').innerHTML = '<div style="color: #444;">EMPTY</div>';
                return;
            }
            document.getElementById('active-show-display').innerText = data.show_title || "Unnamed";
            if (data.movements) {
                let html = "<table><tr><th>Movement</th><th>Start</th><th>Cues</th></tr>";
                data.movements.forEach(m => {
                    html += `<tr><td>${m.movement_name}</td><td>${m.planned_start}</td><td>${m.cues ? m.cues.length : 0}</td></tr>`;
                });
                html += "</table>";
                document.getElementById('timeline-view').innerHTML = html;
            }
        });

        // NEW: Observe Pillar Configuration
        db.ref('pillar_config').on('value', snap => {
            const config = snap.val();
            if (!config || !config.pillars) {
                document.getElementById('pillar-view').innerHTML = '<div style="color: #444; font-style: italic; font-size: 0.8rem;">No Pillar Config Detected in Cloud</div>';
                return;
            }
            let html = "<table><tr><th>ID</th><th>Label</th><th>X (m)</th><th>Y (m)</th></tr>";
            config.pillars.forEach(p => {
                html += `<tr>
                    <td style="color:#00ffcc; font-family:monospace;">${p.id}</td>
                    <td>${p.label}</td>
                    <td>${p.x}</td>
                    <td>${p.y}</td>
                </tr>`;
            });
            html += "</table>";
            document.getElementById('pillar-view').innerHTML = html;
        });

        // Observe Registry Counts (Separating Pillars from Patrons)
        db.ref('devices').on('value', snap => {
            const devices = snap.val() || {};
            let patrons = 0, pillars = 0;
            Object.values(devices).forEach(d => {
                if (d.seat_id && d.seat_id.startsWith('PILLAR_')) pillars++;
                else patrons++;
            });
            document.getElementById('count-beacons').innerText = pillars;
            document.getElementById('count-patrons').innerText = patrons;
        });

        // --- HANDLERS ---

        async function uploadPillarConfig(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.pillars) throw new Error("Invalid Format: Missing 'pillars' key.");
                    log(`Uploading config for ${data.pillars.length} pillars...`);
                    await db.ref('pillar_config').set(data);
                    log("SUCCESS: Pillar coordinates live.");
                } catch (err) { log(`ERROR: ${err.message}`); }
            };
            reader.readAsText(file);
        }

        async function uploadTimeline(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    await db.ref('show').set(data);
                    log(`SUCCESS: Timeline '${data.show_title}' uploaded.`);
                } catch (err) { log(`ERROR: ${err.message}`); }
            };
            reader.readAsText(file);
        }

        function sendKillSignal() {
            db.ref('show/currentCue').set({ action: 'KILL', triggerTime: Date.now() });
            log("COMMAND: Global Kill Signal sent.");
        }

        async function purgeDevices() {
            if (confirm("Clear patron registry?")) {
                await db.ref('devices').remove();
                log("ACTION: Device registry cleared.");
            }
        }

        async function purgeSurvey() {
            if (confirm("Wipe all survey results?")) {
                await db.ref('survey_results').remove();
                log("ACTION: Survey results wiped.");
            }
        }

        async function purgeEverything() {
            if (confirm("DANGER: This will wipe EVERYTHING. Proceed?")) {
                await db.ref('/').remove();
                log("ACTION: DATABASE WIPE COMPLETE.");
                location.reload();
            }
        }

        async function downloadDatabaseBackup() {
            try {
                const snap = await db.ref('/').once('value');
                const blob = new Blob([JSON.stringify(snap.val(), null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `orchestra_backup_${Date.now()}.json`;
                a.click();
                log("ACTION: Backup downloaded.");
            } catch (e) { log(`ERROR: Backup failed: ${e.message}`); }
        }

        function log(msg) {
            const box = document.getElementById('log');
            box.innerHTML += `<div class="log-entry">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
