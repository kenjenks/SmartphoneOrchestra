<!DOCTYPE html>
<!--
admin.html

System janitor.

Global Blackout: This sends a specific KILL action to the show/currentCue path. This ensures that even if a device is mid-script, it receives a command to instantly close its AudioContext and black out the screen.

Pillar Monitoring: The Admin panel lets you see if all 4 pillars have successfully claimed a slot and are "Checking in."

Survey Purge: During setup, you might do several "test walks." This button allows the Sound Tech to wipe the survey_results node so the final, clean data for the seat_config.tsv can be generated without old test noise.

Database Health: Keeping the devices node empty when the show isn't running prevents Firebase from racking up unnecessary "Simultaneous Connection" charges.

Operational SOP for Admin:

* Pre-Show:
  (1)Upload pillar_config.json with the
  current XY locations of the 4 pillars in meters
  from front left of house.

  (2) Check Admin to ensure Pillars = 0 and Devices = 0
  (a clean slate).

  (3) Upload cues.json with the sound and light
  cue description.

  (4) Upload timeline.json, which schedules the cues.

* During Onboarding: Watch the Patron Nodes count climb.

* Post-Show: Hit Purge Device Registry as the audience
leaves to reset for the next performance.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orchestra Control: System Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .section { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { margin-top: 0; color: #00ff00; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; }

        /* Beacon Map Styles */
        #map-container {
            width: 100%; height: 300px; background: #000; position: relative;
            border: 2px solid #444; margin-top: 15px; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 20px 20px; border-radius: 8px;
        }
        .beacon-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 2px solid #fff; transition: background 0.3s; }
        .beacon-online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .beacon-offline { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .beacon-label { position: absolute; font-size: 10px; color: #fff; font-weight: bold; transform: translate(-50%, 12px); white-space: nowrap; background: rgba(0,0,0,0.8); padding: 1px 4px; border-radius: 3px; z-index: 6; }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .status-box { padding: 8px; border-radius: 4px; background: #1a1a1a; font-size: 0.75rem; border-left: 4px solid #444; margin-top: 5px; }
        .status-success { border-left-color: #00ff00 !important; color: #00ff00 !important; }

        .survey-workflow { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .step { flex: 1; text-align: center; }
        .step-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; display: block; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }

        #log { background: #000; color: #0f0; padding: 10px; height: 350px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; border: 1px solid #333; border-radius: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-start { background: #007bff; }
        .btn-stop { background: #666; }
        .btn-danger { background: #822; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-controls">
        <h1 style="color:#00ff00;">Orchestra Control Center</h1>

        <div class="section">
            <h2>1. Theater Asset Configuration</h2>
            <div class="upload-grid">
                <div>
                    <label>Pillar Layout (.json)</label>
                    <input type="file" onchange="handleFile(this, 'active_pillars', 'pStatus')">
                    <div id="pStatus" class="status-box">Ready</div>
                </div>
                <div>
                    <label>Cue Script (.json)</label>
                    <input type="file" onchange="handleFile(this, 'show/script', 'cStatus')">
                    <div id="cStatus" class="status-box">Ready</div>
                </div>
                <div>
                    <label>Show Timeline (.json)</label>
                    <input type="file" onchange="handleFile(this, 'show/timeline', 'tStatus')">
                    <div id="tStatus" class="status-box">Ready</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>2. Survey Control UI</h2>

            <div class="survey-workflow">
                <div class="step">
                    <span class="step-label">STEP 1: INITIALIZE</span>
                    <input type="file" id="sPicker" accept=".tsv" style="display:none" onchange="handleTSVUpload(this)">
                    <button onclick="document.getElementById('sPicker').click()">UPLOAD SEAT TSV</button>
                    <div id="sStatus" class="status-box">Ready</div>
                </div>
                <div class="step">
                    <span class="step-label">STEP 2: ACTIVATE</span>
                    <button class="btn-start" onclick="broadcastSurveyCommand('START')">START SURVEY</button>
                </div>
                <div class="step">
                    <span class="step-label">STEP 3: DEACTIVATE</span>
                    <button class="btn-stop" onclick="broadcastSurveyCommand('STOP')">STOP SURVEY</button>
                </div>
                <div class="step">
                    <span class="step-label">STEP 4: EXPORT</span>
                    <button onclick="downloadSeatConfig()">DOWNLOAD TSV</button>
                </div>
            </div>

            <div id="map-container"></div>

            <div class="card">
                <h3>3. System Maintenance</h3>
                <button class="btn btn-secondary" onclick="downloadDatabaseBackup()" style="width: 100%; margin-bottom: 10px;">
                    DOWNLOAD FULL DB DUMP (.JSON)
                </button>
                <button class="btn btn-danger" onclick="purgeEverything()" style="width: 100%;">
                    WIPE CLOUD DATABASE
                </button>
            </div>
        </div>

        <div class="section">
            <h2>Master Show Commands</h2>
            <button onclick="sendKillSignal()" class="btn-danger">GLOBAL KILL (BLACKOUT)</button>
            <button onclick="purgeDevices()">RESET PATRON REGISTRY</button>
            <button onclick="purgeEverything()" class="btn-danger">WIPE ALL CLOUD DATA</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="section">
            <h2>Live Beacon Data</h2>
            <table id="pillar-table">
                <thead><tr><th>ID</th><th>Status</th><th>Freq</th></tr></thead>
                <tbody><tr><td colspan="3" style="text-align:center;color:#555;">Waiting for beacons...</td></tr></tbody>
            </table>
        </div>
        <div class="section">
            <h2>System Activity</h2>
            <div id="log"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt",
        storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
        messagingSenderId: "722537253165",
        appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. MONITOR BEACONS & UPDATE GRAPHIC DISPLAY
    db.ref('active_pillars').on('value', snap => {
        const pillars = snap.val();
        const map = document.getElementById('map-container');
        const table = document.querySelector('#pillar-table tbody');

        map.innerHTML = ''; // Clear map
        table.innerHTML = ''; // Clear table

        if (!pillars) {
            table.innerHTML = '<tr><td colspan="3" style="text-align:center;">No pillars online.</td></tr>';
            return;
        }

        const pillarArray = Object.values(pillars);
        const maxX = Math.max(...pillarArray.map(p => p.x), 1);
        const maxY = Math.max(...pillarArray.map(p => p.y), 1);

        pillarArray.forEach(p => {
            const isOnline = (Date.now() - p.lastPing) < 5000;

            // Update Table
            table.innerHTML += `<tr>
                <td>${p.id}</td>
                <td style="color:${isOnline ? '#0f0' : '#f00'}">${isOnline ? 'ONLINE' : 'LOST'}</td>
                <td>${p.freq || p.preferred_freq}Hz</td>
            </tr>`;

            // Update Map Graphics
            const dot = document.createElement('div');
            dot.className = `beacon-dot ${isOnline ? 'beacon-online' : 'beacon-offline'}`;
            dot.style.left = `${(p.x / maxX) * 85 + 7.5}%`;
            dot.style.top = `${(p.y / maxY) * 85 + 7.5}%`;

            const label = document.createElement('div');
            label.className = 'beacon-label';
            label.style.left = dot.style.left;
            label.style.top = dot.style.top;
            label.innerText = p.id;

            map.appendChild(dot);
            map.appendChild(label);
        });
    });

    // 2. SURVEY CONTROL FUNCTIONS
    function broadcastSurveyCommand(action) {
        db.ref('survey_control').set({
            command: action,
            serverTime: Date.now()
        }).then(() => log(`COMMAND: Survey ${action} sent.`));
    }

    function handleTSVUpload(input) {
        const file = input.files[0];
        if (!file) return;
        log(`ACTION: Initializing seat list from ${file.name}`);
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n');
            const surveyData = {};
            for (let i = 1; i < lines.length; i++) {
                const [id, x, y] = lines[i].trim().split('\t');
                if (id) surveyData[id] = { x: x || "", y: y || "", status: "INITIALIZED" };
            }
            db.ref('survey_results').update(surveyData).then(() => {
                const el = document.getElementById('sStatus');
                el.className = "status-box status-success";
                el.innerText = `✓ ${Object.keys(surveyData).length} Seats Ready`;
            });
        };
        reader.readAsText(file);
    }

    async function downloadSeatConfig() {
        const snapshot = await db.ref('survey_results').once('value');
        const results = snapshot.val();
        if (!results) return alert("No survey data to download.");

        let tsvContent = "id\tx\ty\n";
        let hasBlank = false;
        Object.keys(results).forEach(id => {
            const r = results[id];
            if (r.x === "" || r.y === "") hasBlank = true;
            tsvContent += `${id}\t${r.x}\t${r.y}\n`;
        });

        if (hasBlank) alert("Warning: Some seats have no XY data. Survey incomplete.");

        const blob = new Blob([tsvContent], { type: 'text/tab-separated-values' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `seat_config_${Date.now()}.tsv`;
        link.click();
    }

    // 3. CORE SYSTEM FUNCTIONS
    function handleFile(input, path, statusId) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            db.ref(path).set(data).then(() => {
                const el = document.getElementById(statusId);
                el.className = "status-box status-success";
                el.innerText = `✓ ${file.name} Uploaded`;
                log(`UPLOAD: ${path} updated.`);
            });
        };
        reader.readAsText(file);
    }

    async function downloadDatabaseBackup() {
        log("MAINTENANCE: Requesting full database dump...");
        try {
            const snapshot = await db.ref('/').once('value');
            const data = snapshot.val();

            if (!data) {
                log("ERROR: Database is empty.");
                return;
            }

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            a.href = url;
            a.download = `orchestra_dump_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            log("SUCCESS: Database dump downloaded.");
        } catch (error) {
            log(`ERROR: Dump failed - ${error.message}`);
        }
    }

    function sendKillSignal() {
        db.ref('show/currentCue').set({ type: 'SYSTEM', action: 'KILL', triggerTime: Date.now() });
        log("COMMAND: Global Kill Signal sent.");
    }

    async function purgeDevices() {
        if (confirm("Reset patron device registry?")) {
            await db.ref('devices').remove();
            log("ACTION: Devices cleared.");
        }
    }

    async function purgeEverything() {
        if (confirm("Wipe all cloud data? This cannot be undone.")) {
            await db.ref('/').remove();
            location.reload();
        }
    }

    function log(msg) {
        const box = document.getElementById('log');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
