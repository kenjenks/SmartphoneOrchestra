<!DOCTYPE html>
<!--
seat_survey_beacon.html

Webapp for "beacons" at the four corners of the theater.

Provides audio "chirps" that allows crew to scan the
QR code on each seat bag to determine and record the
XY location in the theater using seat_survey.html webapp.

Get all 4 pillars running this software before the seat
survey.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smartphone Orchestra: Survey Beacon</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 40px; margin: 0; }
        .pillar-card { border: 4px solid #333; padding: 40px; border-radius: 20px; display: inline-block; min-width: 320px; background: #050505; }
        #freq-display { font-size: 5rem; color: #00ff00; margin: 20px 0; font-weight: bold; font-family: monospace; }
        .coords { font-size: 1.5rem; color: #888; margin-bottom: 20px; }
        #status { font-family: monospace; color: #444; }
        .led { width: 40px; height: 40px; background: #200; border-radius: 50%; margin: 20px auto; transition: 0.1s; }
        .led.active { background: #f00; box-shadow: 0 0 20px #f00; }
    </style>
</head>
<body>

    <div class="pillar-card">
        <h2 id="pillar-label">INITIALIZING...</h2>
        <div id="freq-display">----</div>
        <div class="coords">X: <span id="pos-x">?</span> | Y: <span id="pos-y">?</span></div>
        <div class="led" id="pulse-led"></div>
        <div id="status">WIFI CONNECTING...</div>
    </div>

    <script>
        // PROTECTED BLOCK: Firebase Configuration
        const firebaseConfig = {
            apiKey: "YOUR_RESTRICTED_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const myId = params.get('id') || "PILLAR_FL";

        let myConfig = null;
        let audioCtx = null;
        const THRESHOLD = 50;

        // Listen for the global pillar configuration
        db.ref('pillar_config').on('value', snap => {
            const data = snap.val();
            if (!data || !data.pillars) return;

            myConfig = data.pillars.find(p => p.id === myId);
            if (myConfig) {
                document.getElementById('pillar-label').innerText = myConfig.label;
                document.getElementById('freq-display').innerText = myConfig.preferred_freq + "Hz";
                document.getElementById('pos-x').innerText = myConfig.x;
                document.getElementById('pos-y').innerText = myConfig.y;
                document.getElementById('status').innerText = "CALIBRATED & READY";
            }
        });

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);

            checkChannel(analyser);
        }

        function checkChannel(analyser) {
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            if (!myConfig) {
                setTimeout(() => checkChannel(analyser), 500);
                return;
            }

            const bin = Math.round(myConfig.preferred_freq / (audioCtx.sampleRate / analyser.fftSize));
            const currentVolume = dataArray[bin];

            if (currentVolume < THRESHOLD) {
                document.getElementById('status').innerText = "CHANNEL CLEAR - CHIRPING";
                emitChirp();
                setTimeout(() => checkChannel(analyser), 1800 + Math.random() * 600);
            } else {
                document.getElementById('status').innerText = "CHANNEL BUSY - WAITING...";
                setTimeout(() => checkChannel(analyser), 100);
            }
        }

        function emitChirp() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const led = document.getElementById('pulse-led');

            osc.frequency.setValueAtTime(myConfig.preferred_freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            osc.connect(gain).connect(audioCtx.destination);

            led.classList.add('active');
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);

            setTimeout(() => led.classList.remove('active'), 150);

            // Register as active in the device registry for Admin visibility
            db.ref(`devices/${myId}`).set({
                seat_id: myId,
                lastPing: Date.now(),
                status: "ACTIVE_BEACON"
            });
        }

        window.onclick = () => initAudio();
    </script>
</body>
</html>
