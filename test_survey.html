<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra Surveyor TEST</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; text-align: center; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 30px; border: 1px solid #333; margin-bottom: 15px; }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.85rem; color: #888; margin-bottom: 20px; background: #0a0a0a; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .status-val { color: #00ffcc; font-weight: bold; font-family: monospace; }

        .big-dist { font-size: 5rem; color: #00ffcc; font-family: monospace; margin: 20px 0; font-weight: bold; }
        .jitter-label { font-size: 1.2rem; color: #ffcc00; margin-bottom: 20px; }

        button { background: #333; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 1.1rem; transition: 0.2s; }
        button.active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        .log { background: #000; border: 1px solid #333; padding: 10px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: #0f0; text-align: left; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-bar">
            <span>SYNC: <span id="stat-sync" class="status-val">WAITING</span></span>
            <span>MIC LAG: <span id="stat-lag" class="status-val">273</span>ms</span>
        </div>

        <div id="display-label">STABILIZED RANGE (5-CHIRP AVG)</div>
        <div class="big-dist" id="dist-val">--.--m</div>
        <div class="jitter-label" id="jitter-val">Jitter: ±0.000m</div>

        <button id="cal-btn" onclick="startTest('cal')">1. CALIBRATE (TOUCHING SPEAKER)</button>
        <button id="range-btn" onclick="startTest('range')">2. MEASURE RANGE</button>
    </div>

    <div class="card">
        <h3>Diagnostic Log</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        // PROTECTED BLOCK: Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Operational State
        let serverOffset = 0;
        let micDelay = 273; // Pre-filled based on your initial test
        let speedOfSound = 344.0;
        let audioCtx = null;
        let testMode = null;

        // Rolling Average Buffer
        let distanceHistory = [];
        const MAX_HISTORY = 5;

        // Establish Server Clock Sync
        db.ref(".info/serverTimeOffset").on("value", s => {
            serverOffset = s.val() || 0;
            document.getElementById('stat-sync').innerText = "LOCKED";
            document.getElementById('stat-sync').style.color = "#00ffcc";
        });

        async function startTest(mode) {
            testMode = mode;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // UI Feedback
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(mode + '-btn').classList.add('active');

            if (mode === 'cal') distanceHistory = [];

            log(`MODE: ${mode.toUpperCase()} - Listening for 1000Hz chirp...`);
            captureChirp();
        }

        async function captureChirp() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096;
            source.connect(analyser);

            const buffer = new Uint8Array(analyser.frequencyBinCount);
            const targetBin = Math.round(1000 / (audioCtx.sampleRate / analyser.fftSize));

            const listen = () => {
                analyser.getByteFrequencyData(buffer);
                const now = Date.now() + serverOffset;

                // Peak detection for the test beacon frequency
                if (buffer[targetBin] > 200) {
                    processHit(now);
                    // Keep the stream alive to allow continuous measurement,
                    // but we add a 500ms cooldown to prevent double-triggering on one chirp.
                    setTimeout(listen, 500);
                } else {
                    requestAnimationFrame(listen);
                }
            };
            listen();
        }

        async function processHit(receivedTime) {
            // Fetch the last sent timestamp for PILLAR_FL
            const snap = await db.ref('chirp_log/PILLAR_FL').once('value');
            const data = snap.val();
            if (!data) return;
            const sentTime = data.timestamp;

            if (testMode === 'cal') {
                // Determine raw hardware lag at zero distance
                micDelay = receivedTime - sentTime;
                document.getElementById('stat-lag').innerText = micDelay;
                log(`CALIBRATED: New Mic Delay is ${micDelay}ms`);
            } else {
                // Calculate ToF and Distance
                const tofMs = (receivedTime - sentTime - micDelay);
                const rawDistance = (tofMs / 1000) * speedOfSound;

                // Update Rolling Average
                distanceHistory.push(rawDistance);
                if (distanceHistory.length > MAX_HISTORY) distanceHistory.shift();

                const avgDist = distanceHistory.reduce((a, b) => a + b) / distanceHistory.length;

                // Calculate Jitter (Standard Deviation)
                const variance = distanceHistory.reduce((a, b) => a + Math.pow(b - avgDist, 2), 0) / distanceHistory.length;
                const jitter = Math.sqrt(variance);

                // Update UI
                document.getElementById('dist-val').innerText = avgDist.toFixed(2) + "m";
                document.getElementById('jitter-val').innerText = `Jitter: ±${jitter.toFixed(3)}m`;

                log(`READ: ${rawDistance.toFixed(2)}m | AVG: ${avgDist.toFixed(2)}m | JITTER: ${jitter.toFixed(3)}m`);
            }
        }

        function log(msg) {
            const box = document.getElementById('log');
            box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
