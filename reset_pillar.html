<!--
reset_pillar.html - Part of the SmartphoneOrchestra

Helps sound tech calibrate the four Samsung A9 Tablets forming the pillars at each corner of the house.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pillar Calibration – SmartphoneOrchestra</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', system-ui, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: #111;
            border-radius: 32px;
            border: 1px solid #2a2a2a;
            padding: 24px 20px 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            color: #88ffcc;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .badge {
            background: #1e2a2a;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-family: monospace;
            color: #88ffcc;
        }
        .status-panel {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
            border-left: 4px solid #88ffcc;
        }
        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .pillar-card {
            background: #0f0f0f;
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #2c2c2c;
            transition: all 0.1s ease;
        }
        .pillar-card.active {
            border-color: #88ffcc;
            box-shadow: 0 0 8px #88ffcc40;
            background: #1a221a;
        }
        .pillar-id {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .delay-row {
            font-family: monospace;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            color: #ccc;
        }
        .value {
            color: #88ffcc;
            font-weight: bold;
        }
        button {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            margin-top: 6px;
            width: 100%;
        }
        button.primary {
            background: #2a6b5e;
            border-color: #88ffcc;
            color: white;
        }
        button.primary:active {
            transform: scale(0.97);
        }
        button.test-tone {
            background: #3a2a2a;
            border-color: #ffaa66;
            color: #ffaa66;
        }
        button.test-tone.active {
            background: #aa6644;
            border-color: #ffaa66;
            color: white;
            box-shadow: 0 0 6px #ffaa66;
        }
        button:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }
        .test-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .test-buttons button {
            flex: 1;
            font-size: 0.7rem;
            padding: 5px 6px;
            margin-top: 0;
        }
        .log {
            background: #050505;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #88ffcc80;
            height: 140px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #222;
        }
        .log-entry {
            border-bottom: 1px solid #1e1e1e;
            padding: 4px 0;
            color: #aaa;
        }
        .success {
            color: #88ffcc;
        }
        .warning {
            color: #ffaa66;
        }
        hr {
            border-color: #222;
            margin: 16px 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            display: inline-block;
            background: #444;
            margin-right: 8px;
        }
        .led-green { background: #88ffcc; box-shadow: 0 0 4px #88ffcc; }
        .led-red { background: #ff6666; }
        .small-text { font-size: 0.7rem; color: #888; }
        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            margin: 12px 0 6px 0;
            color: #ffaa66;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>🔧 Pillar Self‑Cal</span>
        <span class="badge" id="pillar-id-badge">—</span>
    </h1>
    <div class="status-panel" id="main-status">
        <div class="flex-between">
            <span><span class="status-led" id="state-led"></span> <span id="state-text">Loading...</span></span>
            <span id="round-info" class="small-text"></span>
        </div>
        <div id="progress-detail" class="small-text" style="margin-top: 8px;"></div>
    </div>

    <div class="pillar-grid" id="pillar-grid">
        <!-- populated dynamically -->
    </div>

    <button id="calibrate-btn" class="primary" disabled>🔊 Start Round‑Robin Calibration</button>
    <div class="small-text" style="margin-top: 8px; text-align: center;">All four pillars must be online. Pressing start on ANY pillar triggers the sequence.</div>

    <div class="log" id="log-panel">
        <div class="log-entry">📡 waiting for pillar configuration...</div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  FIREBASE CONFIG
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --------------------------------------------------------------
    //  GLOBALS
    // --------------------------------------------------------------
    let myId = null;
    let allPillars = ['PILLAR_FL', 'PILLAR_FR', 'PILLAR_BR', 'PILLAR_BL'];
    let pillarPositions = {};
    let audioCtx = null;
    let bufferCache = {};
    let calibrationActive = false;
    let currentRoundRobin = null;
    let allResultsReady = false;
    let activeTestTones = {};

    const SPEED_OF_SOUND = 343;

    const PILLAR_FREQUENCIES = {
        'PILLAR_FL': 440,
        'PILLAR_FR': 523,
        'PILLAR_BR': 659,
        'PILLAR_BL': 784
    };

    // UI elements
    const calibrateBtn = document.getElementById('calibrate-btn');
    const stateTextSpan = document.getElementById('state-text');
    const stateLed = document.getElementById('state-led');
    const roundInfoSpan = document.getElementById('round-info');
    const progressDetail = document.getElementById('progress-detail');
    const pillarGrid = document.getElementById('pillar-grid');
    const logPanel = document.getElementById('log-panel');

    // --------------------------------------------------------------
    //  UTILITIES
    // --------------------------------------------------------------
    function addLog(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        div.innerHTML = `[${time}] ${msg}`;
        if (type === 'success') div.style.color = '#88ffcc';
        else if (type === 'warn') div.style.color = '#ffaa66';
        else div.style.color = '#aaa';
        logPanel.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logPanel.children.length > 60) logPanel.removeChild(logPanel.firstChild);
        console.log(`[PillarCal] ${msg}`);
    }

    function distanceBetween(p1, p2) {
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        return Math.sqrt(dx*dx + dy*dy);
    }

    function propagationMs(dist) {
        return (dist / SPEED_OF_SOUND) * 1000;
    }

    // Create fallback pillar data if Firebase config not loaded yet
    function getDefaultPillarData() {
        const defaults = {};
        const positions = {
            'PILLAR_FL': { x: 0, y: 0 },
            'PILLAR_FR': { x: 15.5, y: 0 },
            'PILLAR_BR': { x: 15.5, y: 25 },
            'PILLAR_BL': { x: 0, y: 25 }
        };
        for (let id of allPillars) {
            defaults[id] = {
                x: positions[id].x,
                y: positions[id].y,
                speakerDelayMs: null,
                micDelayMs: null,
                audioUrl: null,
                testFreq: PILLAR_FREQUENCIES[id]
            };
        }
        return defaults;
    }

    function renderCards() {
        if (!pillarGrid) return;

        // Use fallback data if pillarPositions is empty
        const dataSource = Object.keys(pillarPositions).length > 0 ? pillarPositions : getDefaultPillarData();

        let html = '';
        for (let id of allPillars) {
            const info = dataSource[id] || {
                x: 0, y: 0, speakerDelayMs: null, micDelayMs: null,
                testFreq: PILLAR_FREQUENCIES[id]
            };
            const isMe = (id === myId);
            const speakerVal = (info.speakerDelayMs !== null && info.speakerDelayMs !== undefined) ? `${info.speakerDelayMs} ms` : '—';
            const micVal = (info.micDelayMs !== null && info.micDelayMs !== undefined) ? `${info.micDelayMs} ms` : '—';
            const freqVal = info.testFreq || PILLAR_FREQUENCIES[id];
            const activeClass = (calibrationActive && currentRoundRobin?.currentPlayer === id) ? 'active' : '';
            const isTonePlaying = activeTestTones[id] ? true : false;

            html += `
                <div class="pillar-card ${activeClass}" data-pillar="${id}">
                    <div class="pillar-id">${id} ${isMe ? '📍 (this device)' : ''}</div>
                    <div class="delay-row">🔊 Speaker: <span class="value" id="spk-${id}">${speakerVal}</span></div>
                    <div class="delay-row">🎤 Mic: <span class="value" id="mic-${id}">${micVal}</span></div>
                    <div class="delay-row">🎵 Test freq: <span class="value">${freqVal} Hz</span></div>
                    <div class="test-buttons">
                        <button class="test-tone-btn test-tone ${isTonePlaying ? 'active' : ''}" data-pillar="${id}" data-freq="${freqVal}">
                            ${isTonePlaying ? '🔊 Stop' : '▶️ Tone'}
                        </button>
                    </div>
                    <div class="small-text" style="margin-top:5px;">📌 (${info.x?.toFixed(1) || '?'}, ${info.y?.toFixed(1) || '?'})</div>
                </div>
            `;
        }
        pillarGrid.innerHTML = html;

        // Attach event listeners to test tone buttons
        document.querySelectorAll('.test-tone-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const pillarId = btn.dataset.pillar;
                const freq = parseFloat(btn.dataset.freq);
                toggleTestTone(pillarId, freq);
            });
        });
    }

    function updateCardValue(pillarId, field, value) {
        const el = document.getElementById(`${field}-${pillarId}`);
        if (el) el.innerText = value;
        if (pillarPositions[pillarId]) {
            pillarPositions[pillarId][field === 'spk' ? 'speakerDelayMs' : 'micDelayMs'] = value;
        }
    }

    // --------------------------------------------------------------
    //  TEST TONE CONTROL
    // --------------------------------------------------------------
    async function ensureAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        return audioCtx;
    }

    async function toggleTestTone(pillarId, frequency) {
        await ensureAudioContext();

        if (activeTestTones[pillarId]) {
            // Stop the tone
            const tone = activeTestTones[pillarId];
            try {
                tone.gain.gain.setValueAtTime(tone.gain.gain.value, audioCtx.currentTime);
                tone.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
                setTimeout(() => {
                    tone.oscillator.stop();
                    tone.oscillator.disconnect();
                    tone.gain.disconnect();
                }, 100);
            } catch(e) { /* ignore */ }
            delete activeTestTones[pillarId];
            addLog(`🔇 Stopped test tone for ${pillarId} (${frequency} Hz)`, 'info');
            renderCards();
        } else {
            // Start new tone
            try {
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gain.gain.value = 0.3;
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.start();
                activeTestTones[pillarId] = { oscillator, gain };
                addLog(`🔊 Playing test tone for ${pillarId} at ${frequency} Hz (click again to stop)`, 'success');
                renderCards();
            } catch(e) {
                addLog(`❌ Failed to start tone for ${pillarId}: ${e.message}`, 'warn');
            }
        }
    }

    function stopAllTestTones() {
        for (let pillarId of Object.keys(activeTestTones)) {
            const tone = activeTestTones[pillarId];
            try {
                tone.gain.gain.setValueAtTime(tone.gain.gain.value, audioCtx.currentTime);
                tone.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
                setTimeout(() => {
                    tone.oscillator.stop();
                    tone.oscillator.disconnect();
                    tone.gain.disconnect();
                }, 100);
            } catch(e) { /* ignore */ }
        }
        activeTestTones = {};
        addLog(`🔇 All test tones stopped`, 'info');
        renderCards();
    }

    // --------------------------------------------------------------
    //  LOAD PILLAR CONFIG
    // --------------------------------------------------------------
    async function loadPillarAssets() {
        try {
            const snap = await db.ref('pillar_config').once('value');
            const config = snap.val();
            if (config && config.pillars) {
                for (let p of config.pillars) {
                    pillarPositions[p.id] = {
                        x: p.x,
                        y: p.y,
                        speakerDelayMs: p.speakerDelayMs ?? null,
                        micDelayMs: p.micDelayMs ?? null,
                        audioUrl: config.assets?.[p.id.replace('PILLAR_', '')] || null,
                        testFreq: PILLAR_FREQUENCIES[p.id]
                    };
                }
                addLog(`✅ Loaded pillar positions from Firebase`, 'success');
            } else {
                addLog(`⚠️ No pillar_config found, using default positions`, 'warn');
                pillarPositions = getDefaultPillarData();
            }
        } catch(e) {
            addLog(`⚠️ Failed to load pillar_config: ${e.message}`, 'warn');
            pillarPositions = getDefaultPillarData();
        }
        renderCards();
        return true;
    }

    async function preloadAudio(url, pillarId) {
        if (!url || bufferCache[url]) return;
        try {
            const res = await fetch(url);
            const buf = await res.arrayBuffer();
            bufferCache[url] = await audioCtx.decodeAudioData(buf);
            addLog(`📦 Preloaded ${pillarId} tone`);
        } catch(e) {
            addLog(`⚠️ Could not preload ${pillarId}: ${e.message}`, 'warn');
        }
    }

    // --------------------------------------------------------------
    //  CHECK PRESENCE
    // --------------------------------------------------------------
    let allPillarsPresent = false;
    let presenceCheckInterval = null;

    async function checkAllPillarsOnline() {
        try {
            const snap = await db.ref('devices').once('value');
            const devices = snap.val() || {};
            const now = Date.now() + (window.serverOffset || 0);
            const timeout = 12100;
            let missing = [];
            for (let id of allPillars) {
                const dev = devices[id];
                if (!dev || !dev.lastSeen || (now - dev.lastSeen) > timeout) missing.push(id);
            }
            const allOnline = missing.length === 0;
            if (allOnline !== allPillarsPresent) {
                allPillarsPresent = allOnline;
                if (allOnline) {
                    addLog(`✅ All 4 pillars are online — ready to calibrate`, 'success');
                    stateTextSpan.innerText = 'All pillars ready';
                    stateLed.className = 'status-led led-green';
                    calibrateBtn.disabled = false;
                } else {
                    addLog(`⏳ Waiting for pillars: ${missing.join(', ')}`, 'warn');
                    stateTextSpan.innerText = `Waiting: ${missing.join(', ')}`;
                    stateLed.className = 'status-led led-red';
                    calibrateBtn.disabled = true;
                }
            }
        } catch(e) {
            addLog(`⚠️ Error checking pillar presence: ${e.message}`, 'warn');
        }
    }

    // --------------------------------------------------------------
    //  ROUND-ROBIN CALIBRATION (simplified for now)
    // --------------------------------------------------------------
    async function startRoundRobin() {
        if (calibrationActive) {
            addLog('Calibration already active', 'warn');
            return;
        }
        if (!allPillarsPresent) {
            addLog('Not all pillars are online – cannot start', 'warn');
            return;
        }
        stopAllTestTones();
        addLog(`🔊 Round-robin calibration started by ${myId}`, 'success');
        calibrationActive = true;
        stateTextSpan.innerText = 'Calibrating...';
        // Placeholder for actual calibration logic
        setTimeout(() => {
            addLog(`✅ Calibration simulation complete — use test tones for balance`, 'success');
            calibrationActive = false;
            stateTextSpan.innerText = 'Calibration complete';
        }, 3000);
    }

    // --------------------------------------------------------------
    //  INIT
    // --------------------------------------------------------------
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const seatParam = urlParams.get('seat');
        if (!seatParam || !seatParam.startsWith('PILLAR_')) {
            document.body.innerHTML = '<div class="card"><h1>❌ Invalid seat</h1><p>Missing ?seat=PILLAR_XX parameter</p></div>';
            return;
        }
        myId = seatParam;
        document.getElementById('pillar-id-badge').innerText = myId;

        const offsetRef = db.ref(".info/serverTimeOffset");
        offsetRef.on("value", snap => { window.serverOffset = snap.val() || 0; });

        await ensureAudioContext();
        await loadPillarAssets();

        // Preload MP3s if URLs exist
        for (let id of allPillars) {
            const url = pillarPositions[id]?.audioUrl;
            if (url) await preloadAudio(url, id);
        }

        // Monitor presence
        checkAllPillarsOnline();
        presenceCheckInterval = setInterval(checkAllPillarsOnline, 5000);

        calibrateBtn.onclick = startRoundRobin;

        addLog(`🚀 ${myId} ready. Test tone buttons are always active for sound check.`, 'success');
    }

    window.onload = init;
</script>
</body>
</html>
