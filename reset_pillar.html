    <style>

        .button-group {

        .small-text { font-size: 0.7rem; color: #888; }

<body>
<div class="card">
    <h1>
        <span>🔧 Pillar Self‑Cal</span>
        <span class="badge" id="pillar-id-badge">—</span>
    </h1>
    <div class="status-panel" id="main-status">
        <div class="flex-between">
            <span><span class="status-led" id="state-led"></span> <span id="state-text">Loading...</span></span>
            <span id="round-info" class="small-text"></span>
        </div>
        <div id="progress-detail" class="small-text" style="margin-top: 8px;"></div>
    </div>

    <div class="pillar-grid" id="pillar-grid">
        <!-- populated dynamically -->
    </div>

    <div class="section-title">📊 Calibration Results</div>
    <div id="results-panel" style="background: #0a0a0a; border-radius: 12px; padding: 10px; margin: 10px 0;">
        <div class="small-text">Waiting for tuning movement...</div>
    </div>

    <button id="calibrate-btn" class="primary" disabled>🎯 Listen to Tuning Movement</button>
    <div class="small-text" style="margin-top: 8px; text-align: center;">
        All four pillars must be active. Click the button to start listening for the conductor's tuning movement.
        Each pillar will record its own playback and microphone detections.
    </div>

    <div class="log" id="log-panel">
        <div class="log-entry">📡 waiting for pillar configuration...</div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  FIREBASE CONFIG
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --------------------------------------------------------------
    //  LOGGING SYSTEM (Sends logs to Firebase device_logs)
    // --------------------------------------------------------------
    let logQueue = [];
    let logFlushTimer = null;
    let pendingFlush = false;
    let logRef = null;
    const LOG_FLUSH_INTERVAL_MS = 2000;
    const MAX_LOG_QUEUE_SIZE = 50;

    function initLogging() {
        if (!myId) return;
        logRef = db.ref(`device_logs/${myId}`);

        if (logFlushTimer) clearInterval(logFlushTimer);
        logFlushTimer = setInterval(flushLogs, LOG_FLUSH_INTERVAL_MS);

        const serverTimestamp = Date.now() + (serverOffset || 0);
        pillarLog(`🚀 Pillar ${myId} started at ${new Date(serverTimestamp).toISOString()}`);
        pillarLog(`   Platform: ${navigator.platform}, User Agent: ${navigator.userAgent.substring(0, 100)}`);

        setTimeout(() => flushLogs(), 100);
    }

    function flushLogs() {
        if (logQueue.length === 0 || !logRef || pendingFlush) return;
        pendingFlush = true;

        const logsToSend = [...logQueue];
        logQueue = [];

        const batch = {};
        logsToSend.forEach((logEntry, index) => {
            const ts = Date.now() + (serverOffset || 0);
            batch[`${ts}_${index}_${Math.random().toString(36).substr(2, 6)}`] = logEntry;
        });

        logRef.update(batch)
            .catch(e => {
                console.error("Failed to send logs to Firebase:", e);
                logQueue = [...logsToSend, ...logQueue];
                if (logQueue.length > MAX_LOG_QUEUE_SIZE) {
                    logQueue = logQueue.slice(-MAX_LOG_QUEUE_SIZE);
                }
            })
            .finally(() => {
                pendingFlush = false;
            });
    }

    function pillarLog(message, type = 'info') {
        const serverTimestamp = Date.now() + (serverOffset || 0);
        const timeStr = new Date(serverTimestamp).toISOString().substr(11, 12);

        // Also log to console for debugging
        console.log(`[${timeStr}] [${myId || 'unknown'}] ${message}`);

        // Also add to local UI log
        const div = document.createElement('div');
        div.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        div.innerHTML = `[${time}] ${message}`;
        if (type === 'success') div.style.color = '#88ffcc';
        else if (type === 'warn') div.style.color = '#ffaa66';
        else div.style.color = '#aaa';
        const logPanel = document.getElementById('log-panel');
        if (logPanel) {
            logPanel.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while (logPanel.children.length > 80) logPanel.removeChild(logPanel.firstChild);
        }

        // Send to Firebase
        const logEntry = {
            timestamp: serverTimestamp,
            timeStr: timeStr,
            message: message,
            seatId: myId || 'unknown',
            type: type,
            isPillar: true
        };

        logQueue.push(logEntry);

        if (logQueue.length >= MAX_LOG_QUEUE_SIZE && logRef) {
            flushLogs();
        }
    }

    // --------------------------------------------------------------
    //  GLOBALS
    // --------------------------------------------------------------
    let myId = null;
    let allPillars = ['PILLAR_FL', 'PILLAR_FR', 'PILLAR_BR', 'PILLAR_BL'];
    let pillarData = {};           // keyed by pillar ID, contains all config
    let pillarOrder = [];          // from config
    let audioCtx = null;
    let bufferCache = {};
    let serverOffset = 0;
    let isListening = false;
    let tuningStartTime = null;

    // Microphone for detecting other pillars
    let micStream = null;
    let analyser = null;
    let isMicActive = false;
    let frequencyData = null;
    let sampleRate = 48000;

    // Measurement storage
    let pillarMeasurements = {};    // { targetPillar: [{ rawDelay, listenerId, timestamp }] }
    let myPlaybackStartTime = null;
    let mySpeakerDelay = 45;        // from config
    let myMicDelay = 18;            // from config

    // FFT parameters for onset detection
    const FFT_SIZE = 2048;
    const MIN_DETECTION_ENERGY = 0.03;
    const DETECTION_WINDOW_MS = 500;

    // UI elements
    const calibrateBtn = document.getElementById('calibrate-btn');
    const stateTextSpan = document.getElementById('state-text');
    const stateLed = document.getElementById('state-led');
    const roundInfoSpan = document.getElementById('round-info');
    const progressDetail = document.getElementById('progress-detail');
    const pillarGrid = document.getElementById('pillar-grid');
    const resultsPanel = document.getElementById('results-panel');

    // --------------------------------------------------------------
    //  UTILITIES
    // --------------------------------------------------------------
    function addLog(msg, type = 'info') {
        pillarLog(msg, type);
    }

    function calculateMedian(values) {
        if (values.length === 0) return 0;
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        if (sorted.length % 2 === 0) {
            return (sorted[mid - 1] + sorted[mid]) / 2;
        }
        return sorted[mid];
    }

    function calculateStdDev(values) {
        if (values.length < 2) return 999;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
        return Math.sqrt(variance);
    }

    function getBinForFrequency(frequency, sampleRate, fftSize) {
        const nyquist = sampleRate / 2;
        const bin = Math.floor(frequency / nyquist * (fftSize / 2));
        return Math.min(Math.max(0, bin), fftSize / 2 - 1);
    }

    function calculateEnergyAtFrequency(frequency, sampleRate, fftSize, freqData) {
        if (!freqData) return 0;
        const targetBin = getBinForFrequency(frequency, sampleRate, fftSize);
        const safeBin = Math.min(Math.max(0, targetBin), fftSize / 2 - 1);

        let energy = 0;
        let binsChecked = 0;
        for (let i = Math.max(0, safeBin - 3); i <= Math.min(fftSize / 2 - 1, safeBin + 3); i++) {
            if (freqData && i < freqData.length) {
                energy += freqData[i] / 255;
                binsChecked++;
            }
        }
        return binsChecked > 0 ? energy / binsChecked : 0;
    }

    function getFrequencyFromMidi(midiNote) {
        return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    // --------------------------------------------------------------
    //  LOAD PILLAR CONFIG
    // --------------------------------------------------------------
    async function loadPillarConfig() {
        const snap = await db.ref('pillar_config').once('value');
        const config = snap.val();

        if (!config || !config.pillars) {
            addLog('⚠️ No pillar_config found — using defaults', 'warn');
            pillarOrder = allPillars;
            for (let id of pillarOrder) {
                pillarData[id] = {
                    id: id,
                    label: id.replace('PILLAR_', ''),
                    x: 0,
                    y: 0,
                    audioUrl: null,
                    speakerDelayMs: 45,
                    micDelayMs: 18
                };
            }
            return false;
        }

        pillarOrder = config.pillars.map(p => p.id);
        for (let p of config.pillars) {
            pillarData[p.id] = {
                id: p.id,
                label: p.label,
                x: p.x,
                y: p.y,
                audioUrl: p.audioUrl,
                speakerDelayMs: p.speakerDelayMs || 45,
                micDelayMs: p.micDelayMs || 18
            };
        }
        addLog(`✅ Loaded ${pillarOrder.length} pillars from config`, 'success');

        // Store my own delays
        if (pillarData[myId]) {
            mySpeakerDelay = pillarData[myId].speakerDelayMs;
            myMicDelay = pillarData[myId].micDelayMs;
        }

        return true;
    }

    // --------------------------------------------------------------
    //  MICROPHONE SETUP
    // --------------------------------------------------------------
    async function setupMicrophone() {
        if (isMicActive) return true;

        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false,
                    sampleRate: 44100
                }
            });
            micStream = stream;

            const source = audioCtx.createMediaStreamSource(micStream);
            const micGain = audioCtx.createGain();
            micGain.gain.value = 3.0;
            source.connect(micGain);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = FFT_SIZE;
            analyser.smoothingTimeConstant = 0.1;
            micGain.connect(analyser);

            sampleRate = audioCtx.sampleRate;
            frequencyData = new Uint8Array(analyser.frequencyBinCount);

            isMicActive = true;
            addLog('🎤 Microphone ready for detecting other pillars', 'success');
            return true;
        } catch (e) {
            addLog(`❌ Microphone error: ${e.message}`, 'warn');
            return false;
        }
    }

    // --------------------------------------------------------------
    //  DETECT OTHER PILLARS' PLAYBACK
    // --------------------------------------------------------------
    async function detectPillarPlayback(targetPillarId, expectedTimeServer, frequency) {
        // Skip if listening to ourselves
        if (targetPillarId === myId) {
            addLog(`🔇 Skipping self-detection for ${targetPillarId}`, 'info');
            return null;
        }

        if (!analyser || !frequencyData) return null;

        const startTime = Date.now() + serverOffset;
        const timeoutMs = 2000;
        let detectionTime = null;
        let maxEnergy = 0;

        while ((Date.now() + serverOffset - startTime) < timeoutMs && !detectionTime) {
            analyser.getByteFrequencyData(frequencyData);

            const energy = calculateEnergyAtFrequency(frequency, sampleRate, FFT_SIZE, frequencyData);

            if (energy > MIN_DETECTION_ENERGY && energy > maxEnergy) {
                maxEnergy = energy;
                detectionTime = Date.now() + serverOffset;
            }
            await new Promise(r => setTimeout(r, 5));
        }

        if (detectionTime) {
            const rawDelay = detectionTime - expectedTimeServer;
            addLog(`🔍 Detected ${targetPillarId} → raw delay = ${rawDelay.toFixed(1)} ms (energy: ${maxEnergy.toFixed(3)})`);
            return { rawDelay, detectionTime, energy: maxEnergy };
        }

        addLog(`⚠️ Could not detect ${targetPillarId} (timeout)`, 'warn');
        return null;
    }

    // --------------------------------------------------------------
    //  LISTEN TO TUNING MOVEMENT
    // --------------------------------------------------------------
    async function listenToTuningMovement() {
        if (isListening) {
            addLog('Already listening for tuning movement', 'warn');
            return;
        }

        if (!allPillarsPresent()) {
            addLog('Not all pillars are online – cannot start', 'warn');
            return;
        }

        const micOk = await setupMicrophone();
        if (!micOk) {
            addLog('Microphone required for detection', 'warn');
            return;
        }

        isListening = true;
        calibrateBtn.disabled = true;
        calibrateBtn.innerText = '🎧 Listening for tuning movement...';
        stateTextSpan.innerText = 'Listening for tuning...';
        stateLed.className = 'status-led led-yellow';

        addLog('🔊 Waiting for conductor to start tuning movement...', 'info');

        // Listen for tuning/current
        const tuningRef = db.ref('tuning/current');
        const tuningListener = tuningRef.on('value', async (snap) => {
            const schedule = snap.val();

            if (!schedule || schedule.status !== 'ACTIVE') {
                return;
            }

            if (!schedule.startTime) {
                return;
            }

            addLog(`🎵 Tuning movement detected! Start time: ${new Date(schedule.startTime).toLocaleTimeString()}`, 'success');
            tuningStartTime = schedule.startTime;

            // Clear previous measurements
            pillarMeasurements = {};

            // Schedule detection for each pillar's playback
            const activePillars = schedule.activePillars || pillarOrder;

            addLog(`📡 Will listen for ${activePillars.length} pillars during Phase 1`, 'info');

            // Schedule detection windows based on calibration windows
            if (schedule.metadata && schedule.metadata.pillar_cal_windows) {
                const windows = schedule.metadata.pillar_cal_windows;

                // Log all windows for debugging
                addLog(`📋 Pillar calibration windows:`);
                for (const w of windows) {
                    addLog(`   ${w.pillar_id}: ${w.start_ms}ms → ${w.end_ms}ms (${w.note_count} notes)`);
                }

                for (const window of windows) {
                    const pillarId = window.pillar_id;
                    const startMs = window.start_ms;
                    const endMs = window.end_ms;

                    // Find the notes for this pillar to get frequency
                    const pillarNotes = (schedule.pillar_notes || []).filter(n => n.pillar_id === pillarId);
                    const midiNote = pillarNotes.length > 0 ? pillarNotes[0].midi : 69;
                    const frequency = getFrequencyFromMidi(midiNote);

                    const expectedStartServer = tuningStartTime + startMs;
                    const expectedEndServer = tuningStartTime + endMs;

                    addLog(`🎯 Will listen for ${pillarId} at ~${frequency.toFixed(0)}Hz between ${(startMs/1000).toFixed(1)}s-${(endMs/1000).toFixed(1)}s`);

                    // Schedule detection at the start of the window
                    const nowServer = Date.now() + serverOffset;
                    const delayMs = expectedStartServer - nowServer;

                    if (delayMs > 0 && delayMs < 10000) {
                        setTimeout(async () => {
                            addLog(`🎧 Listening for ${pillarId}...`);

                            const detection = await detectPillarPlayback(pillarId, expectedStartServer, frequency);

                            if (detection) {
                                if (!pillarMeasurements[pillarId]) {
                                    pillarMeasurements[pillarId] = [];
                                }
                                pillarMeasurements[pillarId].push({
                                    rawDelay: detection.rawDelay,
                                    listenerId: myId,
                                    timestamp: detection.detectionTime,
                                    energy: detection.energy,
                                    expectedTime: expectedStartServer
                                });

                                // Log to Firebase for other pillars to see
                                const measurementRef = db.ref(`pillar_calibration/measurements/${pillarId}/${myId}`);
                                await measurementRef.set({
                                    rawDelayMs: detection.rawDelay,
                                    listenerId: myId,
                                    timestamp: detection.detectionTime,
                                    expectedTime: expectedStartServer,
                                    energy: detection.energy
                                });

                                updateResultsDisplay();
                            }
                        }, delayMs);
                    } else {
                        addLog(`⚠️ Detection window for ${pillarId} is too ${delayMs < 0 ? 'late' : 'far'} (${delayMs}ms), skipping`, 'warn');
                    }
                }
            } else {
                addLog('⚠️ No calibration windows found in tuning schedule', 'warn');
            }

            // ============ SCHEDULE OWN PLAYBACK ============
            // Find this pillar's window
            const myWindow = (schedule.metadata?.pillar_cal_windows || []).find(w => w.pillar_id === myId);

            addLog(`📋 Checking playback for ${myId}:`);
            addLog(`   myWindow found: ${myWindow ? 'YES' : 'NO'}`);
            if (myWindow) {
                addLog(`   myWindow.start_ms: ${myWindow.start_ms}ms`);
                addLog(`   myWindow.end_ms: ${myWindow.end_ms}ms`);
            }
            addLog(`   pillarData[${myId}]?.audioUrl: ${pillarData[myId]?.audioUrl || 'MISSING'}`);

            if (myWindow && pillarData[myId]?.audioUrl) {
                const myStartMs = myWindow.start_ms;
                const myStartServer = tuningStartTime + myStartMs;
                const nowServer = Date.now() + serverOffset;
                const delayMs = myStartServer - nowServer - mySpeakerDelay;

                addLog(`🎵 Scheduling playback for ${myId}:`);
                addLog(`   myStartMs: ${myStartMs}ms`);
                addLog(`   myStartServer: ${new Date(myStartServer).toLocaleTimeString()}`);
                addLog(`   nowServer: ${new Date(nowServer).toLocaleTimeString()}`);
                addLog(`   mySpeakerDelay: ${mySpeakerDelay}ms`);
                addLog(`   delayMs: ${delayMs.toFixed(1)}ms`);

                if (delayMs > 0 && delayMs < 10000) {
                    setTimeout(() => {
                        playMyPillarAudio(pillarData[myId].audioUrl, myStartServer);
                    }, delayMs);
                    addLog(`🎵 ${myId} will play at ${new Date(myStartServer).toLocaleTimeString()} (delay: ${Math.round(delayMs)}ms)`);
                } else if (delayMs <= 0) {
                    addLog(`⚠️ ${myId} playback window is ${Math.abs(delayMs)}ms late, playing immediately`, 'warn');
                    playMyPillarAudio(pillarData[myId].audioUrl, myStartServer);
                } else {
                    addLog(`❌ ${myId} playback delay too large (${Math.round(delayMs)}ms > 10000ms), skipping`, 'warn');
                }
            } else {
                if (!myWindow) {
                    addLog(`❌ ${myId} has no calibration window in schedule`, 'warn');
                }
                if (!pillarData[myId]?.audioUrl) {
                    addLog(`❌ ${myId} has no audioUrl in pillar config`, 'warn');
                }
            }

            // Set a timeout to stop listening after Phase 1
            setTimeout(() => {
                isListening = false;
                calibrateBtn.disabled = false;
                calibrateBtn.innerText = '🎯 Listen to Tuning Movement';
                stateTextSpan.innerText = 'Ready';
                stateLed.className = 'status-led led-green';
                addLog('⏹️ Phase 1 listening complete', 'info');

                // Compute final results
                computePillarDelays();

                // Clean up listener
                tuningRef.off('value', tuningListener);
            }, 25000); // Phase 1 is ~20.5 seconds, add buffer
        });
    }

    // --------------------------------------------------------------
    //  PLAY PILLAR AUDIO (for own playback)
    // --------------------------------------------------------------
    async function preloadAudio(url) {
        if (bufferCache[url]) return bufferCache[url];
        try {
            const res = await fetch(url);
            const arrayBuf = await res.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
            bufferCache[url] = audioBuffer;
            return audioBuffer;
        } catch (e) {
            addLog(`❌ Failed to load audio: ${e.message}`, 'warn');
            return null;
        }
    }

    async function playMyPillarAudio(url, expectedStartServer) {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }

        const audioBuffer = await preloadAudio(url);
        if (!audioBuffer) return;

        const nowServer = Date.now() + serverOffset;
        const actualStartServer = nowServer;
        const rawDelay = actualStartServer - expectedStartServer;

        addLog(`🔊 ${myId} played at ${new Date(actualStartServer).toLocaleTimeString()} (deviation: ${rawDelay > 0 ? '+' : ''}${rawDelay.toFixed(1)}ms)`);

        // Log this playback for others to detect
        await db.ref(`pillar_calibration/playback/${myId}/${Date.now()}`).set({
            expectedTime: expectedStartServer,
            actualTime: actualStartServer,
            deviation: rawDelay,
            speakerDelay: mySpeakerDelay
        });

        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start(0);

        myPlaybackStartTime = actualStartServer;
    }

    // --------------------------------------------------------------
    //  CHECK PILLAR PRESENCE
    // --------------------------------------------------------------
    let allPillarsPresentFlag = false;
    let presenceCheckInterval = null;

    async function checkAllPillarsOnline() {
        const snap = await db.ref('devices').once('value');
        const devices = snap.val() || {};
        const now = Date.now() + serverOffset;
        const timeout = 12100;
        let missing = [];
        for (let id of pillarOrder) {
            const dev = devices[id];
            if (!dev || !dev.lastSeen || (now - dev.lastSeen) > timeout) missing.push(id);
        }
        const allOnline = missing.length === 0;
        if (allOnline !== allPillarsPresentFlag) {
            allPillarsPresentFlag = allOnline;
            if (allOnline) {
                addLog(`✅ All ${pillarOrder.length} pillars are online`, 'success');
                stateTextSpan.innerText = 'All pillars ready';
                stateLed.className = 'status-led led-green';
                calibrateBtn.disabled = false;
            } else {
                addLog(`⏳ Waiting for pillars: ${missing.join(', ')}`, 'warn');
                stateTextSpan.innerText = `Waiting: ${missing.join(', ')}`;
                stateLed.className = 'status-led led-red';
                calibrateBtn.disabled = true;
            }
        }
        return allOnline;
    }

    function allPillarsPresent() {
        return allPillarsPresentFlag;
    }

    // --------------------------------------------------------------
    //  HEARTBEAT (Send to Firebase so other pillars see this pillar)
    // --------------------------------------------------------------
    let heartbeatInterval = null;

    function startHeartbeat() {
        if (!myId) return;
        if (heartbeatInterval) clearInterval(heartbeatInterval);

        heartbeatInterval = setInterval(() => {
            db.ref(`devices/${myId}`).update({
                lastSeen: Date.now() + serverOffset,
                status: 'ACTIVE',
                type: 'pillar',
                x: pillarData[myId]?.x || 0,
                y: pillarData[myId]?.y || 0,
                speakerDelay: pillarData[myId]?.speakerDelayMs || 45,
                micDelay: pillarData[myId]?.micDelayMs || 18
            }).catch(e => console.warn("Heartbeat failed", e));
        }, 10000);
        addLog(`💓 Heartbeat started for ${myId}`, 'info');
    }

    function stopHeartbeat() {
        if (heartbeatInterval) {
            clearInterval(heartbeatInterval);
            heartbeatInterval = null;
        }
    }

    // --------------------------------------------------------------
    //  UPDATE DISPLAY
    // --------------------------------------------------------------
    function updateResultsDisplay() {
        if (Object.keys(pillarMeasurements).length === 0) {
            resultsPanel.innerHTML = '<div class="small-text">Waiting for detections...</div>';
            return;
        }

        let html = '<table class="measurement-table">';
        html += '<tr><th>Target Pillar</th><th>Raw Delays (ms)</th><th>Median (ms)</th><th>Samples</th></tr>';

        for (const [pillarId, measurements] of Object.entries(pillarMeasurements)) {
            const rawDelays = measurements.map(m => m.rawDelay);
            const median = calculateMedian(rawDelays);
            const stdDev = calculateStdDev(rawDelays);
            html += `<tr>
                <td><span style="color:#88ffcc;">${pillarId}</span></td>
                <td>${rawDelays.map(d => d.toFixed(1)).join(', ')}</td>
                <td><strong>${median.toFixed(1)} ms</strong></td>
                <td>${measurements.length}</td>
            </tr>`;
        }
        html += '</table>';

        resultsPanel.innerHTML = html;
    }

    // --------------------------------------------------------------
    //  COMPUTE PILLAR DELAYS
    // --------------------------------------------------------------
    async function computePillarDelays() {
        // Also fetch measurements from Firebase that other pillars recorded
        const snap = await db.ref('pillar_calibration/measurements').once('value');
        const allMeasurements = snap.val() || {};

        // Combine local and remote measurements
        for (const [targetId, listeners] of Object.entries(allMeasurements)) {
            for (const [listenerId, data] of Object.entries(listeners)) {
                if (!pillarMeasurements[targetId]) {
                    pillarMeasurements[targetId] = [];
                }
                // Avoid duplicates (check if already exists)
                const exists = pillarMeasurements[targetId].some(m =>
                    m.timestamp === data.timestamp && m.listenerId === data.listenerId
                );
                if (!exists && data.rawDelayMs) {
                    pillarMeasurements[targetId].push({
                        rawDelay: data.rawDelayMs,
                        listenerId: data.listenerId,
                        timestamp: data.timestamp,
                        expectedTime: data.expectedTime
                    });
                }
            }
        }

        updateResultsDisplay();

        // Now compute speaker and mic delays using the full measurement set
        if (Object.keys(pillarMeasurements).length < pillarOrder.length) {
            addLog(`⚠️ Not enough measurements yet (got ${Object.keys(pillarMeasurements).length}/${pillarOrder.length})`, 'warn');
            return;
        }

        // Use the same iterative solver as before
        let spk = {}, mic = {};
        for (let id of pillarOrder) {
            spk[id] = pillarData[id].speakerDelayMs;
            mic[id] = pillarData[id].micDelayMs;
        }

        const iterations = 6;
        for (let iter = 0; iter < iterations; iter++) {
            // Update speaker estimates
            for (let player of pillarOrder) {
                let values = [];
                const measurements = pillarMeasurements[player] || [];
                for (let meas of measurements) {
                    const listener = meas.listenerId;
                    if (listener === player) continue;
                    const raw = meas.rawDelay;
                    if (raw === undefined) continue;
                    const dist = Math.sqrt(
                        Math.pow(pillarData[player]?.x - pillarData[listener]?.x, 2) +
                        Math.pow(pillarData[player]?.y - pillarData[listener]?.y, 2)
                    );
                    const prop = (dist / 343) * 1000;
                    const est = raw - prop - mic[listener];
                    if (isFinite(est) && Math.abs(est) < 300) values.push(est);
                }
                if (values.length) spk[player] = calculateMedian(values);
            }

            // Update mic estimates
            for (let listener of pillarOrder) {
                let values = [];
                for (let player of pillarOrder) {
                    if (player === listener) continue;
                    const measurements = pillarMeasurements[player] || [];
                    const meas = measurements.find(m => m.listenerId === listener);
                    if (!meas) continue;
                    const raw = meas.rawDelay;
                    if (raw === undefined) continue;
                    const dist = Math.sqrt(
                        Math.pow(pillarData[player]?.x - pillarData[listener]?.x, 2) +
                        Math.pow(pillarData[player]?.y - pillarData[listener]?.y, 2)
                    );
                    const prop = (dist / 343) * 1000;
                    const est = raw - spk[player] - prop;
                    if (isFinite(est) && Math.abs(est) < 150) values.push(est);
                }
                if (values.length) mic[listener] = calculateMedian(values);
            }
        }

        // Display final results
        let resultHtml = '<div class="section-title">✅ Calibration Results</div>';
        resultHtml += '<table class="measurement-table">';
        resultHtml += ' <tr><th>Pillar</th><th>Speaker Delay (ms)</th><th>Mic Delay (ms)</th><th>Status</th></tr>';

        for (let id of pillarOrder) {
            let spkVal = Math.round(Math.max(5, Math.min(300, spk[id])));
            let micVal = Math.round(Math.max(2, Math.min(150, mic[id])));
            resultHtml += `
                <tr>
                    <td><span style="color:#88ffcc;">${id}</span></td>
                    <td><strong>${spkVal} ms</strong></td>
                    <td><strong>${micVal} ms</strong></td>
                    <td>📊</td>
                </tr>`;

            // Update the card display
            updateCardValue(id, 'spk', `${spkVal} ms`);
            updateCardValue(id, 'mic', `${micVal} ms`);
            pillarData[id].speakerDelayMs = spkVal;
            pillarData[id].micDelayMs = micVal;
        }
        resultHtml += '</table>';
        resultHtml += '<div class="small-text" style="margin-top: 8px;">📋 Copy these values into pillar_config.json and upload via admin.html</div>';
        resultsPanel.innerHTML = resultHtml;

        addLog(`✅ Calibration complete! Speaker and mic delays calculated.`, 'success');
        stateTextSpan.innerText = 'Calibration complete';
        stateLed.className = 'status-led led-green';
        roundInfoSpan.innerText = '';
        progressDetail.innerText = '✅ Ready — copy values to pillar_config.json';
    }

    function updateCardValue(pillarId, field, value) {
        const el = document.getElementById(`${field}-${pillarId}`);
        if (el) el.innerText = value;
    }

    // --------------------------------------------------------------
    //  RENDER CARDS
    // --------------------------------------------------------------
    function renderCards() {
        if (!pillarGrid) return;
        let html = '';
        for (let id of pillarOrder) {
            const p = pillarData[id];
            if (!p) continue;
            const isMe = (id === myId);
            const speakerVal = (p.speakerDelayMs !== null && p.speakerDelayMs !== undefined) ? `${p.speakerDelayMs} ms` : '—';
            const micVal = (p.micDelayMs !== null && p.micDelayMs !== undefined) ? `${p.micDelayMs} ms` : '—';
            html += `
                <div class="pillar-card" data-pillar="${id}">
                    <div class="pillar-id">${p.label || id} ${isMe ? '📍' : ''}</div>
                    <div class="delay-row">🔊 Speaker: <span class="value" id="spk-${id}">${speakerVal}</span></div>
                    <div class="delay-row">🎤 Mic: <span class="value" id="mic-${id}">${micVal}</span></div>
                    <div class="delay-row">📍 Position: (${p.x}, ${p.y})</div>
                </div>
            `;
        }
        pillarGrid.innerHTML = html;
    }

    // --------------------------------------------------------------
    //  INIT
    // --------------------------------------------------------------
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const seatParam = urlParams.get('seat');
        if (!seatParam || !seatParam.startsWith('PILLAR_')) {
            document.body.innerHTML = '<div class="card"><h1>❌ Invalid seat</h1><p>Missing ?seat=PILLAR_XX parameter</p></div>';
            return;
        }
        myId = seatParam;
        addLog(`🚀 ${myId} Loaded`);

        document.getElementById('pillar-id-badge').innerText = myId;

        // Clock sync
        const offsetRef = db.ref(".info/serverTimeOffset");
        offsetRef.on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        await loadPillarConfig();
        startHeartbeat();
        renderCards();

        // Initialize logging after we have myId
        initLogging();

        // Start presence checking
        await checkAllPillarsOnline();
        presenceCheckInterval = setInterval(checkAllPillarsOnline, 5000);

        calibrateBtn.onclick = async () => {
            if (!allPillarsPresentFlag) {
                addLog('Waiting for all pillars to be online', 'warn');
                return;
            }
            await listenToTuningMovement();
        };

        addLog(`🚀 ${myId} ready. Click "Listen to Tuning Movement" to start.`, 'success');
        addLog(`   Initial speaker delay: ${mySpeakerDelay}ms, mic delay: ${myMicDelay}ms`, 'info');
        addLog(`   Will listen during Phase 1 of the tuning movement`, 'info');
    }

    window.onload = init;

    window.addEventListener('beforeunload', () => {
        stopHeartbeat();
        if (micStream) {
            micStream.getTracks().forEach(track => track.stop());
        }
        flushLogs();
    });
</script>
