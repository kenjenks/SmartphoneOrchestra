<body>
<div class="card">
    <h1>
        <span>🔧 Pillar Self‑Cal</span>
        <span class="badge" id="pillar-id-badge">—</span>
    </h1>
    <div class="status-panel" id="main-status">
        <div class="flex-between">
            <span><span class="status-led" id="state-led"></span> <span id="state-text">Loading...</span></span>
            <span id="round-info" class="small-text"></span>
        </div>
        <div id="progress-detail" class="small-text" style="margin-top: 8px;"></div>
    </div>

    <div class="pillar-grid" id="pillar-grid">
        <!-- populated dynamically -->
    </div>

    <button id="calibrate-btn" class="primary" disabled>🔊 Start Round‑Robin Calibration (MP3)</button>
    <div class="small-text" style="margin-top: 8px; text-align: center;">All four pillars must be online. Pressing start on ANY pillar triggers the sequence.</div>

    <div class="log" id="log-panel">
        <div class="log-entry">📡 waiting for pillar configuration...</div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  FIREBASE CONFIG
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --------------------------------------------------------------
    //  GLOBALS
    // --------------------------------------------------------------
    let myId = null;
    let allPillars = ['PILLAR_FL', 'PILLAR_FR', 'PILLAR_BR', 'PILLAR_BL'];
    let pillarData = {};           // keyed by pillar ID, contains all config
    let pillarOrder = [];          // from config
    let audioCtx = null;
    let bufferCache = {};
    let calibrationActive = false;
    let currentRoundRobin = null;
    let serverOffset = 0;

    // Active test tone oscillators (synthesized for audio balance only)
    let activeTestTones = {};

    const SPEED_OF_SOUND = 344;    // from your config
    const SILENT_WARMUP_MS = 100;
    const WARMUP_ADVANCE_MS = 500;

    // UI elements
    const calibrateBtn = document.getElementById('calibrate-btn');
    const stateTextSpan = document.getElementById('state-text');
    const stateLed = document.getElementById('state-led');
    const roundInfoSpan = document.getElementById('round-info');
    const progressDetail = document.getElementById('progress-detail');
    const pillarGrid = document.getElementById('pillar-grid');
    const logPanel = document.getElementById('log-panel');

    // --------------------------------------------------------------
    //  UTILITIES
    // --------------------------------------------------------------
    function addLog(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        div.innerHTML = `[${time}] ${msg}`;
        if (type === 'success') div.style.color = '#88ffcc';
        else if (type === 'warn') div.style.color = '#ffaa66';
        else div.style.color = '#aaa';
        logPanel.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logPanel.children.length > 60) logPanel.removeChild(logPanel.firstChild);
        console.log(`[PillarCal] ${msg}`);
    }

    function distanceBetween(p1, p2) {
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        return Math.sqrt(dx*dx + dy*dy);
    }

    function propagationMs(dist) {
        return (dist / SPEED_OF_SOUND) * 1000;
    }

    function median(arr) {
        if (!arr.length) return 0;
        const sorted = [...arr].sort((a,b)=>a-b);
        const mid = Math.floor(sorted.length/2);
        return sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid])/2;
    }

    function renderCards() {
        if (!pillarGrid) return;
        let html = '';
        for (let id of pillarOrder) {
            const p = pillarData[id];
            if (!p) continue;
            const isMe = (id === myId);
            const speakerVal = (p.speakerDelayMs !== null && p.speakerDelayMs !== undefined) ? `${p.speakerDelayMs} ms` : '—';
            const micVal = (p.micDelayMs !== null && p.micDelayMs !== undefined) ? `${p.micDelayMs} ms` : '—';
            const freqVal = p.preferred_freq || 440;
            const activeClass = (calibrationActive && currentRoundRobin?.currentPlayer === id) ? 'active' : '';
            const isTonePlaying = activeTestTones[id] ? true : false;
            const hasMp3 = !!p.audioUrl;
            html += `
                <div class="pillar-card ${activeClass}" data-pillar="${id}">
                    <div class="pillar-id">${p.label || id} ${isMe ? '📍' : ''}</div>
                    <div class="delay-row">🔊 Speaker: <span class="value" id="spk-${id}">${speakerVal}</span></div>
                    <div class="delay-row">🎤 Mic: <span class="value" id="mic-${id}">${micVal}</span></div>
                    <div class="delay-row">🎵 Test freq: <span class="value">${freqVal} Hz</span></div>
                    <div class="button-group">
                        <button class="test-tone-btn test-tone ${isTonePlaying ? 'active' : ''}" data-pillar="${id}" data-freq="${freqVal}">
                            ${isTonePlaying ? '🔊 Stop Balance Tone' : '▶️ Balance Tone'}
                        </button>
                        <button class="cal-tone-btn cal-tone" data-pillar="${id}" data-url="${p.audioUrl || ''}" ${!hasMp3 ? 'disabled' : ''}>
                            🎵 Play Cal MP3
                        </button>
                    </div>
                    <div class="small-text">📌 (${p.x}, ${p.y}) | stagger: ${p.stagger || 0}ms</div>
                </div>
            `;
        }
        pillarGrid.innerHTML = html;

        // Attach balance tone buttons (synthesized) — ALWAYS enabled
        document.querySelectorAll('.test-tone-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const pillarId = btn.dataset.pillar;
                const freq = parseFloat(btn.dataset.freq);
                toggleBalanceTone(pillarId, freq);
            });
        });

        // Attach calibration MP3 buttons (for manual testing) — ALWAYS enabled
        document.querySelectorAll('.cal-tone-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const pillarId = btn.dataset.pillar;
                const url = btn.dataset.url;
                if (url) {
                    playCalibrationMp3(pillarId, url, null);
                }
            });
        });
    }

    function updateCardValue(pillarId, field, value) {
        const el = document.getElementById(`${field}-${pillarId}`);
        if (el) el.innerText = value;
        if (pillarData[pillarId]) {
            if (field === 'spk') pillarData[pillarId].speakerDelayMs = value;
            else if (field === 'mic') pillarData[pillarId].micDelayMs = value;
        }
    }

    // --------------------------------------------------------------
    //  BALANCE TONE (synthesized, continuous, for audio balance)
    // --------------------------------------------------------------
    async function ensureAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        return audioCtx;
    }

    async function toggleBalanceTone(pillarId, frequency) {
        await ensureAudioContext();

        if (activeTestTones[pillarId]) {
            const tone = activeTestTones[pillarId];
            try {
                tone.gain.gain.setValueAtTime(tone.gain.gain.value, audioCtx.currentTime);
                tone.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
                setTimeout(() => {
                    tone.oscillator.stop();
                    tone.oscillator.disconnect();
                    tone.gain.disconnect();
                }, 100);
            } catch(e) { /* ignore */ }
            delete activeTestTones[pillarId];
            addLog(`🔇 Stopped balance tone for ${pillarId}`, 'info');
            renderCards();
        } else {
            try {
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gain.gain.value = 0.25;  // comfortable listening level
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.start();
                activeTestTones[pillarId] = { oscillator, gain };
                addLog(`🔊 Playing balance tone for ${pillarId} at ${frequency} Hz (synthesized)`, 'success');
                renderCards();
            } catch(e) {
                addLog(`❌ Failed to start balance tone for ${pillarId}: ${e.message}`, 'warn');
            }
        }
    }

    function stopAllBalanceTones() {
        for (let pillarId of Object.keys(activeTestTones)) {
            const tone = activeTestTones[pillarId];
            try {
                tone.gain.gain.setValueAtTime(tone.gain.gain.value, audioCtx.currentTime);
                tone.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
                setTimeout(() => {
                    tone.oscillator.stop();
                    tone.oscillator.disconnect();
                    tone.gain.disconnect();
                }, 100);
            } catch(e) { /* ignore */ }
        }
        activeTestTones = {};
        addLog(`🔇 All balance tones stopped`, 'info');
        renderCards();
    }

    // --------------------------------------------------------------
    //  CALIBRATION MP3 PLAYBACK (with warm-up to prime hardware)
    // --------------------------------------------------------------
    async function preloadCalibrationMp3(url, pillarId) {
        if (bufferCache[url]) return bufferCache[url];
        try {
            const res = await fetch(url);
            const arrayBuf = await res.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
            bufferCache[url] = audioBuffer;
            addLog(`📦 Preloaded calibration MP3 for ${pillarId}`);
            return audioBuffer;
        } catch(e) {
            addLog(`❌ Failed to load MP3 for ${pillarId}: ${e.message}`, 'warn');
            return null;
        }
    }

    async function playCalibrationMp3(pillarId, url, scheduledStartServerTime) {
        await ensureAudioContext();

        const audioBuffer = await preloadCalibrationMp3(url, pillarId);
        if (!audioBuffer) return false;

        const nowServer = Date.now() + serverOffset;
        let startDelayMs = 0;

        if (scheduledStartServerTime !== null) {
            // Scheduled playback for round-robin
            const speakerDelay = pillarData[pillarId]?.speakerDelayMs || 45;
            const adjustedStartServer = scheduledStartServerTime - speakerDelay;
            startDelayMs = adjustedStartServer - nowServer;

            if (startDelayMs > 0) {
                addLog(`🎵 ${pillarId} calibration MP3 scheduled in ${Math.round(startDelayMs)}ms (server time)`);
                setTimeout(() => {
                    actuallyPlayMp3(audioBuffer, pillarId, scheduledStartServerTime);
                }, startDelayMs);
                return true;
            } else if (startDelayMs > -500) {
                addLog(`⚠️ ${pillarId} calibration MP3 is ${Math.round(-startDelayMs)}ms late, playing immediately`);
                actuallyPlayMp3(audioBuffer, pillarId, scheduledStartServerTime);
                return true;
            } else {
                addLog(`❌ ${pillarId} calibration MP3 too late (${Math.round(-startDelayMs)}ms), skipping`);
                return false;
            }
        } else {
            // Manual playback for testing — play immediately
            addLog(`🎵 Playing calibration MP3 for ${pillarId} manually`);
            actuallyPlayMp3(audioBuffer, pillarId, null);
            return true;
        }
    }

    function actuallyPlayMp3(audioBuffer, pillarId, scheduledStartServerTime) {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        const gainNode = audioCtx.createGain();

        // Apply a quick fade to avoid clicks
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.01);

        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        source.start(0);

        // Fade out at the end
        const duration = audioBuffer.duration;
        gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime + duration - 0.05);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

        if (scheduledStartServerTime !== null) {
            const actualStartServer = Date.now() + serverOffset;
            const rawDelay = actualStartServer - scheduledStartServerTime;
            addLog(`🔊 ${pillarId} MP3 played: scheduled offset = ${rawDelay > 0 ? '+' : ''}${rawDelay.toFixed(1)}ms (server time)`, 'success');
        } else {
            addLog(`🔊 ${pillarId} MP3 played (manual test)`);
        }
    }

    // Warm-up: play silent MP3 to prime hardware path
    async function warmUpCalibrationMp3(url, pillarId) {
        await ensureAudioContext();
        const audioBuffer = await preloadCalibrationMp3(url, pillarId);
        if (!audioBuffer) return;

        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        source.connect(gainNode).connect(audioCtx.destination);
        source.start(0);
        source.stop(audioCtx.currentTime + (SILENT_WARMUP_MS / 1000));
        addLog(`🔇 Warm-up pulse for ${pillarId} (priming MP3 path)`);
    }

    // --------------------------------------------------------------
    //  LOAD PILLAR CONFIG
    // --------------------------------------------------------------
    async function loadPillarConfig() {
        const snap = await db.ref('pillar_config').once('value');
        const config = snap.val();
        if (!config || !config.pillars) {
            addLog('❌ No pillar_config found in Firebase', 'warn');
            return false;
        }

        // Convert array to object keyed by id
        pillarData = {};
        for (let p of config.pillars) {
            pillarData[p.id] = {
                id: p.id,
                label: p.label,
                x: p.x,
                y: p.y,
                preferred_freq: p.preferred_freq || 440,
                stagger: p.stagger || 0,
                audioUrl: p.audioUrl || null,
                speakerDelayMs: p.speakerDelayMs ?? 45,  // Default from config
                micDelayMs: p.micDelayMs ?? 18          // Default from config
            };
        }

        pillarOrder = config.pillarOrder || allPillars;

        // Check for required fields
        for (let id of pillarOrder) {
            const p = pillarData[id];
            if (!p) {
                addLog(`⚠️ Missing config for ${id}`, 'warn');
                return false;
            }
            if (p.x === undefined || p.y === undefined) {
                addLog(`⚠️ Missing coordinates for ${id}`, 'warn');
                return false;
            }
            if (!p.audioUrl) {
                addLog(`⚠️ Missing audioUrl for ${id} — calibration will fail`, 'warn');
            }
        }

        addLog(`✅ Loaded ${pillarOrder.length} pillar configurations`, 'success');

        // Preload all calibration MP3s
        for (let id of pillarOrder) {
            const url = pillarData[id]?.audioUrl;
            if (url) {
                await preloadCalibrationMp3(url, id);
            }
        }

        renderCards();
        return true;
    }

    // --------------------------------------------------------------
    //  CHECK PRESENCE (all pillars online)
    // --------------------------------------------------------------
    let allPillarsPresent = false;
    let presenceCheckInterval = null;

    async function checkAllPillarsOnline() {
        const snap = await db.ref('devices').once('value');
        const devices = snap.val() || {};
        const now = Date.now() + serverOffset;
        const timeout = 12100;
        let missing = [];
        for (let id of pillarOrder) {
            const dev = devices[id];
            if (!dev || !dev.lastSeen || (now - dev.lastSeen) > timeout) missing.push(id);
        }
        const allOnline = missing.length === 0;
        if (allOnline !== allPillarsPresent) {
            allPillarsPresent = allOnline;
            if (allOnline) {
                addLog(`✅ All ${pillarOrder.length} pillars are online — ready to calibrate`, 'success');
                stateTextSpan.innerText = 'All pillars ready';
                stateLed.className = 'status-led led-green';
                calibrateBtn.disabled = false;
            } else {
                addLog(`⏳ Waiting for pillars: ${missing.join(', ')}`, 'warn');
                stateTextSpan.innerText = `Waiting: ${missing.join(', ')}`;
                stateLed.className = 'status-led led-red';
                calibrateBtn.disabled = true;
            }
        }
    }

    // --------------------------------------------------------------
    //  ROUND-ROBIN COORDINATION
    // --------------------------------------------------------------
    const CAL_PATH = 'pillar_calibration';
    let calRef = null;

    async function startRoundRobin() {
        if (calibrationActive) {
            addLog('Calibration already active', 'warn');
            return;
        }
        if (!allPillarsPresent) {
            addLog('Not all pillars are online – cannot start', 'warn');
            return;
        }

        // Stop any balance tones during calibration
        stopAllBalanceTones();

        await db.ref(CAL_PATH).remove();
        const startTimeServer = Date.now() + serverOffset + 3000; // +3s buffer
        const initState = {
            status: 'running',
            currentPlayer: pillarOrder[0],
            round: 0,
            startTime: startTimeServer,
            measurements: {}
        };
        await db.ref(CAL_PATH).set(initState);
        addLog(`🔊 Round-robin initiated by ${myId} — first player ${pillarOrder[0]} at ${new Date(startTimeServer).toLocaleTimeString()} (server time)`, 'success');
    }

    function listenCalibration() {
        calRef = db.ref(CAL_PATH);
        calRef.on('value', async (snap) => {
            const data = snap.val();
            if (!data || data.status !== 'running') {
                if (calibrationActive && (!data || data.status === 'complete')) {
                    addLog('🏁 Calibration sequence finished — computing results', 'success');
                    calibrationActive = false;
                    computeAllDelays();
                } else if (!data) {
                    calibrationActive = false;
                }
                return;
            }
            calibrationActive = true;
            const { currentPlayer, startTime: scheduledStartServer, round } = data;
            roundInfoSpan.innerText = `Round ${round+1}/${pillarOrder.length} · playing: ${currentPlayer}`;
            progressDetail.innerText = `Next play at ${new Date(scheduledStartServer).toLocaleTimeString()}`;
            renderCards();

            if (myId === currentPlayer && !window._scheduledPlay) {
                window._scheduledPlay = true;
                const nowServer = Date.now() + serverOffset;
                const warmUpTime = scheduledStartServer - WARMUP_ADVANCE_MS;
                const warmUpDelay = warmUpTime - nowServer - (pillarData[myId]?.speakerDelayMs || 45);

                // Warm-up to prime MP3 path
                if (warmUpDelay > 0 && pillarData[myId]?.audioUrl) {
                    setTimeout(() => {
                        warmUpCalibrationMp3(pillarData[myId].audioUrl, myId);
                    }, warmUpDelay);
                }

                // Schedule main playback
                const playDelay = scheduledStartServer - nowServer - (pillarData[myId]?.speakerDelayMs || 45);
                if (playDelay > 0 && pillarData[myId]?.audioUrl) {
                    setTimeout(() => {
                        playCalibrationMp3(myId, pillarData[myId].audioUrl, scheduledStartServer);
                    }, playDelay);
                    addLog(`🎵 ${myId} calibration MP3 scheduled in ${Math.round(playDelay)}ms (server time)`);
                } else if (playDelay > -500 && pillarData[myId]?.audioUrl) {
                    addLog(`⚠️ ${myId} MP3 is ${Math.round(-playDelay)}ms late, playing immediately`);
                    playCalibrationMp3(myId, pillarData[myId].audioUrl, scheduledStartServer);
                } else if (!pillarData[myId]?.audioUrl) {
                    addLog(`❌ No audioUrl for ${myId}, cannot play calibration tone`, 'warn');
                }

                setTimeout(() => { window._scheduledPlay = false; }, 6000);
            }

            if (!window._listeningForTone && scheduledStartServer) {
                window._listeningForTone = true;
                const nowServer = Date.now() + serverOffset;
                if (Math.abs(scheduledStartServer - nowServer) < 5000) {
                    await ensureMicrophone();
                    scheduleOnsetDetection(scheduledStartServer, currentPlayer);
                }
                setTimeout(() => { window._listeningForTone = false; }, 8000);
            }
        });
    }

    // Microphone setup
    let analyser = null;
    let micStream = null;
    let isMicActive = false;

    async function ensureMicrophone() {
        if (isMicActive) return;
        await ensureAudioContext();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            micStream = stream;
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            source.connect(analyser);
            isMicActive = true;
            addLog('🎤 Microphone ready for onset detection');
        } catch(e) {
            addLog(`❌ Microphone error: ${e.message}`, 'warn');
        }
    }

    function scheduleOnsetDetection(expectedTimeServer, playerId) {
        const nowServer = Date.now() + serverOffset;
        let delay = expectedTimeServer - nowServer;
        if (delay < 0) delay = 0;
        setTimeout(() => {
            detectOnset(playerId, expectedTimeServer);
        }, delay);
    }

    async function detectOnset(playerId, expectedTimeServer) {
        if (!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        let maxEnergy = 0;
        let onsetTimeServer = null;
        const startSearch = performance.now();
        const timeout = 2000;
        while ((performance.now() - startSearch) < timeout && !onsetTimeServer) {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const avg = sum / dataArray.length;
            if (avg > 12 && avg > maxEnergy) {
                maxEnergy = avg;
                onsetTimeServer = Date.now() + serverOffset;  // Convert to server time
            }
            await new Promise(r => setTimeout(r, 10));
        }
        if (onsetTimeServer) {
            const rawDelay = onsetTimeServer - expectedTimeServer;
            addLog(`🔍 Detected ${playerId} tone → raw delay = ${rawDelay.toFixed(1)} ms (server time)`);
            const roundPath = `${CAL_PATH}/measurements/${playerId}/${myId}`;
            await db.ref(roundPath).set({
                rawDelayMs: rawDelay,
                listenerId: myId,
                timestamp: onsetTimeServer,
                expectedTime: expectedTimeServer
            });
        } else {
            addLog(`⚠️ Could not detect tone from ${playerId} (timeout)`, 'warn');
        }
    }

    // --------------------------------------------------------------
    //  SOLVE DELAYS (starting from existing config values)
    // --------------------------------------------------------------
    async function computeAllDelays() {
        const snap = await db.ref(`${CAL_PATH}/measurements`).once('value');
        const allMeas = snap.val() || {};
        if (Object.keys(allMeas).length < pillarOrder.length * (pillarOrder.length - 1) - 2) {
            addLog(`⚠️ Not enough measurements – try again`, 'warn');
            return;
        }

        // Initialize with existing values from pillar_config.json
        let spk = {}, mic = {};
        for (let id of pillarOrder) {
            spk[id] = pillarData[id].speakerDelayMs ?? 45;
            mic[id] = pillarData[id].micDelayMs ?? 18;
        }

        const iterations = 6;
        for (let iter = 0; iter < iterations; iter++) {
            // Update speaker estimates
            for (let player of pillarOrder) {
                let values = [];
                for (let listener of pillarOrder) {
                    if (listener === player) continue;
                    const raw = allMeas[player]?.[listener]?.rawDelayMs;
                    if (raw === undefined) continue;
                    const dist = distanceBetween(pillarData[player], pillarData[listener]);
                    const prop = propagationMs(dist);
                    const est = raw - prop - mic[listener];
                    if (isFinite(est) && Math.abs(est) < 300) values.push(est);
                }
                if (values.length) spk[player] = median(values);
            }

            // Update mic estimates
            for (let listener of pillarOrder) {
                let values = [];
                for (let player of pillarOrder) {
                    if (player === listener) continue;
                    const raw = allMeas[player]?.[listener]?.rawDelayMs;
                    if (raw === undefined) continue;
                    const dist = distanceBetween(pillarData[player], pillarData[listener]);
                    const prop = propagationMs(dist);
                    const est = raw - spk[player] - prop;
                    if (isFinite(est) && Math.abs(est) < 150) values.push(est);
                }
                if (values.length) mic[listener] = median(values);
            }
        }

        // Display final results
        for (let id of pillarOrder) {
            let spkVal = Math.round(Math.max(5, Math.min(300, spk[id])));
            let micVal = Math.round(Math.max(2, Math.min(150, mic[id])));
            updateCardValue(id, 'spk', `${spkVal} ms`);
            updateCardValue(id, 'mic', `${micVal} ms`);
            pillarData[id].speakerDelayMs = spkVal;
            pillarData[id].micDelayMs = micVal;
        }
        addLog(`✅ Calibration solved! Speaker & mic delays displayed above.`, 'success');
        addLog(`📋 Copy these values into pillar_config.json manually.`, 'success');
        stateTextSpan.innerText = 'Calibration complete';
        stateLed.className = 'status-led led-green';
        roundInfoSpan.innerText = '';
        progressDetail.innerText = '✅ Ready — copy values to pillar_config.json';
    }

    // --------------------------------------------------------------
    //  INIT
    // --------------------------------------------------------------
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const seatParam = urlParams.get('seat');
        if (!seatParam || !seatParam.startsWith('PILLAR_')) {
            document.body.innerHTML = '<div class="card"><h1>❌ Invalid seat</h1><p>Missing ?seat=PILLAR_XX parameter</p></div>';
            return;
        }
        myId = seatParam;
        document.getElementById('pillar-id-badge').innerText = myId;

        // Clock sync
        const offsetRef = db.ref(".info/serverTimeOffset");
        offsetRef.on("value", snap => {
            serverOffset = snap.val() || 0;
            addLog(`⏱️ Server offset: ${serverOffset}ms`, 'info');
        });

        await ensureAudioContext();
        const configOk = await loadPillarConfig();
        if (!configOk) return;

        await ensureMicrophone();

        checkAllPillarsOnline();
        presenceCheckInterval = setInterval(checkAllPillarsOnline, 5000);
        listenCalibration();

        calibrateBtn.onclick = async () => {
            if (!allPillarsPresent) { addLog('Waiting for all pillars to be online', 'warn'); return; }
            await startRoundRobin();
        };

        renderCards();
        addLog(`🚀 ${myId} ready.`, 'success');
        addLog(`   🎵 Balance Tone: synthesized sine wave for audio balance (always available)`, 'info');
        addLog(`   📀 Cal MP3: uses pre-recorded MP3 to measure actual speaker delay`, 'info');
        addLog(`   ⏱️ All timing uses Firebase server time for consistency`, 'info');
        addLog(`   📊 Starting speaker/mic delays from pillar_config.json: spk=${pillarData[myId]?.speakerDelayMs}ms, mic=${pillarData[myId]?.micDelayMs}ms`, 'info');
    }

    window.onload = init;
</script>
