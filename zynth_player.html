<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Player - Tri-Tone Pattern Generator</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff3366;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .pattern-badge {
            background: #ff3366;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
            line-height: 2;
        }
        .control-group {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .control-label {
            color: #ff3366;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #444;
            transform: scale(1.02);
        }
        button.primary {
            background: #ff3366;
            color: white;
            border: none;
            grid-column: span 2;
            font-size: 1.5rem;
            padding: 20px;
        }
        button.primary:hover {
            background: #cc2952;
        }
        .status-box {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            margin: 20px 0;
            border-left: 4px solid #ff3366;
        }
        .indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            gap: 10px;
        }
        .pattern-led {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s ease;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .pattern-led.active {
            background: #ff3366;
            box-shadow: 0 0 40px #ff3366;
            border-color: white;
        }
        .pattern-led.completed {
            background: #00ffcc;
            box-shadow: 0 0 40px #00ffcc;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dotted #222;
        }
        .slider-container {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #888;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff3366;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ff3366;
        }
        .value-display {
            color: #ff3366;
            font-weight: bold;
        }
        .pattern-guide {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            color: #888;
            font-size: 1rem;
        }
        .pattern-guide span {
            color: #ff3366;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Zynth Player</h1>
        <div class="subtitle">Tri-Tone Pattern Generator</div>

        <div class="pattern-badge">
            1234 Hz<br>⬇️<br>900 Hz<br>⬆️<br>1234 Hz
        </div>

        <div class="pattern-guide">
            <span>High</span>
            <span>→</span>
            <span>Low</span>
            <span>→</span>
            <span>High</span>
        </div>

        <div class="control-group">
            <div class="control-label">Pattern Settings</div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Tone Duration</span>
                    <span class="value-display" id="duration-value">300 ms</span>
                </div>
                <input type="range" id="duration-slider" min="100" max="500" value="300" step="10">
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Volume</span>
                    <span class="value-display" id="volume-value">70%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="70" step="1">
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Gap between tones</span>
                    <span class="value-display" id="gap-value">100 ms</span>
                </div>
                <input type="range" id="gap-slider" min="0" max="300" value="100" step="10">
            </div>
        </div>

        <div class="button-grid">
            <button class="primary" onclick="playPattern()">🔴 PLAY TRI-TONE PATTERN</button>
            <button onclick="playRepeating()">🔄 Repeat (3x)</button>
            <button onclick="stopAll()">⏹️ Stop</button>
            <button onclick="initAudio()">🔊 Init Audio</button>
        </div>

        <div class="status-box">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Audio context:</span>
                <span id="audio-state" style="color: #ffcc00;">not initialized</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Pattern progress:</span>
                <span id="pattern-progress" style="color: #ff3366;">Ready</span>
            </div>
        </div>

        <div class="indicator">
            <div class="pattern-led" id="led1">1</div>
            <div class="pattern-led" id="led2">2</div>
            <div class="pattern-led" id="led3">3</div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] Zynth Player ready - tri-tone pattern generator</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let isPlaying = false;
        let repeatTimeout = null;
        let currentTimeout = null;

        const PATTERN = [1234, 900, 1234]; // High, Low, High

        // ============================================
        // Initialize audio
        // ============================================
        async function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    log("✅ AudioContext created");
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                    log("✅ AudioContext resumed");
                }

                document.getElementById('audio-state').innerText = audioCtx.state;
                document.getElementById('audio-state').style.color = '#00ffcc';

            } catch (e) {
                log(`❌ Audio init failed: ${e.message}`);
            }
        }

        // ============================================
        // UI Controls
        // ============================================
        document.getElementById('duration-slider').addEventListener('input', (e) => {
            document.getElementById('duration-value').innerText = e.target.value + ' ms';
        });

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            document.getElementById('volume-value').innerText = e.target.value + '%';
        });

        document.getElementById('gap-slider').addEventListener('input', (e) => {
            document.getElementById('gap-value').innerText = e.target.value + ' ms';
        });

        // ============================================
        // Play a single tone
        // ============================================
        function playTone(frequency, duration, volume, callback) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + duration - 0.01);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);

            return oscillator;
        }

        // ============================================
        // Play the full tri-tone pattern
        // ============================================
        async function playPattern() {
            try {
                await initAudio();

                // Stop any current playback
                stopAll();

                const toneDuration = parseInt(document.getElementById('duration-slider').value) / 1000;
                const gapDuration = parseInt(document.getElementById('gap-slider').value) / 1000;
                const volume = parseInt(document.getElementById('volume-slider').value) / 100;

                document.getElementById('pattern-progress').innerText = 'Playing...';

                // Reset LEDs
                document.getElementById('led1').classList.remove('active', 'completed');
                document.getElementById('led2').classList.remove('active', 'completed');
                document.getElementById('led3').classList.remove('active', 'completed');

                log(`🎵 Playing tri-tone pattern: 1234Hz → 900Hz → 1234Hz`);

                // Play first tone (1234 Hz)
                setTimeout(() => {
                    document.getElementById('led1').classList.add('active');
                    playTone(1234, toneDuration, volume);
                    log(`⬆️ Tone 1: 1234 Hz`);

                    setTimeout(() => {
                        document.getElementById('led1').classList.remove('active');
                        document.getElementById('led1').classList.add('completed');
                    }, toneDuration * 1000);
                }, 0);

                // Play second tone (900 Hz)
                setTimeout(() => {
                    document.getElementById('led2').classList.add('active');
                    playTone(900, toneDuration, volume);
                    log(`⬇️ Tone 2: 900 Hz`);

                    setTimeout(() => {
                        document.getElementById('led2').classList.remove('active');
                        document.getElementById('led2').classList.add('completed');
                    }, toneDuration * 1000);
                }, (toneDuration + gapDuration) * 1000);

                // Play third tone (1234 Hz)
                setTimeout(() => {
                    document.getElementById('led3').classList.add('active');
                    playTone(1234, toneDuration, volume);
                    log(`⬆️ Tone 3: 1234 Hz`);

                    setTimeout(() => {
                        document.getElementById('led3').classList.remove('active');
                        document.getElementById('led3').classList.add('completed');
                        document.getElementById('pattern-progress').innerText = 'Complete';

                        setTimeout(() => {
                            document.getElementById('led1').classList.remove('completed');
                            document.getElementById('led2').classList.remove('completed');
                            document.getElementById('led3').classList.remove('completed');
                        }, 1000);
                    }, toneDuration * 1000);
                }, (toneDuration + gapDuration) * 2000);

            } catch (e) {
                log(`❌ Playback failed: ${e.message}`);
            }
        }

        // ============================================
        // Play repeating patterns
        // ============================================
        function playRepeating() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }

            let count = 0;
            const maxCount = 3;
            const patternDuration = (parseInt(document.getElementById('duration-slider').value) * 3 +
                                    parseInt(document.getElementById('gap-slider').value) * 2) + 500;

            function playNext() {
                if (count < maxCount) {
                    playPattern();
                    count++;
                    repeatTimeout = setTimeout(playNext, patternDuration);
                } else {
                    repeatTimeout = null;
                    log("✅ Repeating pattern complete");
                }
            }

            log(`🔄 Playing ${maxCount} tri-tone patterns...`);
            playNext();
        }

        // ============================================
        // Stop all playback
        // ============================================
        function stopAll() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }

            if (currentTimeout) {
                clearTimeout(currentTimeout);
                currentTimeout = null;
            }

            // Note: Can't easily stop already-playing oscillators
            // but we can prevent new ones and reset UI

            document.getElementById('pattern-progress').innerText = 'Stopped';
            document.getElementById('led1').classList.remove('active', 'completed');
            document.getElementById('led2').classList.remove('active', 'completed');
            document.getElementById('led3').classList.remove('active', 'completed');

            log("⏹️ Stopped");
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div class="log-entry">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Auto-init on first button click
        // ============================================
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
            });
        });

        // Initial log
        log("System ready - tri-tone pattern: 1234Hz → 900Hz → 1234Hz");
    </script>
</body>
</html>
