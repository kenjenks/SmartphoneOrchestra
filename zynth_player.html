<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Player - FSK with Start/Stop Bits</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ffcc;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .code-display {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
        }
        .frame-diagram {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 20px 0;
            padding: 15px;
            background: #000;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .frame-part {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .wakeup { background: #ff3366; color: white; }
        .start { background: #ffcc00; color: black; }
        .data { background: #00ffcc; color: black; }
        .stop { background: #9933ff; color: white; }
        .control-group {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .control-label {
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #444;
            transform: scale(1.02);
        }
        button.primary {
            background: #00ffcc;
            color: #000;
            border: none;
            grid-column: span 2;
            font-size: 1.5rem;
            padding: 20px;
        }
        button.primary:hover {
            background: #00cca3;
        }
        .binary-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            flex-wrap: wrap;
        }
        .bit {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.1s;
            margin: 2px;
        }
        .bit.active {
            background: #00ffcc;
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px #00ffcc;
        }
        .status-box {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            margin: 20px 0;
            border-left: 4px solid #00ffcc;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Zynth Player</h1>
        <div class="subtitle">FSK with Start/Stop Bits</div>

        <div class="code-display" id="code-display">1100101010110011</div>

        <div class="frame-diagram">
            <span class="frame-part wakeup">WAKEUP (500ms)</span>
            <span class="frame-part start">START (200ms)</span>
            <span class="frame-part data">16 DATA BITS</span>
            <span class="frame-part stop">STOP (200ms)</span>
        </div>

        <div class="control-group">
            <div class="control-label">Data Bits</div>
            <div class="binary-row" id="binary-row"></div>
            <div style="margin: 15px 0; color: #888; text-align: center;">
                <span style="color: #ff3366;">⬆️ Wake/Start/Stop = 1234 Hz</span> |
                <span>0 = 900 Hz</span> |
                <span>1 = 1234 Hz</span>
            </div>
        </div>

        <div class="button-grid">
            <button class="primary" onclick="transmitFrame()">📡 TRANSMIT FRAME</button>
            <button onclick="generateNewCode()">🔄 New Random Code</button>
            <button onclick="transmitRepeating()">🔁 Transmit 3x</button>
            <button onclick="stopAll()">⏹️ Stop</button>
        </div>

        <div class="status-box">
            <div style="display: flex; justify-content: space-between;">
                <span>Status:</span>
                <span id="transmit-status" style="color: #00ffcc;">Ready</span>
            </div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] FSK encoder ready</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let isTransmitting = false;
        let repeatTimeout = null;

        // FSK parameters
        const FREQ_0 = 900;     // 0 bit
        const FREQ_1 = 1234;    // 1 bit (also used for wake/start/stop)
        const WAKE_DURATION = 500;    // ms - long wake-up tone
        const START_DURATION = 200;    // ms - start bit
        const BIT_DURATION = 150;      // ms per data bit (slightly longer for reliability)
        const STOP_DURATION = 200;     // ms - stop bit

        let currentCode = '1100101010110011'; // 16-bit code

        // ============================================
        // Initialize
        // ============================================
        function generateBinaryRow() {
            const row = document.getElementById('binary-row');
            row.innerHTML = '';
            for (let i = 0; i < currentCode.length; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                bit.id = `bit-${i}`;
                bit.innerText = currentCode[i];
                row.appendChild(bit);
            }
        }

        function generateNewCode() {
            let code = '';
            for (let i = 0; i < 16; i++) {
                code += Math.random() > 0.5 ? '1' : '0';
            }
            currentCode = code;
            document.getElementById('code-display').innerText = code;
            generateBinaryRow();
            log(`🔄 New code generated: ${code}`);
        }

        generateBinaryRow();

        // ============================================
        // Audio initialization
        // ============================================
        async function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    log("✅ AudioContext created");
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                    log("✅ AudioContext resumed");
                }

            } catch (e) {
                log(`❌ Audio init failed: ${e.message}`);
            }
        }

        // ============================================
        // Play a tone with promise
        // ============================================
        function playTone(frequency, duration, volume = 0.7) {
            return new Promise((resolve) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;

                // Smooth envelope
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + duration - 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                setTimeout(resolve, duration * 1000);
            });
        }

        // ============================================
        // Highlight a bit
        // ============================================
        function highlightBit(index, active) {
            const bit = document.getElementById(`bit-${index}`);
            if (bit) {
                if (active) {
                    bit.classList.add('active');
                } else {
                    bit.classList.remove('active');
                }
            }
        }

        // ============================================
        // Transmit complete frame
        // ============================================
        async function transmitFrame() {
            try {
                await initAudio();

                if (isTransmitting) {
                    log("⏸️ Already transmitting");
                    return;
                }

                isTransmitting = true;
                document.getElementById('transmit-status').innerText = 'Transmitting...';

                log(`📡 Transmitting frame with code: ${currentCode}`);

                // Clear all highlights
                for (let i = 0; i < 16; i++) {
                    highlightBit(i, false);
                }

                // 1. WAKE-UP TONE (longer to ensure receiver is ready)
                log("🔊 WAKE-UP tone (500ms)");
                await playTone(FREQ_1, WAKE_DURATION / 1000, 0.8);

                // 2. START BIT
                log("🔊 START bit (200ms)");
                await playTone(FREQ_1, START_DURATION / 1000, 0.8);

                // 3. DATA BITS (16 bits)
                for (let i = 0; i < currentCode.length; i++) {
                    const bit = currentCode[i];
                    const freq = bit === '1' ? FREQ_1 : FREQ_0;

                    highlightBit(i, true);
                    log(`Bit ${i+1}/16: ${bit} (${freq} Hz)`);

                    await playTone(freq, BIT_DURATION / 1000, 0.6);

                    highlightBit(i, false);

                    // Small gap between bits for clarity
                    if (i < currentCode.length - 1) {
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }

                // 4. STOP BIT
                log("🔊 STOP bit (200ms)");
                await playTone(FREQ_1, STOP_DURATION / 1000, 0.8);

                log("✅ Frame transmission complete");
                document.getElementById('transmit-status').innerText = 'Complete';

                setTimeout(() => {
                    document.getElementById('transmit-status').innerText = 'Ready';
                    isTransmitting = false;
                }, 500);

            } catch (e) {
                log(`❌ Transmission failed: ${e.message}`);
                isTransmitting = false;
            }
        }

        // ============================================
        // Transmit multiple times
        // ============================================
        async function transmitRepeating() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }

            let count = 0;
            const maxCount = 3;

            const transmitNext = async () => {
                if (count < maxCount && !isTransmitting) {
                    await transmitFrame();
                    count++;
                    // Wait longer between transmissions
                    repeatTimeout = setTimeout(transmitNext, 2000);
                } else {
                    repeatTimeout = null;
                    log("✅ Repeating transmissions complete");
                }
            };

            log(`🔄 Transmitting frame ${maxCount} times`);
            transmitNext();
        }

        // ============================================
        // Stop all
        // ============================================
        function stopAll() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }
            isTransmitting = false;
            document.getElementById('transmit-status').innerText = 'Stopped';
            for (let i = 0; i < 16; i++) {
                highlightBit(i, false);
            }
            log("⏹️ Stopped");
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div class="log-entry">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // Auto-init
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
            });
        });

        log("System ready - FSK with start/stop bits");
    </script>
</body>
</html>
