<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Player - Digital Encoder</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ffcc;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .code-display {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 20px;
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
        }
        .control-group {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .control-label {
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #444;
            transform: scale(1.02);
        }
        button.primary {
            background: #00ffcc;
            color: #000;
            border: none;
            grid-column: span 2;
            font-size: 1.5rem;
            padding: 20px;
        }
        button.primary:hover {
            background: #00cca3;
        }
        .binary-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 8px;
        }
        .bit {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.1s;
        }
        .bit.active {
            background: #00ffcc;
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px #00ffcc;
        }
        .status-box {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            margin: 20px 0;
            border-left: 4px solid #00ffcc;
        }
        .indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            gap: 10px;
        }
        .sync-led {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s;
        }
        .sync-led.active {
            background: #00ffcc;
            box-shadow: 0 0 30px #00ffcc;
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Zynth Player</h1>
        <div class="subtitle">Digital Encoder - 16-bit Secure Code</div>

        <div class="code-display" id="code-display">1011001110001101</div>

        <div class="control-group">
            <div class="control-label">Signal Settings</div>

            <div class="binary-row" id="binary-row">
                <!-- Bits will be generated here by JS -->
            </div>

            <div style="margin: 15px 0; color: #888; text-align: center;">
                <span>0 = 900 Hz</span> | <span>1 = 1234 Hz</span>
            </div>
        </div>

        <div class="button-grid">
            <button class="primary" onclick="transmitCode()">📡 TRANSMIT CODE</button>
            <button onclick="generateNewCode()">🔄 New Random Code</button>
            <button onclick="transmitRepeating()">🔁 Transmit 5x</button>
            <button onclick="stopAll()">⏹️ Stop</button>
        </div>

        <div class="status-box">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Audio context:</span>
                <span id="audio-state" style="color: #ffcc00;">not initialized</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Transmitting:</span>
                <span id="transmit-status" style="color: #00ffcc;">Ready</span>
            </div>
        </div>

        <div class="indicator">
            <div class="sync-led" id="sync1"></div>
            <div class="sync-led" id="sync2"></div>
            <div class="sync-led" id="sync3"></div>
            <div class="sync-led" id="sync4"></div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] Digital encoder ready</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let isTransmitting = false;
        let repeatTimeout = null;

        // FSK parameters
        const FREQ_0 = 900;  // 0 bit
        const FREQ_1 = 1234; // 1 bit
        const BIT_DURATION = 100; // ms per bit
        const PREAMBLE_DURATION = 200; // ms of preamble tone
        const POSTAMBLE_DURATION = 200; // ms of postamble tone

        let currentCode = '1011001110001101'; // 16-bit code

        // ============================================
        // Initialize
        // ============================================
        function generateBinaryRow() {
            const row = document.getElementById('binary-row');
            row.innerHTML = '';
            for (let i = 0; i < currentCode.length; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                bit.id = `bit-${i}`;
                bit.innerText = currentCode[i];
                row.appendChild(bit);
            }
        }

        function generateNewCode() {
            // Generate random 16-bit code
            let code = '';
            for (let i = 0; i < 16; i++) {
                code += Math.random() > 0.5 ? '1' : '0';
            }
            currentCode = code;
            document.getElementById('code-display').innerText = code;
            generateBinaryRow();
            log(`🔄 New code generated: ${code}`);
        }

        generateBinaryRow();

        // ============================================
        // Audio initialization
        // ============================================
        async function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    log("✅ AudioContext created");
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                    log("✅ AudioContext resumed");
                }

                document.getElementById('audio-state').innerText = audioCtx.state;
                document.getElementById('audio-state').style.color = '#00ffcc';

            } catch (e) {
                log(`❌ Audio init failed: ${e.message}`);
            }
        }

        // ============================================
        // Play a single tone
        // ============================================
        function playTone(frequency, duration, volume = 0.5, callback) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;

            // Smooth envelope
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + duration - 0.01);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();

            if (callback) {
                setTimeout(callback, duration * 1000);
            }

            return oscillator;
        }

        // ============================================
        // Update sync LEDs
        // ============================================
        function setSyncLED(step) {
            document.getElementById('sync1').classList.remove('active');
            document.getElementById('sync2').classList.remove('active');
            document.getElementById('sync3').classList.remove('active');
            document.getElementById('sync4').classList.remove('active');

            if (step === 'preamble') {
                document.getElementById('sync1').classList.add('active');
            } else if (step === 'data') {
                document.getElementById('sync2').classList.add('active');
            } else if (step === 'postamble') {
                document.getElementById('sync3').classList.add('active');
            } else if (step === 'complete') {
                document.getElementById('sync4').classList.add('active');
            }
        }

        // ============================================
        // Transmit the full code
        // ============================================
        async function transmitCode() {
            try {
                await initAudio();

                if (isTransmitting) {
                    log("⏸️ Already transmitting");
                    return;
                }

                isTransmitting = true;
                document.getElementById('transmit-status').innerText = 'Transmitting...';

                log(`📡 Transmitting 16-bit code: ${currentCode}`);

                // Clear bit highlights
                document.querySelectorAll('.bit').forEach(bit => {
                    bit.classList.remove('active');
                });

                // Step 1: Preamble - 200ms of 1234 Hz (sync tone)
                setSyncLED('preamble');
                log("🔊 Preamble tone");
                await new Promise(resolve => {
                    playTone(FREQ_1, PREAMBLE_DURATION / 1000, 0.7, resolve);
                });

                // Step 2: Transmit each bit
                setSyncLED('data');
                for (let i = 0; i < currentCode.length; i++) {
                    const bit = currentCode[i];
                    const freq = bit === '1' ? FREQ_1 : FREQ_0;

                    // Highlight current bit
                    document.getElementById(`bit-${i}`).classList.add('active');

                    log(`Bit ${i+1}/${currentCode.length}: ${bit} (${freq} Hz)`);

                    await new Promise(resolve => {
                        playTone(freq, BIT_DURATION / 1000, 0.5, resolve);
                    });

                    // Remove highlight after a short delay
                    setTimeout(() => {
                        document.getElementById(`bit-${i}`).classList.remove('active');
                    }, 50);
                }

                // Step 3: Postamble - 200ms of 1234 Hz (completion tone)
                setSyncLED('postamble');
                log("🔊 Postamble tone");
                await new Promise(resolve => {
                    playTone(FREQ_1, POSTAMBLE_DURATION / 1000, 0.7, resolve);
                });

                setSyncLED('complete');
                log("✅ Transmission complete");

                // Reset after delay
                setTimeout(() => {
                    setSyncLED('');
                    document.getElementById('transmit-status').innerText = 'Ready';
                    isTransmitting = false;
                }, 500);

            } catch (e) {
                log(`❌ Transmission failed: ${e.message}`);
                isTransmitting = false;
            }
        }

        // ============================================
        // Transmit multiple times
        // ============================================
        async function transmitRepeating() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }

            let count = 0;
            const maxCount = 5;

            const transmitNext = async () => {
                if (count < maxCount && !isTransmitting) {
                    await transmitCode();
                    count++;
                    repeatTimeout = setTimeout(transmitNext, 1000);
                } else {
                    repeatTimeout = null;
                    log("✅ Repeating transmissions complete");
                }
            };

            log(`🔄 Transmitting code ${maxCount} times`);
            transmitNext();
        }

        // ============================================
        // Stop all
        // ============================================
        function stopAll() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }
            isTransmitting = false;
            setSyncLED('');
            document.getElementById('transmit-status').innerText = 'Stopped';
            document.querySelectorAll('.bit').forEach(bit => {
                bit.classList.remove('active');
            });
            log("⏹️ Stopped");
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div class="log-entry">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Auto-init
        // ============================================
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
            });
        });

        log("System ready - 16-bit digital encoder");
    </script>
</body>
</html>
