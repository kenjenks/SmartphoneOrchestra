<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Player - 1234 Hz Tone Generator</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff3366;
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .frequency-badge {
            background: #ff3366;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            padding: 30px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
            letter-spacing: 8px;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
        }
        .control-group {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .control-label {
            color: #ff3366;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #444;
            transform: scale(1.02);
        }
        button.primary {
            background: #ff3366;
            color: white;
            border: none;
            grid-column: span 2;
            font-size: 1.5rem;
            padding: 25px;
        }
        button.primary:hover {
            background: #cc2952;
        }
        button.warning {
            background: #442288;
            color: #fff;
        }
        .status-box {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            margin: 20px 0;
            border-left: 4px solid #ff3366;
        }
        .indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
        }
        .led {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #222;
            transition: all 0.1s ease;
            border: 2px solid #444;
        }
        .led.playing {
            background: #ff3366;
            box-shadow: 0 0 60px #ff3366;
            animation: pulse-beat 0.5s infinite;
        }
        @keyframes pulse-beat {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        .log {
            background: #000;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            border: 1px solid #333;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px dotted #222;
        }
        .slider-container {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #888;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff3366;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ff3366;
        }
        .value-display {
            color: #ff3366;
            font-weight: bold;
        }
        .preset-box {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preset-btn {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .preset-btn.active {
            background: #ff3366;
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Zynth Player</h1>
        <div class="subtitle">Single frequency generator - 1234 Hz only</div>

        <div class="frequency-badge" id="freq-display">1234 Hz</div>

        <div class="control-group">
            <div class="control-label">Signal Control</div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Volume</span>
                    <span class="value-display" id="volume-value">50%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="100" value="50" step="1">
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <span>Duration</span>
                    <span class="value-display" id="duration-value">1000 ms</span>
                </div>
                <input type="range" id="duration-slider" min="200" max="3000" value="1000" step="10">
            </div>

            <div class="preset-box">
                <button class="preset-btn active" onclick="setDuration(200)">Short (200ms)</button>
                <button class="preset-btn" onclick="setDuration(500)">Medium (500ms)</button>
                <button class="preset-btn" onclick="setDuration(1000)">Long (1s)</button>
                <button class="preset-btn" onclick="setDuration(2000)">Very Long (2s)</button>
            </div>
        </div>

        <div class="button-grid">
            <button class="primary" onclick="playTone()">🔴 PLAY 1234 Hz</button>
            <button onclick="playBurst()">⚡ Burst (3x)</button>
            <button onclick="playContinuous()">∞ Continuous</button>
            <button onclick="stopAll()">⏹️ Stop</button>
        </div>

        <div class="status-box">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Audio context:</span>
                <span id="audio-state" style="color: #ffcc00;">not initialized</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Status:</span>
                <span id="play-status" style="color: #ff3366;">Ready</span>
            </div>
        </div>

        <div class="indicator">
            <div class="led" id="play-led"></div>
        </div>

        <div class="log" id="log">
            <div class="log-entry">[System] Zynth Player ready - 1234 Hz tone generator</div>
        </div>
    </div>

    <script>
        // ============================================
        // Global state
        // ============================================
        let audioCtx = null;
        let currentOscillator = null;
        let currentGain = null;
        let isPlaying = false;
        let continuousTimeout = null;

        const TARGET_FREQUENCY = 1234; // Fixed frequency

        // ============================================
        // Initialize audio
        // ============================================
        async function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    log("✅ AudioContext created");
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                    log("✅ AudioContext resumed");
                }

                document.getElementById('audio-state').innerText = audioCtx.state;
                document.getElementById('audio-state').style.color = '#00ffcc';

            } catch (e) {
                log(`❌ Audio init failed: ${e.message}`);
            }
        }

        // ============================================
        // UI Controls
        // ============================================
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            document.getElementById('volume-value').innerText = e.target.value + '%';
            if (currentGain) {
                currentGain.gain.setValueAtTime(e.target.value / 100, audioCtx.currentTime);
            }
        });

        document.getElementById('duration-slider').addEventListener('input', (e) => {
            document.getElementById('duration-value').innerText = e.target.value + ' ms';
        });

        function setDuration(ms) {
            document.getElementById('duration-slider').value = ms;
            document.getElementById('duration-value').innerText = ms + ' ms';

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // ============================================
        // Play single tone at 1234 Hz
        // ============================================
        async function playTone() {
            try {
                await initAudio();

                // Stop any currently playing tone
                stopCurrentTone();

                const volume = document.getElementById('volume-slider').value / 100;
                const durationMs = parseInt(document.getElementById('duration-slider').value);
                const duration = durationMs / 1000;

                // Create oscillator and gain node
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.value = TARGET_FREQUENCY;

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + duration - 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // Store references
                currentOscillator = oscillator;
                currentGain = gainNode;

                // Start and stop
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);

                // Update UI
                isPlaying = true;
                document.getElementById('play-status').innerText = 'Playing 1234 Hz';
                const led = document.getElementById('play-led');
                led.classList.add('playing');

                log(`🔴 Playing 1234 Hz tone for ${durationMs}ms at ${Math.round(volume * 100)}% volume`);

                // Clean up after tone ends
                setTimeout(() => {
                    if (currentOscillator === oscillator) {
                        led.classList.remove('playing');
                        document.getElementById('play-status').innerText = 'Ready';
                        isPlaying = false;
                        currentOscillator = null;
                        currentGain = null;
                    }
                }, duration * 1000 + 100);

            } catch (e) {
                log(`❌ Playback failed: ${e.message}`);
            }
        }

        // ============================================
        // Play burst of 3 tones
        // ============================================
        async function playBurst() {
            stopAll();
            await initAudio();

            log("⚡ Playing 3-tone burst at 1234 Hz");

            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    playTone();
                }, i * 800); // 800ms between tones
            }
        }

        // ============================================
        // Play continuous tone
        // ============================================
        async function playContinuous() {
            try {
                await initAudio();

                // Stop any currently playing tone
                stopCurrentTone();

                const volume = document.getElementById('volume-slider').value / 100;

                // Create oscillator and gain node
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.value = TARGET_FREQUENCY;

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.1);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // Store references
                currentOscillator = oscillator;
                currentGain = gainNode;

                // Start (continuous - no stop)
                oscillator.start();

                // Update UI
                isPlaying = true;
                document.getElementById('play-status').innerText = 'Continuous 1234 Hz';
                const led = document.getElementById('play-led');
                led.classList.add('playing');

                log(`∞ Continuous 1234 Hz tone at ${Math.round(volume * 100)}% volume`);

            } catch (e) {
                log(`❌ Playback failed: ${e.message}`);
            }
        }

        // ============================================
        // Stop current tone
        // ============================================
        function stopCurrentTone() {
            if (currentOscillator) {
                try {
                    // Fade out
                    if (currentGain) {
                        currentGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                    }
                    setTimeout(() => {
                        try {
                            currentOscillator.stop();
                        } catch (e) {}
                    }, 50);
                } catch (e) {}
                currentOscillator = null;
                currentGain = null;
            }
        }

        // ============================================
        // Stop all playback
        // ============================================
        function stopAll() {
            stopCurrentTone();

            document.getElementById('play-led').classList.remove('playing');
            document.getElementById('play-status').innerText = 'Stopped';
            isPlaying = false;

            log("⏹️ Stopped all playback");
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div class="log-entry">[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Auto-init on first button click
        // ============================================
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
            });
        });
