<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Note Timing Test</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .slider-group {
            margin: 20px 0;
        }
        input[type=range] {
            width: 100%;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Note Timing Test</h1>

    <div class="panel">
        <button id="playBtn">🔊 PLAY TEST NOTE (A4, 1 sec)</button>
        <button id="playShortBtn">🔊 PLAY SHORT NOTE (A4, 300ms)</button>

        <div class="slider-group">
            <label>Duration: <span id="durationVal">1000</span>ms</label>
            <input type="range" id="duration" min="100" max="2000" value="1000">
        </div>

        <p style="color: #888;">
            Click play, then check the device for onset/offset timing.
        </p>
    </div>

    <div class="log" id="log"></div>

    <script>
        let audioCtx = null;

        async function playNote(durationMs) {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            const freq = 440; // A4
            const sampleRate = audioCtx.sampleRate;
            const samples = Math.floor(sampleRate * (durationMs / 1000));

            // Generate a simple sine wave
            const buffer = audioCtx.createBuffer(1, samples, sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < samples; i++) {
                // Simple envelope to make onset/offset clear
                const t = i / samples;
                let envelope = 1;
                if (t < 0.01) envelope = t / 0.01; // 10ms attack
                if (t > 0.99) envelope = (1 - t) / 0.01; // 10ms release

                data[i] = Math.sin(2 * Math.PI * freq * i / sampleRate) * envelope;
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);

            const startTime = Date.now();
            source.start();

            log(`🔊 Playing note at ${new Date().toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);

            source.onended = () => {
                const endTime = Date.now();
                log(`✅ Note ended after ${endTime - startTime}ms`);
            };
        }

        document.getElementById('playBtn').onclick = () => {
            const duration = parseInt(document.getElementById('duration').value);
            playNote(duration);
        };

        document.getElementById('playShortBtn').onclick = () => {
            playNote(300);
        };

        document.getElementById('duration').oninput = (e) => {
            document.getElementById('durationVal').innerText = e.target.value;
        };

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + logDiv.innerHTML;
        }

        log('🎵 Conductor ready - click PLAY to test');
    </script>
</body>
</html>
