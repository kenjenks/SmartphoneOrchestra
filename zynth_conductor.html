        // Clock sync

            }
        });

        // Generate random simulated delays for each note (0-200ms)
        function generateSimulatedDelays() {
            return allNotes.map(() => Math.floor(Math.random() * 200));
        }

        // Update the note table
        function updateNoteTable(simulatedDelays) {
            const tbody = document.getElementById('noteTableBody');
            tbody.innerHTML = '';

            const avgDelay = simulatedDelays.reduce((a, b) => a + b, 0) / simulatedDelays.length;
            document.getElementById('avgDelay').innerText = Math.round(avgDelay) + 'ms';

            for (let i = 0; i < Math.min(10, allNotes.length); i++) {
                const note = allNotes[i];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td>${note.pitch}</td>
                    <td>${note.offset}</td>
                    <td>${note.duration}</td>
                    <td style="color: #ffaa00;">${simulatedDelays[i]} ms</td>
                `;
                tbody.appendChild(row);
            }

            document.getElementById('totalNotes').innerText = allNotes.length;
            document.getElementById('totalDuration').innerText = '30s';
        }

        async function playNote(note, simulatedDelay, noteIndex, scheduledTime) {
            return new Promise(async (resolve) => {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }

                // Calculate delay until scheduled time
                const now = Date.now() + serverOffset;
                const delayMs = Math.max(0, scheduledTime - now);

                setTimeout(async () => {
                    if (audioCtx.state === 'suspended') {
                        await audioCtx.resume();
                    }

                    const sampleRate = audioCtx.sampleRate;
                    const samples = Math.floor(sampleRate * (note.duration / 1000));

                    // Generate sine wave with envelope
                    const buffer = audioCtx.createBuffer(1, samples, sampleRate);
                    const data = buffer.getChannelData(0);

                    for (let i = 0; i < samples; i++) {
                        const t = i / samples;
                        let envelope = 1;
                        if (t < 0.01) envelope = t / 0.01;
                        if (t > 0.99) envelope = (1 - t) / 0.01;

                        data[i] = Math.sin(2 * Math.PI * note.freq * i / sampleRate) * envelope * 0.5;
                    }

                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);

                    // Apply simulated delay
                    const actualStartTime = Date.now() + serverOffset + simulatedDelay;

                    setTimeout(() => {
                        source.start();

                        const logTime = Date.now() + serverOffset;
                        log(`🔊 Note ${noteIndex}: ${note.pitch} at ${new Date(logTime).toLocaleTimeString()}.${String(logTime % 1000).padStart(3, '0')} (simulated delay: ${simulatedDelay}ms)`);

                        source.onended = () => {
                            log(`✅ Note ${noteIndex} ended`);
                            resolve();
                        };
                    }, simulatedDelay);

                }, delayMs);
            });
        }

        async function playSequence() {
            if (isPlaying) {
                log('⚠️ Already playing');
                return;
            }

            isPlaying = true;

            // Generate random simulated delays for this run
            const simulatedDelays = generateSimulatedDelays();
            updateNoteTable(simulatedDelays);

            // Calculate scheduled start times with 1 second buffer
            const now = Date.now() + serverOffset;
            const bufferMs = 1000;
            const startTime = now + bufferMs;

            log('🎬 Sending GO signal with 1s buffer');
            log(`📅 Sequence starting at ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);

            // Prepare notes for Firebase
            const notesForFirebase = allNotes.map((note, index) => ({
                index: index,
                pitch: note.pitch,
                freq: note.freq,
                offset: note.offset,
                duration: note.duration,
                simulatedDelay: simulatedDelays[index]
            }));

            // Send GO signal to Firebase
            await db.ref('zynth/30sec_test').set({
                status: 'ACTIVE',
                startTime: startTime,
                bufferMs: bufferMs,
                notes: notesForFirebase,
                timestamp: now
            });

            // Play each note with its simulated delay
            for (let i = 0; i < allNotes.length; i++) {
                const note = allNotes[i];
                const noteTime = startTime + note.offset;

                // Update progress
                const progress = ((i + 1) / allNotes.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';

                await playNote(note, simulatedDelays[i], i, noteTime);
            }

            log('✅ 30-second sequence complete');

            // Clear the test sequence
            await db.ref('zynth/30sec_test').remove();

            document.getElementById('progressFill').style.width = '0%';
            isPlaying = false;
        }

        function stopSequence() {
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            db.ref('zynth/30sec_test').remove();
            document.getElementById('progressFill').style.width = '0%';
            isPlaying = false;
            log('⏹️ Sequence stopped');
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('copyLogBtn').onclick = copyLog;
