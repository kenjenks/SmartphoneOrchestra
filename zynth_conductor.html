<!--
zynth_conductor.html - Warble-based tone transmission
Generates flute-like tones with optional warbles for data transmission
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Warble Transmitter</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .panel {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        .bit-cell {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .bit-cell.one {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 20px #00ffcc;
        }
        .bit-cell.zero {
            background: #442288;
            color: #fff;
        }
        .bit-cell.pending {
            background: #333;
            color: #666;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        button.secondary {
            background: #442288;
            color: #fff;
        }
        .status {
            font-family: monospace;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            color: #0f0;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            color: #888;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px;
            background: #1a1a1a;
            border-radius: 4px;
        }
        .label {
            color: #888;
        }
        .value {
            color: #00ffcc;
            font-weight: bold;
        }
        .slider-group {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #888;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            height: 5px;
            background: #333;
            border-radius: 5px;
            outline: none;
        }
        .data-bits {
            font-family: monospace;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 10px;
            color: #00ffcc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Warble Transmitter</h1>

    <div class="panel">
        <h2>Data to Transmit</h2>
        <div class="data-bits" id="dataBits">1100101010110011</div>

        <div class="grid" id="bitGrid">
            <!-- Filled by JavaScript -->
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>🎵 Warble Depth (Hz)</span>
                <span id="depthValue" class="value">30 Hz</span>
            </div>
            <input type="range" id="warbleDepth" min="15" max="60" value="30" step="5">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>🎵 Vibrato Rate (Hz)</span>
                <span id="rateValue" class="value">2.5 Hz</span>
            </div>
            <input type="range" id="vibratoRate" min="1.5" max="4.0" value="2.5" step="0.1">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="randomBtn">🔄 Random Data</button>
            <button id="allOnesBtn">1111 All 1s</button>
            <button id="alternatingBtn">1010 Pattern</button>
        </div>
    </div>

    <div class="panel">
        <h2>Transmission Control</h2>
        <button id="transmitBtn">📡 TRANSMIT 16-BIT FRAME</button>
        <button id="repeatBtn" class="secondary">🔁 Repeat 3x</button>
        <button id="stopBtn" class="danger">⏹️ STOP</button>

        <div class="status" id="connectionStatus">🔴 Firebase Disconnected</div>
        <div class="status" id="transmitStatus">⏸️ Ready</div>
        <div class="status" id="audioStatus">🔇 Audio not initialized</div>
    </div>

    <div class="panel">
        <h2>Device Schedule</h2>
        <div id="deviceList" class="status">
            Loading devices...
        </div>
        <div id="schedule" class="log">
            Waiting for devices...
        </div>
    </div>

    <div class="panel">
        <h2>Event Log</h2>
        <div id="log" class="log">
            Ready...
        </div>
    </div>

    <script>
        // ============================================
        // Firebase Configuration
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // Global State
        // ============================================
        let audioCtx = null;
        let isTransmitting = false;
        let repeatTimeout = null;
        let serverOffset = 0;
        let devices = [];

        // Warble parameters (from successful test)
        const BASE_FLUTE_FREQ = 440;  // A4
        const NOTE_DURATION = 300;     // ms per note
        const GAP_DURATION = 50;       // ms gap between notes
        const FRAME_SIZE = 16;          // 16 bits per frame

        let currentData = '1100101010110011';  // 16-bit default
        let warbleDepth = 30;   // Hz
        let vibratoRate = 2.5;  // Hz

        // ============================================
        // Clock sync
        // ============================================
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // ============================================
        // UI Setup
        // ============================================
        function updateBitGrid() {
            const grid = document.getElementById('bitGrid');
            grid.innerHTML = '';

            for (let i = 0; i < FRAME_SIZE; i++) {
                const bit = currentData[i];
                const cell = document.createElement('div');
                cell.className = `bit-cell ${bit === '1' ? 'one' : 'zero'}`;
                cell.innerText = bit;
                cell.onclick = () => toggleBit(i);
                grid.appendChild(cell);
            }
        }

        function toggleBit(index) {
            const bits = currentData.split('');
            bits[index] = bits[index] === '1' ? '0' : '1';
            currentData = bits.join('');
            document.getElementById('dataBits').innerText = currentData;
            updateBitGrid();
            log(`📝 Bit ${index + 1} toggled to ${bits[index]}`);
        }

        // Slider handlers
        document.getElementById('warbleDepth').addEventListener('input', (e) => {
            warbleDepth = parseInt(e.target.value);
            document.getElementById('depthValue').innerText = warbleDepth + ' Hz';
        });

        document.getElementById('vibratoRate').addEventListener('input', (e) => {
            vibratoRate = parseFloat(e.target.value);
            document.getElementById('rateValue').innerText = vibratoRate.toFixed(1) + ' Hz';
        });

        // Button handlers
        document.getElementById('randomBtn').onclick = () => {
            let bits = '';
            for (let i = 0; i < FRAME_SIZE; i++) {
                bits += Math.random() > 0.5 ? '1' : '0';
            }
            currentData = bits;
            document.getElementById('dataBits').innerText = currentData;
            updateBitGrid();
            log(`🔄 Random data: ${currentData}`);
        };

        document.getElementById('allOnesBtn').onclick = () => {
            currentData = '1'.repeat(FRAME_SIZE);
            document.getElementById('dataBits').innerText = currentData;
            updateBitGrid();
            log(`1111 All ones: ${currentData}`);
        };

        document.getElementById('alternatingBtn').onclick = () => {
            let bits = '';
            for (let i = 0; i < FRAME_SIZE; i++) {
                bits += (i % 2 === 0) ? '1' : '0';
            }
            currentData = bits;
            document.getElementById('dataBits').innerText = currentData;
            updateBitGrid();
            log(`🔄 Alternating pattern: ${currentData}`);
        };

        // ============================================
        // Audio System
        // ============================================
        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                log(`🔊 AudioContext created (sample rate: ${audioCtx.sampleRate}Hz)`);
            }

            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
                log("🔊 AudioContext resumed");
            }

            document.getElementById('audioStatus').innerHTML = '🔊 Audio ready';
            return true;
        }

        // ============================================
        // Generate Flute Tone (with or without warble)
        // ============================================
        function generateFluteTone(baseFreq, durationMs, addWarble = false) {
            const sampleRate = audioCtx.sampleRate;
            const nSamples = Math.floor(sampleRate * (durationMs / 1000));

            const t = new Float32Array(nSamples);
            for (let i = 0; i < nSamples; i++) {
                t[i] = i / sampleRate;
            }

            let samples;

            if (addWarble) {
                // Generate warble (1 bit) - from our working receiver test
                const modPhase = 2 * Math.PI * vibratoRate * t;

                // Pure sine modulation
                let modulation = new Float32Array(nSamples);
                for (let i = 0; i < nSamples; i++) {
                    modulation[i] = Math.sin(modPhase[i]);
                }

                // Add subtle second harmonic for natural sound
                for (let i = 0; i < nSamples; i++) {
                    modulation[i] += 0.2 * Math.sin(2 * modPhase[i] + 0.1);
                }

                // Normalize
                let maxVal = 0;
                for (let i = 0; i < nSamples; i++) {
                    maxVal = Math.max(maxVal, Math.abs(modulation[i]));
                }
                if (maxVal > 0) {
                    for (let i = 0; i < nSamples; i++) {
                        modulation[i] /= maxVal;
                    }
                }

                // Convert to frequency modulation
                const warbleFactor = new Float32Array(nSamples);
                for (let i = 0; i < nSamples; i++) {
                    warbleFactor[i] = 1.0 + (warbleDepth / baseFreq) * modulation[i];
                }

                // Generate with phase accumulation
                const phase = new Float32Array(nSamples);
                phase[0] = 0;
                for (let i = 1; i < nSamples; i++) {
                    phase[i] = phase[i-1] + 2 * Math.PI * baseFreq * warbleFactor[i] * t[1];
                }

                samples = new Float32Array(nSamples);
                for (let i = 0; i < nSamples; i++) {
                    samples[i] = Math.sin(phase[i]);
                }
            } else {
                // Pure flute tone (0 bit) - with harmonics for natural sound
                samples = new Float32Array(nSamples);
                for (let i = 0; i < nSamples; i++) {
                    // Fundamental
                    samples[i] = Math.sin(2 * Math.PI * baseFreq * t[i]);
                    // Second harmonic
                    samples[i] += 0.3 * Math.sin(2 * Math.PI * baseFreq * 2 * t[i] + 0.2);
                    // Third harmonic
                    samples[i] += 0.1 * Math.sin(2 * Math.PI * baseFreq * 3 * t[i] + 0.5);
                }

                // Normalize
                let maxVal = 0;
                for (let i = 0; i < nSamples; i++) {
                    maxVal = Math.max(maxVal, Math.abs(samples[i]));
                }
                if (maxVal > 0) {
                    for (let i = 0; i < nSamples; i++) {
                        samples[i] /= maxVal;
                    }
                }
            }

            // Apply raised cosine envelope for smooth attack/decay
            const fadeSamples = Math.floor(20 / 1000 * sampleRate); // 20ms fade

            for (let i = 0; i < nSamples; i++) {
                if (i < fadeSamples) {
                    // Fade in
                    samples[i] *= 0.5 * (1 - Math.cos(Math.PI * i / fadeSamples));
                } else if (i > nSamples - fadeSamples) {
                    // Fade out
                    const j = i - (nSamples - fadeSamples);
                    samples[i] *= 0.5 * (1 - Math.cos(Math.PI * j / fadeSamples));
                }
            }

            return samples;
        }

        // ============================================
        // Play a single note
        // ============================================
        async function playNote(bit, index) {
            return new Promise((resolve) => {
                const sampleRate = audioCtx.sampleRate;

                // Generate the note
                const samples = generateFluteTone(BASE_FLUTE_FREQ, NOTE_DURATION, bit === '1');

                // Create buffer
                const buffer = audioCtx.createBuffer(1, samples.length, sampleRate);
                buffer.copyToChannel(samples, 0);

                // Play
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start();

                log(`   Bit ${index + 1}/16: ${bit} (${bit === '1' ? 'warble' : 'pure tone'})`);

                // Resolve after duration
                setTimeout(resolve, NOTE_DURATION + GAP_DURATION);
            });
        }

        // ============================================
        // Transmit complete frame
        // ============================================
        async function transmitFrame() {
            try {
                await initAudio();

                if (isTransmitting) {
                    log("⏸️ Already transmitting");
                    return;
                }

                isTransmitting = true;
                document.getElementById('transmitStatus').innerHTML = '📡 Transmitting...';

                log(`📡 Transmitting 16-bit frame: ${currentData}`);
                log(`   Warble depth: ${warbleDepth}Hz, rate: ${vibratoRate}Hz`);

                // Play all 16 notes
                for (let i = 0; i < FRAME_SIZE; i++) {
                    const bit = currentData[i];
                    await playNote(bit, i);
                }

                log("✅ Frame transmission complete");
                document.getElementById('transmitStatus').innerHTML = '✅ Complete';

                setTimeout(() => {
                    document.getElementById('transmitStatus').innerHTML = '⏸️ Ready';
                    isTransmitting = false;
                }, 1000);

                // Record this transmission in Firebase for devices to detect
                await db.ref('zynth/last_frame').set({
                    data: currentData,
                    timestamp: Date.now() + serverOffset,
                    depth: warbleDepth,
                    rate: vibratoRate
                });

            } catch (e) {
                log(`❌ Transmission failed: ${e.message}`);
                isTransmitting = false;
            }
        }

        // ============================================
        // Repeat transmission
        // ============================================
        async function transmitRepeating() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }

            let count = 0;
            const maxCount = 3;

            const transmitNext = async () => {
                if (count < maxCount && !isTransmitting) {
                    await transmitFrame();
                    count++;
                    repeatTimeout = setTimeout(transmitNext, 2000);
                } else {
                    repeatTimeout = null;
                    log("✅ Repeating transmissions complete");
                }
            };

            log(`🔄 Transmitting frame ${maxCount} times`);
            transmitNext();
        }

        // ============================================
        // Stop all
        // ============================================
        function stopAll() {
            if (repeatTimeout) {
                clearTimeout(repeatTimeout);
                repeatTimeout = null;
            }
            isTransmitting = false;
            document.getElementById('transmitStatus').innerHTML = '⏸️ Stopped';
            log("⏹️ Stopped");
        }

        // ============================================
        // Load active devices
        // ============================================
        async function loadDevices() {
            const snapshot = await db.ref('devices').once('value');
            const devicesData = snapshot.val() || {};

            devices = Object.entries(devicesData)
                .filter(([id, data]) => data.lastSeen && (Date.now() + serverOffset - data.lastSeen < 10000))
                .map(([id, data]) => ({ id, ...data }));

            document.getElementById('deviceList').innerHTML =
                devices.map(d => d.id).join(', ') || 'No active devices';

            log(`👥 Found ${devices.length} active devices`);
        }

        // ============================================
        // Generate device schedule (for display)
        // ============================================
        function generateSchedule() {
            if (devices.length === 0) return;

            const scheduleDiv = document.getElementById('schedule');
            let html = '<div style="color:#00ffcc">Note Distribution:</div>';

            for (let i = 0; i < FRAME_SIZE; i++) {
                const deviceIndex = i % devices.length;
                const deviceId = devices[deviceIndex]?.id || 'unknown';
                const bit = currentData[i];
                html += `<div>Note ${i+1}: Bit ${bit} → ${deviceId}</div>`;
            }

            scheduleDiv.innerHTML = html;
        }

        // ============================================
        // Logging
        // ============================================
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
            console.log(message);
        }

        // ============================================
        // Initialize
        // ============================================
        window.onload = async () => {
            // Connection status
            db.ref('.info/connected').on('value', snap => {
                const el = document.getElementById('connectionStatus');
                if (snap.val()) {
                    el.innerHTML = '🟢 Firebase Connected';
                    el.style.color = '#0f0';
                } else {
                    el.innerHTML = '🔴 Firebase Disconnected';
                    el.style.color = '#f00';
                }
            });

            // Load devices periodically
            await loadDevices();
            setInterval(loadDevices, 5000);
            setInterval(generateSchedule, 2000);

            // Button handlers
            document.getElementById('transmitBtn').onclick = transmitFrame;
            document.getElementById('repeatBtn').onclick = transmitRepeating;
            document.getElementById('stopBtn').onclick = stopAll;

            // Initialize UI
            updateBitGrid();
            document.getElementById('dataBits').innerText = currentData;

            log("🎵 Zynth Conductor ready");
            log("ℹ️ 16-bit warble encoding: 1 = warble, 0 = pure tone");
            log("ℹ️ Click bits to toggle, then TRANSMIT");
        };
    </script>
</body>
</html>
