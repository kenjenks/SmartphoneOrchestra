<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Single Note Test with Feedback</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .note-display {
            background: #1a1a1a;
            border: 2px solid #00ccff;
            border-radius: 12px;
            padding: 30px;
            font-size: 3rem;
            text-align: center;
            color: #00ccff;
            margin: 20px 0;
            font-family: monospace;
        }
        .jitter-control {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .slider-group {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #888;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            height: 5px;
            background: #333;
            border-radius: 5px;
            outline: none;
        }
        .param-value {
            color: #00ccff;
            font-weight: bold;
        }
        .delay-display {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-size: 2rem;
            font-family: monospace;
            border-left: 4px solid #ffaa00;
        }
        .delay-value {
            color: #ffaa00;
            font-weight: bold;
        }
        .delay-label {
            color: #888;
            font-size: 0.9rem;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .status {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin: 20px 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
        .audio-status {
            font-family: monospace;
            color: #ffaa00;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Single Note Test with Feedback</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="note-display" id="noteDisplay">
            G4
        </div>

        <div class="audio-status" id="audioStatus">
            ⏳ Loading MP3 file...
        </div>

        <div class="jitter-control">
            <h3>🎲 Random Jitter</h3>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Jitter Range (±ms)</span>
                    <span id="jitterValue" class="param-value">200 ms</span>
                </div>
                <input type="range" id="jitterSlider" min="0" max="500" value="200" step="10">
            </div>
            <p style="color: #888; font-size: 0.9rem;">
                First note: G4 at 302ms into MP3, duration 372ms
            </p>
        </div>

        <div class="delay-display">
            <div class="delay-label">Last Measured Delay</div>
            <div class="delay-value" id="lastDelay">---</div>
        </div>

        <button id="playBtn">🔊 PLAY SINGLE NOTE</button>

        <div class="status" id="status">
            Ready
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Audio state
        let audioCtx = null;
        let audioBuffer = null;
        let serverOffset = 0;
        let isPlaying = false;

        // First note from tuning_mode.json
        const firstNote = {
            pitch: 'G4',
            offset: 301.9,  // ms into MP3
            duration: 371.5  // ms
        };

        // MP3 URL
        const MP3_URL = "https://static.wixstatic.com/mp3/9178d1_f151780a64db4af297d38519c1b2b825.mp3";

        // Clock sync
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');
            if (snap.val()) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
            }
        });

        // Listen for device feedback
        db.ref('zynth/device_feedback').on('value', snap => {
            const feedback = snap.val();
            if (feedback && feedback.delay !== undefined) {
                document.getElementById('lastDelay').innerText = feedback.delay + ' ms';
                log(`📊 Received device feedback: delay = ${feedback.delay}ms`);
            }
        });

        // Load MP3 file
        async function loadMP3() {
            try {
                document.getElementById('audioStatus').innerHTML = '⏳ Loading MP3 file...';

                const response = await fetch(MP3_URL);
                const arrayBuffer = await response.arrayBuffer();

                audioCtx = new AudioContext();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                document.getElementById('audioStatus').innerHTML = '✅ MP3 loaded - ' +
                    Math.round(audioBuffer.duration) + 's';
                log('✅ MP3 loaded successfully');

            } catch (err) {
                document.getElementById('audioStatus').innerHTML = '❌ Failed to load MP3';
                log(`❌ MP3 load error: ${err.message}`);
            }
        }

        // Jitter slider
        let maxJitter = 200;
        document.getElementById('jitterSlider').addEventListener('input', (e) => {
            maxJitter = parseInt(e.target.value);
            document.getElementById('jitterValue').innerText = maxJitter + ' ms';
        });

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        async function playNote() {
            if (isPlaying) {
                log('⚠️ Already playing');
                return;
            }

            if (!audioBuffer) {
                log('❌ MP3 not loaded yet');
                return;
            }

            isPlaying = true;

            // Generate random jitter
            const jitter = Math.floor(Math.random() * (maxJitter * 2 + 1)) - maxJitter;

            // Calculate scheduled start time with 1 second buffer
            const now = Date.now() + serverOffset;
            const bufferMs = 1000;
            const scheduledWallTime = now + bufferMs; // When the sequence starts

            // The note will play at: scheduledWallTime + firstNote.offset + jitter
            const notePlayTime = scheduledWallTime + firstNote.offset + jitter;

            log('🎬 Sending GO signal with 1s buffer');
            log(`📅 Sequence starting at ${new Date(scheduledWallTime).toLocaleTimeString()}.${String(scheduledWallTime % 1000).padStart(3, '0')}`);
            log(`🎲 Jitter: ${jitter > 0 ? '+' : ''}${jitter}ms`);
            log(`🎯 Note scheduled at ${new Date(notePlayTime).toLocaleTimeString()}.${String(notePlayTime % 1000).padStart(3, '0')}`);

            // Send GO signal to Firebase
            await db.ref('zynth/single_note_test').set({
                status: 'ACTIVE',
                scheduledWallTime: scheduledWallTime,  // When the sequence starts
                note: {
                    index: 0,
                    pitch: firstNote.pitch,
                    offset: firstNote.offset,  // Offset into MP3
                    duration: firstNote.duration,
                    jitter: jitter,
                    expectedPlayTime: notePlayTime  // When the note should actually play
                },
                timestamp: now
            });

            // Resume audio context if needed
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Calculate delay until this note should play
            const delayMs = Math.max(0, notePlayTime - (Date.now() + serverOffset));

            setTimeout(() => {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);

                // Start from the correct offset in the MP3
                source.start(0, firstNote.offset / 1000, firstNote.duration / 1000);

                const actualPlayTime = Date.now() + serverOffset;
                log(`🔊 Playing note at ${new Date(actualPlayTime).toLocaleTimeString()}.${String(actualPlayTime % 1000).padStart(3, '0')} (expected: ${new Date(notePlayTime).toLocaleTimeString()}.${String(notePlayTime % 1000).padStart(3, '0')})`);

                source.onended = () => {
                    log(`✅ Note ended`);
                    isPlaying = false;
                };

            }, delayMs);
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        // Initialize - load MP3
        loadMP3();

        document.getElementById('playBtn').onclick = playNote;
        document.getElementById('copyLogBtn').onclick = copyLog;

        log('🎵 Single MP3 Note Test with Feedback ready');
        log('🎯 First note: G4 at 302ms offset');
    </script>
</body>
</html>
