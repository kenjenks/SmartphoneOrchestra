<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Two Note Test with GO Signal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .note-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .note-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .note-card.active {
            border-color: #00ccff;
            box-shadow: 0 0 20px #00ccff;
        }
        .note-pitch {
            font-size: 2rem;
            font-weight: bold;
            color: #00ccff;
        }
        .note-details {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .status {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin: 20px 0;
            border-left: 4px solid #00ccff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            flex: 1;
        }
        button.danger {
            background: #600;
            color: #fff;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        .disconnected {
            background: #ff0000;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Two Note Test with GO Signal</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="note-grid">
            <div class="note-card" id="note0Card">
                <div class="note-pitch">G4</div>
                <div class="note-details">392 Hz · 371.5 ms</div>
                <div class="note-details">Offset: 301.9 ms</div>
            </div>
            <div class="note-card" id="note1Card">
                <div class="note-pitch">A4</div>
                <div class="note-details">440 Hz · 278.6 ms</div>
                <div class="note-details">Offset: 696.6 ms</div>
            </div>
        </div>

        <div class="button-row">
            <button id="playBtn">🔊 PLAY TWO NOTES</button>
            <button id="stopBtn" class="danger">⏹️ STOP</button>
        </div>

        <div class="status" id="status">
            ⏸️ Ready
        </div>

        <div class="log-container">
            <div class="log-header">
                <span style="color: #888;">Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx = null;
        let serverOffset = 0;
        let isPlaying = false;

        // First two notes from tuning_mode.json
        const notes = [
            { pitch: 'G4', freq: 392, duration: 371.5, offset: 301.9 },
            { pitch: 'A4', freq: 440, duration: 278.6, offset: 696.6 }
        ];

        // Clock sync
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
        });

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');
            if (snap.val()) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
            }
        });

        async function playNote(freq, durationMs, noteIndex, scheduledTime) {
            return new Promise(async (resolve) => {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }

                // Calculate delay until scheduled time
                const now = Date.now() + serverOffset;
                const delayMs = Math.max(0, scheduledTime - now);

                setTimeout(async () => {
                    if (audioCtx.state === 'suspended') {
                        await audioCtx.resume();
                    }

                    const sampleRate = audioCtx.sampleRate;
                    const samples = Math.floor(sampleRate * (durationMs / 1000));

                    // Generate sine wave with envelope
                    const buffer = audioCtx.createBuffer(1, samples, sampleRate);
                    const data = buffer.getChannelData(0);

                    for (let i = 0; i < samples; i++) {
                        const t = i / samples;
                        // Simple envelope to make onset/offset clear
                        let envelope = 1;
                        if (t < 0.01) envelope = t / 0.01; // 10ms attack
                        if (t > 0.99) envelope = (1 - t) / 0.01; // 10ms release

                        data[i] = Math.sin(2 * Math.PI * freq * i / sampleRate) * envelope * 0.5;
                    }

                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);

                    const actualStartTime = Date.now() + serverOffset;
                    source.start();

                    // Highlight active note
                    document.querySelectorAll('.note-card').forEach(card => card.classList.remove('active'));
                    document.getElementById(`note${noteIndex}Card`).classList.add('active');

                    log(`🔊 Note ${noteIndex}: ${notes[noteIndex].pitch} at ${new Date(actualStartTime).toLocaleTimeString()}.${String(actualStartTime % 1000).padStart(3, '0')} (scheduled: ${new Date(scheduledTime).toLocaleTimeString()}.${String(scheduledTime % 1000).padStart(3, '0')})`);

                    source.onended = () => {
                        document.getElementById(`note${noteIndex}Card`).classList.remove('active');
                        log(`✅ Note ${noteIndex} ended after ${Date.now() + serverOffset - actualStartTime}ms`);
                        resolve();
                    };
                }, delayMs);
            });
        }

        async function playTwoNotes() {
            if (isPlaying) {
                log('⚠️ Already playing');
                return;
            }

            isPlaying = true;
            document.getElementById('status').innerHTML = '🔴 Playing...';

            // Calculate scheduled start times with 1 second buffer
            const now = Date.now() + serverOffset;
            const bufferMs = 1000; // 1 second buffer like conductor.html
            const startTime = now + bufferMs;

            // Note 0 at startTime + 301.9ms offset
            const note0Time = startTime + notes[0].offset;
            // Note 1 at startTime + 696.6ms offset
            const note1Time = startTime + notes[1].offset;

            log('🎬 Sending GO signal with 1s buffer');
            log(`📅 Sequence starting at ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);

            // Send GO signal to Firebase
            await db.ref('zynth/test_sequence').set({
                status: 'ACTIVE',
                startTime: startTime,
                bufferMs: bufferMs,
                notes: [
                    { pitch: notes[0].pitch, freq: notes[0].freq, offset: notes[0].offset, duration: notes[0].duration },
                    { pitch: notes[1].pitch, freq: notes[1].freq, offset: notes[1].offset, duration: notes[1].duration }
                ],
                timestamp: now
            });

            log(`📅 Note 0 (G4) scheduled at ${new Date(note0Time).toLocaleTimeString()}.${String(note0Time % 1000).padStart(3, '0')}`);
            log(`📅 Note 1 (A4) scheduled at ${new Date(note1Time).toLocaleTimeString()}.${String(note1Time % 1000).padStart(3, '0')}`);

            // Play first note (G4)
            await playNote(notes[0].freq, notes[0].duration, 0, note0Time);

            // Play second note (A4)
            await playNote(notes[1].freq, notes[1].duration, 1, note1Time);

            log('✅ Two-note sequence complete');

            // Clear the test sequence
            await db.ref('zynth/test_sequence').remove();

            document.getElementById('status').innerHTML = '⏸️ Ready';
            isPlaying = false;
        }

        function stopSequence() {
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            db.ref('zynth/test_sequence').remove();
            document.querySelectorAll('.note-card').forEach(card => card.classList.remove('active'));
            document.getElementById('status').innerHTML = '⏸️ Stopped';
            isPlaying = false;
            log('⏹️ Sequence stopped');
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('playBtn').onclick = playTwoNotes;
        document.getElementById('stopBtn').onclick = stopSequence;
        document.getElementById('copyLogBtn').onclick = copyLog;

        log('🎵 Conductor ready - click PLAY TWO NOTES to test with GO signal');
        log('⏱️ Using 1 second buffer like conductor.html');
    </script>
</body>
</html>
