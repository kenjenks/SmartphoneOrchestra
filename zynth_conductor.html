<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Two Note Test</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .note-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .note-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .note-card.active {
            border-color: #00ccff;
            box-shadow: 0 0 20px #00ccff;
        }
        .note-pitch {
            font-size: 2rem;
            font-weight: bold;
            color: #00ccff;
        }
        .note-details {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .status {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin: 20px 0;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Two Note Test</h1>

    <div class="panel">
        <div class="note-grid">
            <div class="note-card" id="note0Card">
                <div class="note-pitch">G4</div>
                <div class="note-details">392 Hz · 371.5 ms</div>
                <div class="note-details">Offset: 301.9 ms</div>
            </div>
            <div class="note-card" id="note1Card">
                <div class="note-pitch">A4</div>
                <div class="note-details">440 Hz · 278.6 ms</div>
                <div class="note-details">Offset: 696.6 ms</div>
            </div>
        </div>

        <button id="playBtn">🔊 PLAY TWO NOTES</button>

        <div class="status" id="status">Ready</div>

        <div class="log" id="log"></div>
    </div>

    <script>
        let audioCtx = null;

        // First two notes from tuning_mode.json
        const notes = [
            { pitch: 'G4', freq: 392, duration: 371.5, offset: 301.9 },
            { pitch: 'A4', freq: 440, duration: 278.6, offset: 696.6 }
        ];

        async function playNote(freq, durationMs, noteIndex) {
            return new Promise(async (resolve) => {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                const sampleRate = audioCtx.sampleRate;
                const samples = Math.floor(sampleRate * (durationMs / 1000));

                // Generate sine wave with envelope
                const buffer = audioCtx.createBuffer(1, samples, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < samples; i++) {
                    const t = i / samples;
                    // Simple envelope to make onset/offset clear
                    let envelope = 1;
                    if (t < 0.01) envelope = t / 0.01; // 10ms attack
                    if (t > 0.99) envelope = (1 - t) / 0.01; // 10ms release

                    data[i] = Math.sin(2 * Math.PI * freq * i / sampleRate) * envelope * 0.5;
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);

                const startTime = Date.now();
                source.start();

                // Highlight active note
                document.querySelectorAll('.note-card').forEach(card => card.classList.remove('active'));
                document.getElementById(`note${noteIndex}Card`).classList.add('active');

                log(`🔊 Note ${noteIndex}: ${notes[noteIndex].pitch} at ${new Date().toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);

                source.onended = () => {
                    document.getElementById(`note${noteIndex}Card`).classList.remove('active');
                    log(`✅ Note ${noteIndex} ended after ${Date.now() - startTime}ms`);
                    resolve();
                };
            });
        }

        async function playTwoNotes() {
            log('🎬 Starting two-note sequence');

            // Play first note (G4)
            await playNote(notes[0].freq, notes[0].duration, 0);

            // Gap between notes (from tuning_mode: 696.6 - (301.9 + 371.5) = 23.2ms)
            const gap = notes[1].offset - (notes[0].offset + notes[0].duration);
            log(`⏱️ Gap between notes: ${gap.toFixed(1)}ms`);

            await new Promise(resolve => setTimeout(resolve, gap));

            // Play second note (A4)
            await playNote(notes[1].freq, notes[1].duration, 1);

            log('✅ Two-note sequence complete');
        }

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        document.getElementById('playBtn').onclick = playTwoNotes;

        log('🎵 Conductor ready - click PLAY TWO NOTES to test');
    </script>
</body>
</html>
