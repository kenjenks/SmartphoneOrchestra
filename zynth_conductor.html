<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynth Conductor - Fully Corrected</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #00ccff;
        }
        .panel {
            background: #252525;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .note-display {
            background: #1a1a1a;
            border: 2px solid #00ccff;
            border-radius: 12px;
            padding: 30px;
            font-size: 3rem;
            text-align: center;
            color: #00ccff;
            margin: 20px 0;
            font-family: monospace;
        }
        .jitter-control {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .slider-group {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #888;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            height: 5px;
            background: #333;
            border-radius: 5px;
            outline: none;
        }
        .param-value {
            color: #00ccff;
            font-weight: bold;
        }
        .delay-display {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-size: 2rem;
            font-family: monospace;
            border-left: 4px solid #ffaa00;
        }
        .delay-value {
            color: #ffaa00;
            font-weight: bold;
        }
        .delay-label {
            color: #888;
            font-size: 0.9rem;
        }
        button {
            background: #00ccff;
            color: #000;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .status {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin: 20px 0;
        }
        .log-container {
            position: relative;
            margin-top: 20px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .copy-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .copy-btn:hover {
            background: #444;
        }
        .log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .firebase-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connected { background: #00ff00; }
        .disconnected { background: #ff0000; }
        .audio-status {
            font-family: monospace;
            color: #ffaa00;
            margin: 10px 0;
        }
        .ready-status {
            color: #ffaa00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🎵 Zynth Conductor - Fully Corrected</h1>

    <div class="panel">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <span class="firebase-status" id="firebaseStatus"></span>
            <span id="connectionText">Connecting to Firebase...</span>
        </div>

        <div class="note-display" id="noteDisplay">
            G4
        </div>

        <div class="audio-status" id="audioStatus">
            ⏳ Loading MP3 file...
        </div>

        <div class="jitter-control">
            <h3>🎲 Random Jitter</h3>
            <div class="slider-group">
                <div class="slider-label">
                    <span>Jitter Range (±ms)</span>
                    <span id="jitterValue" class="param-value">200 ms</span>
                </div>
                <input type="range" id="jitterSlider" min="0" max="500" value="200" step="10">
            </div>
            <p style="color: #888; font-size: 0.9rem;">
                First note: G4 at 302ms into MP3, duration 372ms<br>
                <span class="ready-status" id="readyStatus">⏳ Waiting for system ready...</span>
            </p>
        </div>

        <div class="delay-display">
            <div class="delay-label">Last Measured Delay</div>
            <div class="delay-value" id="lastDelay">---</div>
        </div>

        <button id="playBtn" disabled>🔊 PLAY SINGLE NOTE</button>

        <div class="status" id="status">
            Initializing...
        </div>

        <div class="log-container">
            <div class="log-header">
                <span>Event Log</span>
                <button class="copy-btn" id="copyLogBtn">📋 COPY LOG</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== GLOBAL VARIABLES ==========
        let audioCtx = null;
        let audioBuffer = null;
        let serverOffset = 0;
        let isOffsetReady = false;
        let isAudioReady = false;
        let isPlaying = false;

        // First note from tuning_mode.json - using forte flute (no warbles)
        const firstNote = {
            pitch: 'G4',
            offset: 301.9,  // ms into MP3 - this is a SEEK POSITION, not a delay
            duration: 371.5  // ms
        };

        // MP3 URL - forte flute, no warbles
        const MP3_URL = "https://static.wixstatic.com/mp3/9178d1_90075dcab43749b7a644df60ca7acc58.mp3";

        // Jitter range
        let maxJitter = 200;

        // ========== HELPER FUNCTIONS ==========
        function log(message) {
            const logDiv = document.getElementById('log');
            if (!logDiv) return;
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div>[${timestamp}] ${message}</div>` + logDiv.innerHTML;
            console.log(message);
        }

        function copyLog() {
            const logDiv = document.getElementById('log');
            const range = document.createRange();
            range.selectNodeContents(logDiv);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                log('📋 Log copied to clipboard');
            } catch (err) {
                console.error('Copy failed:', err);
            }

            selection.removeAllRanges();
        }

        function checkReady() {
            if (isOffsetReady && isAudioReady) {
                document.getElementById('playBtn').disabled = false;
                document.getElementById('readyStatus').innerHTML = '✅ System ready - Play button enabled';
                log('✅ System ready - Play button enabled');
            }
        }

        // ========== FIREBASE LISTENERS ==========
        // Server time offset - wait for this before enabling play
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            isOffsetReady = true;
            log(`⏱️ Server offset: ${serverOffset}ms`);
            checkReady();
        });

        // Connection status
        db.ref('.info/connected').on('value', snap => {
            const connected = snap.val();
            const statusEl = document.getElementById('firebaseStatus');
            const textEl = document.getElementById('connectionText');

            if (connected) {
                statusEl.className = 'firebase-status connected';
                textEl.innerText = 'Firebase Connected';
                log('🔌 Firebase connected');
            } else {
                statusEl.className = 'firebase-status disconnected';
                textEl.innerText = 'Firebase Disconnected';
                log('🔌 Firebase disconnected');
            }
        });

        // Listen for device feedback
        db.ref('zynth/device_feedback').on('value', snap => {
            const feedback = snap.val();
            if (feedback && feedback.delay !== undefined) {
                document.getElementById('lastDelay').innerText = feedback.delay + ' ms';
                log(`📊 Received device feedback: delay = ${feedback.delay}ms`);
            }
        });

        // ========== AUDIO FUNCTIONS ==========
        async function loadMP3() {
            try {
                document.getElementById('audioStatus').innerHTML = '⏳ Loading MP3 file...';
                document.getElementById('status').innerHTML = 'Loading MP3...';

                const response = await fetch(MP3_URL);
                const arrayBuffer = await response.arrayBuffer();

                audioCtx = new AudioContext();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                document.getElementById('audioStatus').innerHTML = '✅ MP3 loaded';
                document.getElementById('status').innerHTML = 'MP3 loaded, waiting for offset...';
                isAudioReady = true;
                log('✅ MP3 loaded successfully');
                checkReady();

            } catch (err) {
                document.getElementById('audioStatus').innerHTML = '❌ Failed to load MP3';
                document.getElementById('status').innerHTML = 'MP3 load failed';
                log(`❌ MP3 load error: ${err.message}`);
            }
        }

        // ========== JITTER CONTROL ==========
        document.getElementById('jitterSlider').addEventListener('input', (e) => {
            maxJitter = parseInt(e.target.value);
            document.getElementById('jitterValue').innerText = maxJitter + ' ms';
        });

        // ========== PLAYBACK FUNCTION ==========
        async function playNote() {
            if (isPlaying) {
                log('⚠️ Already playing');
                return;
            }

            if (!audioBuffer || !isOffsetReady) {
                log('❌ System not ready yet');
                return;
            }

            isPlaying = true;
            document.getElementById('playBtn').disabled = true;

            // Generate random jitter - this is the ONLY thing that affects when the note plays
            const jitter = Math.floor(Math.random() * (maxJitter * 2 + 1)) - maxJitter;

            // Get current Firebase-synced time
            const now = Date.now() + serverOffset;

            // Add extra buffer to account for Firebase write latency (worst case 400ms)
            // This ensures notePlayTime is always after the Firebase write completes
            const firebaseWriteBuffer = 500; // ms
            const bufferMs = 1000 + firebaseWriteBuffer;
            const scheduledWallTime = now + bufferMs; // When the sequence starts

            // IMPORTANT: The note plays at scheduledWallTime + jitter
            // The offset (302ms) is a SEEK POSITION within the MP3, not an additional delay
            const notePlayTime = scheduledWallTime + jitter;  // No +offset here!

            log('🎬 ===== STARTING NEW TEST =====');
            log(`🕐 Current Firebase time: ${new Date(now).toLocaleTimeString()}.${String(now % 1000).padStart(3, '0')}`);
            log(`📅 Sequence starting at: ${new Date(scheduledWallTime).toLocaleTimeString()}.${String(scheduledWallTime % 1000).padStart(3, '0')} (in ${bufferMs/1000}s)`);
            log(`🎲 Jitter: ${jitter > 0 ? '+' : ''}${jitter}ms`);
            log(`🎯 Note scheduled at: ${new Date(notePlayTime).toLocaleTimeString()}.${String(notePlayTime % 1000).padStart(3, '0')}`);
            log(`   (MP3 seek position: ${firstNote.offset}ms, duration: ${firstNote.duration}ms)`);

            // Send GO signal to Firebase with server timestamp
            await db.ref('zynth/single_note_test').set({
                status: 'ACTIVE',
                serverTimestamp: firebase.database.ServerValue.TIMESTAMP,
                conductorTime: now,
                scheduledWallTime: scheduledWallTime,  // This is a Firebase-synced timestamp
                note: {
                    index: 0,
                    pitch: firstNote.pitch,
                    offset: firstNote.offset,  // Seek position in MP3
                    duration: firstNote.duration,
                    jitter: jitter
                    // Note: expectedPlayTime is NOT sent - device will compute it
                }
            });

            log(`📤 GO signal sent to Firebase`);

            // Resume audio context if needed
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Calculate when to start playback using Web Audio API time
            const nowAudio = audioCtx.currentTime;
            const timeUntilStart = (notePlayTime - (Date.now() + serverOffset)) / 1000;

            // If timeUntilStart is negative, we've already missed the slot - abort
            if (timeUntilStart < 0) {
                log(`❌ ERROR: Missed playback window by ${(-timeUntilStart * 1000).toFixed(0)}ms`);
                isPlaying = false;
                document.getElementById('playBtn').disabled = false;
                return;
            }

            const scheduledAudioTime = nowAudio + timeUntilStart;

            log(`⏱️ Audio context now: ${nowAudio.toFixed(3)}s`);
            log(`⏱️ Scheduled audio time: ${scheduledAudioTime.toFixed(3)}s`);
            log(`⏱️ Delay until start: ${(timeUntilStart * 1000).toFixed(0)}ms`);

            // Schedule the note using Web Audio API's precise timing
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);

            // Start at the precise audio time, seeking to the correct offset in the MP3
            source.start(scheduledAudioTime, firstNote.offset / 1000, firstNote.duration / 1000);

            // Use a single source.onended callback for accurate timing
            // No separate setTimeout - this avoids race conditions
            source.onended = () => {
                const endTime = Date.now() + serverOffset;
                // Calculate actual start time based on scheduled audio time
                const actualStartTime = notePlayTime; // Best estimate
                const actualDuration = endTime - actualStartTime;

                log(`✅ Note ended at ${new Date(endTime).toLocaleTimeString()}.${String(endTime % 1000).padStart(3, '0')}`);
                log(`   Expected start was: ${new Date(notePlayTime).toLocaleTimeString()}.${String(notePlayTime % 1000).padStart(3, '0')}`);
                log(`   Actual duration: ${actualDuration}ms (expected: ${firstNote.duration}ms)`);
                log(`   Duration error: ${actualDuration - firstNote.duration}ms`);

                isPlaying = false;
                document.getElementById('playBtn').disabled = false;

                // Clear the test
                db.ref('zynth/single_note_test').remove();
            };

            // Also log when Web Audio thinks it started (via a separate callback)
            if (typeof source.onstart === 'function') {
                source.onstart = () => {
                    const startTime = Date.now() + serverOffset;
                    log(`🔊 Note ACTUALLY started at: ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);
                    log(`   Scheduled was: ${new Date(notePlayTime).toLocaleTimeString()}.${String(notePlayTime % 1000).padStart(3, '0')}`);
                    log(`   Playback delay: ${startTime - notePlayTime}ms`);
                };
            } else {
                // Fallback for browsers without onstart
                setTimeout(() => {
                    const startTime = Date.now() + serverOffset;
                    log(`🔊 Note estimated start: ${new Date(startTime).toLocaleTimeString()}.${String(startTime % 1000).padStart(3, '0')}`);
                }, timeUntilStart * 1000);
            }
        }

        // ========== INITIALIZATION ==========
        window.onload = () => {
            // Set up button handlers
            document.getElementById('playBtn').onclick = playNote;
            document.getElementById('copyLogBtn').onclick = copyLog;

            // Load MP3
            loadMP3();

            log('🎵 Zynth Conductor - Fully Corrected ready');
            log('🎯 First note: G4 at 302ms offset');
            log('⏳ Waiting for server offset and MP3 load...');
        };
    </script>
</body>
</html>
