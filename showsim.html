<!--

ShowSim: Feature List

1. Real-Time Timeline & Synchronization
- Firebase Integration: Connects to the Smartphone Orchestra Real-Time Database to fetch show scripts, timelines, and current cue states.

- Master Clock Emulation: Simulates the theater’s central timebase with manual seek (slider), play/pause controls, and adjustable playback speed (0.5x to 5.0x).

- Script Visualization: A dynamic sidebar "Show Script" that highlights the active cue and auto-scrolls to keep the current timeline event in view.

- MP3 Preloading System: Decodes audio into memory and keeps the "Start" button disabled until everything is ready.

- "Next Cue" Button: Scans the timeline for the next upcoming event and jumps the playhead to 3 seconds before that event starts.

- Resilient togglePlay: Explicitly awaits the audioCtx.resume() to ensure zero-latency starts even after the browser has put the audio tab to sleep.

2. Spatial Graphics Engine

- Coordinate Grid: Maps the theater floor using a scaled coordinate system (15.5m x 25.0m) to match the physical seat_config.tsv.

- Dynamic Cue Overlays: * Audio Cues: Represented by dashed circular rings showing the radius of effect.

- Lighting Cues: Represented by solid circular rings or global border flashes for non-spatial wash effects.

- Motion Tracking: Real-time interpolation of movement from originX/Y to destX/Y based on cue duration and easing.

- Path Visualizer (line segment): Allows you to see the "flight path" of a cue.

3. Interactive Seat Simulation (Virtual Listener)

- Seat Toggling: Users can click any seat on the canvas to "occupy" it. Toggling a seat transforms the audio simulation from a global mix to a localized point-of-view experience.

- Point-of-View Audio: When a seat is toggled "ON," the audio volume is dynamically modulated using the distance-attenuation algorithm from devicedist.html.

- Visual Occupancy Feedback: Selected seats are highlighted with a green interactive ring.

- Distance-Based Audio/Light: For each active cue, it calculates the seat-specific intensity using the same formula as devicedist.html: Math.max(0, 1 - (dist / radius)) for linear rolloff.

- Virtual Listener Monitor: The "Seat GUI" now aggregates data from all active cues, displaying the peak volume and the most recent light color affecting that seat.

4. Real-Time "Seat GUI" Monitor

- Live Data Readout: Displays the precise X, Y coordinates (xx.x, yy.y format and ID of the selected seat in a dedicated sidebar panel.

- Virtual Screen Preview: A rectangle representing the smartphone screen of the "Virtual Listener."

- Distance-Based Lighting: The rectangle changes color and brightness (opacity) in real-time as spatial lighting cues pass over the seat.

- Automatic Decay: Returns to black immediately once a cue moves outside the seat's reception radius.

- Volume Indicator: A percentage-based meter (0% to 100%) showing the current gain of the audio cue at that specific seat, accounting for linear vs. none rolloff settings.

5. Technical Architecture

- Asset Preloading: Automatically initializes audio buffers for stems defined in the script to ensure gapless transitions during simulation. After decoding each file, the system immediately triggers a 0.1s silent playback to ensure that the MP3 will be able to play on cue.

- Pillar Visualization: Displays the four "A9 Pillars" at the theater corners to provide spatial context for the distributed acoustic grid.

- Responsive Canvas: Scaled rendering that maintains coordinate accuracy regardless of browser zoom or window resizing.

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShowSim: Designer Visualization Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 20px; z-index: 10; }
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .loader-card { background: #222; padding: 40px; border-radius: 12px; border: 1px solid #444; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 420px; }
        #main-container { display: grid; grid-template-columns: 1fr 350px; flex: 1; overflow: hidden; }
        #canvas-container { background: #000; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }
        canvas { border: 1px solid #333; background: #050505; cursor: crosshair; transition: border 0.1s; }
        .sidebar { background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .panel-label { padding: 12px; background: #1a1a1a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #666; border-bottom: 1px solid #333; }
        #timeline-display { flex: 1; overflow-y: auto; padding: 10px; scroll-behavior: smooth; }
        
        #seat-gui { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        #seat-gui.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .gui-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        #virtual-screen { width: 100%; height: 60px; border: 2px solid #444; background: #000; margin-bottom: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #444; font-weight: bold; position: relative; overflow: hidden; }
        #virtual-screen-fill { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .val { font-family: 'Courier New', monospace; color: #4CAF50; font-weight: bold; }

        .cue-item { padding: 8px; margin-bottom: 4px; background: #181818; border-radius: 4px; font-size: 0.8rem; border-left: 3px solid #333; transition: all 0.2s; }
        .cue-item.active { background: #1d2b1d; border-left-color: #4CAF50; color: #fff; transform: scale(1.02); }
        #clock-display { font-family: 'Courier New', monospace; font-size: 1.4rem; color: #4CAF50; background: #000; padding: 4px 12px; border-radius: 4px; border: 1px solid #222; min-width: 110px; text-align: center; }
        
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #play-btn { background: #2e7d32; width: 100px; }
        #play-btn.playing { background: #c62828; }
        #next-cue-btn { background: #1565c0; }
        
        #progress-container { width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 20px 0; overflow: hidden; display: none; }
        #progress-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.1s; }
        .control-group { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loader-card">
            <h1 style="color: #4CAF50; margin: 0 0 10px 0;">ShowSim Designer</h1>
            <p id="loader-status" style="color: #888;">Synchronizing Theater Config...</p>
            <div id="progress-container"><div id="progress-fill"></div></div>
            <button id="start-btn" disabled onclick="startSim()">INITIALIZE STREAMS</button>
        </div>
    </div>

    <div id="header">
        <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
        <button id="next-cue-btn" onclick="jumpToNextCue()">⏭ NEXT CUE</button>
        <div class="control-group" style="flex-grow: 1;">
            <input type="range" id="time-slider" min="0" value="0" step="0.01" oninput="manualSeek()" style="flex-grow: 1; accent-color: #4CAF50;">
            <div id="clock-display">00:00:00</div>
        </div>
        <div class="control-group">
            <span style="color:#666">SPEED</span>
            <input type="range" id="speed-slider" min="0.5" max="5" value="1" step="0.5" oninput="updateSpeedLabel()">
            <span id="speed-label" style="min-width: 40px; font-family: monospace;">1.0x</span>
        </div>
    </div>

    <div id="main-container">
        <div id="canvas-container"><canvas id="simCanvas"></canvas></div>
        <div class="sidebar">
            <div class="panel-label">Show Script</div>
            <div id="timeline-display"></div>
            <div class="panel-label">Virtual Seat POV</div>
            <div id="seat-gui" class="disabled">
                <div class="gui-row">
                    <span>ID: <span id="gui-id" class="val">---</span></span>
                    <span>Pos: <span id="gui-pos" class="val">(0.0, 0.0)</span></span>
                </div>
                <div id="virtual-screen">
                    SCREEN PREVIEW
                    <div id="virtual-screen-fill"></div>
                </div>
                <div class="gui-row">
                    <span>Gain Intensity:</span>
                    <span id="gui-vol" class="val">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };

        let cues = [], timeline = [], seats = [], showStartTimeSecs = 0;
        let isPlaying = false, lastFrameTime = 0;
        let audioCtx, bufferCache = {}, durationCache = {}, activeSources = new Map();

        const pillars = [
            { id: "FL", x: 0, y: 0 }, { id: "FR", x: 15.5, y: 0 },
            { id: "BL", x: 0, y: 25 }, { id: "BR", x: 15.5, y: 25 }
        ];

        const ease = {
            linear: t => t,
            slowfastslow: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2
        };

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const SCALE = 25, PADDING = 60;

        window.onload = async () => {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const status = document.getElementById('loader-status');

            const rows = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P","Q"];
            rows.forEach((row, rIdx) => {
                for(let i=1; i<=10; i++) {
                    seats.push({ id: row + i, x: (i <= 5 ? 2.75 + (i-1) : 8.75 + (i-6)), y: 3.0 + rIdx, selected: false });
                }
            });

            try {
                const [scriptSnap, timelineSnap] = await Promise.all([
                    db.ref('show/script').once('value'),
                    db.ref('show/timeline').once('value')
                ]);
                cues = scriptSnap.val() || [];
                timeline = timelineSnap.val() || [];
                showStartTimeSecs = timeToSecs(timeline[0].time);
                status.innerText = "Data Synchronized. Assets Ready.";
                document.getElementById('start-btn').disabled = false;
            } catch (e) { status.innerText = "Firebase Connection Error."; }
        };

        async function startSim() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('progress-container').style.display = 'block';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const audioCues = cues.filter(c => c.type === 'AUDIO' && c.url);
            let loaded = 0;

            for (const cue of audioCues) {
                document.getElementById('loader-status').innerText = `Pre-buffering: ${cue.label}...`;
                try {
                    const res = await fetch(cue.url);
                    const buf = await audioCtx.decodeAudioData(await res.arrayBuffer());
                    bufferCache[cue.url] = buf;
                    durationCache[cue.url] = buf.duration;

                    // Silent Hardware Warm-up
                    const src = audioCtx.createBufferSource();
                    const g = audioCtx.createGain();
                    g.gain.value = 0; 
                    src.buffer = buf;
                    src.connect(g).connect(audioCtx.destination);
                    src.start(0);
                    src.stop(audioCtx.currentTime + 0.1);

                } catch (e) { console.error("Load fail:", cue.label); }
                loaded++;
                document.getElementById('progress-fill').style.width = `${(loaded/audioCues.length)*100}%`;
            }

            canvas.width = 15.5 * SCALE + (PADDING * 2);
            canvas.height = 25 * SCALE + (PADDING * 2);
            document.getElementById('time-slider').max = timeToSecs(timeline[timeline.length - 1].time) - showStartTimeSecs + 300;
            canvas.addEventListener('click', handleCanvasClick);
            document.getElementById('loader-overlay').style.display = 'none';
            render();
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - PADDING) / SCALE;
            const my = (e.clientY - rect.top - PADDING) / SCALE;
            let found = null;
            seats.forEach(s => {
                const dist = Math.sqrt((s.x - mx)**2 + (s.y - my)**2);
                if (dist < 0.5) found = s;
            });
            if (found) {
                const wasSelected = found.selected;
                seats.forEach(s => s.selected = false);
                found.selected = !wasSelected;
            }
            const s = seats.find(s => s.selected);
            document.getElementById('seat-gui').classList.toggle('disabled', !s);
            if (s) {
                document.getElementById('gui-id').innerText = s.id;
                document.getElementById('gui-pos').innerText = `(${s.x.toFixed(1)}, ${s.y.toFixed(1)})`;
            }
            render();
        }

        async function togglePlay() {
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            isPlaying = !isPlaying;
            document.getElementById('play-btn').innerText = isPlaying ? '⏸ PAUSE' : '▶ PLAY';
            document.getElementById('play-btn').classList.toggle('playing', isPlaying);
            if (isPlaying) { 
                lastFrameTime = performance.now(); 
                requestAnimationFrame(simLoop); 
            } else { stopAllAudio(); }
        }

        function jumpToNextCue() {
            const currentT = parseFloat(document.getElementById('time-slider').value);
            // Find first cue that starts at least 1 second after current playhead
            const next = timeline.find(entry => (timeToSecs(entry.time) - showStartTimeSecs) > currentT + 1.0);
            if (next) {
                const targetT = Math.max(0, (timeToSecs(next.time) - showStartTimeSecs) - 3.0);
                document.getElementById('time-slider').value = targetT;
                manualSeek();
            }
        }

        function stopAllAudio() { activeSources.forEach(o => { try { o.source.stop(); } catch(e){} }); activeSources.clear(); }
        function manualSeek() { stopAllAudio(); render(); }
        function updateSpeedLabel() { document.getElementById('speed-label').innerText = parseFloat(document.getElementById('speed-slider').value).toFixed(1) + 'x'; }

        function simLoop(now) {
            if (!isPlaying) return;
            const speed = parseFloat(document.getElementById('speed-slider').value);
            const dt = ((now - lastFrameTime) / 1000) * speed;
            lastFrameTime = now;
            const slider = document.getElementById('time-slider');
            slider.value = Math.min(parseFloat(slider.value) + dt, parseFloat(slider.max));
            render();
            if (parseFloat(slider.value) < parseFloat(slider.max)) requestAnimationFrame(simLoop); else togglePlay();
        }

        function render() {
            const currentT = parseFloat(document.getElementById('time-slider').value);
            document.getElementById('clock-display').innerText = secsToClock(showStartTimeSecs + currentT);
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Pillars
            pillars.forEach(p => {
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(p.x * SCALE + PADDING, p.y * SCALE + PADDING, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4CAF50'; ctx.font = "bold 10px monospace"; ctx.fillText(p.id, p.x * SCALE + PADDING - 6, p.y * SCALE + PADDING + 4);
            });

            const selectedSeat = seats.find(s => s.selected);
            let activeIdxs = new Set(), guiVol = 0, guiColor = '#000', guiOpac = 0;

            timeline.forEach((entry, idx) => {
                const cue = cues.find(c => c.label === entry.cueLabel);
                if (!cue) return;
                const start = timeToSecs(entry.time) - showStartTimeSecs;
                const dur = cue.elapsedT || durationCache[cue.url] || 0;
                const localT = currentT - start;

                if (localT >= 0 && (dur === 0 || localT <= dur)) {
                    activeIdxs.add(idx);
                    const rawPct = dur > 0 ? localT / dur : 0;
                    const curve = ease[cue.motion] || ease.linear;
                    const pct = curve(rawPct);

                    const isSpatial = cue.originX !== undefined;
                    const curX = isSpatial ? cue.originX + ((cue.destX ?? cue.originX) - cue.originX) * pct : null;
                    const curY = isSpatial ? cue.originY + ((cue.destY ?? cue.originY) - cue.originY) * pct : null;

                    // Global Light Flash
                    if (!isSpatial && cue.type === 'LIGHT') {
                        canvas.style.borderColor = cue.color || '#4CAF50';
                        if (selectedSeat) { guiColor = cue.color || '#fff'; guiOpac = 1; }
                    }

                    seats.forEach(seat => {
                        let intensity = 1;
                        if (isSpatial) {
                            const d = Math.sqrt((seat.x - curX)**2 + (seat.y - curY)**2);
                            if (cue.rolloff === 'none') intensity = d <= cue.radius ? 1 : 0;
                            else intensity = cue.radius ? Math.max(0, 1 - (d / cue.radius)) : 1;
                        }
                        if (seat.selected) {
                            if (cue.type === 'AUDIO') guiVol = Math.max(guiVol, intensity);
                            if (cue.type === 'LIGHT' || cue.color) { guiColor = cue.color || '#fff'; guiOpac = Math.max(guiOpac, intensity); }
                        }
                        if (intensity > 0) {
                            ctx.globalAlpha = 0.2 + (intensity * 0.8);
                            ctx.fillStyle = cue.color || (cue.type === 'AUDIO' ? '#2196F3' : '#fff');
                            ctx.beginPath(); ctx.arc(seat.x * SCALE + PADDING, seat.y * SCALE + PADDING, 3, 0, Math.PI*2); ctx.fill();
                        }
                    });

                    // Audio Engine
                    if (isPlaying && cue.type === 'AUDIO' && bufferCache[cue.url]) {
                        if (!activeSources.has(idx)) {
                            const src = audioCtx.createBufferSource();
                            const gain = audioCtx.createGain();
                            src.buffer = bufferCache[cue.url];
                            src.connect(gain).connect(audioCtx.destination);
                            src.start(0, localT);
                            activeSources.set(idx, { source: src, gain });
                        }
                        activeSources.get(idx).gain.gain.setTargetAtTime(selectedSeat ? guiVol : 1.0, audioCtx.currentTime, 0.05);
                    }

                    // Visual Path Line
                    if (isSpatial && cue.destX !== undefined) {
                        ctx.globalAlpha = 0.15; ctx.strokeStyle = cue.color || '#fff'; ctx.setLineDash([2, 4]);
                        ctx.beginPath();
                        ctx.moveTo(cue.originX * SCALE + PADDING, cue.originY * SCALE + PADDING);
                        ctx.lineTo(cue.destX * SCALE + PADDING, cue.destY * SCALE + PADDING);
                        ctx.stroke();
                        ctx.setLineDash([]); ctx.beginPath(); ctx.arc(cue.destX * SCALE + PADDING, cue.destY * SCALE + PADDING, 2, 0, Math.PI*2); ctx.stroke();
                    }

                    // Active Sweep Ring
                    if (isSpatial) {
                        ctx.globalAlpha = 0.5; ctx.strokeStyle = cue.color || '#fff'; ctx.setLineDash(cue.type === 'AUDIO' ? [5, 5] : []);
                        ctx.beginPath(); ctx.arc(curX * SCALE + PADDING, curY * SCALE + PADDING, (cue.radius || 1) * SCALE, 0, Math.PI*2); ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            });

            activeSources.forEach((o, i) => { if (!activeIdxs.has(i)) { try { o.source.stop(); } catch(e){} activeSources.delete(i); } });
            if (activeIdxs.size === 0) canvas.style.borderColor = '#333';

            if (selectedSeat) {
                document.getElementById('gui-vol').innerText = Math.round(guiVol * 100) + "%";
                document.getElementById('virtual-screen-fill').style.background = guiColor;
                document.getElementById('virtual-screen-fill').style.opacity = guiOpac;
                ctx.globalAlpha = 1; ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(selectedSeat.x * SCALE + PADDING, selectedSeat.y * SCALE + PADDING, 8, 0, Math.PI*2); ctx.stroke();
            }

            const list = document.getElementById('timeline-display');
            list.innerHTML = '';
            timeline.forEach((e, i) => {
                const div = document.createElement('div');
                div.className = `cue-item ${activeIdxs.has(i) ? 'active' : ''}`;
                div.innerHTML = `<strong>${e.time}</strong> — ${e.label}`;
                list.appendChild(div);
                if (activeIdxs.has(i) && isPlaying && activeIdxs.size === 1) div.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            });
        }

        function timeToSecs(hms) {
            const a = hms.split(':');
            // a[2] might be "40.909", parseFloat preserves the .909
            return (+a[0]) * 3600 + (+a[1]) * 60 + parseFloat(a[2]);
        }

        function secsToClock(ts) { return [Math.floor(ts/3600)%24, Math.floor((ts%3600)/60), Math.floor(ts%60)].map(v => v.toString().padStart(2, '0')).join(':'); }
    </script>
</body>
</html>
