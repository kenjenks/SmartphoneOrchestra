<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
in cues.json (as represented by the RTDBMS)
as commanded by timeline.json (as represented by the RTDBMS).

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smartphone Orchestra: Performer Node</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; touch-action: none; }
        #setup-screen { padding: 20px; max-width: 400px; z-index: 10; }
        .checklist { text-align: left; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .checklist label { display: block; margin: 10px 0; font-size: 1.1rem; }
        .btn-ready { width: 100%; padding: 20px; font-size: 1.5rem; background: #007bff; color: #fff; border: none; border-radius: 50px; cursor: pointer; transition: background 0.3s; }
        .btn-ready:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status { margin-top: 20px; font-family: monospace; color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        #show-screen { display: none; width: 100%; height: 100%; }

        /* Recovery Overlay */
        #recovery-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .pulse-text { animation: pulse-red 1.5s infinite; font-size: 1.5rem; color: #ff4444; font-weight: bold; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Smartphone Orchestra</h1>
        <div class="checklist">
            <label><input type="checkbox" id="chk-audio" onchange="checkStatus()"> Silence Ringer / Max Vol</label>
            <label><input type="checkbox" id="chk-wifi" onchange="checkStatus()"> Theatre Wi-Fi Connected</label>
            <label><input type="checkbox" id="chk-bright" onchange="checkStatus()"> Max Screen Brightness</label>
        </div>
        <button id="ready-btn" class="btn-ready" disabled>ENTER THE MESH</button>
        <div id="status">Syncing with Conductor...</div>
    </div>

    <div id="show-screen"></div>

    <div id="recovery-overlay" onclick="resumeAudio()">
        <div class="pulse-text">CONNECTION INTERRUPTED</div>
        <p>Tap to rejoin the performance</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
            messagingSenderId: "722537253165",
            appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx, masterGain, highPass;
        let mySeat = { id: 'GUEST', x: 0, y: 0 };
        const bufferCache = {};

        // --- LINEAR CLOCK SYNC ---
        let syncPoints = [];
        let driftRate = 1.0;
        let timeOffset = 0;

        function getSyncedTime() {
            return (Date.now() * driftRate) + timeOffset;
        }

        db.ref('laptop/clock').on('value', snap => {
            if (!snap.exists()) return;
            const laptopTime = snap.val();
            const localTime = Date.now();
            syncPoints.push({ local: localTime, remote: laptopTime });
            if (syncPoints.length > 10) syncPoints.shift();

            if (syncPoints.length >= 2) {
                const p1 = syncPoints[0];
                const p2 = syncPoints[syncPoints.length - 1];
                driftRate = (p2.remote - p1.remote) / (p2.local - p1.local);
                timeOffset = p2.remote - (p2.local * driftRate);
            } else {
                timeOffset = laptopTime - localTime;
            }
        });

        // --- IDENTITY & ASSETS ---
        async function resolveIdentity() {
            const params = new URLSearchParams(window.location.search);
            mySeat.id = params.get('id') || 'GUEST_' + Math.floor(Math.random()*1000);
            mySeat.x = parseFloat(params.get('x')) || 0;
            mySeat.y = parseFloat(params.get('y')) || 0;
        }

        async function preloadAssets() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch('cues.json');
                const cues = await response.json();
                const urls = [...new Set(cues.filter(c => c.type === 'AUDIO').map(c => c.url))];
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                for (let i = 0; i < urls.length; i++) {
                    statusDiv.innerText = `PRELOADING: ${Math.round((i/urls.length)*100)}%`;
                    const res = await fetch(urls[i]);
                    bufferCache[urls[i]] = await audioCtx.decodeAudioData(await res.arrayBuffer());
                }
                statusDiv.innerText = `READY - ${mySeat.id}`;
                checkStatus();
            } catch (e) { statusDiv.innerText = "LOAD ERROR"; }
        }

        function checkStatus() {
            const readyBtn = document.getElementById('ready-btn');
            readyBtn.disabled = !(document.getElementById('chk-audio').checked &&
                                  document.getElementById('chk-wifi').checked &&
                                  document.getElementById('chk-bright').checked);
        }

        // --- PERFORMANCE LOCKS ---
        async function startPerformanceMode() {
            if (screen.orientation && screen.orientation.lock) {
                try {
                    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
                    await screen.orientation.lock('portrait-primary');
                } catch (e) { console.warn("Lock failed"); }
            }
            audioCtx.onstatechange = () => {
                document.getElementById('recovery-overlay').style.display =
                    (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') ? 'flex' : 'none';
            };
        }

        async function resumeAudio() {
            if (audioCtx) await audioCtx.resume();
        }

        function initAudioEngine() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();

            // --- THE PILLAR BYPASS LOGIC ---
            if (mySeat.id.toUpperCase().includes('PILLAR')) {
                // A9 Beacons have subwoofers. Provide full-range audio.
                console.log("PILLAR DETECTED: Disabling High-Pass Protection.");
                masterGain.connect(audioCtx.destination);
            } else {
                // Patron phone protection: Cut everything below 350Hz.
                highPass = audioCtx.createBiquadFilter();
                highPass.type = "highpass";
                highPass.frequency.setValueAtTime(350, audioCtx.currentTime);
                masterGain.connect(highPass).connect(audioCtx.destination);
            }
        }

        function playSpatialAudio(cue) {
            const dist = Math.sqrt(Math.pow(mySeat.x - cue.originX, 2) + Math.pow(mySeat.y - cue.originY, 2));
            if (dist > cue.radius) return;

            let vol = (cue.rolloff === "none") ? 1.0 : (1 - (dist / cue.radius));
            const serverNow = getSyncedTime();
            const delaySec = (cue.triggerTime - serverNow) / 1000;
            const startTime = audioCtx.currentTime + delaySec;

            if (delaySec < -1.0) return;

            if (cue.type === 'AUDIO' && bufferCache[cue.url]) {
                const source = audioCtx.createBufferSource();
                source.buffer = bufferCache[cue.url];
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(vol, startTime);
                source.connect(g).connect(masterGain);
                source.start(Math.max(audioCtx.currentTime, startTime));
            }

            if (cue.type === 'LIGHT' || cue.color) {
                setTimeout(() => {
                    document.getElementById('show-screen').style.background = cue.color || '#000';
                }, Math.max(0, delaySec * 1000));
            }
        }

        document.getElementById('ready-btn').onclick = async () => {
            initAudioEngine();
            await startPerformanceMode();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';
            db.ref(`devices/${mySeat.id}`).set({ ...mySeat, online: true, lastSeen: Date.now() });
            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) {
                    if (cue.action === 'KILL') location.reload();
                    playSpatialAudio(cue);
                }
            });
        };

        window.onload = async () => {
            await resolveIdentity();
            await preloadAssets();
        };
    </script>
</body>
</html>
