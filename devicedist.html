<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
in cues.json (as represented by the RTDBMS)
as commanded by timeline.json (as represented by the RTDBMS).

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smartphone Orchestra: Performer Node</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; touch-action: none; }
        #setup-screen { padding: 20px; max-width: 400px; z-index: 10; }
        #show-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; }
        .btn-ready { background: #007bff; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0,123,255,0.5); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 id="id-display">Connecting...</h1>
        <button id="ready-btn" class="btn-ready">I AM READY</button>
    </div>

    <div id="show-screen"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mySeat = { id: 'unknown', x: 0, y: 0 };
        let audioCtx, masterGain, bufferCache = {};
        let activeAnimation = null; // Holds the requestAnimationFrame ID

        async function resolveIdentity() {
            const params = new URLSearchParams(window.location.search);
            mySeat.id = params.get('id') || 'Z99';
            mySeat.x = parseFloat(params.get('x')) || 0;
            mySeat.y = parseFloat(params.get('y')) || 0;
            document.getElementById('id-display').innerText = `Seat ${mySeat.id}`;
        }

        async function preloadAssets() {
            const snap = await db.ref('show/script').once('value');
            const script = snap.val() || [];
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);

            for (const cue of script) {
                if (cue.type === 'AUDIO' && cue.url) {
                    const res = await fetch(cue.url);
                    const data = await res.arrayBuffer();
                    bufferCache[cue.url] = await audioCtx.decodeAudioData(data);
                }
            }
        }

        function playSpatialCue(cue) {
            // Cancel any previous sweep animation
            if (activeAnimation) cancelAnimationFrame(activeAnimation);

            const startTime = cue.triggerTime / 1000; // Firebase timestamp in seconds
            const duration = cue.elapsedT || 0;
            const screen = document.getElementById('show-screen');

            let audioSource = null;
            let audioGain = null;

            // 1. Initialize Audio if applicable
            if (cue.type === 'AUDIO' && bufferCache[cue.url]) {
                audioSource = audioCtx.createBufferSource();
                audioSource.buffer = bufferCache[cue.url];
                audioGain = audioCtx.createGain();
                audioSource.connect(audioGain).connect(masterGain);
                audioSource.start(Math.max(audioCtx.currentTime, startTime));

                // Hard Stop at elapsedT
                if (duration > 0) {
                    audioSource.stop(startTime + duration);
                }
            }

            // 2. The Animation Loop (The Sweep)
            function update() {
                const now = audioCtx.currentTime;
                const elapsedSinceStart = now - startTime;

                // If cue is finished, reset screen and stop loop
                if (duration > 0 && elapsedSinceStart > duration) {
                    screen.style.background = '#000';
                    if (audioGain) audioGain.gain.setTargetAtTime(0, now, 0.05);
                    return;
                }

                // Calculate current source position (Interpolate between origin and dest)
                let currentX = cue.originX || 0;
                let currentY = cue.originY || 0;

                if (duration > 0 && cue.destX !== undefined) {
                    const pct = Math.min(1, elapsedSinceStart / duration);
                    currentX = cue.originX + (cue.destX - cue.originX) * pct;
                    currentY = cue.originY + (cue.destY - cue.originY) * pct;
                }

                // Spatial Logic
                const dist = Math.sqrt(Math.pow(mySeat.x - currentX, 2) + Math.pow(mySeat.y - currentY, 2));
                let intensity = 0;

                if (cue.radius) {
                    if (cue.rolloff === 'linear') {
                        intensity = Math.max(0, 1 - (dist / cue.radius));
                    } else { // 'none' / hard edge
                        intensity = dist <= cue.radius ? 1 : 0;
                    }
                } else {
                    intensity = 1; // Global cue if no radius
                }

                // Apply to Light
                if (cue.type === 'LIGHT' || cue.color) {
                    if (intensity > 0) {
                        screen.style.background = cue.color || '#fff';
                        screen.style.opacity = intensity;
                    } else {
                        screen.style.background = '#000';
                    }
                }

                // Apply to Audio
                if (audioGain) {
                    audioGain.gain.setTargetAtTime(intensity, now, 0.02);
                }

                activeAnimation = requestAnimationFrame(update);
            }

            if (audioCtx.currentTime >= startTime || duration > 0) {
                update();
            }
        }

        document.getElementById('ready-btn').onclick = async () => {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) {
                    if (cue.action === 'KILL') location.reload();
                    playSpatialCue(cue);
                }
            });
        };

        window.onload = async () => {
            await resolveIdentity();
            await preloadAssets();
            document.getElementById('ready-btn').disabled = false;
        };
    </script>
</body>
</html>
