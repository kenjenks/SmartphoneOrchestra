<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
in cues.json (as represented by the RTDBMS)
as commanded by timeline.json (as represented by the RTDBMS).

devicedist.html: Feature List

1. Synchronized Spatial Audio Engine
- Firebase Real-Time Integration: Listens for 'currentCue' updates and maps
  them to local playback using a shared master clock to eliminate jitter.

- Acoustic Spatialization: Calculates real-time gain based on the distance
  between the patron's seat (from seat_config.tsv) and the sound's
  originX/Y coordinates.

- Hardware "Silent Warm-up": Triggers a 100ms silent burst immediately
  upon receiving a cue to prime the MP3 decoder and wake the mobile
  device's audio hardware before the actual scheduled start time.

- Non-Blocking Asset Preloading: Fetches and decodes all AUDIO type
  cues into a local bufferCache during the initial setup phase.

2. A9 Pillar Management (Anchor Mode)
- Identity-Based Filtering: Recognizes "PILLAR_" seat_ids and
  automatically filters out individual instrument stems to play only
  the high-fidelity Master Mixes designed for the corners.

- Deep Bass Reinforcement: Provides the room-wide low-frequency
  foundation for localized phone sounds, acting as a "subwoofer anchor."

3. Additive Visual Engine
- Global Animation Loop: Uses requestAnimationFrame to provide 60fps
  color updates without the flickering or "strobe" effects.

- RGB Additive Blending: Implements 'lighter' composite operations,
  allowing overlapping light cues to mix colors mathematically
  (e.g., Red + Blue = Magenta).

- Spatial Light Mapping: Scales screen brightness based on the patron’s
  proximity to the light's originX/Y, allowing for sweeps and pulses.

4. Performance & Reliability
- Asset Resilience: Wraps preloading in try/catch blocks to ensure
  a single missing MP3 doesn't crash the entire performer node.

- Battery & System Monitoring: Reports device battery level and
  charging status back to Firebase for real-time stage management.

- System Kill Switch: Listens for 'SYSTEM' cues with 'KILL' actions
  to force immediate browser reloads across all nodes.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smartphone Orchestra: Performer Node</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; touch-action: none; }
        #setup-screen { padding: 20px; max-width: 400px; z-index: 10; }
        #show-screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; }
        .btn { padding: 15px 30px; font-size: 1.2rem; background: #444; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .btn:disabled { background: #222; color: #555; }
        #status { margin-top: 10px; font-size: 0.8rem; color: #888; }
        #visual-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 id="seat-display">Locating Seat...</h2>
        <button id="ready-btn" class="btn" disabled>ENTER ORCHESTRA</button>
        <div id="status">Syncing with Theater...</div>
    </div>

    <div id="show-screen">
        <canvas id="visual-canvas"></canvas>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let myIdentity = { x: 7.7, y: 12.5, seat_id: 'Unknown' };
        let bufferCache = {};

        // Light Animation Globals
        const canvas = document.getElementById('visual-canvas');
        const ctx = canvas.getContext('2d');
        let activeLightCues = [];
        let animationFrameRequested = false;

        async function resolveIdentity() {
            const params = new URLSearchParams(window.location.search);
            const seatId = params.get('seat');
            if (!seatId) return;

            const snap = await db.ref('theater/seats').once('value');
            snap.forEach(child => {
                if (child.val().seat_id === seatId) {
                    myIdentity = child.val();
                    document.getElementById('seat-display').innerText = "Seat " + seatId;
                }
            });
        }

        async function preloadAssets() {
            const snap = await db.ref('show/cues').once('value');
            const cues = snap.val();
            for (let key in cues) {
                const cue = cues[key];
                if (cue.type === 'AUDIO' && cue.url && !bufferCache[cue.url]) {
                    try {
                        const res = await fetch(cue.url);
                        const data = await res.arrayBuffer();
                        bufferCache[cue.url] = await audioCtx.decodeAudioData(data);
                    } catch (e) { console.error("Load failed:", cue.label); }
                }
            }
            document.getElementById('status').innerText = "Orchestra Ready";
        }

        // Global Light Loop: Blends all active cues
        function updateLights() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter'; // Additive blending (R+R, G+G, B+B)

            const now = Date.now();
            activeLightCues = activeLightCues.filter(c => now < c.endTime);

            activeLightCues.forEach(cue => {
                const elapsed = now - cue.startTime;
                const progress = elapsed / cue.duration;

                // Linear fade out
                const fadeIntensity = Math.max(0, 1 - progress);

                // Spatial Intensity
                let spatialMult = 1.0;
                if (cue.originX !== undefined) {
                    const dist = Math.sqrt(Math.pow(myIdentity.x - cue.originX, 2) + Math.pow(myIdentity.y - cue.originY, 2));
                    spatialMult = Math.max(0, 1 - (dist / (cue.radius || 15)));
                }

                ctx.globalAlpha = fadeIntensity * spatialMult;
                ctx.fillStyle = cue.color || '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            if (activeLightCues.length > 0) {
                requestAnimationFrame(updateLights);
            } else {
                animationFrameRequested = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        async function playSpatialCue(cue) {
            // --- PILLAR & AUDIO FILTERING ---
            if (cue.type === 'AUDIO') {
                const isPillar = myIdentity.seat_id.startsWith("PILLAR");
                const isPillarCue = cue.label.startsWith("PILLAR_MASTER");
                if (isPillar && cue.label !== myIdentity.seat_id.replace("PILLAR_", "PILLAR_MASTER_")) return;
                if (!isPillar && isPillarCue) return;
            }

            const now = Date.now();
            const scheduledTime = cue.scheduledTime || now;
            const delay = (scheduledTime - now) / 1000;

            // --- AUDIO LOGIC ---
            if (cue.type === 'AUDIO' && cue.url) {
                if (!bufferCache[cue.url]) {
                    const res = await fetch(cue.url);
                    const data = await res.arrayBuffer();
                    bufferCache[cue.url] = await audioCtx.decodeAudioData(data);
                }
                const buffer = bufferCache[cue.url];

                // Silent Hardware Warm-up (decoder priming)
                const warmUp = audioCtx.createBufferSource();
                const warmUpGain = audioCtx.createGain();
                warmUp.buffer = buffer;
                warmUpGain.gain.value = 0;
                warmUp.connect(warmUpGain);
                warmUpGain.connect(audioCtx.destination);
                warmUp.start(0, 0, 0.1);

                // Spatial Volume calculation
                let volume = 1.0;
                if (cue.originX !== undefined) {
                    const dist = Math.sqrt(Math.pow(myIdentity.x - cue.originX, 2) + Math.pow(myIdentity.y - cue.originY, 2));
                    if (cue.rolloff === 'linear') volume = Math.max(0, 1 - (dist / (cue.radius || 10)));
                }

                const source = audioCtx.createBufferSource();
                const gainNode = audioCtx.createGain();
                source.buffer = buffer;
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + Math.max(0, delay));
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                source.start(audioCtx.currentTime + Math.max(0, delay));
            }

            // --- ADDITIVE LIGHT LOGIC ---
            if (cue.type === 'LIGHT') {
                const duration = cue.elapsedT ? cue.elapsedT * 1000 : 3000;

                setTimeout(() => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;

                    activeLightCues.push({
                        ...cue,
                        startTime: Date.now(),
                        endTime: Date.now() + duration,
                        duration: duration
                    });

                    if (!animationFrameRequested) {
                        animationFrameRequested = true;
                        requestAnimationFrame(updateLights);
                    }
                }, Math.max(0, scheduledTime - Date.now()));
            }
        }

        document.getElementById('ready-btn').onclick = async () => {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) {
                    if (cue.action === 'KILL') location.reload();
                    playSpatialCue(cue);
                }
            });
        };

        window.onload = async () => {
            await resolveIdentity();
            await preloadAssets();
            document.getElementById('ready-btn').disabled = false;
        };
    </script>
</body>
</html>
