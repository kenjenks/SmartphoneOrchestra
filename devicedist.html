<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
as commanded by timeline manifests received via GO signals.

devicedist.html: Feature List

1. Synchronized Spatial Audio Engine
- Firebase Real-Time Integration: Listens for GO signals and calibration data
  using a shared master clock to eliminate jitter.

- Acoustic Spatialization: Calculates real-time gain based on the distance
  between the patron's seat (from seat_config.tsv) and the sound's
  originX/Y coordinates as they move over time.

- Hardware "Silent Warm-up": Triggers a 100ms silent burst 500ms
  before the scheduled start time to prime the MP3 decoder and wake the mobile
  device's audio hardware, ensuring zero-latency playback at the precise moment.

- Non-Blocking Asset Preloading: Fetches and decodes all AUDIO type
  cues from the Firebase show/movements timeline during setup.

2. A9 Pillar Management (Anchor Mode)
- Identity-Based Filtering: Recognizes "PILLAR_" seat_ids and
  automatically filters out individual instrument stems to play only
  the high-fidelity Master Mixes designed for the corners.

- Deep Bass Reinforcement: Provides the room-wide low-frequency
  foundation for localized phone sounds, acting as a "subwoofer anchor."

3. Additive Visual Engine
- Global Animation Loop: Uses requestAnimationFrame to provide 60fps
  color updates without the flickering or "strobe" effects.

- RGB Additive Blending: Implements 'lighter' composite operations,
  allowing overlapping light cues to mix colors mathematically
  (e.g., Red + Blue = Magenta).

- Spatial Light Mapping: Scales screen brightness based on the patron’s
  proximity to the light's originX/Y, allowing for sweeps and pulses.

4. Decentralized Statistical Calibration (for the Bach
"Jesu, Joy of Man's Desiring" sequence)
- Ultrasonic Pulse Detection via Firebase: Listens for conductor's
  detection timestamps at tuning/last_heard
- One-Way Lag Calculation: Compares pulse playback time with heard time
- Local Storage: Maintains calibrated lag value for precise synchronization
- Single Flute MP3: Plays the encoded flute audio with volume ramping
  only for notes assigned to this device
- Pillar Fabric: All four pillars play their continuous MP3s
  throughout the tuning movement, providing the musical foundation

5. Distributed Timeline Execution (Model B)
- GO Signal Handler: Processes movement start commands with full timeline
- Local Scheduling: Each device schedules its own cues using setTimeout
- Movement Buffer: Respects movement-specific buffer times (typically 1.0s)
- No reliance on individual cue pushes from conductor

6. Performance & Reliability
- Asset Resilience: Wraps preloading in try/catch blocks to ensure
  a single missing MP3 doesn't crash the entire performer node.

- Battery & System Monitoring: Reports device battery level and
  charging status back to Firebase for real-time stage management.

- "I'm Still Alive" message sent to conductor.html every 10 +/- 1 s

- System Kill Switch: Listens for 'KILL' actions
  to force immediate browser reloads across all nodes.

-->

        // --- IDENTITY RESOLUTION - Reads from Firebase seat_config ---
        async function resolveIdentity() {
            try {
                // Get seat ID from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const seatId = urlParams.get('seat');
                console.log("🔍 Looking for seat:", seatId);

                if (!seatId) {
                    console.warn("No seat ID in URL, using default for testing");
                    document.getElementById('seat-label').innerText = `No Seat ID (using default)`;
                    // For testing, use a default seat
                    mySeat = { id: 'G12', x: 7.75, y: 12.5 };
                    document.getElementById('id-ind').className = 'indicator syncing';
                    return true;
                }

                document.getElementById('seat-label').innerText = `Seat ${seatId} (loading...)`;

                // Read from seat_config/seats where admin.html uploads
                const seatsSnap = await db.ref('seat_config/seats').once('value');
                const seatsData = seatsSnap.val();

                console.log("📊 Firebase seat data:", seatsData);

                if (!seatsData) {
                    console.warn("No seat data in Firebase, falling back to local TSV");
                    // Fallback to local TSV
                    const response = await fetch('seat_config.tsv');
                    const data = await response.text();
                    const rows = data.split('\n').map(r => r.split('\t'));
                    const config = rows.find(r => r[0] === seatId);

                    console.log("📄 TSV rows:", rows.slice(0, 5));
                    console.log("🎯 Found in TSV:", config);

                    if (config) {
                        mySeat = { id: config[0], x: parseFloat(config[1]), y: parseFloat(config[2]) };
                        document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                        document.getElementById('id-ind').className = 'indicator active';

                        // Also upload to Firebase for future reference
                        await db.ref(`seat_config/seats/${seatId}`).set({
                            id: mySeat.id,
                            x: mySeat.x,
                            y: mySeat.y
                        });

                        return true;
                    }
                } else {
                    // Find seat by ID in the seats object
                    // seatsData is an object with seat IDs as keys
                    if (seatsData[seatId]) {
                        mySeat = {
                            id: seatId,
                            x: seatsData[seatId].x,
                            y: seatsData[seatId].y
                        };
                        document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                        document.getElementById('id-ind').className = 'indicator active';
                        console.log(`✅ Resolved seat ${seatId} at (${mySeat.x}, ${mySeat.y})`);
                        return true;
                    } else {
                        console.warn(`Seat ${seatId} not found in Firebase`);
                        // Try to search as array if it's an array
                        if (Array.isArray(seatsData)) {
                            const config = seatsData.find(s => s.id === seatId);
                            if (config) {
                                mySeat = { id: config.id, x: config.x, y: config.y };
                                document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                                document.getElementById('id-ind').className = 'indicator active';
                                console.log(`✅ Resolved seat ${seatId} from array`);
                                return true;
                            }
                        }
                    }
                }

                console.error(`Seat ${seatId} not found in any source`);
                document.getElementById('seat-label').innerText = `Seat ${seatId} NOT FOUND`;
                document.getElementById('id-ind').className = 'indicator error';
                return false;

            } catch (e) {
                console.error("Identity Resolution Error:", e);

        // --- HEARTBEAT FUNCTION - staggered "I'm still active" signal ---
        function startHeartbeat() {
            if (!mySeat) return;

            // Clear any existing heartbeat
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            if (heartbeatTimer) {
                clearTimeout(heartbeatTimer);
                heartbeatTimer = null;
            }

            console.log(`💓 Starting heartbeat for ${mySeat.id} (base interval: ${HEARTBEAT_BASE_INTERVAL_MS}ms ±1000ms)`);

            // Schedule the first heartbeat with random jitter
            scheduleNextHeartbeat();
        }

        function scheduleNextHeartbeat() {
            // Calculate next interval with random jitter (±1000ms)
            const jitter = Math.floor(Math.random() * HEARTBEAT_JITTER_MS) - (HEARTBEAT_JITTER_MS / 2);
            const nextInterval = Math.max(1000, HEARTBEAT_BASE_INTERVAL_MS + jitter); // Ensure at least 1 second

            if (heartbeatTimer) {
                clearTimeout(heartbeatTimer);
            }

            heartbeatTimer = setTimeout(() => {
                sendHeartbeat();
                // Schedule the next one
                scheduleNextHeartbeat();
            }, nextInterval);
        }

        async function sendHeartbeat() {
            if (!mySeat) return;

            try {
                const now = Date.now() + serverOffset;
                await db.ref(`devices/${mySeat.id}`).update({
                    lastSeen: now,
                    status: 'ACTIVE',
                    x: mySeat.x,
                    y: mySeat.y
                });
                console.log(`💓 Heartbeat sent for ${mySeat.id} at ${new Date(now).toLocaleTimeString()}`);
            } catch (e) {
                console.error(`💔 Heartbeat failed for ${mySeat.id}:`, e);
            }
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            if (heartbeatTimer) {
                clearTimeout(heartbeatTimer);
                heartbeatTimer = null;
            }
            console.log(`💓 Heartbeat stopped for ${mySeat?.id}`);
        }

        // --- CLOCK SYNCHRONIZATION ---
        function syncClock() {
            const offsetRef = db.ref(".info/serverTimeOffset");

        // --- DECENTRALIZED CALIBRATION ENGINE (Bach Logic) ---
        function processAcousticReturn(tHeard) {
            if (!lastPingSent) return;

            // Calculate measured one-way lag (time from pulse play to conductor hearing)
            // This includes both hardware delay AND acoustic travel time
            const measuredLag = tHeard - lastPingSent;

            // Store the calibrated value
            calibratedLag = measuredLag;
            hardwareLag = measuredLag; // Update working lag estimate

            // Append to rolling buffer (Sample pool of 12)
            lagSamples.push(measuredLag);
            if (lagSamples.length > 12) lagSamples.shift();

            // Calculate Standard Deviation
            if (lagSamples.length >= 6) {
                const mean = lagSamples.reduce((a, b) => a + b) / lagSamples.length;
                const variance = lagSamples.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / lagSamples.length;
                const stdDev = Math.sqrt(variance);

                if (stdDev < 5 && !isHappy) {
                    isHappy = true;
                    document.getElementById('cal-ind').className = 'indicator active happy';
                    db.ref(`devices/${mySeat.id}/status`).set('HAPPY');

                    // Store calibrated lag in Firebase for monitoring
                    db.ref(`devices/${mySeat.id}/calibration`).update({
                        lag: calibratedLag,
                        samples: lagSamples.length,
                        stdDev: stdDev,
                        calibratedAt: Date.now() + serverOffset
                    });
                } else if (!isHappy) {
                    document.getElementById('cal-ind').className = 'indicator syncing';
                }
            }

            // Update overlay with current lag
            updatePerformanceOverlay();

            // Clear any pending test pulse
            pendingTestPulse = null;
        }

        // --- TUNING SCHEDULE HANDLER ---
        function initTuningListener() {
            // Listen for tuning schedule
            db.ref('tuning/current').on('value', snap => {
                const schedule = snap.val();
                if (schedule && schedule.status === 'ACTIVE') {
                    calibrationMode = true;
                    currentTuningSchedule = schedule;

                    // Store flute URL from schedule (if not already loaded from tuning_mode)
                    if (schedule.fluteUrl && !fluteUrl) {
                        fluteUrl = schedule.fluteUrl;
                    }

                    // Find notes assigned to this device
                    if (schedule.schedule) {
                        // Parse all timing values as floats
                        assignedNotes = schedule.schedule
                            .filter(note => note.deviceId === mySeat.id)
                            .map(note => ({
                                ...note,
                                startMs: parseFloat(note.startMs),
                                durationMs: parseFloat(note.durationMs),
                                pulsePositionMs: parseFloat(note.pulsePositionMs)
                            }));

                        console.log(`🎯 Device assigned ${assignedNotes.length} notes for tuning`);

                        // Log first few notes with proper floating point values
                        assignedNotes.slice(0, 5).forEach((note, i) => {
                            console.log(`   Note ${i}: start=${note.startMs.toFixed(1)}ms, ` +
                                      `duration=${note.durationMs.toFixed(1)}ms, ` +
                                      `pulse at ${note.pulsePositionMs.toFixed(1)}ms`);
                        });

                        // Verify durations are > 0
                        const zeroDurationNotes = assignedNotes.filter(n => n.durationMs <= 0);
                        if (zeroDurationNotes.length > 0) {
                            console.warn(`⚠️ Warning: ${zeroDurationNotes.length} notes have zero/negative duration`);
                        }
                    }

                    // Preload the flute audio if not already cached
                    if (fluteUrl && !bufferCache[fluteUrl]) {
                        preloadTuningAsset(fluteUrl);
                    }
                } else {
                    calibrationMode = false;
                    currentTuningSchedule = null;
                    assignedNotes = [];
                    console.log("🎯 Tuning mode deactivated");
                    // Don't clear fluteUrl - keep it for potential future use
                }
            });

            // Listen for conductor's pulse detections
            db.ref('tuning/last_heard').on('value', snap => {
                const tHeard = snap.val();
                if (tHeard) {
                    // Parse as float to ensure precision
                    const heardTime = parseFloat(tHeard);

                    // Check if this detection matches any of our pending pulses
                    processPendingDetections(heardTime);

                    // Also check if it matches a pending individual test
                    if (pendingTestPulse && Math.abs(heardTime - pendingTestPulse.playTime) < 1000) {
                        processAcousticReturn(heardTime);
                    }
                }
            });

            // Also listen for changes to the tuning schedule (in case it gets updated)
            db.ref('tuning/current/schedule').on('child_changed', snap => {
                console.log("🔄 Tuning schedule updated, reloading assignments");
                // Force a refresh of the tuning data
                db.ref('tuning/current').once('value', scheduleSnap => {
                    const updatedSchedule = scheduleSnap.val();
                    if (updatedSchedule && updatedSchedule.schedule) {
                        assignedNotes = updatedSchedule.schedule
                            .filter(note => note.deviceId === mySeat.id)
                            .map(note => ({
                                ...note,
                                startMs: parseFloat(note.startMs),
                                durationMs: parseFloat(note.durationMs),
                                pulsePositionMs: parseFloat(note.pulsePositionMs)
                            }));
                        console.log(`🔄 Updated: ${assignedNotes.length} notes assigned`);
                    }
                });
            });
        }

        async function preloadTuningAsset(url) {

                bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);

        function processPendingDetections(tHeard) {
            // Look for pending pulses that haven't been matched
            const now = Date.now() + serverOffset;

            pendingPulseDetections = pendingPulseDetections.filter(pending => {
                // Only consider pulses from last 5 seconds
                if (now - pending.playTime > 5000) return false;

                // Check if this detection could be for our pulse
                // The conductor broadcasts immediately upon detection
                if (Math.abs(tHeard - pending.playTime) < 1000) { // Within 1 second window
                    lastPingSent = pending.playTime;
                    processAcousticReturn(tHeard);
                    return false; // Remove from pending
                }
                return true; // Keep in pending
            });
        }

        // --- ASSET PRELOADING from Firebase show/movements ---
        async function preloadAssets() {
            // Show progress bar
            document.getElementById('asset-progress').style.display = 'block';

            try {
                // Read movements from Firebase (uploaded by admin.html from visual_timeline.json)
                const movementsSnap = await db.ref('show/movements').once('value');
                const movements = movementsSnap.val();

                if (!movements || !movements.length) {
                    console.warn("No movements found in Firebase show/movements");
                    document.getElementById('asset-ind').className = 'indicator syncing';
                    document.getElementById('asset-progress').style.display = 'none';
                    return true; // Non-fatal - may get timeline later
                }

                // Collect all unique audio URLs from all movements and assets
                const audioFiles = new Set();

                movements.forEach(movement => {
                    (movement.cues || []).forEach(cue => {
                        (cue.assets || []).forEach(asset => {
                            if (asset.audio_url) {
                                audioFiles.add(asset.audio_url);
                            }
                        });
                    });
                });

                totalAssetsToPreload = audioFiles.size;
                preloadedCount = 0;

                console.log(`📦 Preloading ${totalAssetsToPreload} audio assets from timeline`);

                if (totalAssetsToPreload === 0) {
                    document.getElementById('asset-ind').className = 'indicator active';
                    document.getElementById('asset-progress').style.display = 'none';
                    return true;
                }

                // Load each audio file
                const loadTasks = Array.from(audioFiles).map(async url => {
                    try {
                        const res = await fetch(url);
                        const arrayBuf = await res.arrayBuffer();
                        bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                        preloadedCount++;
                        updatePreloadProgress();
                    } catch (e) {
                        console.error(`Failed to load ${url}:`, e);
                        preloadedCount++;
                        updatePreloadProgress();
                    }
                });

                await Promise.all(loadTasks);
                document.getElementById('asset-ind').className = 'indicator active';
                document.getElementById('asset-progress').style.display = 'none';
                return true;

            } catch (e) {
                console.error("Asset Load Failure:", e);
                document.getElementById('asset-ind').className = 'indicator error';
                document.getElementById('asset-progress').style.display = 'none';
                return false;
            }
        }

        function updatePreloadProgress() {

        // --- MOVEMENT HANDLER (uses cue.cues not cue.timeline) ---

            clearAllScheduledCues();

            // Clear scheduled cues array

        function clearAllScheduledCues() {

            activeTimeouts.forEach(timeoutId => clearTimeout(timeoutId));

        // --- SPATIAL TIMELINE SCHEDULER with trajectory overlap detection ---
        function scheduleTimelineCues(cues) {
            const now = Date.now() + serverOffset;

            cues.forEach(cue => {
                if (cue.type !== 'MASTER_MEDIA_SYNC') return;

                // cue.time is seconds offset from movement start
                const cueOffsetMs = (cue.time || 0) * 1000;
                const absoluteStartTime = movementStartTime + cueOffsetMs;

                // We schedule the warm-up pulse 500ms BEFORE the actual start
                const warmUpTime = absoluteStartTime - WARMUP_ADVANCE_MS;
                const warmUpDelayMs = warmUpTime - now - hardwareLag;
                const startDelayMs = absoluteStartTime - now - hardwareLag;

                // Process each asset in this cue
                (cue.assets || []).forEach(asset => {
                    // PILLAR HANDLING: Only play if this pillar ID matches
                    if (asset.type === 'pillar') {
                        if (mySeat.id !== asset.id) return;

                        // For pillars, use their position from pillar_config
                        const pillarPos = pillarPositions[asset.id] || { x: 0, y: 0 };

                        scheduleCueWithWarmUp({
                            audio_url: asset.audio_url,
                            lsq_url: asset.lsq_url,
                            gain: 1.0, // Pillars play at full volume
                            color: null,
                            label: asset.id,
                            startTime: absoluteStartTime,
                            // Store spatial info for render loop
                            originX: pillarPos.x,
                            originY: pillarPos.y,
                            radius: asset.radius || 30,
                            rolloff: asset.rolloff || 'none',
                            type: 'pillar',
                            duration: asset.duration || 30000
                        }, warmUpDelayMs, startDelayMs);
                        return;
                    }

                    // INSTRUMENT HANDLING: Check if this device will be within THIS cue's radius
                    // at any point during its movement

                    const startX = asset.originX;
                    const startY = asset.originY;
                    const endX = asset.destX || startX;
                    const endY = asset.destY || startY;
                    const cueRadius = asset.radius;

                    // Calculate duration
                    const cueDuration = asset.duration || 30000;

                    // Check if the sound source moves
                    const isMoving = (startX !== endX) || (startY !== endY);

                    let shouldSchedule = false;

                    if (!isMoving) {
                        // Static sound source - just check distance
                        const dx = mySeat.x - startX;
                        const dy = mySeat.y - startY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        shouldSchedule = (dist <= cueRadius);
                    } else {
                        // Moving sound source - check if trajectory comes within its radius

                        // Vector from start to end
                        const moveX = endX - startX;
                        const moveY = endY - startY;

                        // Vector from start to seat
                        const seatVecX = mySeat.x - startX;
                        const seatVecY = mySeat.y - startY;

                        // Find closest point on line segment to seat
                        const moveLenSq = moveX * moveX + moveY * moveY;
                        let t = 0;

                        if (moveLenSq > 0) {
                            t = (seatVecX * moveX + seatVecY * moveY) / moveLenSq;
                            t = Math.max(0, Math.min(1, t));
                        }

                        // Closest point on path
                        const closestX = startX + t * moveX;
                        const closestY = startY + t * moveY;

                        // Distance from seat to closest point on path
                        const distToPath = Math.sqrt(
                            Math.pow(mySeat.x - closestX, 2) +
                            Math.pow(mySeat.y - closestY, 2)
                        );

                        // If the path comes within this cue's radius, schedule it
                        if (distToPath <= cueRadius) {
                            shouldSchedule = true;
                        } else {
                            // Also check endpoints in case radius is large
                            const distStart = Math.sqrt(
                                Math.pow(mySeat.x - startX, 2) +
                                Math.pow(mySeat.y - startY, 2)
                            );
                            const distEnd = Math.sqrt(
                                Math.pow(mySeat.x - endX, 2) +
                                Math.pow(mySeat.y - endY, 2)
                            );

                            if (distStart <= cueRadius || distEnd <= cueRadius) {
                                shouldSchedule = true;
                            }
                        }
                    }

                    if (shouldSchedule) {
                        scheduleCueWithWarmUp({
                            audio_url: asset.audio_url,
                            lsq_url: asset.lsq_url,
                            // Store all spatial params for render loop
                            originX: startX,
                            originY: startY,
                            destX: endX,
                            destY: endY,
                            radius: cueRadius,
                            rolloff: asset.rolloff || 'linear',
                            color: asset.color,
                            label: asset.id,
                            startTime: absoluteStartTime,
                            duration: cueDuration,
                            type: 'instrument',
                            volume: 1.0
                        }, warmUpDelayMs, startDelayMs);
                    }
                });
            });

            scheduledCues.sort((a, b) => a.startTime - b.startTime);
            console.log(`📅 Scheduled ${scheduledCues.length} asset(s) for this seat`);
        }

        // --- Schedule a single asset with separate warm-up pulse and actual start ---
        function scheduleCueWithWarmUp(payload, warmUpDelayMs, startDelayMs) {
            // Schedule the warm-up pulse (100ms of silent playback)
            if (warmUpDelayMs > 0) {
                const warmUpTimeoutId = setTimeout(() => {
                    playWarmUpPulse(payload);
                    activeTimeouts = activeTimeouts.filter(id => id !== warmUpTimeoutId);
                }, warmUpDelayMs);
                activeTimeouts.push(warmUpTimeoutId);
            }

            // Schedule the actual performance start
            if (startDelayMs > 0) {
                const startTimeoutId = setTimeout(() => {
                    playSpatialCue(payload);
                    if (payload.lsq_url) {
                        scheduleLightSequence(payload);
                    }
                    activeTimeouts = activeTimeouts.filter(id => id !== startTimeoutId);
                }, startDelayMs);
                activeTimeouts.push(startTimeoutId);
            } else if (startDelayMs > -1000) {
                // Within 1s late - play immediately
                playSpatialCue(payload);
                if (payload.lsq_url) {
                    scheduleLightSequence(payload);
                }
            }

            // Store for reference
            scheduledCues.push({
                label: payload.label,
                startTime: payload.startTime
            });
        }

        // --- WARM-UP PULSE: Play silently for exactly 100ms then stop ---
        async function playWarmUpPulse(cue) {
            // For pillar devices, verify this is a master mix
            if (mySeat.id.startsWith('PILLAR_') && cue.type !== 'pillar') {
                return;
            }

            const url = cue.audio_url;
            if (!url) {
                console.error('playWarmUpPulse: no audio_url', cue);
                return;
            }

            // Load on-demand if not preloaded
            if (!bufferCache[url]) {
                console.warn(`⚠️ Not preloaded, fetching: ${url.split('/').pop()}`);
                try {
                    const res = await fetch(url);
                    const arrayBuf = await res.arrayBuffer();
                    bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                } catch (e) {
                    console.error(`Failed to fetch ${url}:`, e);
                    return;
                }
            }

            const source = audioCtx.createBufferSource();
            source.buffer = bufferCache[url];

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Silent

            source.connect(gainNode).connect(audioCtx.destination);

            // Start playing silently
            source.start(0);

            // Stop after exactly 100ms
            source.stop(audioCtx.currentTime + (SILENT_WARMUP_MS / 1000));

            console.log(`🔇 Warm-up pulse for ${cue.label} at ${new Date().toLocaleTimeString()}`);

            // No need to track this in activeAudioCues since it's just a pulse
        }

        // --- ACTUAL PERFORMANCE: Start at T-0 with proper volume ---
        async function playSpatialCue(cue) {
            // For pillar devices, verify this is a master mix
            if (mySeat.id.startsWith('PILLAR_') && cue.type !== 'pillar') {
                console.log(`🔇 Pillar device filtering out non-pillar cue: ${cue.label}`);
                return;
            }
            if (!mySeat.id.startsWith('PILLAR_') && cue.type === 'pillar') {
                console.log(`🔇 Patron device skipping pillar cue: ${cue.label}`);
                return;
            }

            const url = cue.audio_url;
            if (!url) {
                console.error('playSpatialCue: no audio_url', cue);
                return;
            }

            // Load on-demand if not preloaded
            if (!bufferCache[url]) {
                console.warn(`⚠️ Not preloaded, fetching: ${url.split('/').pop()}`);
                try {
                    const res = await fetch(url);
                    const arrayBuf = await res.arrayBuffer();
                    bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                } catch (e) {
                    console.error(`Failed to fetch ${url}:`, e);
                    return;
                }
            }

            const source = audioCtx.createBufferSource();
            source.buffer = bufferCache[url];

            const gainNode = audioCtx.createGain();

            // Start at full volume (gain will be updated by render loop)
            gainNode.gain.setValueAtTime(cue.gain || 1.0, audioCtx.currentTime);

            source.connect(gainNode).connect(audioCtx.destination);
            source.start(0); // Start at the beginning

            console.log(`🎵 Started: ${cue.label} at ${new Date().toLocaleTimeString()}`);

            // Store for render loop (for spatial updates)
            activeAudioCues.push({
                ...cue,
                source,
                gainNode,
                startTime: cue.startTime,
                localStartTime: Date.now()
            });
        }

        // --- PLAY PILLAR FABRIC DURING TUNING (with warm-up) ---
        async function startPillarFabric(startTime) {
            console.log("🎻 Starting pillar fabric (string quartet + piano)");

            const pillars = [
                { id: 'PILLAR_FL', url: pillarUrls.FL, pos: 'FL' },
                { id: 'PILLAR_FR', url: pillarUrls.FR, pos: 'FR' },
                { id: 'PILLAR_BL', url: pillarUrls.BL, pos: 'BL' },
                { id: 'PILLAR_BR', url: pillarUrls.BR, pos: 'BR' }
            ];

            const now = Date.now() + serverOffset;

            // Calculate warm-up time (500ms before start)
            const warmUpTime = startTime - WARMUP_ADVANCE_MS;
            const warmUpDelay = warmUpTime - now - hardwareLag;
            const startDelay = startTime - now - hardwareLag;

            for (const pillar of pillars) {
                if (!pillar.url) {
                    console.warn(`⚠️ No URL for pillar ${pillar.id} - skipping`);
                    continue;
                }

                // Ensure the asset is loaded
                if (!bufferCache[pillar.url]) {
                    console.warn(`⚠️ Pillar ${pillar.id} not preloaded, fetching now`);
                    try {
                        const res = await fetch(pillar.url);
                        const arrayBuf = await res.arrayBuffer();
                        bufferCache[pillar.url] = await audioCtx.decodeAudioData(arrayBuf);
                    } catch (e) {
                        console.error(`Failed to load pillar ${pillar.id}:`, e);
                        continue;
                    }
                }

                // Schedule warm-up pulse
                if (warmUpDelay > 0) {
                    const warmUpTimeoutId = setTimeout(() => {
                        const source = audioCtx.createBufferSource();
                        source.buffer = bufferCache[pillar.url];

                        const gainNode = audioCtx.createGain();
                        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

                        source.connect(gainNode).connect(audioCtx.destination);
                        source.start(0);
                        source.stop(audioCtx.currentTime + (SILENT_WARMUP_MS / 1000));

                        console.log(`🏛️ Pillar ${pillar.id} warm-up pulse`);
                        activeTimeouts = activeTimeouts.filter(id => id !== warmUpTimeoutId);
                    }, warmUpDelay);
                    activeTimeouts.push(warmUpTimeoutId);
                }

                // Schedule actual start
                if (startDelay > 0) {
                    const startTimeoutId = setTimeout(() => {
                        const source = audioCtx.createBufferSource();
                        source.buffer = bufferCache[pillar.url];
                        source.loop = true;

                        const gainNode = audioCtx.createGain();
                        gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

                        source.connect(gainNode).connect(audioCtx.destination);
                        source.start(0);

                        activePillarSources.push({ source, gainNode, id: pillar.id });
                        console.log(`🏛️ Pillar ${pillar.id} started`);

                        activeTimeouts = activeTimeouts.filter(id => id !== startTimeoutId);
                    }, startDelay);
                    activeTimeouts.push(startTimeoutId);
                } else if (startDelay > -1000) {
                    // Start immediately if late
                    const source = audioCtx.createBufferSource();
                    source.buffer = bufferCache[pillar.url];
                    source.loop = true;

                    const gainNode = audioCtx.createGain();
                    gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

                    source.connect(gainNode).connect(audioCtx.destination);
                    source.start(0);

                    activePillarSources.push({ source, gainNode, id: pillar.id });
                    console.log(`🏛️ Pillar ${pillar.id} started (late)`);
                }
            }
        }

        // --- LIGHT SEQUENCE SCHEDULER ---
        async function scheduleLightSequence(payload) {
            if (!payload.lsq_url) return;

            try {
                const res = await fetch(payload.lsq_url);
                const text = await res.text();

                // Parse LSQ format: one row per frame at 20fps, 4 comma-separated floats
                const frames = text.trim().split('\n').map(row =>
                    row.split(',').map(v => parseFloat(v.trim()) || 0)
                );

                activeLightCues.push({
                    frames,
                    startTime: payload.startTime,
                    color: payload.color || '#ffffff',
                    label: payload.label,
                    gain: 1.0
                });

                console.log(`💡 Loaded light sequence: ${payload.label} (${frames.length} frames)`);
            } catch (e) {
                console.error(`Failed to load LSQ ${payload.lsq_url}:`, e);
            }
        }

                const now = Date.now() + serverOffset;
                const nextNote = assignedNotes.find(n => {
                    return n.startMs + (currentTuningSchedule.startTime || 0) > now;
                });

                if (nextNote) {
                    const timeToNext = ((nextNote.startMs + (currentTuningSchedule.startTime || 0)) - now) / 1000;
                    document.getElementById('debug-next-note').innerText = `Note ${nextNote.noteIndex} in ${timeToNext.toFixed(2)}s`;
                } else {
                    document.getElementById('debug-next-note').innerText = 'none';
                }

                document.getElementById('debug-audio-ctx').innerText = audioCtx?.state || 'not created';
                document.getElementById('debug-buffer-status').innerText = (fluteUrl && bufferCache[fluteUrl]) ? 'loaded' : 'not loaded';
                document.getElementById('debug-time').innerText = (now / 1000).toFixed(2);
                document.getElementById('debug-tuning-start').innerText = currentTuningSchedule.startTime ?
                    ((currentTuningSchedule.startTime - now) / 1000).toFixed(2) + 's from now' : 'not set';
            } else {
                debugDiv.style.display = 'none';
            }

            requestAnimationFrame(updateTuningDebug);
        }

        // --- THE UNIFIED 30FPS RENDER LOOP ---
        function frame(now) {
            const delta = now - lastFrameTime;

            // Throttle to 30fps
            if (delta < FRAME_DURATION) {
                requestAnimationFrame(frame);
                return;
            }

            // Performance Watchdog
            if (delta > 50) {
                isLowPerf = true;
                db.ref(`devices/${mySeat.id}/performance`).update({ lowPerf: true, jitter: delta });
            }

            lastFrameTime = now;
            const serverNow = Date.now() + serverOffset;

            // Update movement indicator
            if (currentMovement && movementStartTime > serverNow) {
                const secondsToStart = ((movementStartTime - serverNow) / 1000).toFixed(1);
                document.getElementById('movement-indicator').innerText =
                    `🎭 ${currentMovement} (T-${secondsToStart}s)`;
            } else if (currentMovement) {
                document.getElementById('movement-indicator').innerText = `🎭 ${currentMovement} (Playing)`;
            }

            // --- SPATIAL AUDIO UPDATE ---
            // Calculate gain for each active audio cue based on current position
            activeAudioCues.forEach((cue, index) => {
                // Skip special cases handled elsewhere
                if (cue.metadata?.purpose === 'seat_test') return;
                if (calibrationMode && cue.type === 'TUNING_MOVEMENT') return;

                // Calculate elapsed time and interpolation factor
                const elapsed = serverNow - cue.startTime;
                const t = Math.max(0, Math.min(1, elapsed / cue.duration));

                // Sine-based ease-in-out for movement
                const easedT = -(Math.cos(Math.PI * t) - 1) / 2;

                // Interpolate between origin and destination
                const curX = cue.originX + (cue.destX - cue.originX) * easedT;
                const curY = cue.originY + (cue.destY - cue.originY) * easedT;

                // Calculate distance to this seat
                const dist = Math.sqrt(
                    Math.pow(mySeat.x - curX, 2) +
                    Math.pow(mySeat.y - curY, 2)
                );

                // Calculate gain based on distance and rolloff
                let gain = 0;
                if (dist < cue.radius) {
                    if (cue.rolloff === 'linear') {
                        gain = 1 - (dist / cue.radius);
                    } else { // 'none' = constant volume inside radius
                        gain = 1.0;
                    }
                }

                // Apply gain with anti-click ramp
                cue.gainNode.gain.setTargetAtTime(
                    gain * (cue.volume || 1),
                    audioCtx.currentTime,
                    0.015
                );

                // Clean up finished cues
                if (elapsed >= cue.duration) {
                    activeAudioCues.splice(index, 1);
                }
            });

            // --- VISUAL UPDATE ---
            if (!isLowPerf) {
                updateVisuals(serverNow);
            } else {
                const ctx = document.getElementById('stage-canvas').getContext('2d');
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            }

            requestAnimationFrame(frame);
        }

        // --- VISUAL RENDER with additive blending ---
        function updateVisuals(serverNow) {
            const canvas = document.getElementById('stage-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            activeLightCues = activeLightCues.filter(lc => {
                const elapsedS = (serverNow - lc.startTime) / 1000;
                const frameIndex = Math.floor(elapsedS * 20); // 20fps LSQ

                if (frameIndex >= lc.frames.length) return false;

                const row = lc.frames[frameIndex];
                const rawMax = Math.max(...row); // 0.0-1.0

                if (rawMax > 0.001) {
                    // Parse hex color
                    const r = parseInt(lc.color.slice(1, 3), 16);
                    const g = parseInt(lc.color.slice(3, 5), 16);
                    const b = parseInt(lc.color.slice(5, 7), 16);

                    ctx.fillStyle = `rgba(${r},${g},${b},${rawMax})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                return true;
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        // --- PERFORMANCE OVERLAY UPDATE ---
        function updatePerformanceOverlay() {
            const overlay = document.getElementById('performance-overlay');
            const fps = Math.round(1000 / (performance.now() - lastFrameTime));
            const lag = calibratedLag ? `${calibratedLag}ms` : '--';
            const cueCount = activeAudioCues.length + activeLightCues.length;
            overlay.innerHTML = `FPS: ${fps} | Lag: ${lag} | Cues: ${cueCount} | ${isHappy ? '✅' : '🔄'}`;
        }

        // --- DIRECT PLAYBACK FOR TUNING MOVEMENT (uses fluteUrl from tuning_mode) ---
        async function playTuningMovement(cue) {
            console.log("🎵 Starting tuning movement with cue:", cue);
            console.log("🎵 Flute URL:", fluteUrl);
            console.log("🎵 Current values:", {
                cueStartTime: cue.startTime,
                serverOffset: serverOffset,
                hardwareLag: hardwareLag,
                audioCtxCurrentTime: audioCtx.currentTime
            });

            if (!fluteUrl) {
                console.error("No flute URL available for tuning movement");
                return;
            }

            // ❌ PROBLEMATIC TIMING CALCULATION
            if (!cue.startTime || isNaN(cue.startTime)) {
                console.error("Invalid cue.startTime:", cue.startTime);
                return;
            }

            const scheduledStart = cue.startTime - (serverOffset || 0) - (hardwareLag || 0);
            console.log("Scheduled start (ms):", scheduledStart);

            if (isNaN(scheduledStart)) {
                console.error("scheduledStart is NaN");
                return;
            }

            const startTime = Math.max(audioCtx.currentTime, scheduledStart / 1000);
            console.log("Final startTime (seconds):", startTime);

            if (isNaN(startTime) || !isFinite(startTime)) {
                console.error("Invalid startTime:", startTime);
                return;
            }

            // Load on-demand if not preloaded
            if (!bufferCache[fluteUrl]) {
                console.warn(`⚠️ Flute not preloaded, fetching: ${fluteUrl.split('/').pop()}`);
                try {
                    const res = await fetch(fluteUrl);
                    const arrayBuf = await res.arrayBuffer();
                    bufferCache[fluteUrl] = await audioCtx.decodeAudioData(arrayBuf);
                } catch (e) {
                    console.error(`Failed to fetch flute ${fluteUrl}:`, e);
                    return;
                }
            }

            const source = audioCtx.createBufferSource();
            source.buffer = bufferCache[fluteUrl];

            const gainNode = audioCtx.createGain();

            // Connect and start
            source.connect(gainNode).connect(audioCtx.destination);

            // Set target gain with validated time - SET TO FULL VOLUME IMMEDIATELY
            try {
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                // gainNode.gain.setTargetAtTime(1.0, startTime, 0.015); // Original line commented out
            } catch (e) {
                console.error("Error in setValueAtTime:", e);
                return;
            }

            source.start(startTime);

            // ✅ DEBUG LINE
            console.log(`✅ Flute source started at ${startTime}, current audio time: ${audioCtx.currentTime}`);

            // Store for render loop
            activeAudioCues.push({
                ...cue,
                source,
                gainNode,
                startTime: cue.startTime,
                localStartTime: Date.now() + (startTime * 1000) - audioCtx.currentTime * 1000
            });

            // Start monitoring for note assignments
            if (currentTuningSchedule && assignedNotes.length > 0) {
                monitorTuningPlayback(cue, source, startTime);
            } else {
                console.log("No notes assigned to this device");
            }
        }

        // --- EVENT HANDLERS ---
        document.getElementById('ready-btn').onclick = async () => {
            // Wake Audio Hardware
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Start Render Loop
            requestAnimationFrame(frame);

            // Start debug update loop
            updateTuningDebug();

            // 1. Listen for GO signals (Model B - Distributed Timeline)
            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) {
                    if (cue.action === 'KILL') {
                        console.log("💀 KILL signal received - reloading");
                        location.reload();
                    } else if (cue.action === 'GO') {
                        // Handle movement start signal with full timeline
                        handleMovementStart(cue);
                    } else if (cue.type === 'TUNING_MOVEMENT') {
                        // Handle tuning movement - use the flute URL from tuning_mode
                        calibrationMode = true;
                        playTuningMovement(cue);
                    }
                }
            });

            // 2. Listen for Calibration Broadcast (Conductor Mic)
            db.ref('tuning/last_heard').on('value', snap => {
                const tHeard = snap.val();
                if (tHeard) processAcousticReturn(tHeard);
            });

            // 3. Listen for Personal Calibration Polling (Bach Sequence)
            db.ref(`tuning/active_poll/${mySeat.id}`).on('value', snap => {
                const noteAsset = snap.val();
                if (noteAsset) {
                    lastPingSent = Date.now() + serverOffset;
                    // This is legacy - we now use tuning_mode URLs
                    console.warn("Received legacy active_poll, ignoring");
                }
            });

            // 4. Initialize tuning schedule listener
            initTuningListener();

            // 5. Register this device in Firebase and start heartbeat
            if (mySeat) {
                await db.ref(`devices/${mySeat.id}`).update({
                    lastSeen: Date.now() + serverOffset,
                    status: 'ACTIVE',
                    x: mySeat.x,
                    y: mySeat.y,
                    hardwareLag: hardwareLag,
                    calibratedLag: calibratedLag,
                    isHappy: isHappy
                });

                // Start staggered heartbeat
                startHeartbeat();
            }
        };

        // Clean up heartbeat when page unloads
        window.addEventListener('beforeunload', () => {
            stopHeartbeat();
        });

        window.onload = async () => {
            syncClock();
            await loadPillarPositions();
            await loadTuningAssetUrls(); // Load tuning asset URLs from database

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const assetsOk = await preloadAssets();
            const idOk = await resolveIdentity();

            if (idOk && assetsOk) {
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('system-msg').innerText = "System Ready. Please Enter.";
            }
        };

        window.onresize = () => {
            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

    </script>
</body>
