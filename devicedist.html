<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isle of Noises - Patron Device</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* --- SETUP SCREEN --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        #status-registry {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            width: 80%;
            max-width: 400px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        #system-msg {
            font-size: 0.9rem;
            color: #00ffcc;
            margin-top: 10px;
            min-height: 1.2em;
        }

        /* --- BUTTONS --- */
        .action-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 20px;
            width: 250px;
        }

        #init-permissions-btn {
            background: #fff;
            color: #000;
        }

        #init-permissions-btn {
            background: #00ffcc;
            color: #000;
        }

        .action-btn:disabled {
            background: #333 !important;
            color: #666 !important;
            cursor: not-allowed;
        }

        .action-btn:active { transform: scale(0.95); }

        /* --- SHOW SCREEN --- */
        #show-screen { display: none; height: 100vh; width: 100vw; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }

        #performance-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #00ffcc;
            pointer-events: none;
            opacity: 0.5;
            z-index: 10;
        }

        #movement-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            border-left: 3px solid #00ffcc;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        /* --- DEBUG & METERS --- */
        #calibration-debug {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            font-family: monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #ffcc00;
            z-index: 100;
            max-width: 300px;
        }

        .energy-meter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 180px;
            background: rgba(0,0,0,0.8);
            border-radius: 4px;
            padding: 8px;
            font-family: monospace;
            font-size: 9px;
            border-left: 3px solid #00ffcc;
            z-index: 100;
        }

        .meter-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 4px 0; overflow: hidden; }
        .meter-fill { height: 100%; background: #00ffcc; width: 0%; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Isle of Noises</h1>

        <div id="status-registry">
            <div class="status-item">
                <span>Seat Location:</span>
                <span id="device-id-display">--</span>
            </div>
            <div id="system-msg">Initializing...</div>
        </div>

        <button id="init-permissions-btn" class="action-btn">Start Setup</button>
    </div>

    <div id="show-screen">
        <div id="performance-overlay">FPS: -- | Speaker: --ms | Mic: -- | Neighbors: --</div>

        <div id="movement-indicator">
            <span style="font-size: 16px;">📱</span>
            <span style="font-size: 11px; letter-spacing: 1px;" id="device-status-text">ACTIVE</span>
        </div>

        <div id="calibration-debug" class="calibration-debug" style="display:none;">

        <div class="energy-meter" id="energy-meter" style="display:none;">
            <div style="display: flex; justify-content: space-between;"><span>Acoustic Sync</span><span id="energy-value">0.00</span></div>
            <div class="meter-bar"><div class="meter-fill" id="energy-fill"></div></div>
        </div>

        <canvas id="stage-canvas"></canvas>
    </div>

    <script>
    // ============================================================================
    // CONSTANTS
    // ============================================================================
    const SILENT_WARMUP_MS = 1000;
    const HEARTBEAT_BASE_INTERVAL_MS = 10000;
    const HEARTBEAT_JITTER_MS = 2000;
    const SPEED_OF_SOUND = 343;
    const MASTER_PLAYBACK_GAIN = 1.5;
    const PICCOLO_MIN_FREQ = 500;
    const PICCOLO_MAX_FREQ = 2100;
    const FFT_SIZE = 2048;
    const BASELINE_SAMPLES_MS = 200;
    const BASELINE_THRESHOLD_MULTIPLIER = 1.1;
    const MIN_DETECTION_ENERGY = 0.03;
    const PILLAR_ONSET_THRESHOLD = 2.0;
    const PHASE1_SCHEDULE_WINDOW_MS = 200;
    const MIC_DELAY_SANITY_MIN = 0;
    const MIC_DELAY_SANITY_MAX = 150;
    const MIN_MIC_SAMPLES = 4;
    const NOTE_BAND_RATIO = Math.pow(2, 1/48);
    const RECORDING_WINDOW_MS = 200;
    const EVALUATION_INTERVAL_MS = 2000;
    const AUDIBLE_ERROR_MS = 30;
    const SIGNIFICANT_ERROR_MS = 15;
    const MIN_CORRECTION_MS = 5;
    const MIN_SAMPLES_FOR_CORRECTION = 3;
    const CONVERGENCE_STD_DEV_MS = 15;
    const MAX_CORRECTIONS = 3;
    const HEARTBEAT_TIMEOUT_MS = 12100;

    // ============================================================================
    // GLOBAL STATE
    // ============================================================================
    let wakeLock = null;
    let heartbeatOsc = null;
    let isListenOnlyMode = false;
    let audioCtx = null;
    let masterGain = null;

    let mySeat = { id: null, x: 0, y: 0 };
    let assetsPreloaded = false;
    let micPermissionGranted = false;
    let micPermissionRequested = false;
    let myNeighbors = [];

    let serverOffset = 0;
    let bufferCache = {};
    let activeAudioCues = [];
    let activeLightCues = [];
    let activeTimeouts = [];
    let lastMicCheck = 0;
    let continuousSource = null;
    let continuousGain = null;
    let currentPlaybackStartTime = 0;
    let envelopeTimeouts = [];
    let isSingleDeviceMode = false;
    let lastMedianShift = 0;
    let sameShiftCount = 0;
    let micStream = null;
    let analyser = null;
    let isMicActive = false;
    let frequencyData = null;
    let sampleRate = 48000;
    let currentAvgEnergy = 0;
    let baselineEnergy = 0;
    let baselineSamples = [];
    let baselineComplete = false;
    let baselineStartTime = 0;
    let allListeningTargets = [];
    let noteTimings = [];
    let noteSchedule = [];
    let detectionWindows = new Map();
    let processedMeasurements = new Set();
    let rawTimeShifts = [];
    let isHappy = false;
    let estimatedDeviceDelayMs = 130;
    let estimatedDeviceMicDelayMs = 13;
    let myMicDelayMs = null;
    let currentSpeakerDelay = estimatedDeviceDelayMs;
    let micDelaySamples = [];
    let pillarNoteSchedule = [];
    let pillarWindows = [];
    let phase1Complete = false;
    let phase1EndMs = 20571.4;
    let phase1WindowActive = true;
    let currentTuningSchedule = null;
    let tuningStartTime = 0;
    let PICCOLO_URL = "";
    let TEST_PULSE_URL = "";
    let assignedNotes = [];
    let localRecordings = new Map();
    let refinedDataToSend = [];
    let receivedRefinements = [];
    let phase3StartTime = 0;
    let cocktailPartyInterval = null;
    let lastEvaluationTime = 0;
    let currentMovement = null;
    let movementStartTime = 0;
    let lastFrameTime = 0;
    const FPS_TARGET = 30;
    const FRAME_DURATION = 1000 / FPS_TARGET;
    let heartbeatInterval = null;
    let pillarRefBaseline = 0;
    let pillarRefBaselineSamples = [];
    let allPillarNotes = [];
    let pillarUrls = {};
    let pillarData = {};
    let seatData = {};
    let refinementTimer = null;
    let scheduledRecordings = new Set();
    let correctionCount = 0;
    let pendingCorrection = null;
    let restPeriods = [];

    // ============================================================================
    // UTILITIES
    // ============================================================================
    function calculateMedian(values) {
        if (values.length === 0) return 0;
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        if (sorted.length % 2 === 0) return (sorted[mid - 1] + sorted[mid]) / 2;
        return sorted[mid];
    }

    function calculateStdDev(values) {
        if (values.length < 2) return 999;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
        return Math.sqrt(variance);
    }

    function getFrequencyFromMidi(midiNote) {
        return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    function getNoteFrequencyBand(midiNote) {
        const fundamental = getFrequencyFromMidi(midiNote);
        const lowerFreq = fundamental / NOTE_BAND_RATIO;
        const upperFreq = fundamental * NOTE_BAND_RATIO;
        return { lowerFreq, upperFreq };
    }

    function getBinForFrequency(frequency, sampleRate, fftSize) {
        const nyquist = sampleRate / 2;
        const bin = Math.floor(frequency / nyquist * (fftSize / 2));
        return Math.min(Math.max(0, bin), fftSize / 2 - 1);
    }

    function calculateEnergyForNote(midiNote, sampleRate, fftSize) {
        if (!frequencyData) return 0;
        const band = getNoteFrequencyBand(midiNote);
        const lowerBin = getBinForFrequency(band.lowerFreq, sampleRate, fftSize);
        const upperBin = getBinForFrequency(band.upperFreq, sampleRate, fftSize);
        let energy = 0, binsChecked = 0;
        for (let i = lowerBin; i <= upperBin && i < frequencyData.length; i++) {
            energy += frequencyData[i] / 255;
            binsChecked++;
        }
        return binsChecked > 0 ? energy / binsChecked : 0;
    }

    // ============================================================================
    // STATUS DISPLAY
    // ============================================================================
    function updateDeviceStatusDisplay() {
        // 1. Update Seat ID (e.g., "C1")
        const seatDisplay = document.getElementById('device-id-display');
        if (seatDisplay) {
            seatDisplay.innerText = mySeat ? mySeat.id : "--";
        }

        // Update Init Button State
        const initBtn = document.getElementById('init-permissions-btn');
        if (initBtn) {
            // Only allow setup to start if we know the seat and assets are ready
            const canStartSetup = mySeat && assetsPreloaded;
            initBtn.disabled = !canStartSetup;

            // Hide this button once the mic is granted (since we'll show the init-permissions-btn)
            if (micPermissionGranted) {
                initBtn.style.display = 'none';
            }
        }

        // 2. Update System Status Message
        const msgDisplay = document.getElementById('system-msg');
        if (msgDisplay) {
            if (!mySeat) {
                msgDisplay.innerText = "Identifying seat...";
            } else if (!assetsPreloaded) {
                msgDisplay.innerText = "Loading assets...";
            } else if (!micPermissionGranted) {
                msgDisplay.innerText = "Please grant microphone permission.";
            } else {
                msgDisplay.innerText = "System Ready. Please Enter.";
            }
        }

        // 3. Update Debug/Calibration Panel Visibility
        const debugPanel = document.getElementById('calibration-debug');
        if (debugPanel) {
            // Only show the panel if the microphone is active or we are in a tuning phase
            const isCalibrating = (typeof isMicActive !== 'undefined' && isMicActive);
            debugPanel.style.display = isCalibrating ? 'block' : 'none';
        }
    }

    // ============================================================================
    // LOGGING
    // ============================================================================
    let logQueue = [];
    let logFlushTimer = null;
    let pendingFlush = false;
    let logRef = null;
    const LOG_FLUSH_INTERVAL_MS = 2000;
    const MAX_LOG_QUEUE_SIZE = 200;

    function initLogging() {
        if (!mySeat) return;
        logRef = db.ref(`device_logs/${mySeat.id}`);
        if (logFlushTimer) clearInterval(logFlushTimer);
        logFlushTimer = setInterval(flushLogs, LOG_FLUSH_INTERVAL_MS);
        const serverTimestamp = Date.now() + (serverOffset || 0);
        log(`🚀 Device ${mySeat.id} started`);
        setTimeout(() => flushLogs(), 100);
    }

    function flushLogs() {
        if (logQueue.length === 0 || !logRef || pendingFlush) return;
        pendingFlush = true;
        const logsToSend = [...logQueue];
        logQueue = [];
        const batch = {};
        logsToSend.forEach((logEntry, index) => {
            const ts = Date.now() + (serverOffset || 0);
            batch[`${ts}_${index}_${Math.random().toString(36).substr(2, 6)}`] = logEntry;
        });
        logRef.update(batch).catch(e => {
            console.error("Failed to send logs:", e);
            logQueue = [...logsToSend, ...logQueue];
            if (logQueue.length > MAX_LOG_QUEUE_SIZE) logQueue = logQueue.slice(-MAX_LOG_QUEUE_SIZE);
        }).finally(() => { pendingFlush = false; });
    }

    function log(message, type = 'info') {
        const serverTimestamp = Date.now() + (serverOffset || 0);
        const timeStr = new Date(serverTimestamp).toISOString().substr(11, 12);
        console.log(`[${timeStr}] [${mySeat?.id || 'unknown'}] ${message}`);
        const logEntry = { timestamp: serverTimestamp, timeStr, message, seatId: mySeat ? mySeat.id : 'unknown', type, isHappy, speakerDelay: currentSpeakerDelay, micDelay: myMicDelayMs };
        logQueue.push(logEntry);
        if (logQueue.length >= MAX_LOG_QUEUE_SIZE && logRef) flushLogs();
    }

    // ============================================================================
    // FIREBASE INIT
    // ============================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref(".info/serverTimeOffset").on("value", snap => {
        serverOffset = snap.val() || 0;
        updateDeviceStatusDisplay();
    });

    // ============================================================================
    // CALIBRATION DISPLAY
    // ============================================================================
    function updateCalibrationDisplay() {
        const displayDiv = document.getElementById('calibration-display');
        const speakerSpan = document.getElementById('display-speaker-delay');
        const micSpan = document.getElementById('display-mic-delay');
        const statusSpan = document.getElementById('calibration-status-text');
        if (isHappy && currentSpeakerDelay !== null && myMicDelayMs !== null) {
            displayDiv.style.display = 'block';
            speakerSpan.innerText = `${Math.round(currentSpeakerDelay)} ms`;
            micSpan.innerText = `${Math.round(myMicDelayMs)} ms`;
            statusSpan.innerText = '✅ Calibrated - Ready';
            statusSpan.className = 'calibration-status happy';
        } else {
            displayDiv.style.display = 'block';
            speakerSpan.innerText = '-- ms';
            micSpan.innerText = '-- ms';
            statusSpan.innerText = '⚠️ Not Calibrated - Will calibrate on ENTER';
            statusSpan.className = 'calibration-status uncalibrated';
        }
        updateDeviceStatusDisplay();
    }

    // ============================================================================
    // IDENTITY & CONFIG
    // ============================================================================

    /**
     * Resolves the device's seat identity from URL parameters
     * and fetches spatial coordinates from Firebase.
     */
    async function resolveIdentity() {
        const urlParams = new URLSearchParams(window.location.search);
        const seatParam = urlParams.get('seat');

        if (seatParam) {
            // 1. Assign local ID to the pre-initialized mySeat object
            mySeat.id = seatParam;

            log(`Identity found in URL: ${mySeat.id}`);

            try {
                // 2. Fetch spatial coordinates from Firebase config
                const snap = await db.ref('seat_config/' + mySeat.id).once('value');

                if (snap.exists()) {
                    const data = snap.val();
                    // Store X/Y for spatial audio and visual calculations
                    mySeat.x = data.x !== undefined ? data.x : 0;
                    mySeat.y = data.y !== undefined ? data.y : 0;
                    log(`Spatial mapping resolved: [${mySeat.x}, ${mySeat.y}]`);
                } else {
                    log(`⚠️ Warning: Seat ${mySeat.id} not found in database config. Using defaults.`);
                }

                // 3. Update the UI
                // This fills the "Seat Location" span and updates the status message
                updateDeviceStatusDisplay();
                return true;

            } catch (error) {
                log(`❌ Firebase Identity Error: ${error.message}`);
                // Fallback: still allow the app to run with the ID from the URL
                updateDeviceStatusDisplay();
                return false;
            }
        } else {
            log('❌ Error: No ?seat= parameter found in URL.');
            const msg = document.getElementById('system-msg');
            if (msg) {
                msg.innerText = "Error: Invalid Seat Link";
                msg.style.color = "#ff4444";
            }
            return false;
        }
    }

    async function loadStoredCalibration() {
        if (!mySeat) return false;
        try {
            const stored = localStorage.getItem(`calibration_${mySeat.id}`);
            if (stored) {
                const cal = JSON.parse(stored);
                const age = Date.now() - cal.timestamp;
                if (age < 30 * 24 * 60 * 60 * 1000 && cal.speakerDelay && cal.micDelay) {
                    currentSpeakerDelay = cal.speakerDelay;
                    myMicDelayMs = cal.micDelay;
                    phase1Complete = true;
                    isHappy = true;
                    log(`✅ Loaded calibration: speaker=${currentSpeakerDelay.toFixed(1)}ms, mic=${myMicDelayMs.toFixed(1)}ms`);
                    updateCalibrationDisplay();
                    return true;
                }
            }
            return false;
        } catch (e) {
            log(`⚠️ Failed to load calibration: ${e.message}`);
            return false;
        }
    }

    /**
     * Fetches the list of nearby seats from Firebase.
     * This is used for the distributed acoustic calibration (Phase 2).
     */
    async function loadNeighborMap() {
        try {
            // 1. Safety check: Ensure identity is resolved first
            if (!mySeat || !mySeat.id) {
                log("⚠️ Cannot load neighbors: Seat ID not resolved.");
                return false;
            }

            log(`🔍 Fetching neighbor map for seat ${mySeat.id}...`);

            // 2. Fetch the specific array for this seat
            const snap = await db.ref('neighbor_map/' + mySeat.id).once('value');

            if (snap.exists()) {
                myNeighbors = snap.val();
                log(`📍 Neighbor map loaded: ${myNeighbors.length} neighbors found.`);

                // 3. Update the UI Safely
                // We check if the indicator exists before touching it to prevent null errors
                const neighborInd = document.getElementById('neighbor-ind');
                if (neighborInd) {
                    neighborInd.className = 'indicator active';
                }

                // Trigger the general UI update to refresh the system message
                updateDeviceStatusDisplay();
                return true;
            } else {
                log(`⚠️ No neighbor data found for seat ${mySeat.id}.`);

                const neighborInd = document.getElementById('neighbor-ind');
                if (neighborInd) {
                    neighborInd.className = 'indicator warning';
                }
                return false;
            }

        } catch (error) {
            log(`❌ Failed to load neighbor map: ${error.message}`);

            const neighborInd = document.getElementById('neighbor-ind');
            if (neighborInd) {
                neighborInd.className = 'indicator error';
            }

            // We throw the error so window.onload's try/catch can handle the global failure
            throw error;
        }
    }

    async function loadTuningConfig() {
        try {
            const tuningSnap = await db.ref('tuning_mode').once('value');
            const tuningData = tuningSnap.val();
            if (!tuningData || !tuningData.piano_notes) { log("⚠️ No tuning configuration found"); return; }
            noteTimings = tuningData.piano_notes.map((note, index) => ({ index, startMs: note.ms_offset, durationMs: note.duration_ms || 500, measure: note.measure, pitch: note.pitch, midi: note.midi }));
            log(`📋 Loaded ${noteTimings.length} piccolo notes`);
            if (tuningData.pillar_notes) allPillarNotes = tuningData.pillar_notes;
            if (tuningData.metadata && tuningData.metadata.pillar_cal_windows) {
                pillarWindows = tuningData.metadata.pillar_cal_windows;
                phase1EndMs = pillarWindows[pillarWindows.length - 1].end_ms;
                log(`📡 Loaded ${pillarWindows.length} calibration windows, Phase 1 ends at ${phase1EndMs}ms`);
            }
            if (tuningData.assets) {
                if (tuningData.assets.piccolo) PICCOLO_URL = tuningData.assets.piccolo;
                if (tuningData.assets.test_pulse) TEST_PULSE_URL = tuningData.assets.test_pulse;
                if (tuningData.assets.pillars) pillarUrls = tuningData.assets.pillars;
            }
            log(`✅ Tuning configuration loaded`);

            // Pre-calculate rest periods for correction scheduling
            restPeriods = [];
            let lastEndMs = 0;
            for (let i = 0; i < noteTimings.length; i++) {
                const note = noteTimings[i];
                const startMs = note.startMs;
                const endMs = startMs + note.durationMs;
                if (startMs > lastEndMs + 100) {
                    restPeriods.push({ startMs: lastEndMs, endMs: startMs, durationMs: startMs - lastEndMs });
                }
                lastEndMs = Math.max(lastEndMs, endMs);
            }
            restPeriods = restPeriods.filter(r => r.durationMs > 200);
            log(`📡 Found ${restPeriods.length} rest periods for correction scheduling`);
        } catch (e) { log(`❌ Failed to load tuning config: ${e.message}`); }
    }

    async function loadPillarData() {
        const snap = await db.ref('pillar_config').once('value');
        const config = snap.val();
        if (config && config.pillars) {
            config.pillars.forEach(p => { pillarData[p.id] = { x: p.x, y: p.y, speakerDelayMs: p.speakerDelayMs || 45, micDelayMs: p.micDelayMs || 18 }; });
            log(`📡 Loaded ${Object.keys(pillarData).length} pillars`);
        }
    }

    // ============================================================================
    // MICROPHONE
    // ============================================================================
    window.requestMicrophonePermission = async function() {
        if (micPermissionGranted) return true;
        if (micPermissionRequested) return false;
        micPermissionRequested = true;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 44100 }, video: false });
            micStream = stream;
            micPermissionGranted = true;
            log("✅ Microphone permission GRANTED");
            const oldBtn = document.getElementById('request-mic-btn');
            if (initBtn) initBtn.style.display = 'block';
            if (micBtn) { micBtn.style.background = "#1e4d1e"; micBtn.innerHTML = "✅ Mic Ready"; micBtn.disabled = true; }
            return true;
        } catch (e) {
            log(`❌ Mic permission DENIED: ${e.message}`);
            micPermissionRequested = false;
            return false;
        }
    };

    async function setupMicrophone() {
        if (!micPermissionGranted) return false;
        if (isMicActive) return true;
        try {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.gain.value = MASTER_PLAYBACK_GAIN; masterGain.connect(audioCtx.destination); }
            if (!micStream) { const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } }); micStream = stream; }
            const source = audioCtx.createMediaStreamSource(micStream);
            const micGain = audioCtx.createGain();
            micGain.gain.value = 5.0;
            source.connect(micGain);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = FFT_SIZE;
            analyser.smoothingTimeConstant = 0.1;
            micGain.connect(analyser);
            sampleRate = audioCtx.sampleRate;
            frequencyData = new Uint8Array(analyser.frequencyBinCount);
            isMicActive = true;
            document.getElementById('energy-meter').style.display = 'block';
            log(`🎤 Microphone active`);
            requestAnimationFrame(detectNeighborNotes);
            return true;
        } catch (e) { log(`❌ Failed to setup mic: ${e.message}`); return false; }
    }

    async function enableMicrophone() {
        if (!micPermissionGranted) return false;
        if (isMicActive) return true;
        return await setupMicrophone();
    }

    // ============================================================================
    // PHASE 1: MIC DELAY DETECTION
    // ============================================================================
    function detectPillarOnsets(now) {
        if (!allPillarNotes || allPillarNotes.length === 0) return;
        if (!tuningStartTime) return;
        if (isHappy) return;
        if (phase1Complete) return;
        const songPosition = now - tuningStartTime;
        if (songPosition > phase1EndMs) return;
        const activeNotes = allPillarNotes.filter(note => Math.abs(songPosition - note.ms_offset) < PHASE1_SCHEDULE_WINDOW_MS);
        for (const note of activeNotes) {
            const noteKey = `pillar_mic_${note.pillar_id}_${note.ms_offset}`;
            if (processedMeasurements.has(noteKey)) continue;
            const energy = calculateEnergyForNote(note.midi, sampleRate, FFT_SIZE);
            let threshold = MIN_DETECTION_ENERGY;
            if (pillarRefBaseline > 0) threshold = pillarRefBaseline * PILLAR_ONSET_THRESHOLD;
            if (energy > threshold) {
                const expectedTimeAbs = tuningStartTime + note.ms_offset;
                const rawDelay = now - expectedTimeAbs;
                const pillar = pillarData[note.pillar_id];
                if (!pillar) continue;
                const dx = mySeat.x - pillar.x, dy = mySeat.y - pillar.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                const propagationMs = (distance / SPEED_OF_SOUND) * 1000;
                const micDelay = rawDelay - pillar.speakerDelayMs - propagationMs;
                if (micDelay >= MIC_DELAY_SANITY_MIN && micDelay <= MIC_DELAY_SANITY_MAX) {
                    micDelaySamples.push(micDelay);
                    processedMeasurements.add(noteKey);
                    document.getElementById('debug-phase1-samples').innerText = micDelaySamples.length;
                    if (micDelaySamples.length >= MIN_MIC_SAMPLES) {
                        myMicDelayMs = calculateMedian(micDelaySamples);
                        phase1Complete = true;
                        log(`🎤 Mic delay: ${myMicDelayMs.toFixed(1)}ms from ${micDelaySamples.length} detections`, 'success');
                        document.getElementById('debug-mic-delay').innerText = `${myMicDelayMs.toFixed(1)}ms`;
                        updateCalibrationDisplay();
                    }
                }
            }
            if (pillarRefBaselineSamples.length < 50) pillarRefBaselineSamples.push(energy);
            else { const sorted = [...pillarRefBaselineSamples].sort((a, b) => a - b); pillarRefBaseline = sorted[Math.floor(sorted.length / 2)]; pillarRefBaselineSamples.shift(); pillarRefBaselineSamples.push(energy); }
        }
    }

    // ============================================================================
    // PHASE 2A: PILLAR SYNC (Immutable Timing Reference)
    // ============================================================================
    function detectPillarForSync(now) {
        if (!allPillarNotes || allPillarNotes.length === 0) return;
        if (!tuningStartTime) return;
        if (!phase1Complete) return;
        if (isHappy) return;
        const songPosition = now - tuningStartTime;
        if (songPosition < phase1EndMs) return;
        const activeNotes = allPillarNotes.filter(note => Math.abs(songPosition - note.ms_offset) < PHASE1_SCHEDULE_WINDOW_MS);
        for (const note of activeNotes) {
            const noteKey = `pillar_sync_${note.pillar_id}_${note.ms_offset}`;
            if (processedMeasurements.has(noteKey)) continue;
            const energy = calculateEnergyForNote(note.midi, sampleRate, FFT_SIZE);
            let threshold = MIN_DETECTION_ENERGY;
            if (pillarRefBaseline > 0) threshold = pillarRefBaseline * PILLAR_ONSET_THRESHOLD;
            if (energy > threshold) {
                const expectedTimeAbs = tuningStartTime + note.ms_offset;
                const timeShift = now - expectedTimeAbs;
                if (Math.abs(timeShift) < 500) {
                    rawTimeShifts.push(timeShift);
                    if (rawTimeShifts.length > 50) rawTimeShifts.shift();
                }
                processedMeasurements.add(noteKey);
            }
        }
        if (pillarRefBaselineSamples.length < 50) { const e = activeNotes.length ? calculateEnergyForNote(activeNotes[0]?.midi, sampleRate, FFT_SIZE) : 0; pillarRefBaselineSamples.push(e); }
        else { const sorted = [...pillarRefBaselineSamples].sort((a, b) => a - b); pillarRefBaseline = sorted[Math.floor(sorted.length / 2)]; pillarRefBaselineSamples.shift(); }
    }

    // ============================================================================
    // RECORDING FOR PHASE 3 (NON-BLOCKING)
    // ============================================================================
    async function captureRecordingWindow(expectedNoteTime, windowMs) {
        if (!analyser || !frequencyData) return null;
        const frames = [];
        const startTime = expectedNoteTime - (windowMs / 2);
        const endTime = expectedNoteTime + (windowMs / 2);
        let nowServer = Date.now() + serverOffset;
        if (startTime > nowServer) await new Promise(r => setTimeout(r, startTime - nowServer));
        const recordEndTime = Date.now() + serverOffset + windowMs;
        while (Date.now() + serverOffset < recordEndTime) {
            analyser.getByteFrequencyData(frequencyData);
            frames.push({ timestamp: Date.now() + serverOffset, data: compressFrequencyData(frequencyData) });
            await new Promise(r => setTimeout(r, 10));
        }
        return { frames, windowMs, startTime, endTime };
    }

    function compressFrequencyData(freqData) {
        const nyquist = sampleRate / 2;
        const startBin = Math.floor(500 / nyquist * (FFT_SIZE / 2));
        const endBin = Math.ceil(2100 / nyquist * (FFT_SIZE / 2));
        const step = Math.max(1, Math.floor((endBin - startBin) / 20));
        const compressed = [];
        for (let i = startBin; i <= endBin; i += step) {
            let sum = 0, count = 0;
            for (let j = 0; j < step && i + j <= endBin; j++) { sum += freqData[i + j] / 255; count++; }
            compressed.push(sum / count);
        }
        return compressed;
    }

    function storeRecording(neighborId, noteIndex, realTimeEstimate, recordingWindow) {
        if (!localRecordings.has(neighborId)) localRecordings.set(neighborId, []);
        localRecordings.get(neighborId).push({ noteIndex, realTimeEstimate, recordingWindow });
    }

    // ============================================================================
    // PHASE 2B: NEIGHBOR DETECTION + SCHEDULED RECORDING
    // ============================================================================
    function processDetectionWindows(now, piccoloEnergy) {
        if (!phase1Complete) return;
        if (!noteSchedule || noteSchedule.length === 0) return;
        if (!tuningStartTime) return;
        if (isHappy) return;
        const songPosition = now - tuningStartTime;
        if (songPosition < phase1EndMs) return;
        const candidateNotes = noteSchedule.filter(note => {
            if (note.deviceId === mySeat.id) return false;
            if (!allListeningTargets.includes(note.deviceId)) return false;
            if (processedMeasurements.has(`${note.noteIndex}_${note.deviceId}`)) return false;
            return Math.abs(songPosition - note.startMs) <= 500;
        });
        for (const note of candidateNotes) {
            const expectedNote = noteTimings[note.noteIndex];
            if (!expectedNote || !expectedNote.midi) continue;
            const expectedNoteTime = tuningStartTime + note.startMs;
            const nowServer = Date.now() + serverOffset;
            const windowStartDelay = expectedNoteTime - nowServer - (RECORDING_WINDOW_MS / 2);
            if (windowStartDelay > 0 && windowStartDelay < 2000) {
                const scheduleKey = `rec_${note.deviceId}_${note.noteIndex}`;
                if (!scheduledRecordings.has(scheduleKey)) {
                    scheduledRecordings.add(scheduleKey);
                    setTimeout(async () => {
                        const recordingWindow = await captureRecordingWindow(expectedNoteTime, RECORDING_WINDOW_MS);
                        if (recordingWindow) storeRecording(note.deviceId, note.noteIndex, null, recordingWindow);
                    }, windowStartDelay);
                }
            }
            const energy = calculateEnergyForNote(expectedNote.midi, sampleRate, FFT_SIZE);
            if (energy > MIN_DETECTION_ENERGY) {
                const rawDelay = songPosition - note.startMs;
                const dx = mySeat.x - note.originX, dy = mySeat.y - note.originY;
                const distance = Math.sqrt(dx*dx + dy*dy);
                const propagationMs = (distance / SPEED_OF_SOUND) * 1000;
                const speakerDelay = rawDelay - propagationMs - (myMicDelayMs || 0);
                if (speakerDelay >= -50 && speakerDelay <= 500) {
                    if (localRecordings.has(note.deviceId)) {
                        const existing = localRecordings.get(note.deviceId).find(r => r.noteIndex === note.noteIndex);
                        if (existing) existing.realTimeEstimate = speakerDelay;
                    }
                    rawTimeShifts.push(speakerDelay);
                    if (rawTimeShifts.length > 50) rawTimeShifts.shift();
                    reportMeasurement(note.noteIndex, note.deviceId, speakerDelay, rawDelay, propagationMs, now);
                    processedMeasurements.add(`${note.noteIndex}_${note.deviceId}`);
                    log(`👥 Neighbor: ${note.deviceId} note ${note.noteIndex} → delay=${speakerDelay.toFixed(1)}ms`);
                }
            }
        }
    }

    async function reportMeasurement(noteIndex, playingSeatId, speakerDelay, rawDelay, propagationMs, detectionTime) {
        try {
            await db.ref(`measurements/${noteIndex}/reporters/${mySeat.id}`).set({
                targetSeatId: playingSeatId, reporterSeatId: mySeat.id, speakerDelay: Math.round(speakerDelay),
                rawDelay: Math.round(rawDelay), propagationMs: Math.round(propagationMs), micDelayMs: myMicDelayMs || 0,
                reportedAt: Date.now() + serverOffset, detectedAt: detectionTime, noteIndex
            });
        } catch (e) { log(`❌ Failed to report: ${e.message}`); }
    }

    // ============================================================================
    // PARALLEL STREAMING PLAYBACK (No stop() calls)
    // ============================================================================
    let activeStream = null;
    let allStreams = [];

    function startContinuousPlayback(startTime, speakerDelay) {
        if (isListenOnlyMode) { log(`🔇 Listen-only mode - no playback`); return; }
        if (!PICCOLO_URL || !bufferCache[PICCOLO_URL]) return;
        const nowWall = Date.now() + serverOffset;
        const adjustedStartTime = startTime - speakerDelay;
        const delayMs = adjustedStartTime - nowWall;
        if (delayMs > 0 && delayMs < 30000) {
            setTimeout(() => { createNewPlaybackStream(adjustedStartTime, speakerDelay); }, delayMs);
        } else if (delayMs > -1000) {
            log(`⚠️ Playback is ${Math.round(-delayMs)}ms late, starting immediately`, 'warn');
            createNewPlaybackStream(adjustedStartTime, speakerDelay);
        } else {
            log(`❌ Playback too late (${Math.round(-delayMs)}ms), skipping`, 'warn');
        }
    }

    function createNewPlaybackStream(targetWallTime, speakerDelay) {
        if (!audioCtx || audioCtx.state !== 'running') return null;
        if (!PICCOLO_URL || !bufferCache[PICCOLO_URL]) return null;

        const nowAudio = audioCtx.currentTime;
        const nowWall = Date.now() + serverOffset;
        const delaySec = (targetWallTime - nowWall) / 1000;
        const startAudioTime = nowAudio + Math.max(0, delaySec);

        const source = audioCtx.createBufferSource();
        source.buffer = bufferCache[PICCOLO_URL];
        source.loop = false;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, startAudioTime);
        source.connect(gain);
        gain.connect(masterGain || audioCtx.destination);
        source.start(startAudioTime);

        const streamId = allStreams.length + 1;
        const newStream = { id: streamId, source, gain, targetWallTime, startAudioTime, speakerDelay, createdAt: nowWall, isActive: false };
        allStreams.push(newStream);

        if (activeStream) {
            const crossfadeDuration = 0.1;
            const now = audioCtx.currentTime;
            activeStream.gain.gain.linearRampToValueAtTime(0, now + crossfadeDuration);
            gain.gain.linearRampToValueAtTime(1, startAudioTime + 0.01);
            activeStream.isActive = false;
        } else {
            gain.gain.setValueAtTime(1, startAudioTime);
        }
        newStream.isActive = true;
        activeStream = newStream;

        startEnvelopeScheduler(targetWallTime, speakerDelay);
        return newStream;
    }

    function startEnvelopeScheduler(pieceStartTime, speakerDelay) {
        envelopeTimeouts.forEach(t => clearTimeout(t));
        envelopeTimeouts = [];
        if (isListenOnlyMode) return;
        if (isSingleDeviceMode) { if (activeStream?.gain) activeStream.gain.gain.setValueAtTime(MASTER_PLAYBACK_GAIN, audioCtx.currentTime); return; }
        assignedNotes.forEach(note => {
            const noteStartWall = pieceStartTime + note.startMs;
            const nowWall = Date.now() + serverOffset;
            const rampUpStart = noteStartWall - speakerDelay;
            const rampUpDelay = rampUpStart - nowWall;
            if (rampUpDelay > 0) {
                const timeoutId = setTimeout(() => {
                    if (!activeStream?.gain) return;
                    const now = audioCtx.currentTime;
                    const durationMs = note.durationMs;
                    activeStream.gain.gain.cancelScheduledValues(now);
                    activeStream.gain.gain.setValueAtTime(0, now);
                    activeStream.gain.gain.linearRampToValueAtTime(MASTER_PLAYBACK_GAIN, now + 0.005);
                    activeStream.gain.gain.linearRampToValueAtTime(0, now + (durationMs - 10)/1000);
                    activeStream.gain.gain.setValueAtTime(0, now + durationMs/1000);
                }, rampUpDelay);
                envelopeTimeouts.push(timeoutId);
            }
        });
    }

    // ============================================================================
    // CORRECTION WITH REST SCHEDULING
    // ============================================================================
    function findNextRestPeriod(songPositionMs) {
        for (const rest of restPeriods) {
            if (rest.startMs > songPositionMs + 100) {
                return rest;
            }
        }
        return null;
    }

    function scheduleCorrectionDuringRest(medianShift, currentDelay) {
        const nowWall = Date.now() + serverOffset;
        const songPosition = nowWall - tuningStartTime;
        const nextRest = findNextRestPeriod(songPosition);

        if (nextRest && nextRest.durationMs > 300) {
            const restStartTime = tuningStartTime + nextRest.startMs;
            const waitMs = restStartTime - nowWall;

            if (waitMs > 0 && waitMs < 30000) {
                log(`🎵 Scheduling correction during rest at ${(nextRest.startMs/1000).toFixed(1)}s (wait ${waitMs.toFixed(0)}ms, rest duration ${nextRest.durationMs}ms)`, 'info');

                setTimeout(() => {
                    const newDelay = currentDelay + medianShift;
                    const clampedDelay = Math.max(-50, Math.min(1000, newDelay));
                    log(`🔄 REST CORRECTION: ${currentDelay.toFixed(1)}ms → ${clampedDelay.toFixed(1)}ms`, 'info');

                    currentSpeakerDelay = clampedDelay;
                    const nowWall2 = Date.now() + serverOffset;
                    const currentSongPos = nowWall2 - tuningStartTime;
                    const newStartTime = nowWall2 - currentSongPos + clampedDelay;
                    createNewPlaybackStream(newStartTime, clampedDelay);

                    const flash = document.getElementById('detection-flash');
                    if (flash) {
                        flash.style.background = '#ffaa44';
                        setTimeout(() => { flash.style.background = '#333'; }, 500);
                    }

                    updateCalibrationDisplay();
                }, waitMs);
                return true;
            }
        }
        return false;
    }

    function applyCorrection(medianShift) {
        const currentDelay = currentSpeakerDelay;
        const newDelay = currentDelay + medianShift;
        const clampedDelay = Math.max(-50, Math.min(1000, newDelay));
        const correctionMagnitude = Math.abs(clampedDelay - currentDelay);

        if (correctionMagnitude < MIN_CORRECTION_MS) return;

        log(`🔄 Correction needed: shift=${medianShift > 0 ? '+' : ''}${medianShift.toFixed(1)}ms → ${currentDelay.toFixed(1)}ms → ${clampedDelay.toFixed(1)}ms`);

        const scheduled = scheduleCorrectionDuringRest(medianShift, currentDelay);
        if (!scheduled) {
            log(`⚠️ No suitable rest period, applying correction immediately`, 'warn');
            currentSpeakerDelay = clampedDelay;
            const nowWall = Date.now() + serverOffset;
            const currentSongPos = nowWall - tuningStartTime;
            const newStartTime = nowWall - currentSongPos + clampedDelay;
            createNewPlaybackStream(newStartTime, clampedDelay);
        }

        rawTimeShifts = [];
        correctionCount++;
        updateCalibrationDisplay();
    }

    // ============================================================================
    // REAL-TIME EVALUATION
    // ============================================================================
    function shouldIterate(medianShift, stdDev, sampleCount) {
        const absError = Math.abs(medianShift);
        if (sampleCount < MIN_SAMPLES_FOR_CORRECTION) return false;
        if (stdDev > 50 && sampleCount < 15) return false;
        if (absError > AUDIBLE_ERROR_MS) return true;
        if (absError > SIGNIFICANT_ERROR_MS && stdDev < 40) return true;
        if (sampleCount >= 15 && absError > MIN_CORRECTION_MS && stdDev < 50) return true;
        return false;
    }

    function evaluateInRealTime() {
        if (isHappy) return;
        if (rawTimeShifts.length < MIN_SAMPLES_FOR_CORRECTION) return;

        const medianShift = calculateMedian(rawTimeShifts);
        const stdDev = calculateStdDev(rawTimeShifts);
        const currentDelay = currentSpeakerDelay;
        const absError = Math.abs(medianShift);

        document.getElementById('debug-stddev').innerText = `${stdDev.toFixed(1)}ms`;
        document.getElementById('debug-speaker-delay').innerText = `${currentDelay.toFixed(1)}ms`;

        log(`📊 Real-time: median shift=${medianShift > 0 ? '+' : ''}${medianShift.toFixed(1)}ms, σ=${stdDev.toFixed(1)}ms, samples=${rawTimeShifts.length}, current delay=${currentDelay.toFixed(1)}ms, corrections=${correctionCount}`);

        if (correctionCount === 0 && rawTimeShifts.length >= 5 && absError > 20) {
            log(`🔧 FORCE FIRST CORRECTION: shift=${medianShift > 0 ? '+' : ''}${medianShift.toFixed(1)}ms, samples=${rawTimeShifts.length}`, 'info');
            applyCorrection(medianShift);
            rawTimeShifts = [];
            return;
        }

        if (absError <= CONVERGENCE_STD_DEV_MS && stdDev <= CONVERGENCE_STD_DEV_MS) {
            if (!isHappy) {
                log(`✅ Converged! Error ${absError.toFixed(1)}ms ≤ ${CONVERGENCE_STD_DEV_MS}ms, σ=${stdDev.toFixed(1)}ms`, 'success');
                completeCalibration();
            }
            return;
        }

        if (correctionCount >= MAX_CORRECTIONS) {
            log(`✅ Max corrections (${MAX_CORRECTIONS}) reached, completing calibration`, 'info');
            completeCalibration();
            return;
        }

        const MIN_DELAY = -50;
        const MAX_DELAY = 1000;
        if (currentDelay <= MIN_DELAY && medianShift > 0) {
            log(`⚠️ At minimum delay (${currentDelay.toFixed(1)}ms) but still ${medianShift > 0 ? 'early' : 'late'} by ${absError.toFixed(1)}ms`);
            if (correctionCount > 0) completeCalibration();
            return;
        }
        if (currentDelay >= MAX_DELAY && medianShift < 0) {
            log(`⚠️ At maximum delay (${currentDelay.toFixed(1)}ms) but still late by ${absError.toFixed(1)}ms`);
            if (correctionCount > 0) completeCalibration();
            return;
        }

        if (shouldIterate(medianShift, stdDev, rawTimeShifts.length)) {
            if (absError <= MIN_CORRECTION_MS) {
                log(`✅ In sync: error ${absError.toFixed(1)}ms ≤ ${MIN_CORRECTION_MS}ms`);
                if (!isHappy && (stdDev < CONVERGENCE_STD_DEV_MS || correctionCount >= 2)) completeCalibration();
                return;
            }
            applyCorrection(medianShift);
            flushLogs();
        }
    }

    // ============================================================================
    // DETECTION LOOP
    // ============================================================================
    function detectNeighborNotes() {
        if (!isMicActive || !analyser || !frequencyData) { requestAnimationFrame(detectNeighborNotes); return; }
        const now = Date.now() + serverOffset;
        analyser.getByteFrequencyData(frequencyData);
        const nyquist = sampleRate / 2;
        const startBin = Math.floor(500 / nyquist * (FFT_SIZE / 2));
        const endBin = Math.ceil(2100 / nyquist * (FFT_SIZE / 2));
        let piccoloEnergy = 0;
        for (let i = startBin; i <= endBin && i < frequencyData.length; i++) piccoloEnergy += frequencyData[i] / 255;
        piccoloEnergy = piccoloEnergy / (endBin - startBin + 1);
        currentAvgEnergy = piccoloEnergy;
        const energyFill = document.getElementById('energy-fill');
        if (energyFill) energyFill.style.width = (piccoloEnergy * 100) + '%';
        const energyValue = document.getElementById('energy-value');
        if (energyValue) energyValue.innerText = piccoloEnergy.toFixed(4);
        if (!baselineComplete && tuningStartTime) {
            if (now - baselineStartTime < BASELINE_SAMPLES_MS) baselineSamples.push(piccoloEnergy);
            else if (baselineSamples.length > 0) { const sorted = [...baselineSamples].sort((a, b) => a - b); baselineEnergy = sorted[Math.floor(sorted.length / 2)]; baselineComplete = true; log(`📊 Baseline: ${baselineEnergy.toFixed(4)}`); }
        }
        const songPosition = tuningStartTime ? now - tuningStartTime : 0;
        const isPhase1Music = songPosition < phase1EndMs;
        const isPhase2Music = songPosition >= phase1EndMs;
        if (!isHappy && !phase1Complete && isPhase1Music && tuningStartTime) detectPillarOnsets(now);
        if (!isHappy && isPhase2Music && tuningStartTime) detectPillarForSync(now);
        if (!isHappy && isPhase2Music && tuningStartTime) {
            processDetectionWindows(now, piccoloEnergy);
            if (now - lastEvaluationTime > EVALUATION_INTERVAL_MS) { lastEvaluationTime = now; evaluateInRealTime(); }
        }
        requestAnimationFrame(detectNeighborNotes);
    }

    // ============================================================================
    // COMPLETE CALIBRATION
    // ============================================================================
    async function completeCalibration() {
        if (isHappy) return;
        isHappy = true;
        log(`✅✅✅ CALIBRATION COMPLETE ✅✅✅`);
        log(`   Speaker delay: ${currentSpeakerDelay.toFixed(1)}ms`);
        log(`   Mic delay: ${myMicDelayMs?.toFixed(1) || '0'}ms`);
        saveCalibration();
        await db.ref(`devices/${mySeat.id}`).update({
            status: 'HAPPY', calibrated: true, finalSpeakerDelay: Math.round(currentSpeakerDelay),
            finalMicDelay: Math.round(myMicDelayMs || 0), convergedAt: Date.now() + serverOffset
        });
        updateCalibrationDisplay();
        document.getElementById('debug-status').innerHTML = 'HAPPY ✓';
        updateDeviceStatusDisplay();
        startPhase3();
    }

    function saveCalibration() {
        try { localStorage.setItem(`calibration_${mySeat.id}`, JSON.stringify({ speakerDelay: currentSpeakerDelay, micDelay: myMicDelayMs, timestamp: Date.now() })); log(`💾 Calibration saved`); }
        catch (e) { log(`⚠️ Could not save: ${e.message}`); }
    }

    async function startPhase3() {
        log("📡 Phase 3: Analyzing recordings...");
        setTimeout(() => { log("✅ Phase 3 complete (simplified)"); }, 2000);
    }

    // ============================================================================
    // HEARTBEAT
    // ============================================================================
    function startHeartbeat() {
        if (!mySeat) return;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const scheduleNext = () => {
            const jitter = Math.floor(Math.random() * HEARTBEAT_JITTER_MS) - (HEARTBEAT_JITTER_MS / 2);
            const nextInterval = Math.max(1000, HEARTBEAT_BASE_INTERVAL_MS + jitter);
            heartbeatInterval = setTimeout(async () => { await sendHeartbeat(); scheduleNext(); }, nextInterval);
        };
        scheduleNext();
        log(`💓 Heartbeat started`);
    }

    async function sendHeartbeat() {
        if (!mySeat) return;
        try {
            await db.ref(`devices/${mySeat.id}`).update({
                lastSeen: Date.now() + serverOffset, status: isHappy ? 'HAPPY' : (phase1Complete ? 'CALIBRATING' : 'ACTIVE'),
                calibrated: isHappy, x: mySeat.x, y: mySeat.y, speakerDelay: currentSpeakerDelay,
                micDelay: myMicDelayMs || 0, neighborCount: myNeighbors.length
            });
        } catch (e) { log(`💔 Heartbeat failed: ${e.message}`); }
    }

    function stopHeartbeat() { if (heartbeatInterval) clearTimeout(heartbeatInterval); }

    // ============================================================================
    // ASSET PRELOAD
    // ============================================================================

    async function preloadAssets() {
        document.getElementById('asset-progress').style.display = 'block';
        log("📦 Starting asset preload...");
        try {
            const movementsSnap = await db.ref('show/movements').once('value');
            const movements = movementsSnap.val();
            const audioFiles = new Set();
            if (movements && movements.length) {
                movements.forEach(movement => { (movement.cues || []).forEach(cue => { (cue.assets || []).forEach(asset => { if (asset.audio_url) audioFiles.add(asset.audio_url); }); }); });
            }
            if (PICCOLO_URL) audioFiles.add(PICCOLO_URL);
            if (TEST_PULSE_URL) audioFiles.add(TEST_PULSE_URL);
            const totalAssets = audioFiles.size;
            if (totalAssets === 0) { document.getElementById('asset-ind').className = 'indicator active'; document.getElementById('asset-progress').style.display = 'none'; assetsPreloaded = true; return true; }
            let loadedCount = 0;
            for (const url of audioFiles) {
                try { const res = await fetch(url); const arrayBuf = await res.arrayBuffer(); bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf); loadedCount++; document.getElementById('asset-progress-fill').style.width = `${(loadedCount / totalAssets) * 100}%`; }
                catch (e) { log(`❌ Failed to load ${url.split('/').pop()}: ${e.message}`); loadedCount++; }
            }
            document.getElementById('asset-ind').className = 'indicator active';
            document.getElementById('asset-progress').style.display = 'none';
            log(`✅ Asset preload complete (${loadedCount}/${totalAssets})`);
            assetsPreloaded = true;
            if (micPermissionGranted && mySeat && myNeighbors) document.getElementById('init-permissions-btn').disabled = false;
            return true;
        } catch (e) { log(`❌ Asset Load Failure: ${e.message}`); document.getElementById('asset-ind').className = 'indicator error'; return false; }
    }

    // ============================================================================
    // TUNING LISTENER
    // ============================================================================
    let isProcessingTuning = false;
    function initTuningListener() {
        db.ref('tuning/current').on('value', async snap => {
            const schedule = snap.val();
            if (!schedule || schedule.status !== 'ACTIVE') return;
            if (isProcessingTuning || tuningStartTime === schedule.startTime) return;
            const now = Date.now() + serverOffset;
            if (schedule.startTime < now - 60000) { log(`❌ Schedule is in the past`); return; }
            log(`🎵 Tuning schedule received! startTime=${new Date(schedule.startTime).toISOString().substr(11, 12)}`);
            isProcessingTuning = true;
            currentTuningSchedule = schedule;
            tuningStartTime = schedule.startTime;
            updateDeviceStatusDisplay();
            const activePillars = (schedule.deviceOrder || []).filter(id => id.startsWith('PILLAR_'));
            const calibratedPatronIds = schedule.calibratedPatronIds || [];
            const isCalibrated = calibratedPatronIds.includes(mySeat.id);
            if (isCalibrated) { isListenOnlyMode = true; assignedNotes = []; phase1Complete = true; log(`🎯 Listen-only mode (already calibrated)`); }
            else {
                isListenOnlyMode = false;
                if (schedule.schedule) { noteSchedule = schedule.schedule.map(note => ({ ...note, startMs: parseFloat(note.startMs), durationMs: parseFloat(note.durationMs) })); assignedNotes = noteSchedule.filter(note => note.deviceId === mySeat.id); log(`🎯 Assigned ${assignedNotes.length} notes`); }
            }
            if (!isListenOnlyMode && schedule.pillar_notes) allPillarNotes = schedule.pillar_notes;
            if (schedule.metadata && schedule.metadata.pillar_cal_windows) { pillarWindows = schedule.metadata.pillar_cal_windows; phase1EndMs = pillarWindows[pillarWindows.length - 1].end_ms; }
            if (schedule.deviceOrder && !isListenOnlyMode) { const patronOrder = schedule.deviceOrder.filter(id => !id.startsWith('PILLAR_')); isSingleDeviceMode = (patronOrder.length === 1); }
            if (!isListenOnlyMode) { phase1Complete = false; phase1WindowActive = true; micDelaySamples = []; myMicDelayMs = null; rawTimeShifts = []; processedMeasurements.clear(); localRecordings.clear(); scheduledRecordings.clear(); log(`🎤 Phase 1: listening for mic delay (0-${phase1EndMs}ms)`); }
            if (!isListenOnlyMode) { const initialDelay = currentSpeakerDelay !== null ? currentSpeakerDelay : estimatedDeviceDelayMs; log(`🎵 Starting playback with delay ${initialDelay.toFixed(1)}ms`); startContinuousPlayback(tuningStartTime, initialDelay); }
            else { log(`🔇 Listen-only mode - no playback`); }
            await enableMicrophone();
            log("🎧 Listening...");
            if (!isListenOnlyMode && pillarWindows.length > 0 && activePillars.length > 0) {
                setTimeout(() => {
                    if (phase1WindowActive && !phase1Complete) {
                        log(`⏱️ Phase 1 timeout - using default mic delay`);
                        phase1WindowActive = false; phase1Complete = true;
                        myMicDelayMs = micDelaySamples.length > 0 ? calculateMedian(micDelaySamples) : estimatedDeviceMicDelayMs;
                        updateCalibrationDisplay();
                    }
                }, phase1EndMs);
            }
        });
    }

    // ============================================================================
    // SHOW PLAYBACK
    // ============================================================================
    async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.warn('Wake lock failed:', err); } }
    function handleMovementStart(cue) { if (!cue.startTime || !cue.movement || !cue.cues) return; log(`🎬 MOVEMENT START: "${cue.movement}"`); clearAllScheduledCues(); currentMovement = cue.movement; movementStartTime = cue.startTime; document.getElementById('movement-indicator').querySelector('.status-text').innerText = `${cue.movement}`; if (cue.cues) scheduleTimelineCues(cue.cues); }
    function clearAllScheduledCues() {
        activeTimeouts.forEach(t => clearTimeout(t)); activeTimeouts = [];
        activeAudioCues.forEach(cue => {
            if (cue.gainNode) {
                const now = audioCtx.currentTime;
                cue.gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
                setTimeout(() => { if (cue.gainNode) cue.gainNode.disconnect(); }, 150);
            }
        });
        activeAudioCues = []; activeLightCues = [];
        const canvas = document.getElementById('stage-canvas');
        if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }
    function scheduleTimelineCues(cues) { const now = Date.now() + serverOffset; cues.forEach(cue => { if (cue.type !== 'MASTER_MEDIA_SYNC') return; const cueOffsetMs = (cue.time || 0) * 1000; const absoluteStartTime = movementStartTime + cueOffsetMs; const startDelayMs = absoluteStartTime - now - (currentSpeakerDelay || 0) - (myMicDelayMs || 0); (cue.assets || []).forEach(asset => { if (asset.type === 'pillar') return; if (startDelayMs > 0) { const timeoutId = setTimeout(() => { playSpatialCue(asset); }, startDelayMs); activeTimeouts.push(timeoutId); } else if (startDelayMs > -1000) { playSpatialCue(asset); } }); }); }
    async function playSpatialCue(cue) { const url = cue.audio_url; if (!url || !bufferCache[url]) return; const source = audioCtx.createBufferSource(); source.buffer = bufferCache[url]; const gainNode = audioCtx.createGain(); gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); source.connect(gainNode); gainNode.connect(masterGain || audioCtx.destination); source.start(0); activeAudioCues.push({ ...cue, source, gainNode }); }
    function frame(now) { const delta = now - lastFrameTime; if (delta < FRAME_DURATION) { requestAnimationFrame(frame); return; } lastFrameTime = now; const serverNow = Date.now() + serverOffset; if (currentMovement && movementStartTime > serverNow) { const secondsToStart = ((movementStartTime - serverNow) / 1000).toFixed(1); document.getElementById('movement-indicator').querySelector('.status-text').innerText = `${currentMovement} (T-${secondsToStart}s)`; } else if (currentMovement) { document.getElementById('movement-indicator').querySelector('.status-text').innerText = `${currentMovement} (Playing)`; } const fps = Math.round(1000 / delta); document.getElementById('performance-overlay').innerHTML = `FPS: ${fps} | Speaker: ${currentSpeakerDelay?.toFixed(0) || '--'}ms | Mic: ${myMicDelayMs?.toFixed(0) || '--'}ms | Neighbors: ${myNeighbors.length} | ${isHappy ? '😊' : (phase1Complete ? '🎵' : '🎤')}`; requestAnimationFrame(frame); }

    // Native Screen Wake Lock
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log("✅ Screen Wake Lock active");

                wakeLock.addEventListener('release', () => {
                    console.log("⚠️ Wake Lock released");
                });
            }
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    // Audio Heartbeat to prevent thread deprioritization
    //
    // By keeping a low-level audio process running,
    // the browser's power manager treats this tab
    // as an "active media player" and keeps the
    // JavaScript thread running at full speed
    // rather than throttling it to save battery.

    function startAudioHeartbeat() {
        if (!audioCtx) return;

        // Create a silent gain node
        const silentGain = audioCtx.createGain();
        silentGain.gain.value = 0.001; // Effectively silent
        silentGain.connect(audioCtx.destination);

        // Create a continuous oscillator to keep the audio thread active
        heartbeatOsc = audioCtx.createOscillator();
        heartbeatOsc.type = 'sine';
        heartbeatOsc.frequency.setValueAtTime(440, audioCtx.currentTime);

        heartbeatOsc.connect(silentGain);
        heartbeatOsc.start();
        console.log("💓 Audio Heartbeat started: Thread priority elevated.");
    }

    // Re-request the lock if the user tabs away and returns
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    const micButton = document.getElementById('request-mic-btn');
    if (micButton) { micButton.onclick = async () => { await window.requestMicrophonePermission(); if (micPermissionGranted && mySeat && myNeighbors && assetsPreloaded) document.getElementById('init-permissions-btn').disabled = false; }; }

    document.getElementById('init-permissions-btn').onclick = async () => {
        // 1. Immediate UI feedback (prevent double-clicks)
        document.getElementById('init-permissions-btn').disabled = true;
        document.getElementById('system-msg').innerText = "Activating keep-alive...";
        log("🖱️ Activation button pressed.");

        try {
            // 2. ATOMIC MEDIA ACTIVATION
            // We do these IMMEDIATELY. Browsers are most likely to allow them
            // in the first few milliseconds of the click event loop.
            await requestWakeLock();
            startAudioHeartbeat();

            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
                log("🎵 AudioContext resumed.");
            }

            // 3. IDENTITY VALIDATION
            if (!mySeat || !mySeat.id) {
                throw new Error("Identity missing. Please refresh or re-scan QR.");
            }

            // 4. ASYNCHRONOUS NETWORK SYNC
            // If the theater WiFi is spotty, this is where it might hang.
            // By doing this last, your audio and keep-alive are already running.
            log("🛰️ Syncing with stage...");
            await db.ref(`devices/${mySeat.id}`).update({
                status: 'active',
                lastCheckin: firebase.database.ServerValue.TIMESTAMP,
                neighborCount: (myNeighbors ? myNeighbors.length : 0)
            });

            startHeartbeat();
            log("✅ System active. Waiting for cues.");
            document.getElementById('system-msg').innerText = "Ready. Place phone in bag.";

        } catch (error) {
            log(`❌ Activation Failure: ${error.message}`);
            console.error(error);
            document.getElementById('system-msg').innerText = "System Error. Tap to retry.";
            document.getElementById('init-permissions-btn').disabled = false;
        }
    };

    window.onload = async () => {
        log(`🚀 System Initialization Started`);

        try {
            // 1. Resolve who this device is (Seat ID and Coordinates)
            const identityResolved = await resolveIdentity();

            // 2. Load the network of neighboring seats for acoustic sync
            await loadNeighborMap();

            // 3. Load frequency/timing offsets for this specific performance
            await loadTuningConfig();

            // 4. Initialize the Web Audio API context
            // Note: It will stay "suspended" until a user gesture (the button click)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = MASTER_PLAYBACK_GAIN;
            masterGain.connect(audioCtx.destination);

            // 5. Preload audio buffers and visual assets
            await preloadAssets();

            // 6. Connect to the Firebase Logging system
            if (mySeat.id) {
                initLogging();
                log(`Device ${mySeat.id} online and logging.`);
            }

            // 7. Update UI State
            // This will enable the 'init-permissions-btn' if identity and assets are ready
            updateDeviceStatusDisplay();

            // 8. Ensure the canvas is ready for the show screen
            const canvas = document.getElementById('stage-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            document.getElementById('init-permissions-btn').onclick = async () => {
                const granted = await window.requestMicrophonePermission();
                if (granted) {
                    // Disable the button
                    document.getElementById('init-permissions-btn').style.display = 'none';

                    // Initialize the mic stream immediately so it's ready
                    await setupMicrophone();

                    // Refresh UI state
                    updateDeviceStatusDisplay();
                }
            };

            log(`✅ Initialization complete. Waiting for user permissions.`);

        } catch (error) {
            log(`❌ Critical Initialization Error: ${error.message}`);
            const msg = document.getElementById('system-msg');
            if (msg) {
                msg.innerText = "Initialization Failed. Please check connection and refresh.";
                msg.style.color = "#ff4444";
            }
        }
    };

    window.onresize = () => { const canvas = document.getElementById('stage-canvas'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; };

    window.addEventListener('beforeunload', () => {
        stopHeartbeat();
        flushLogs();
    });
    </script>
</body>
</html>
