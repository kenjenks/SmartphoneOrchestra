<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isle of Noises - Patron Device</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
        #status-registry { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 30px; width: 80%; max-width: 400px; }
        .status-item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 1.1rem; }
        .action-btn { padding: 18px 45px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; transition: transform 0.2s, background 0.3s; margin-top: 20px; width: 250px; }
        #init-permissions-btn { background: #444; color: #fff; }
        .action-btn:disabled { background: #222 !important; color: #666 !important; cursor: not-allowed; }
        .action-btn:active { transform: scale(0.95); }

        #show-screen { display: none; height: 100vh; width: 100vw; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        #performance-overlay { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 10px; color: #00ffcc; pointer-events: none; opacity: 0.5; z-index: 10; }
        #movement-indicator { position: absolute; top: 10px; right: 10px; font-family: monospace; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; border-left: 3px solid #00ffcc; display: flex; align-items: center; gap: 8px; z-index: 10; }
        #calibration-debug { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #00ff00; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 4px; border-left: 3px solid #ffcc00; z-index: 100; max-width: 300px; }
        .energy-meter { position: absolute; bottom: 10px; right: 10px; width: 180px; background: rgba(0,0,0,0.8); border-radius: 4px; padding: 8px; font-family: monospace; font-size: 9px; border-left: 3px solid #00ffcc; z-index: 100; }
        .meter-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 4px 0; overflow: hidden; }
        .meter-fill { height: 100%; background: #00ffcc; width: 0%; }
        .indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #333; margin-left: 10px; }
        .indicator.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .indicator.warning { background: #ffcc00; }
        .indicator.error { background: #ff4444; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Isle of Noises</h1>
        <div id="seat-display">Seat: <span id="seat-id">--</span></div>
        <div id="status-registry">
            <div class="status-item"><span>Assets:</span><span id="assets-ind" class="indicator">--</span></div>
            <div class="status-item"><span>Microphone:</span><span id="mic-ind" class="indicator">--</span></div>
            <div class="status-item"><span>Neighbors:</span><span id="neighbor-ind" class="indicator">--</span></div>
            <div class="status-item"><span>Clock Sync:</span><span id="sync-ind" class="indicator">--</span></div>
        </div>
        <button id="init-permissions-btn" class="action-btn" disabled>⌛ Loading Assets...</button>
        <div id="calibration-display" style="display:none; margin-top:20px;">
            <div>Speaker: <span id="display-speaker-delay">--</span> ms</div>
            <div>Mic: <span id="display-mic-delay">--</span> ms</div>

        <div id="performance-overlay">FPS: -- | Speaker: --ms | Mic: -- | Neighbors: --</div>
        <div id="movement-indicator"><span style="font-size: 16px;">📱</span><span style="font-size: 11px; letter-spacing: 1px;" class="status-text">ACTIVE</span></div>
        <div id="calibration-debug" style="display:none;"><div style="font-weight: bold; margin-bottom: 5px;">🔧 System Debug</div><div id="log-display-debug">Waiting for logs...</div></div>
        <div class="energy-meter" id="energy-meter" style="display:none;"><div style="display: flex; justify-content: space-between;"><span>Acoustic Sync</span><span id="energy-value">0.00</span></div><div class="meter-bar"><div class="meter-fill" id="energy-fill"></div></div></div>

<script>
    // ============================================================================

    const MIN_MIC_SAMPLES = 4;
    const NOTE_BAND_RATIO = Math.pow(2, 1/48);
    const RECORDING_WINDOW_MS = 200;

    const AUDIBLE_ERROR_MS = 30;
    const SIGNIFICANT_ERROR_MS = 15;
    const MIN_CORRECTION_MS = 5;
    const MIN_SAMPLES_FOR_CORRECTION = 3;
    const CONVERGENCE_STD_DEV_MS = 15;

    const HEARTBEAT_TIMEOUT_MS = 12100;

    const FADE_MS = 5;

    const RECORDING_PRE_MS = 100;      // record 100ms before expected start
    const RECORDING_POST_MS = 500;     // record 500ms after expected end

    // ============================================================================
    // GLOBAL STATE
    // ============================================================================
    let wakeLock = null;
    let isListenOnlyMode = false;
    let audioCtx = null;
    let masterGain = null;
    let mySeat = { id: null, x: 0, y: 0 };
    let assetsPreloaded = false;
    let micPermissionGranted = false;
    let micPermissionRequested = false;
    let myNeighbors = [];

    let serverOffset = 0;
    let bufferCache = {};
    let activeAudioCues = [];
    let activeLightCues = [];
    let activeTimeouts = [];
    let lastMicCheck = 0;
    let continuousSource = null;
    let continuousGain = null;
    let currentPlaybackStartTime = 0;
    let envelopeTimeouts = [];
    let isSingleDeviceMode = false;
    let lastMedianShift = 0;
    let sameShiftCount = 0;
    let micStream = null;
    let analyser = null;
    let isMicActive = false;
    let frequencyData = null;
    let sampleRate = 48000;
    let currentAvgEnergy = 0;
    let baselineEnergy = 0;
    let baselineSamples = [];
    let baselineComplete = false;
    let baselineStartTime = 0;
    let allListeningTargets = [];
    let noteTimings = [];
    let noteSchedule = [];
    let detectionWindows = new Map();
    let processedMeasurements = new Set();
    let rawTimeShifts = [];
    let pillarSyncShifts = [];
    let isHappy = false;
    let estimatedDeviceDelayMs = 175;
    let estimatedDeviceMicDelayMs = 13;
    let myMicDelayMs = null;
    let currentSpeakerDelay = estimatedDeviceDelayMs;
    let micDelaySamples = [];
    let pillarNoteSchedule = [];
    let pillarWindows = [];
    let phase1Complete = false;
    let phase1EndMs = 20571.4;
    let phase1WindowActive = true;
    let currentTuningSchedule = null;
    let tuningStartTime = 0;
    let PICCOLO_URL = "";
    let TEST_PULSE_URL = "";
    let assignedNotes = [];
    let localRecordings = new Map();
    let refinedDataToSend = [];
    let receivedRefinements = [];
    let phase3StartTime = 0;
    let cocktailPartyInterval = null;
    let lastEvaluationTime = 0;
    let currentMovement = null;
    let movementStartTime = 0;
    let lastFrameTime = 0;
    const FPS_TARGET = 30;
    const FRAME_DURATION = 1000 / FPS_TARGET;
    let heartbeatInterval = null;
    let pillarRefBaseline = 0;
    let pillarRefBaselineSamples = [];
    let allPillarNotes = [];
    let pillarUrls = {};
    let pillarData = {};
    let seatData = {};
    let refinementTimer = null;
    let scheduledRecordings = new Set();
    let correctionCount = 0;
    let pendingCorrection = null;
    let restPeriods = [];

    let deviceBuffer = null;          // device‑specific buffer

    // New waveform assets
    let oboeBuffer = null;
    let tubaBuffers = { FL: null, FR: null, BL: null, BR: null };
    let pillarTemplates = {};          // pillar_id -> AudioBuffer (extracted calibration window)

    // Diagnostic mode
    let diagnoseMode = false;

    // ============================================================================
    // AUDIO HARDWARE PRIMING
    // ============================================================================
    let primedBuffers = new Set();

    async function primeBuffer(buffer, options = {}) {
        if (!audioCtx || audioCtx.state !== 'running') {
            log(`⚠️ Cannot prime – audio context not running`, 'warn');
            return false;
        }
        if (primedBuffers.has(buffer)) {
            return true;
        }
        const gainValue = options.gain || 0.0001;   // inaudible
        const durationSec = options.duration || 0.05; // 50 ms
        const playDuration = Math.min(durationSec, buffer.duration);
        try {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = gainValue;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            source.start(now);
            source.stop(now + playDuration);
            primedBuffers.add(buffer);
            log(`🔊 Primed hardware (${playDuration*1000}ms at gain ${gainValue})`, 'info');
            await new Promise(r => setTimeout(r, playDuration * 1000 + 10));
            return true;
        } catch (e) {
            log(`❌ Priming failed: ${e.message}`, 'error');
            return false;
        }
    }

    // ============================================================================
    // PERIODIC LOGGING
    // ============================================================================
    let periodicLogInterval = null;
    let playedNotesCount = 0;
    let neighborDetectionsCount = 0;
    let neighborDetectionsPerNeighbor = new Map();
    let pillarDetectionsCount = 0;
    let firstNoteLogged = false;

    function startPeriodicLogging() {
        if (periodicLogInterval) clearInterval(periodicLogInterval);
        periodicLogInterval = setInterval(() => {
            if (!tuningStartTime) return;
            const now = Date.now() + serverOffset;
            const songPos = tuningStartTime ? (now - tuningStartTime) : 0;
            const neighborSummary = Array.from(neighborDetectionsPerNeighbor.entries())
                .map(([id, cnt]) => `${id}:${cnt}`).join(', ');
            let maxEnergy = 0;
            if (frequencyData) {
                for (let i = 0; i < frequencyData.length; i++) {
                    maxEnergy = Math.max(maxEnergy, frequencyData[i] / 255);
                }
            }
            log(`📊 STATUS: played=${playedNotesCount} | neighbor=${neighborDetectionsCount} (${neighborSummary}) | pillar=${pillarDetectionsCount} | phase=${phase1Complete ? '2' : '1'} | delay=${currentSpeakerDelay.toFixed(0)}ms | mic=${myMicDelayMs?.toFixed(0) || '?'}ms | corr=${correctionCount} | pos=${(songPos/1000).toFixed(0)}s | maxE=${maxEnergy.toFixed(3)}`);
            flushLogs();
        }, 5000);
    }

    function stopPeriodicLogging() {
        if (periodicLogInterval) {
            clearInterval(periodicLogInterval);
            periodicLogInterval = null;
        }
    }

    // ============================================================================
    // UTILITIES
    // ============================================================================
    function calculateMedian(values) {
        if (values.length === 0) return 0;
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        if (sorted.length % 2 === 0) return (sorted[mid - 1] + sorted[mid]) / 2;
        return sorted[mid];
    }

    function calculateStdDev(values) {
        if (values.length < 2) return 999;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
        return Math.sqrt(variance);
    }

    function getFrequencyFromMidi(midiNote) {
        return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    function getNoteFrequencyBand(midiNote) {
        const fundamental = getFrequencyFromMidi(midiNote);
        const lowerFreq = fundamental / NOTE_BAND_RATIO;
        const upperFreq = fundamental * NOTE_BAND_RATIO;
        return { lowerFreq, upperFreq };
    }

    function getBinForFrequency(frequency, sampleRate, fftSize) {
        const nyquist = sampleRate / 2;
        const bin = Math.floor(frequency / nyquist * (fftSize / 2));
        return Math.min(Math.max(0, bin), fftSize / 2 - 1);
    }

    function calculateEnergyForNote(midiNote, sampleRate, fftSize) {
        if (!frequencyData) return 0;
        const band = getNoteFrequencyBand(midiNote);
        const lowerBin = getBinForFrequency(band.lowerFreq, sampleRate, fftSize);
        const upperBin = getBinForFrequency(band.upperFreq, sampleRate, fftSize);
        let energy = 0, binsChecked = 0;
        for (let i = lowerBin; i <= upperBin && i < frequencyData.length; i++) {
            energy += frequencyData[i] / 255;
            binsChecked++;
        }
        return binsChecked > 0 ? energy / binsChecked : 0;
    }

    // ============================================================================
    // STATUS DISPLAY (UI)
    // ============================================================================
    function updateDeviceStatusDisplay() {
        const updateInd = (id, condition) => {
            const el = document.getElementById(id);
            if (el) {
                el.className = condition ? 'indicator active' : 'indicator';
                el.innerText = condition ? 'OK' : '--';
            }
        };
        updateInd('assets-ind', assetsPreloaded);
        updateInd('mic-ind', micPermissionGranted);
        updateInd('neighbor-ind', myNeighbors && myNeighbors.length > 0);
        updateInd('sync-ind', serverOffset !== 0);

        const seatEl = document.getElementById('seat-id');
        if (seatEl) seatEl.innerText = mySeat.id || '--';

        const actionBtn = document.getElementById('init-permissions-btn');
        if (actionBtn) {
            const isDataReady = mySeat && mySeat.id && assetsPreloaded;
            if (!micPermissionGranted) {
                actionBtn.disabled = !isDataReady;
                actionBtn.innerHTML = isDataReady ? "Enable Microphone & Audio" : "⌛ Loading Assets...";
                actionBtn.style.background = isDataReady ? "#444" : "#222";
            } else {
                actionBtn.disabled = !isDataReady;
                actionBtn.innerHTML = isDataReady ? "Enter Orchestra" : "⌛ Finalizing Data...";
                actionBtn.style.background = isDataReady ? "#1e4d1e" : "#222";
            }
        }
    }

    // ============================================================================
    // LOGGING
    // ============================================================================
    let logQueue = [];
    let logFlushTimer = null;
    let pendingFlush = false;
    let logRef = null;
    const LOG_FLUSH_INTERVAL_MS = 2000;
    const MAX_LOG_QUEUE_SIZE = 200;

    function initLogging() {
        if (!mySeat || !mySeat.id) return;
        logRef = db.ref(`device_logs/${mySeat.id}`);
        if (logFlushTimer) clearInterval(logFlushTimer);
        logFlushTimer = setInterval(flushLogs, LOG_FLUSH_INTERVAL_MS);
        log(`🚀 Device ${mySeat.id} started`);
        setTimeout(() => flushLogs(), 100);
    }

    function flushLogs() {
        if (logQueue.length === 0 || !logRef || pendingFlush) return;
        pendingFlush = true;
        const logsToSend = [...logQueue];
        logQueue = [];
        const batch = {};
        logsToSend.forEach((logEntry, index) => {
            const ts = Date.now() + (serverOffset || 0);
            batch[`${ts}_${index}_${Math.random().toString(36).substr(2, 6)}`] = logEntry;
        });
        logRef.update(batch).catch(e => {
            console.error("Failed to send logs:", e);
            logQueue = [...logsToSend, ...logQueue];
            if (logQueue.length > MAX_LOG_QUEUE_SIZE) logQueue = logQueue.slice(-MAX_LOG_QUEUE_SIZE);
        }).finally(() => { pendingFlush = false; });
    }

    function log(message, type = 'info') {
        const serverTimestamp = Date.now() + (serverOffset || 0);
        const timeStr = new Date(serverTimestamp).toISOString().substr(11, 12);
        console.log(`[${timeStr}] [${mySeat?.id || 'unknown'}] ${message}`);
        const logEntry = { timestamp: serverTimestamp, timeStr, message, seatId: mySeat ? mySeat.id : 'unknown', type, isHappy, speakerDelay: currentSpeakerDelay, micDelay: myMicDelayMs };
        logQueue.push(logEntry);
        if (logQueue.length >= MAX_LOG_QUEUE_SIZE && logRef) flushLogs();
    }

    // ============================================================================
    // FIREBASE INIT
    // ============================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Monitor server offset changes
    let lastLoggedOffset = 0;
    db.ref(".info/serverTimeOffset").on("value", snap => {
        const newOffset = snap.val() || 0;
        if (Math.abs(newOffset - lastLoggedOffset) > 50) {
            log(`🕰️ Server offset changed from ${lastLoggedOffset} to ${newOffset}ms`, 'info');
            lastLoggedOffset = newOffset;
        }
        serverOffset = newOffset;
        updateDeviceStatusDisplay();
    });

    // ============================================================================
    // CALIBRATION DISPLAY
    // ============================================================================
    function updateCalibrationDisplay() {
        const displayDiv = document.getElementById('calibration-display');
        const speakerSpan = document.getElementById('display-speaker-delay');
        const micSpan = document.getElementById('display-mic-delay');
        const statusSpan = document.getElementById('calibration-status-text');
        if (isHappy && currentSpeakerDelay !== null && myMicDelayMs !== null) {
            displayDiv.style.display = 'block';
            speakerSpan.innerText = `${Math.round(currentSpeakerDelay)}`;
            micSpan.innerText = `${Math.round(myMicDelayMs)}`;
            statusSpan.innerText = '✅ Calibrated';
        } else {
            displayDiv.style.display = 'block';
            speakerSpan.innerText = '--';
            micSpan.innerText = '--';
            statusSpan.innerText = '⚠️ Not calibrated';
        }
        updateDeviceStatusDisplay();
    }

    // ============================================================================
    // IDENTITY & CONFIG
    // ============================================================================
    async function resolveIdentity() {
        const urlParams = new URLSearchParams(window.location.search);
        const seatParam = urlParams.get('seat');
        if (!seatParam) {
            log('❌ No ?seat parameter');
            return false;
        }
        mySeat.id = seatParam;
        log(`Identity: ${mySeat.id}`);

        diagnoseMode = urlParams.has('diagnose');
        if (diagnoseMode) log("🔬 DIAGNOSTIC MODE ENABLED - will analyze buffer content");

        try {
            const seatSnap = await db.ref('seat_config').once('value');
            const seats = seatSnap.val();
            if (seats && seats[mySeat.id]) {
                mySeat.x = seats[mySeat.id].x || 0;
                mySeat.y = seats[mySeat.id].y || 0;
                log(`Spatial: (${mySeat.x}, ${mySeat.y})`);
            } else {
                log(`⚠️ No coordinates for ${mySeat.id}`);
            }
        } catch (e) {
            log(`❌ Identity error: ${e.message}`);
            return false;
        }

        try {
            const seatConfigSnap = await db.ref('seat_config').once('value');
            const seatConfig = seatConfigSnap.val();
            if (seatConfig && seatConfig.seats) {
                seatData = {};
                seatConfig.seats.forEach(s => {
                    seatData[s.id] = { x: s.x, y: s.y, section: s.section };
                });
                log(`📋 Loaded seat coordinates for ${Object.keys(seatData).length} seats`);
            } else {
                seatData = seatConfig || {};
                log(`⚠️ seat_config missing 'seats' array; using raw data`);
            }
        } catch (e) {
            log(`⚠️ Could not load seat data: ${e.message}`);
        }

        updateDeviceStatusDisplay();
        return true;
    }

    async function loadStoredCalibration() {
        if (!mySeat.id) return false;
        try {
            const stored = localStorage.getItem(`calibration_${mySeat.id}`);
            if (stored) {
                const cal = JSON.parse(stored);
                const age = Date.now() - cal.timestamp;
                if (age < 30 * 24 * 60 * 60 * 1000 && typeof cal.speakerDelay === 'number' && typeof cal.micDelay === 'number') {
                    currentSpeakerDelay = cal.speakerDelay;
                    myMicDelayMs = cal.micDelay;
                    phase1Complete = true;
                    isHappy = true;
                    log(`✅ Loaded calibration: speaker=${currentSpeakerDelay.toFixed(1)}ms, mic=${myMicDelayMs.toFixed(1)}ms (age: ${Math.round(age/1000/60)}min)`);
                    updateCalibrationDisplay();
                    return true;
                } else {
                    log(`📭 Stored calibration for ${mySeat.id} is invalid or too old, ignoring`);
                }
            } else {
                log(`📭 No stored calibration found for ${mySeat.id}`);
            }
            return false;
        } catch (e) {
            log(`⚠️ Failed to load calibration: ${e.message}`);
            return false;
        }
    }

    async function loadNeighborMap() {
        if (!mySeat.id) return false;
        try {
            const snap = await db.ref('neighbor_map/' + mySeat.id).once('value');
            if (snap.exists()) {
                myNeighbors = snap.val();
                log(`📍 Neighbors: ${myNeighbors.length} found`);
                allListeningTargets = [...myNeighbors];
                updateDeviceStatusDisplay();
                return true;
            } else {
                log(`⚠️ No neighbor map for ${mySeat.id}`);
                return false;
            }
        } catch (e) {
            log(`❌ Neighbor map error: ${e.message}`);
            return false;
        }
    }

    async function loadTuningConfig() {
        try {
            const snap = await db.ref('tuning_mode').once('value');
            const data = snap.val();
            if (!data || !data.piano_notes) { log("⚠️ No tuning config"); return; }
            noteTimings = data.piano_notes.map((n, i) => ({ index: i, startMs: n.ms_offset, durationMs: n.duration_ms || 500, measure: n.measure, pitch: n.pitch, midi: n.midi }));
            log(`📋 Loaded ${noteTimings.length} piccolo notes`);
            if (data.pillar_notes) allPillarNotes = data.pillar_notes;
            if (data.metadata && data.metadata.pillar_cal_windows) {
                pillarWindows = data.metadata.pillar_cal_windows;
                phase1EndMs = pillarWindows[pillarWindows.length - 1].end_ms;
            }
            if (data.assets) {
                if (data.assets.piccolo) PICCOLO_URL = data.assets.piccolo;
                if (data.assets.test_pulse) TEST_PULSE_URL = data.assets.test_pulse;
                if (data.assets.pillars) pillarUrls = data.assets.pillars;
            }
            restPeriods = [];
            let lastEndMs = 0;
            for (let i = 0; i < noteTimings.length; i++) {
                const start = noteTimings[i].startMs;
                const end = start + noteTimings[i].durationMs;
                if (start > lastEndMs + 100) {
                    restPeriods.push({ startMs: lastEndMs, endMs: start, durationMs: start - lastEndMs });
                }
                lastEndMs = Math.max(lastEndMs, end);
            }
            restPeriods = restPeriods.filter(r => r.durationMs > 200);
            log(`📡 Found ${restPeriods.length} rest periods`);
        } catch (e) { log(`❌ Tuning config error: ${e.message}`); }
    }

    async function loadPillarData() {
        try {
            const snap = await db.ref('pillar_config').once('value');
            const config = snap.val();
            if (config && config.pillars) {
                config.pillars.forEach(p => { pillarData[p.id] = { x: p.x, y: p.y, speakerDelayMs: p.speakerDelayMs || 45, micDelayMs: p.micDelayMs || 18 }; });
                log(`📡 Loaded ${Object.keys(pillarData).length} pillars`);
            }
        } catch (e) { log(`⚠️ Pillar data error: ${e.message}`); }
    }

    // ============================================================================
    // MICROPHONE
    // ============================================================================
    window.requestMicrophonePermission = async function() {
        if (micPermissionGranted) return true;
        if (micPermissionRequested) return false;
        micPermissionRequested = true;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, sampleRate: 44100 }, video: false });
            micStream = stream;
            micPermissionGranted = true;
            log("✅ Microphone granted");
            updateDeviceStatusDisplay();
            return true;
        } catch (e) {
            log(`❌ Mic denied: ${e.message}`);
            micPermissionRequested = false;
            return false;
        }
    };

    async function setupMicrophone() {
        if (!micPermissionGranted) return false;
        if (isMicActive) return true;
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = MASTER_PLAYBACK_GAIN;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
                log("🎛️ Audio context resumed");
            }
            if (!micStream) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
                micStream = stream;
            }
            const source = audioCtx.createMediaStreamSource(micStream);
            const micGain = audioCtx.createGain();
            micGain.gain.value = 5.0;
            source.connect(micGain);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = FFT_SIZE;
            analyser.smoothingTimeConstant = 0.1;
            micGain.connect(analyser);
            sampleRate = audioCtx.sampleRate;
            frequencyData = new Uint8Array(analyser.frequencyBinCount);
            isMicActive = true;
            document.getElementById('energy-meter').style.display = 'block';
            log(`🎤 Microphone active, sample rate: ${sampleRate}Hz, FFT size: ${FFT_SIZE}`);
            requestAnimationFrame(detectNeighborNotes);
            return true;
        } catch (e) { log(`❌ Mic setup failed: ${e.message}`); return false; }
    }

    async function enableMicrophone() {
        if (!micPermissionGranted) return false;
        if (isMicActive) return true;
        return await setupMicrophone();
    }

    // ============================================================================
    // RECORDING & CORRELATION
    // ============================================================================
    async function recordAudioBuffer(durationMs) {
        if (!micStream) throw new Error('No microphone stream');
        const sampleRate = audioCtx.sampleRate;
        const length = Math.floor(durationMs / 1000 * sampleRate);
        const recordingBuffer = new AudioBuffer({ numberOfChannels: 1, length: length, sampleRate: sampleRate });
        const recordChannel = recordingBuffer.getChannelData(0);

        const source = audioCtx.createMediaStreamSource(micStream);
        const processor = audioCtx.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(audioCtx.destination);

        let writeIndex = 0;
        const startTime = audioCtx.currentTime;
        const endTime = startTime + durationMs / 1000;

        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => {
                processor.disconnect();
                source.disconnect();
                resolve(recordingBuffer);
            }, durationMs);

            processor.onaudioprocess = (event) => {
                const inputData = event.inputBuffer.getChannelData(0);
                for (let i = 0; i < inputData.length && writeIndex < length; i++) {
                    recordChannel[writeIndex++] = inputData[i];
                }
                if (writeIndex >= length) {
                    clearTimeout(timeout);
                    processor.disconnect();
                    source.disconnect();
                    resolve(recordingBuffer);
                }
            };
        });
    }

    function crossCorrelate(template, recorded) {
        const t = template.getChannelData(0);
        const r = recorded.getChannelData(0);
        const n = r.length;
        const m = t.length;
        if (n < m) return 0;
        let bestLag = 0;
        let maxCorr = -Infinity;
        for (let lag = 0; lag <= n - m; lag++) {
            let sum = 0;
            for (let i = 0; i < m; i++) {
                sum += t[i] * r[lag + i];
            }
            if (sum > maxCorr) {
                maxCorr = sum;
                bestLag = lag;
            }
        }
        const sampleRate = recorded.sampleRate;
        const offsetMs = (bestLag / sampleRate) * 1000;
        return offsetMs;
    }

    function extractAudioSegment(buffer, startMs, endMs) {
        const sampleRate = buffer.sampleRate;
        const startSample = Math.floor(startMs / 1000 * sampleRate);
        const endSample = Math.floor(endMs / 1000 * sampleRate);
        const length = endSample - startSample;
        const segment = new AudioBuffer({
            numberOfChannels: buffer.numberOfChannels,
            length: length,
            sampleRate: sampleRate
        });
        for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
            const src = buffer.getChannelData(ch);
            const dst = segment.getChannelData(ch);
            for (let i = 0; i < length; i++) {
                dst[i] = src[startSample + i];
            }
        }
        return segment;
    }

    // ============================================================================
    // DEVICE‑SPECIFIC BUFFER CREATION
    // ============================================================================
    function createDeviceBuffer(originalBuffer, assignedNotes) {
        const sampleRate = originalBuffer.sampleRate;
        const length = originalBuffer.length;
        const channels = originalBuffer.numberOfChannels;

        const deviceBuffer = new AudioBuffer({
            numberOfChannels: channels,
            length: length,
            sampleRate: sampleRate
        });

        const sortedNotes = [...assignedNotes].sort((a, b) => a.startMs - b.startMs);

        for (let ch = 0; ch < channels; ch++) {
            const srcData = originalBuffer.getChannelData(ch);
            const dstData = deviceBuffer.getChannelData(ch);
            dstData.fill(0);

            for (let i = 0; i < sortedNotes.length; i++) {
                const note = sortedNotes[i];
                const startSample = Math.floor(note.startMs / 1000 * sampleRate);
                const endSample = Math.floor((note.startMs + note.durationMs) / 1000 * sampleRate);

                const prevNote = i > 0 ? sortedNotes[i-1] : null;
                const prevEndSample = prevNote ? Math.floor((prevNote.startMs + prevNote.durationMs) / 1000 * sampleRate) : -1;
                const isAdjacentPrev = (prevEndSample === startSample);

                const nextNote = i < sortedNotes.length - 1 ? sortedNotes[i+1] : null;
                const nextStartSample = nextNote ? Math.floor(nextNote.startMs / 1000 * sampleRate) : -1;
                const isAdjacentNext = (endSample === nextStartSample);

                const fadeSamples = Math.floor(FADE_MS / 1000 * sampleRate);

                for (let s = startSample; s < endSample && s < length; s++) {
                    let gain = 1.0;
                    if (!isAdjacentPrev && s - startSample < fadeSamples) {
                        gain = (s - startSample) / fadeSamples;
                    }
                    if (!isAdjacentNext && endSample - s < fadeSamples) {
                        gain = (endSample - s) / fadeSamples;
                    }
                    dstData[s] += srcData[s] * gain;
                }
            }
        }
        return deviceBuffer;
    }

    function diagnoseBuffer(buffer, assignedNotes) {
        const sampleRate = buffer.sampleRate;
        const channelData = buffer.getChannelData(0);
        const length = buffer.length;
        log(`🔬 Starting diagnostic analysis of device buffer (${assignedNotes.length} assigned notes)...`);
        let presentCount = 0, missingCount = 0;
        for (let i = 0; i < assignedNotes.length; i++) {
            const note = assignedNotes[i];
            const startSample = Math.floor(note.startMs / 1000 * sampleRate);
            const endSample = Math.floor((note.startMs + note.durationMs) / 1000 * sampleRate);
            const len = endSample - startSample;
            if (len <= 0) continue;
            let sumSq = 0;
            for (let s = startSample; s < endSample && s < length; s++) sumSq += channelData[s] * channelData[s];
            const rms = Math.sqrt(sumSq / len);
            const status = rms >= DIAGNOSTIC_RMS_THRESHOLD ? "PRESENT" : "MISSING";
            if (rms >= DIAGNOSTIC_RMS_THRESHOLD) presentCount++;
            else missingCount++;
            log(`DIAGNOSTIC: assigned note ${note.noteIndex} (${note.pitch}) – RMS = ${rms.toFixed(4)} → ${status}`);
        }
        log(`🔬 Diagnostic summary: ${presentCount} present, ${missingCount} missing out of ${assignedNotes.length} assigned notes.`);
    }

    // ============================================================================
    // PLAYBACK (with priming)
    // ============================================================================
    let activeStream = null;
    let allStreams = [];

    function startContinuousPlayback(startTime, speakerDelay) {
        log(`🔍 startContinuousPlayback: isListenOnlyMode=${isListenOnlyMode}, hasDeviceBuffer=${!!deviceBuffer}`);
        if (isListenOnlyMode) { log(`🔇 Listen‑only mode`); return; }
        if (!deviceBuffer) { log(`❌ Device buffer not ready`); return; }
        const nowWall = Date.now() + serverOffset;
        const adjStart = startTime - speakerDelay;
        const delayMs = adjStart - nowWall;
        log(`🔍 startContinuousPlayback: delayMs=${delayMs.toFixed(1)}`);
        if (delayMs > 0 && delayMs < 30000) {
            setTimeout(() => createNewPlaybackStream(adjStart, speakerDelay, 0), delayMs);
        } else if (delayMs > -1000) {
            log(`⚠️ Playback ${Math.round(-delayMs)}ms late, starting immediately`, 'warn');
            createNewPlaybackStream(adjStart, speakerDelay, 0);
        } else {
            log(`❌ Playback too late (${Math.round(-delayMs)}ms)`, 'warn');
        }
    }

    function createNewPlaybackStream(targetWallTime, speakerDelay, offsetMs = 0) {
        log(`🔍 createNewPlaybackStream: audioCtx.state=${audioCtx?.state}, hasDeviceBuffer=${!!deviceBuffer}, offsetMs=${offsetMs}`);
        if (!audioCtx || audioCtx.state !== 'running') {
            log(`⚠️ Audio context not running (state=${audioCtx?.state})`);
            return null;
        }
        if (!deviceBuffer) {
            log(`⚠️ Device buffer missing`);
            return null;
        }

        const nowAudio = audioCtx.currentTime;
        const nowWall = Date.now() + serverOffset;
        const delaySec = (targetWallTime - nowWall) / 1000;
        const startAudio = nowAudio + Math.max(0, delaySec);
        const offsetSec = offsetMs / 1000;

        const source = audioCtx.createBufferSource();
        source.buffer = deviceBuffer;
        source.loop = false;

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(MASTER_PLAYBACK_GAIN, startAudio);
        source.connect(gain);
        gain.connect(masterGain || audioCtx.destination);
        source.start(startAudio, offsetSec);

        const streamId = allStreams.length + 1;
        const newStream = {
            id: streamId,
            source,
            gain,
            targetWallTime,
            startAudio,
            speakerDelay,
            createdAt: nowWall,
            isActive: false
        };
        allStreams.push(newStream);

        if (activeStream) {
            const now = audioCtx.currentTime;
            const oldGain = activeStream.gain.gain;
            oldGain.cancelScheduledValues(now);
            oldGain.linearRampToValueAtTime(0, now + 0.1);
            activeStream.isActive = false;
        }

        newStream.isActive = true;
        activeStream = newStream;

        log(`✅ Playback stream ${streamId} created, startAudio=${startAudio.toFixed(3)}, offset=${offsetSec.toFixed(3)}s`);
        return newStream;
    }

    // ============================================================================
    // CORRECTION WITH REST SCHEDULING
    // ============================================================================
    function findNextRestPeriod(songPosMs) {
        for (const rest of restPeriods) {
            if (rest.startMs > songPosMs + 100) return rest;
        }
        return null;
    }

    function scheduleCorrectionDuringRest(medianShift, currentDelay) {
        if (isSingleDeviceMode) {
            log(`🎧 Single‑device mode: skipping correction scheduling`);
            return false;
        }
        const nowWall = Date.now() + serverOffset;
        const songPos = nowWall - tuningStartTime;
        const nextRest = findNextRestPeriod(songPos);
        if (nextRest && nextRest.durationMs > 300) {
            const restStart = tuningStartTime + nextRest.startMs;
            const wait = restStart - nowWall;
            if (wait > 0 && wait < 30000) {
                log(`🎵 Scheduling correction at rest ${(nextRest.startMs/1000).toFixed(1)}s (wait ${wait.toFixed(0)}ms)`, 'info');
                setTimeout(() => {
                    const newDelay = currentDelay - medianShift;
                    const clamped = Math.max(-500, Math.min(1000, newDelay));
                    log(`🔄 REST CORRECTION: ${currentDelay.toFixed(1)}ms → ${clamped.toFixed(1)}ms`, 'info');
                    currentSpeakerDelay = clamped;
                    const now2 = Date.now() + serverOffset;
                    const curPos = now2 - tuningStartTime;
                    createNewPlaybackStream(now2 - curPos + clamped, clamped, curPos);
                    updateCalibrationDisplay();
                }, wait);
                return true;
            }
        }
        return false;
    }

    function applyCorrection(medianShift) {
        const currentDelay = currentSpeakerDelay;
        const newDelay = currentDelay - medianShift;
        const MIN_DELAY = -500;
        const MAX_DELAY = 2000;
        const clamped = Math.max(MIN_DELAY, Math.min(MAX_DELAY, newDelay));
        const mag = Math.abs(clamped - currentDelay);
        if (mag < MIN_CORRECTION_MS) return;

        log(`🔄 Correction needed: shift=${medianShift.toFixed(1)}ms → ${currentDelay.toFixed(1)}ms → ${clamped.toFixed(1)}ms`);

        if (isSingleDeviceMode) {
            log(`🔧 Single‑device mode: storing delay ${clamped.toFixed(1)}ms, keeping current stream`);
            currentSpeakerDelay = clamped;
            rawTimeShifts = [];
            correctionCount++;
            updateCalibrationDisplay();
            return;
        }

        const scheduled = scheduleCorrectionDuringRest(medianShift, currentDelay);
        if (!scheduled) {
            log(`⚠️ No suitable rest, applying immediately`, 'warn');
            currentSpeakerDelay = clamped;
            const now = Date.now() + serverOffset;
            const curPos = now - tuningStartTime;
            createNewPlaybackStream(now - curPos + clamped, clamped, curPos);
        }
        rawTimeShifts = [];
        correctionCount++;
        updateCalibrationDisplay();

        if (clamped <= MIN_DELAY && correctionCount > 0) {
            log(`⚠️ Delay hit minimum (${MIN_DELAY}ms). Completing calibration.`);
            completeCalibration();
        }
    }

    // ============================================================================
    // REAL-TIME EVALUATION
    // ============================================================================
    function shouldIterate(medianShift, stdDev, sampleCount) {
        const absErr = Math.abs(medianShift);
        if (sampleCount < MIN_SAMPLES_FOR_CORRECTION) return false;
        if (stdDev > 50 && sampleCount < 15) return false;
        if (absErr > AUDIBLE_ERROR_MS) return true;
        if (absErr > SIGNIFICANT_ERROR_MS && stdDev < 40) return true;
        if (sampleCount >= 15 && absErr > MIN_CORRECTION_MS && stdDev < 50) return true;
        return false;
    }

    function evaluateInRealTime() {
        if (isHappy) return;
        if (rawTimeShifts.length < MIN_SAMPLES_FOR_CORRECTION) return;
        const median = calculateMedian(rawTimeShifts);
        const stdDev = calculateStdDev(rawTimeShifts);
        const curDelay = currentSpeakerDelay;
        log(`📊 Real-time: shift=${median>0?'+':''}${median.toFixed(1)}ms, σ=${stdDev.toFixed(1)}ms, samples=${rawTimeShifts.length}, delay=${curDelay.toFixed(1)}ms, corr=${correctionCount}`);
        if (correctionCount === 0 && rawTimeShifts.length >= 5 && Math.abs(median) > 20) {
            log(`🔧 FORCE FIRST CORRECTION: shift=${median.toFixed(1)}ms`, 'info');
            applyCorrection(median);
            rawTimeShifts = [];
            return;
        }
        if (Math.abs(median) <= CONVERGENCE_STD_DEV_MS && stdDev <= CONVERGENCE_STD_DEV_MS) {
            if (!isHappy) {
                log(`✅ Converged! error=${Math.abs(median).toFixed(1)}ms, σ=${stdDev.toFixed(1)}ms`, 'success');
                completeCalibration();
            }
            return;
        }
        if (correctionCount >= MAX_CORRECTIONS) {
            log(`✅ Max corrections (${MAX_CORRECTIONS}) reached`, 'info');
            completeCalibration();
            return;
        }
        const MIN_DELAY = -500, MAX_DELAY = 2000;
        if (curDelay <= MIN_DELAY && median > 0) {
            log(`⚠️ At min delay, still early by ${Math.abs(median).toFixed(1)}ms`);
            if (correctionCount > 0) completeCalibration();
            return;
        }
        if (curDelay >= MAX_DELAY && median < 0) {
            log(`⚠️ At max delay, still late by ${Math.abs(median).toFixed(1)}ms`);
            if (correctionCount > 0) completeCalibration();
            return;
        }
        if (shouldIterate(median, stdDev, rawTimeShifts.length)) {
            if (Math.abs(median) <= MIN_CORRECTION_MS) {
                log(`✅ In sync: error ${Math.abs(median).toFixed(1)}ms ≤ ${MIN_CORRECTION_MS}ms`);
                if (!isHappy && (stdDev < CONVERGENCE_STD_DEV_MS || correctionCount >= 2)) completeCalibration();
                return;
            }
            applyCorrection(median);
            flushLogs();
        }
    }

    // ============================================================================
    // DETECTION LOOP
    // ============================================================================
    function detectNeighborNotes() {
        if (!isMicActive || !analyser || !frequencyData) { requestAnimationFrame(detectNeighborNotes); return; }
        const now = Date.now() + serverOffset;
        analyser.getByteFrequencyData(frequencyData);

        const nyquist = sampleRate/2;
        const startBin = Math.floor(500 / nyquist * (FFT_SIZE/2));
        const endBin = Math.ceil(2100 / nyquist * (FFT_SIZE/2));
        let piccoloEnergy = 0;
        for (let i = startBin; i <= endBin && i < frequencyData.length; i++) piccoloEnergy += frequencyData[i]/255;
        piccoloEnergy /= (endBin - startBin + 1);
        currentAvgEnergy = piccoloEnergy;

        const eFill = document.getElementById('energy-fill');
        if (eFill) eFill.style.width = (piccoloEnergy*100)+'%';
        const eVal = document.getElementById('energy-value');
        if (eVal) eVal.innerText = piccoloEnergy.toFixed(4);

        baselineSamples.push(piccoloEnergy);
        if (baselineSamples.length > BASELINE_WINDOW_SAMPLES) baselineSamples.shift();
        if (baselineSamples.length === BASELINE_WINDOW_SAMPLES) {
            const sorted = [...baselineSamples].sort((a,b)=>a-b);
            baselineEnergy = sorted[Math.floor(sorted.length/2)];
        }

        const songPos = tuningStartTime ? now - tuningStartTime : 0;
        const isPhase2 = songPos >= phase1EndMs;

        if (!isHappy && isPhase2 && tuningStartTime) {
            processDetectionWindows(now, piccoloEnergy);
            if (now - lastEvaluationTime > EVALUATION_INTERVAL_MS) {
                lastEvaluationTime = now;
                evaluateInRealTime();
            }
        }

        requestAnimationFrame(detectNeighborNotes);
    }

    function processDetectionWindows(now, piccoloEnergy) {
        if (!phase1Complete || isHappy) return;
        if (!noteSchedule.length) return;
        if (!tuningStartTime) return;
        const songPos = now - tuningStartTime;
        if (songPos < phase1EndMs) return;
        const candidates = noteSchedule.filter(note => {
            if (note.deviceId === mySeat.id) return false;
            if (!allListeningTargets.includes(note.deviceId)) return false;
            if (processedMeasurements.has(`${note.noteIndex}_${note.deviceId}`)) return false;
            return Math.abs(songPos - note.startMs) <= 500;
        });
        for (const note of candidates) {
            const expected = noteTimings[note.noteIndex];
            if (!expected || !expected.midi) continue;
            const expectedTime = tuningStartTime + note.startMs;
            const nowServer = Date.now() + serverOffset;
            const windowDelay = expectedTime - nowServer - RECORDING_WINDOW_MS/2;
            if (windowDelay > 0 && windowDelay < 2000) {
                const key = `rec_${note.deviceId}_${note.noteIndex}`;
                if (!scheduledRecordings.has(key)) {
                    scheduledRecordings.add(key);
                    setTimeout(async () => {
                        const win = await captureRecordingWindow(expectedTime, RECORDING_WINDOW_MS);
                        if (win) storeRecording(note.deviceId, note.noteIndex, null, win);
                    }, windowDelay);
                }
            }
            const energy = calculateEnergyForNote(expected.midi, sampleRate, FFT_SIZE);
            if (energy > MIN_DETECTION_ENERGY) {
                const rawDelay = songPos - note.startMs;
                const dx = mySeat.x - note.originX, dy = mySeat.y - note.originY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const propMs = (dist / SPEED_OF_SOUND) * 1000;
                const speakerDelay = rawDelay - propMs - (myMicDelayMs || 0);
                if (speakerDelay >= -50 && speakerDelay <= 500) {
                    if (localRecordings.has(note.deviceId)) {
                        const rec = localRecordings.get(note.deviceId).find(r => r.noteIndex === note.noteIndex);
                        if (rec) rec.realTimeEstimate = speakerDelay;
                    }
                    rawTimeShifts.push(speakerDelay);
                    if (rawTimeShifts.length > 50) rawTimeShifts.shift();
                    neighborDetectionsCount++;
                    const cnt = neighborDetectionsPerNeighbor.get(note.deviceId) || 0;
                    neighborDetectionsPerNeighbor.set(note.deviceId, cnt + 1);
                    reportMeasurement(note.noteIndex, note.deviceId, speakerDelay, rawDelay, propMs, now);
                    processedMeasurements.add(`${note.noteIndex}_${note.deviceId}`);
                    log(`👥 ${note.deviceId} note ${note.noteIndex} → delay=${speakerDelay.toFixed(1)}ms`);
                }
            }
        }
    }

    async function reportMeasurement(noteIndex, playingSeatId, speakerDelay, rawDelay, propMs, detectionTime) {
        try {
            await db.ref(`measurements/${noteIndex}/reporters/${mySeat.id}`).set({
                targetSeatId: playingSeatId, reporterSeatId: mySeat.id, speakerDelay: Math.round(speakerDelay),
                rawDelay: Math.round(rawDelay), propagationMs: Math.round(propMs), micDelayMs: myMicDelayMs || 0,
                reportedAt: Date.now() + serverOffset, detectedAt: detectionTime, noteIndex
            });
        } catch (e) { log(`❌ Report failed: ${e.message}`); }
    }

    async function captureRecordingWindow(expectedNoteTime, windowMs) {
        if (!analyser || !frequencyData) return null;
        const frames = [];
        const startTime = expectedNoteTime - windowMs/2;
        const endTime = expectedNoteTime + windowMs/2;
        let nowServer = Date.now() + serverOffset;
        if (startTime > nowServer) await new Promise(r => setTimeout(r, startTime - nowServer));
        const recordEnd = Date.now() + serverOffset + windowMs;
        while (Date.now() + serverOffset < recordEnd) {
            analyser.getByteFrequencyData(frequencyData);
            frames.push({ timestamp: Date.now() + serverOffset, data: compressFrequencyData(frequencyData) });
            await new Promise(r => setTimeout(r, 10));
        }
        return { frames, windowMs, startTime, endTime };
    }

    function compressFrequencyData(freqData) {
        const nyquist = sampleRate/2;
        const startBin = Math.floor(500 / nyquist * (FFT_SIZE/2));
        const endBin = Math.ceil(2100 / nyquist * (FFT_SIZE/2));
        const step = Math.max(1, Math.floor((endBin - startBin)/20));
        const comp = [];
        for (let i = startBin; i <= endBin; i += step) {
            let sum = 0, cnt = 0;
            for (let j = 0; j < step && i+j <= endBin; j++) { sum += freqData[i+j]/255; cnt++; }
            comp.push(sum/cnt);
        }
        return comp;
    }

    function storeRecording(neighborId, noteIndex, realTimeEstimate, recordingWindow) {
        if (!localRecordings.has(neighborId)) localRecordings.set(neighborId, []);
        localRecordings.get(neighborId).push({ noteIndex, realTimeEstimate, recordingWindow });
    }

    // ============================================================================
    // OBOE / TUBA WAVEFORM-BASED CALIBRATION
    // ============================================================================
    async function startOboeCalibration(cue) {
        const targetSeat = cue.targetSeat;
        const expectedStart = cue.startTime;
        const duration = cue.total_duration_ms;
        const recordingStart = expectedStart - RECORDING_PRE_MS;
        const recordingEnd = expectedStart + duration + RECORDING_POST_MS;
        const recordingDuration = recordingEnd - recordingStart;
        const nowWall = Date.now() + serverOffset;
        const delayMs = recordingStart - nowWall;
        log(`🎙️ Oboe recording: expectedStart=${expectedStart}, recordingStart=${recordingStart}, nowWall=${nowWall}, delay=${delayMs.toFixed(1)}ms`, 'debug');
        if (delayMs > 0 && delayMs < 30000) {
            setTimeout(async () => {
                log(`🔴 Oboe recording START at ${Date.now()+serverOffset}`, 'info');
                const recorded = await recordAudioBuffer(recordingDuration);
                const offset = crossCorrelate(oboeBuffer, recorded);
                log(`📐 Cross-correlation offset = ${offset.toFixed(1)}ms`, 'debug');
                const actualOnset = recordingStart + offset;
                const rawDelay = actualOnset - expectedStart;
                const targetSeatData = seatData[targetSeat];
                if (targetSeatData) {
                    const dx = mySeat.x - targetSeatData.x;
                    const dy = mySeat.y - targetSeatData.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const propMs = (dist / SPEED_OF_SOUND) * 1000;
                    const speakerDelay = rawDelay - propMs - (myMicDelayMs || 0);
                    reportOboeDetection(targetSeat, null, speakerDelay, cue.startTime, rawDelay, propMs);
                    log(`📝 Oboe detected: delay=${speakerDelay.toFixed(1)}ms (offset=${offset.toFixed(1)}ms)`);
                } else {
                    log(`⚠️ No coordinates for target seat ${targetSeat}`);
                }
            }, delayMs);
        } else if (delayMs > -1000) {
            log(`⚠️ Oboe recording start too late (${Math.round(-delayMs)}ms)`, 'warn');
        } else {
            log(`❌ Oboe recording start too early (${Math.round(-delayMs)}ms)`, 'warn');
        }
    }

    function startListeningForOboe(cue) {
        startOboeCalibration(cue);
    }

    function reportOboeDetection(targetSeat, noteIndex, speakerDelay, calibrationId, rawDelay, propMs) {
        db.ref(`measurements/speaker_cal/${targetSeat}`).push({
            reporterSeatId: mySeat.id,
            targetSeat: targetSeat,
            noteIndex: noteIndex,
            speakerDelay: speakerDelay,
            rawDelay: rawDelay,
            propagationMs: propMs,
            micDelayMs: myMicDelayMs || 0,
            calibrationId: calibrationId,
            timestamp: Date.now() + serverOffset
        });
        log(`📝 Reported oboe detection for ${targetSeat}: ${speakerDelay.toFixed(1)}ms (silent)`, 'phase2');
    }

    async function startTubaMicCalibration(sched) {
        const pillarId = sched.pillar;
        const pillarKey = pillarId.replace('PILLAR_', '');
        const tubaBuffer = tubaBuffers[pillarKey];
        if (!tubaBuffer) {
            log(`❌ No tuba waveform loaded for ${pillarId}`);
            return;
        }
        const expectedStart = sched.startTime;
        const duration = sched.total_duration_ms;
        // Recording window: start 100ms before expected start (pre‑roll), end after duration + post‑roll
        const recordingStart = expectedStart - RECORDING_PRE_MS;
        const recordingEnd = expectedStart + duration + RECORDING_POST_MS;
        const recordingDuration = recordingEnd - recordingStart;
        const nowWall = Date.now() + serverOffset;
        const delayMs = recordingStart - nowWall;

        log(`🎙️ Tuba recording: expectedStart=${expectedStart}, recordingStart=${recordingStart}, delay=${delayMs.toFixed(1)}ms`, 'debug');

        if (delayMs > 0 && delayMs < 30000) {
            setTimeout(async () => {
                log(`🔴 Tuba recording START at ${Date.now()+serverOffset}`, 'info');
                const recorded = await recordAudioBuffer(recordingDuration);
                const offset = crossCorrelate(tubaBuffer, recorded);
                log(`📐 Cross-correlation offset = ${offset.toFixed(1)}ms`, 'debug');

                const actualOnset = recordingStart + offset;
                const rawDelay = actualOnset - expectedStart;

                const pillar = pillarData[pillarId];
                if (!pillar) {
                    log(`⚠️ No coordinates for pillar ${pillarId}`);
                    return;
                }

                const dx = mySeat.x - pillar.x;
                const dy = mySeat.y - pillar.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const propMs = (dist / SPEED_OF_SOUND) * 1000;

                // CORRECTED: pillar already compensates its speaker delay, so we do NOT subtract it again.
                const micDelay = rawDelay - propMs;

                log(`📊 rawDelay=${rawDelay.toFixed(1)}ms, propMs=${propMs.toFixed(1)}ms, micDelay=${micDelay.toFixed(1)}ms`);

                // Sanity check – you may want to widen the range or remove it entirely
                // for debugging. Currently it rejects values outside [0,150]ms.
                if (micDelay >= MIC_DELAY_SANITY_MIN && micDelay <= MIC_DELAY_SANITY_MAX) {
                    micDelaySamples.push(micDelay);
                    if (micDelaySamples.length >= MIN_MIC_SAMPLES) {
                        myMicDelayMs = calculateMedian(micDelaySamples);
                        log(`🎤 Mic delay (tuba): ${myMicDelayMs.toFixed(1)}ms (${micDelaySamples.length} detections)`);
                        saveCalibration();
                        db.ref(`devices/${mySeat.id}/mic_cal_result`).set({
                            micDelayMs: myMicDelayMs,
                            source: 'tuba',
                            timestamp: Date.now() + serverOffset
                        });
                    }
                } else {
                    log(`⚠️ Mic delay ${micDelay.toFixed(1)}ms out of range [${MIC_DELAY_SANITY_MIN}, ${MIC_DELAY_SANITY_MAX}], ignoring`);
                }

                log(`🔇 Tuba calibration finished`);
            }, delayMs);
        } else if (delayMs > -1000) {
            log(`⚠️ Tuba recording start too late (${Math.round(-delayMs)}ms)`, 'warn');
        } else {
            log(`❌ Tuba recording start too early (${Math.round(-delayMs)}ms)`, 'warn');
        }
    }

    // ============================================================================
    // PHASE 1: WAVEFORM-BASED PILLAR MIC DELAY DETECTION
    // ============================================================================
    function schedulePillarRecordings() {
        if (!pillarWindows || !pillarTemplates) return;
        for (const win of pillarWindows) {
            const pillarId = win.pillar_id;
            const template = pillarTemplates[pillarId];
            if (!template) {
                log(`⚠️ No template for ${pillarId}, skipping`);
                continue;
            }
            const windowStartMs = win.start_ms;
            const windowEndMs = win.end_ms;
            const recordingStartWall = tuningStartTime + windowStartMs - RECORDING_PRE_MS;
            const recordingEndWall = tuningStartTime + windowEndMs + RECORDING_POST_MS;
            const recordingDuration = recordingEndWall - recordingStartWall;
            const nowWall = Date.now() + serverOffset;
            const delayMs = recordingStartWall - nowWall;

            if (delayMs > 0 && delayMs < 30000) {
                setTimeout(async () => {
                    log(`🎙️ Recording pillar ${pillarId} window (${recordingDuration}ms)...`);
                    const recorded = await recordAudioBuffer(recordingDuration);
                    const offsetMs = crossCorrelate(template, recorded);
                    const actualOnset = recordingStartWall + offsetMs;
                    const expectedOnset = tuningStartTime + windowStartMs;
                    const rawDelay = actualOnset - expectedOnset;

                    const pillar = pillarData[pillarId];
                    if (pillar) {
                        const dx = mySeat.x - pillar.x;
                        const dy = mySeat.y - pillar.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const propMs = (dist / SPEED_OF_SOUND) * 1000;
                        const micDelay = rawDelay - pillar.speakerDelayMs - propMs;
                        if (micDelay >= MIC_DELAY_SANITY_MIN && micDelay <= MIC_DELAY_SANITY_MAX) {
                            micDelaySamples.push(micDelay);
                            pillarDetectionsCount++;
                            if (micDelaySamples.length >= MIN_MIC_SAMPLES) {
                                myMicDelayMs = calculateMedian(micDelaySamples);
                                phase1Complete = true;
                                log(`🎤 Mic delay: ${myMicDelayMs.toFixed(1)}ms (${micDelaySamples.length} detections)`);
                                updateCalibrationDisplay();
                            }
                        } else {
                            log(`⚠️ Mic delay ${micDelay.toFixed(1)}ms out of range, ignoring`);
                        }
                    } else {
                        log(`⚠️ No coordinates for pillar ${pillarId}`);
                    }
                }, delayMs);
            } else if (delayMs > -1000) {
                log(`⚠️ Pillar ${pillarId} recording start too late (${Math.round(-delayMs)}ms)`, 'warn');
            } else {
                log(`❌ Pillar ${pillarId} recording start too early (${Math.round(-delayMs)}ms)`, 'warn');
            }
        }
    }

    // ============================================================================
    // COMPLETE CALIBRATION
    // ============================================================================
    async function completeCalibration() {
        if (isHappy) return;
        isHappy = true;
        log(`✅✅✅ CALIBRATION COMPLETE ✅✅✅`);
        log(`   Speaker: ${currentSpeakerDelay.toFixed(1)}ms, Mic: ${myMicDelayMs?.toFixed(1) || '0'}ms`);
        saveCalibration();
        await db.ref(`devices/${mySeat.id}`).update({
            status: 'HAPPY', calibrated: true,
            finalSpeakerDelay: Math.round(currentSpeakerDelay),
            finalMicDelay: Math.round(myMicDelayMs || 0),
            convergedAt: Date.now() + serverOffset
        });
        updateCalibrationDisplay();
        stopPeriodicLogging();
        startPhase3();
    }

    function saveCalibration() {
        try {
            const calData = {
                speakerDelay: currentSpeakerDelay,
                micDelay: myMicDelayMs,
                timestamp: Date.now()
            };
            localStorage.setItem(`calibration_${mySeat.id}`, JSON.stringify(calData));
            log(`💾 Calibration saved: speaker=${currentSpeakerDelay.toFixed(1)}ms, mic=${myMicDelayMs?.toFixed(1) || '?'}ms`);
        } catch (e) {
            log(`⚠️ Could not save calibration: ${e.message}`);
        }
    }

    async function startPhase3() {
        log("📡 Phase 3: Analyzing recordings...");
        await new Promise(resolve => setTimeout(resolve, 3000));
        log(`✅ Phase 3 complete. Calibration finalized: speaker=${currentSpeakerDelay.toFixed(1)}ms, mic=${myMicDelayMs?.toFixed(1) || '?'}ms`);
    }

    // ============================================================================
    // HEARTBEAT
    // ============================================================================
    function startHeartbeat() {
        if (!mySeat.id) return;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const schedule = () => {
            const jitter = Math.floor(Math.random() * HEARTBEAT_JITTER_MS) - (HEARTBEAT_JITTER_MS/2);
            const next = Math.max(1000, HEARTBEAT_BASE_INTERVAL_MS + jitter);
            heartbeatInterval = setTimeout(async () => {
                await sendHeartbeat();
                schedule();
            }, next);
        };
        schedule();
        log(`💓 Heartbeat started`);
    }

    async function sendHeartbeat() {
        if (!mySeat.id) return;
        try {
            await db.ref(`devices/${mySeat.id}`).update({
                lastSeen: Date.now() + serverOffset,
                status: isHappy ? 'HAPPY' : (phase1Complete ? 'CALIBRATING' : 'ACTIVE'),
                calibrated: isHappy,
                x: mySeat.x, y: mySeat.y,
                speakerDelay: currentSpeakerDelay,
                micDelay: myMicDelayMs || 0,
                neighborCount: myNeighbors.length
            });
        } catch (e) { log(`💔 Heartbeat failed: ${e.message}`); }
    }

    function stopHeartbeat() { if (heartbeatInterval) clearTimeout(heartbeatInterval); }

    // ============================================================================
    // ASSET PRELOAD (includes loading oboe, tuba, and extracting pillar templates)
    // ============================================================================
    async function preloadAssets() {
        log("📦 Preloading assets...");
        try {
            const movementsSnap = await db.ref('show/movements').once('value');
            const movements = movementsSnap.val();
            const audioFiles = new Set();
            if (movements && movements.length) {
                movements.forEach(m => {
                    (m.cues || []).forEach(cue => {
                        (cue.assets || []).forEach(asset => {
                            if (asset.audio_url) audioFiles.add(asset.audio_url);
                        });
                    });
                });
            }
            if (PICCOLO_URL) audioFiles.add(PICCOLO_URL);
            if (TEST_PULSE_URL) audioFiles.add(TEST_PULSE_URL);
            const total = audioFiles.size;
            if (total === 0) {
                assetsPreloaded = true;
                updateDeviceStatusDisplay();
                return true;
            }
            let loaded = 0;
            for (const url of audioFiles) {
                try {
                    const res = await fetch(url);
                    const buf = await res.arrayBuffer();
                    bufferCache[url] = await audioCtx.decodeAudioData(buf);
                    loaded++;
                } catch (e) {
                    log(`❌ Failed to load ${url.split('/').pop()}: ${e.message}`);
                    loaded++;
                }
            }
            assetsPreloaded = true;
            log(`✅ Assets loaded (${loaded}/${total})`);
            updateDeviceStatusDisplay();

            // Load oboe waveform
            const tuningModeSnap = await db.ref('tuning_mode').once('value');
            const oboeData = tuningModeSnap.val()?.oboe;
            if (oboeData && oboeData.audio_url) {
                try {
                    const res = await fetch(oboeData.audio_url);
                    const buf = await res.arrayBuffer();
                    oboeBuffer = await audioCtx.decodeAudioData(buf);
                    log(`✅ Oboe waveform loaded (${oboeBuffer.duration.toFixed(2)}s)`);
                } catch (e) {
                    log(`❌ Failed to load oboe waveform: ${e.message}`);
                }
            } else {
                log(`⚠️ No oboe data in tuning_mode.json`);
            }

            // Load tuba waveforms
            const tubaData = tuningModeSnap.val()?.tuba;
            if (tubaData && tubaData.audio_urls) {
                for (const [pos, url] of Object.entries(tubaData.audio_urls)) {
                    try {
                        const res = await fetch(url);
                        const buf = await res.arrayBuffer();
                        tubaBuffers[pos] = await audioCtx.decodeAudioData(buf);
                        log(`✅ Tuba waveform loaded for ${pos} (${tubaBuffers[pos].duration.toFixed(2)}s)`);
                    } catch (e) {
                        log(`❌ Failed to load tuba waveform for ${pos}: ${e.message}`);
                    }
                }
            }

            // Extract pillar templates (if pillarWindows and pillar URLs available)
            if (pillarWindows && pillarUrls) {
                for (const win of pillarWindows) {
                    const pillarId = win.pillar_id;
                    const pos = pillarId.replace('PILLAR_', '');
                    const url = pillarUrls[pos];
                    if (url && bufferCache[url]) {
                        const fullBuffer = bufferCache[url];
                        const segment = extractAudioSegment(fullBuffer, win.start_ms, win.end_ms);
                        pillarTemplates[pillarId] = segment;
                        log(`📐 Extracted template for ${pillarId}: ${segment.duration.toFixed(2)}s`);
                    } else {
                        log(`⚠️ Cannot extract template for ${pillarId}: missing buffer`);
                    }
                }
            }

            return true;
        } catch (e) {
            log(`❌ Asset load error: ${e.message}`);
            return false;
        }
    }

    // ============================================================================
    // TUNING LISTENER
    // ============================================================================
    let isProcessingTuning = false;
    function initTuningListener() {
        db.ref('tuning/current').on('value', async snap => {
            const sched = snap.val();
            if (!sched || sched.status !== 'ACTIVE') return;
            if (isProcessingTuning || tuningStartTime === sched.startTime) return;
            const now = Date.now() + serverOffset;
            if (sched.startTime < now - 60000) { log(`❌ Schedule in past`); return; }

            // Handle tuba mic calibration
            if (sched.type === 'MIC_CAL' && sched.instrument === 'tuba') {
                log(`📯 Tuba mic calibration from ${sched.pillar}`);
                startTubaMicCalibration(sched);
                return;
            }

            // Normal piccolo tuning
            log(`🎵 Tuning schedule received: start=${new Date(sched.startTime).toISOString().substr(11,12)}`);
            isProcessingTuning = true;
            currentTuningSchedule = sched;
            tuningStartTime = sched.startTime;
            updateDeviceStatusDisplay();

            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
                log("🎛️ Audio context resumed (by tuning)");
            }

            const activePillars = (sched.deviceOrder || []).filter(id => id.startsWith('PILLAR_'));
            const calibratedPatrons = sched.calibratedPatronIds || [];
            const isCalibrated = calibratedPatrons.includes(mySeat.id);

            if (isCalibrated) {
                isListenOnlyMode = true;
                assignedNotes = [];
                phase1Complete = true;
                log(`🎯 Listen‑only mode (already calibrated)`);
            } else {
                isListenOnlyMode = false;
                if (sched.schedule) {
                    noteSchedule = sched.schedule.map(n => ({ ...n, startMs: parseFloat(n.startMs), durationMs: parseFloat(n.durationMs) }));
                    assignedNotes = noteSchedule.filter(n => n.deviceId === mySeat.id);
                    log(`🎯 Assigned ${assignedNotes.length} notes`);
                    if (assignedNotes.length) {
                        log(`🎼 First 5 assigned notes for ${mySeat.id}:`);
                        assignedNotes.slice(0, 5).forEach(note => {
                            log(`   note ${note.noteIndex} at ${note.startMs}ms, duration ${note.durationMs}ms`);
                        });
                    }
                }
            }

            if (!isListenOnlyMode && sched.pillar_notes) allPillarNotes = sched.pillar_notes;
            if (sched.metadata && sched.metadata.pillar_cal_windows) {
                pillarWindows = sched.metadata.pillar_cal_windows;
                phase1EndMs = pillarWindows[pillarWindows.length - 1].end_ms;
            }
            if (sched.deviceOrder && !isListenOnlyMode) {
                const patronOrder = sched.deviceOrder.filter(id => !id.startsWith('PILLAR_'));
                isSingleDeviceMode = (patronOrder.length === 1);
                log(`📌 isSingleDeviceMode = ${isSingleDeviceMode} (patron count ${patronOrder.length})`);
            }

            // Build device‑specific buffer
            if (!isListenOnlyMode && assignedNotes.length > 0 && bufferCache[PICCOLO_URL]) {
                log(`🔧 Building device‑specific buffer for ${assignedNotes.length} notes...`);
                deviceBuffer = createDeviceBuffer(bufferCache[PICCOLO_URL], assignedNotes);
                log(`✅ Device buffer built, duration: ${deviceBuffer.duration.toFixed(2)}s`);
                if (diagnoseMode) diagnoseBuffer(deviceBuffer, assignedNotes);

                // PRIME THE HARDWARE for tuning movement
                await primeBuffer(deviceBuffer, { gain: 0.0005, duration: 0.08 });
            }

            if (!isListenOnlyMode) {
                phase1Complete = false;
                phase1WindowActive = true;
                micDelaySamples = [];
                myMicDelayMs = null;
                rawTimeShifts = [];
                pillarSyncShifts = [];
                processedMeasurements.clear();
                localRecordings.clear();
                scheduledRecordings.clear();
                playedNotesCount = 0;
                neighborDetectionsCount = 0;
                neighborDetectionsPerNeighbor.clear();
                pillarDetectionsCount = 0;
                firstNoteLogged = false;
                log(`🎤 Phase 1: listening for mic delay using waveform detection (0-${phase1EndMs}ms)`);
            }

            if (!isListenOnlyMode) {
                const initDelay = currentSpeakerDelay !== null ? currentSpeakerDelay : estimatedDeviceDelayMs;
                log(`🎵 Starting playback with delay ${initDelay.toFixed(1)}ms`);
                startContinuousPlayback(tuningStartTime, initDelay);
            } else {
                log(`🔇 Listen‑only mode, no playback`);
            }

            await enableMicrophone();
            log("🎧 Listening...");
            startPeriodicLogging();

            // Schedule waveform‑based pillar recordings for Phase 1
            if (!isListenOnlyMode && pillarWindows.length && activePillars.length) {
                schedulePillarRecordings();
                // Set a timeout to fall back to default mic delay if no detections
                setTimeout(() => {
                    if (phase1WindowActive && !phase1Complete) {
                        log(`⏱️ Phase 1 timeout, using default mic delay`);
                        phase1WindowActive = false;
                        phase1Complete = true;
                        myMicDelayMs = micDelaySamples.length ? calculateMedian(micDelaySamples) : estimatedDeviceMicDelayMs;
                        updateCalibrationDisplay();
                    }
                }, phase1EndMs);
            }
        });
    }

    // ============================================================================
    // SHOW PLAYBACK & SPEAKER_CAL HANDLER
    // ============================================================================
    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) { console.warn('Wake lock failed', e); }
    }
    function handleMovementStart(cue) {
        if (!cue.startTime || !cue.movement || !cue.cues) return;
        log(`🎬 MOVEMENT START: "${cue.movement}"`);
        clearAllScheduledCues();
        currentMovement = cue.movement;
        movementStartTime = cue.startTime;
        const indicator = document.getElementById('movement-indicator');
        if (indicator) indicator.querySelector('.status-text').innerText = cue.movement;
        if (cue.cues) scheduleTimelineCues(cue.cues);
    }
    function clearAllScheduledCues() {
        activeTimeouts.forEach(t => clearTimeout(t)); activeTimeouts = [];
        activeAudioCues.forEach(cue => {
            if (cue.gainNode) {
                const now = audioCtx.currentTime;
                cue.gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
                setTimeout(() => { if (cue.gainNode) cue.gainNode.disconnect(); }, 150);
            }
        });
        activeAudioCues = [];
        activeLightCues = [];
        const canvas = document.getElementById('stage-canvas');
        if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }
    function scheduleTimelineCues(cues) {
        const now = Date.now() + serverOffset;
        cues.forEach(cue => {
            if (cue.type !== 'MASTER_MEDIA_SYNC') return;
            const offsetMs = (cue.time || 0) * 1000;
            const absTime = movementStartTime + offsetMs;
            const delay = absTime - now - (currentSpeakerDelay || 0) - (myMicDelayMs || 0);
            (cue.assets || []).forEach(asset => {
                if (asset.type === 'pillar') return;
                if (delay > 0) {
                    const tid = setTimeout(() => playSpatialCue(asset), delay);
                    activeTimeouts.push(tid);
                } else if (delay > -5000) {   // Increased tolerance to 5 seconds
                    log(`⚠️ Cue ${asset.id} is ${Math.round(-delay)}ms late, playing immediately`, 'warn');
                    playSpatialCue(asset);
                } else {
                    log(`❌ Cue ${asset.id} too late (${Math.round(-delay)}ms), skipping`, 'error');
                }
            });
        });
    }
    async function playSpatialCue(cue) {
        const url = cue.audio_url;
        if (!url || !bufferCache[url]) return;
        const buffer = bufferCache[url];
        // Prime the hardware for show cues
        await primeBuffer(buffer);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
        source.connect(gain);
        gain.connect(masterGain || audioCtx.destination);
        source.start(0);
        activeAudioCues.push({ ...cue, source, gainNode: gain });
    }
    function frame(now) {
        const delta = now - lastFrameTime;
        if (delta < FRAME_DURATION) { requestAnimationFrame(frame); return; }
        lastFrameTime = now;
        const serverNow = Date.now() + serverOffset;
        const movInd = document.getElementById('movement-indicator');
        if (movInd) {
            if (currentMovement && movementStartTime > serverNow) {
                const t = ((movementStartTime - serverNow)/1000).toFixed(1);
                movInd.querySelector('.status-text').innerText = `${currentMovement} (T-${t}s)`;
            } else if (currentMovement) {
                movInd.querySelector('.status-text').innerText = `${currentMovement} (Playing)`;
            }
        }
        const fps = Math.round(1000 / delta);
        document.getElementById('performance-overlay').innerHTML = `FPS: ${fps} | Speaker: ${currentSpeakerDelay?.toFixed(0) || '--'}ms | Mic: ${myMicDelayMs?.toFixed(0) || '--'}ms | Neighbors: ${myNeighbors.length} | ${isHappy ? '😊' : (phase1Complete ? '🎵' : '🎤')}`;
        requestAnimationFrame(frame);
    }

    function initShowCueListener() {
