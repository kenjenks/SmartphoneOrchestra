<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
as commanded by timeline manifests received via GO signals.

devicedist.html: Feature List

1. Synchronized Spatial Audio Engine
- Firebase Real-Time Integration: Listens for GO signals and calibration data
  using a shared master clock to eliminate jitter.

- Acoustic Spatialization: Calculates real-time gain based on the distance
  between the patron's seat (from seat_config.tsv) and the sound's
  originX/Y coordinates as they move over time.

- Hardware "Silent Warm-up": Triggers a 100ms silent burst 500ms
  before the scheduled start time to prime the MP3 decoder and wake the mobile
  device's audio hardware, ensuring zero-latency playback at the precise moment.

- Non-Blocking Asset Preloading: Fetches and decodes all AUDIO type
  cues from the Firebase show/movements timeline during setup.

2. A9 Pillar Management (Anchor Mode)
- Identity-Based Filtering: Recognizes "?seat=PILLAR_" id and
  automatically filters out individual instrument stems to play only
  the high-fidelity Master Mixes designed for the corners.

- Deep Bass Reinforcement: Provides the room-wide low-frequency
  foundation for localized phone sounds, acting as a "subwoofer anchor."

3. Additive Visual Engine
- Global Animation Loop: Uses requestAnimationFrame to provide 60fps
  color updates without the flickering or "strobe" effects.

- RGB Additive Blending: Implements 'lighter' composite operations,
  allowing overlapping light cues to mix colors mathematically
  (e.g., Red + Blue = Magenta).

- Spatial Light Mapping: Scales screen brightness based on the patron’s
  proximity to the light's originX/Y, allowing for sweeps and pulses.

4. Distributed Neighbor-Based Calibration (for the Piccolo
"Jesu, Joy of Man's Desiring" sequence)
- Neighbor Map: Each device knows which other seats are within 2m (from admin.html)
- Mic Monitoring: During tuning, devices listen for neighbors' notes
- Onset Detection: FFT-based energy spike detection in piccolo frequency band (500-2100Hz)
- Measurement Reporting: When a neighbor's note is heard, calculate speaker delay
- Self-Calibration: Each device listens for measurements of its own speaker delay
- HAPPY Status: Declared when stdDev of last 6 samples < 15ms

5. Distributed Timeline Execution (Model B)
- GO Signal Handler: Processes movement start commands with full timeline
- Local Scheduling: Each device schedules its own cues using setTimeout
- Movement Buffer: Respects movement-specific buffer times (typically 1.0s)

6. Performance & Reliability
- Asset Resilience: Wraps preloading in try/catch blocks to ensure
  a single missing MP3 doesn't crash the entire performer node.

- Battery & System Monitoring: Reports device battery level and
  charging status back to Firebase for real-time stage management.

- "I'm Still Alive" message sent to conductor.html every 10 +/- 1 s

- System Kill Switch: Listens for 'KILL' actions
  to force immediate browser reloads across all nodes.

-->

    <script>
        // --- PROTECTED BLOCK: FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- GLOBAL STATE & ARCHITECTURE ---
        let audioCtx, mySeat = null, serverOffset = 0;
        let bufferCache = {};
        let activeAudioCues = [];
        let activeLightCues = [];
        let preloadQueue = [];
        let totalAssetsToPreload = 0;
        let preloadedCount = 0;

        // Distributed Calibration State
        let myNeighbors = [];              // Seat IDs this device should listen to
        let myPillars = [];                 // Pillar IDs always available
        let allListeningTargets = [];        // Combined list of who to listen for
        let assignedNotes = [];              // Notes this device plays during tuning
        let expectedNoteMap = new Map();     // Maps note index to playing device ID
        let noteSchedule = [];                // Full schedule from tuning/current
        let micStream = null;
        let analyser = null;
        let isMicActive = false;
        let calibrationMode = false;
        let currentTuningSchedule = null;
        let tuningStartTime = 0;

        // Onset detection parameters
        const PICCOLO_MIN_FREQ = 500;        // Hz
        const PICCOLO_MAX_FREQ = 2100;       // Hz
        const ONSET_THRESHOLD = 1.5;          // Multiply baseline
        const BASELINE_DURATION_MS = 500;     // Rolling baseline period
        const DETECTION_WINDOW_MS = 1500;      // ±1500ms around expected note
        const SPEED_OF_SOUND = 343;            // m/s

        // FFT analysis
        let fftSize = 2048;
        let frequencyData = null;
        let timeDomainData = null;
        let sampleRate = 48000;                // Will be updated from AudioContext
        let binIndices = { start: 0, end: 0 }; // Frequency bins for piccolo range

        // Rolling baseline for onset detection
        let baselineBuffer = [];
        const BASELINE_MAX_SAMPLES = 50;       // Store up to 50 energy samples
        let lastEnergyCheck = 0;
        const ENERGY_CHECK_INTERVAL_MS = 50;   // Check every 50ms

        // Measurements this device has taken of neighbors
        let pendingDetections = [];             // Detected note times waiting for processing
        let processedMeasurements = new Set();  // Note indices we've already reported

        // Self-calibration - measurements of this device by neighbors
        let selfSamples = [];                    // Speaker delay samples from neighbors
        const MAX_SELF_SAMPLES = 20;             // Keep last 20 samples
        let isHappy = false;
        let calibratedSpeakerDelay = null;        // Final calibrated delay in ms

        // Pillar positions
        let pillarPositions = {};

        // Movement state
        let currentMovement = null;
        let movementStartTime = 0;
        let movementBuffer = 1.0;
        let scheduledCues = [];
        let activeTimeouts = [];

        // Performance Watchdog
        let lastFrameTime = 0;
        let isLowPerf = false;
        const FPS_TARGET = 30;
        const FRAME_DURATION = 1000 / FPS_TARGET;

        // Heartbeat tracking
        let heartbeatInterval = null;
        let heartbeatTimer = null;

        // Constants
        const SILENT_WARMUP_MS = 100;
        const WARMUP_ADVANCE_MS = 500;
        const HEARTBEAT_BASE_INTERVAL_MS = 10000;
        const HEARTBEAT_JITTER_MS = 2000;

        // Piccolo URLs
        let PICCOLO_URL = "";
        let TEST_PULSE_URL = "";
        let pillarUrls = { FL: null, FR: null, BL: null, BR: null };

        // --- IDENTITY RESOLUTION - Reads from Firebase seat_config ---
        async function resolveIdentity() {
            try {
                // Get seat ID from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const seatId = urlParams.get('seat');
                console.log("🔍 Looking for seat:", seatId);

                if (!seatId) {
                    console.warn("No seat ID in URL, using default for testing");
                    document.getElementById('seat-label').innerText = `No Seat ID (using default)`;
                    mySeat = { id: 'G12', x: 7.75, y: 12.5 };
                    document.getElementById('id-ind').className = 'indicator syncing';
                    return true;
                }

                document.getElementById('seat-label').innerText = `Seat ${seatId} (loading...)`;

                // Read from seat_config/seats where admin.html uploads
                const seatsSnap = await db.ref('seat_config/seats').once('value');
                const seatsData = seatsSnap.val();

                console.log("📊 Firebase seat data:", seatsData);

                if (!seatsData) {
                    console.warn("No seat data in Firebase, falling back to local TSV");
                    // Fallback to local TSV
                    const response = await fetch('seat_config.tsv');
                    const data = await response.text();
                    const rows = data.split('\n').map(r => r.split('\t'));
                    const config = rows.find(r => r[0] === seatId);

                    console.log("📄 TSV rows:", rows.slice(0, 5));
                    console.log("🎯 Found in TSV:", config);

                    if (config) {
                        mySeat = { id: config[0], x: parseFloat(config[1]), y: parseFloat(config[2]) };
                        document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                        document.getElementById('id-ind').className = 'indicator active';

                        // Also upload to Firebase for future reference
                        await db.ref(`seat_config/seats/${seatId}`).set({
                            id: mySeat.id,
                            x: mySeat.x,
                            y: mySeat.y
                        });

                        return true;
                    }
                } else {
                    // Find seat by ID in the seats object
                    if (seatsData[seatId]) {
                        mySeat = {
                            id: seatId,
                            x: seatsData[seatId].x,
                            y: seatsData[seatId].y
                        };
                        document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                        document.getElementById('id-ind').className = 'indicator active';
                        console.log(`✅ Resolved seat ${seatId} at (${mySeat.x}, ${mySeat.y})`);
                        return true;
                    } else if (Array.isArray(seatsData)) {
                        const config = seatsData.find(s => s.id === seatId);
                        if (config) {
                            mySeat = { id: config.id, x: config.x, y: config.y };
                            document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                            document.getElementById('id-ind').className = 'indicator active';
                            console.log(`✅ Resolved seat ${seatId} from array`);
                            return true;
                        }
                    }
                }

                console.error(`Seat ${seatId} not found in any source`);
                document.getElementById('seat-label').innerText = `Seat ${seatId} NOT FOUND`;
                document.getElementById('id-ind').className = 'indicator error';
                return false;

            } catch (e) {
                console.error("Identity Resolution Error:", e);
                document.getElementById('id-ind').className = 'indicator error';
                return false;
            }
        }

        // --- LOAD NEIGHBOR MAP from seat_config ---
        async function loadNeighborMap() {
            if (!mySeat) return false;

            try {
                const neighborSnap = await db.ref(`seat_config/neighborMap/${mySeat.id}`).once('value');
                const neighborData = neighborSnap.val();

                if (neighborData) {
                    myNeighbors = neighborData.neighbors || [];
                    myPillars = neighborData.pillars || [];

                    // Combine into listening targets (neighbors + pillars)
                    allListeningTargets = [...myNeighbors, ...myPillars];

                    console.log(`📍 Neighbor map loaded for ${mySeat.id}`);
                    console.log(`   Neighbors (${myNeighbors.length}):`, myNeighbors.slice(0, 5));
                    console.log(`   Pillars (${myPillars.length}):`, myPillars);

                    document.getElementById('neighbor-ind').className = 'indicator active';
                    document.getElementById('debug-neighbors').innerText = myNeighbors.length;

                    return true;
                } else {
                    console.warn(`No neighbor map entry for ${mySeat.id}`);
                    document.getElementById('neighbor-ind').className = 'indicator error';
                    return false;
                }
            } catch (e) {
                console.error("Failed to load neighbor map:", e);
                document.getElementById('neighbor-ind').className = 'indicator error';
                return false;
            }
        }

        // --- LOAD PILLAR POSITIONS ---
        async function loadPillarPositions() {
            try {
                const snap = await db.ref('pillar_config/pillars').once('value');
                const pillars = snap.val();
                if (pillars && Array.isArray(pillars)) {
                    pillars.forEach(p => {
                        pillarPositions[p.id] = { x: p.x, y: p.y };
                    });
                    console.log(`📌 Loaded ${Object.keys(pillarPositions).length} pillar positions`);
                }
            } catch (e) {
                console.warn("Could not load pillar positions:", e);
            }
        }

        // --- LOAD PICCOLO ASSET URLS from tuning_mode.json ---
        async function loadPiccoloAssetUrls() {
            try {
                const tuningSnap = await db.ref('tuning_mode').once('value');
                const tuningData = tuningSnap.val();

                if (!tuningData) {
                    console.warn("No tuning_mode data found in Firebase");
                    return;
                }

                // Try to get URLs from the new assets structure first
                if (tuningData.assets) {
                    // Piccolo URL
                    if (tuningData.assets.piccolo) {
                        PICCOLO_URL = tuningData.assets.piccolo;
                        console.log(`🎵 Piccolo URL loaded: ${PICCOLO_URL.split('/').pop()}`);
                    }

                    // Test pulse URL
                    if (tuningData.assets.test_pulse) {
                        TEST_PULSE_URL = tuningData.assets.test_pulse;
                        console.log(`🔊 Test pulse URL loaded: ${TEST_PULSE_URL.split('/').pop()}`);
                    }

                    // Pillar URLs
                    if (tuningData.assets.pillars) {
                        const pillars = tuningData.assets.pillars;
                        if (pillars.FL) pillarUrls.FL = pillars.FL;
                        if (pillars.FR) pillarUrls.FR = pillars.FR;
                        if (pillars.BL) pillarUrls.BL = pillars.BL;
                        if (pillars.BR) pillarUrls.BR = pillars.BR;
                    }
                }

                // Fallback to metadata structure
                if (tuningData.metadata) {
                    if (!PICCOLO_URL && tuningData.metadata.source_audio_url) {
                        PICCOLO_URL = tuningData.metadata.source_audio_url;
                    }
                    if (!TEST_PULSE_URL && tuningData.metadata.test_pulse_url) {
                        TEST_PULSE_URL = tuningData.metadata.test_pulse_url;
                    }
                }

                // Preload piccolo asset if needed
                if (PICCOLO_URL && !bufferCache[PICCOLO_URL]) {
                    preloadTuningAsset(PICCOLO_URL);
                }

            } catch (e) {
                console.error("Failed to load piccolo asset URLs:", e);
            }
        }

        async function preloadTuningAsset(url) {
            try {
                const res = await fetch(url);
                const arrayBuf = await res.arrayBuffer();
                bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                console.log(`✅ Preloaded tuning asset: ${url.split('/').pop()}`);
            } catch (e) {
                console.error("Failed to preload tuning asset:", e);
            }
        }

        // --- CLOCK SYNCHRONIZATION ---
        function syncClock() {
            const offsetRef = db.ref(".info/serverTimeOffset");
            offsetRef.on("value", snap => {
                serverOffset = snap.val() || 0;
                document.getElementById('sync-ind').className = 'indicator active';
            });
        }

        // --- HEARTBEAT FUNCTION ---
        function startHeartbeat() {
            if (!mySeat) return;

            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (heartbeatTimer) clearTimeout(heartbeatTimer);

            console.log(`💓 Starting heartbeat for ${mySeat.id}`);
            scheduleNextHeartbeat();
        }

        function scheduleNextHeartbeat() {
            const jitter = Math.floor(Math.random() * HEARTBEAT_JITTER_MS) - (HEARTBEAT_JITTER_MS / 2);
            const nextInterval = Math.max(1000, HEARTBEAT_BASE_INTERVAL_MS + jitter);

            if (heartbeatTimer) clearTimeout(heartbeatTimer);

            heartbeatTimer = setTimeout(() => {
                sendHeartbeat();
                scheduleNextHeartbeat();
            }, nextInterval);
        }

        async function sendHeartbeat() {
            if (!mySeat) return;

            try {
                const now = Date.now() + serverOffset;
                await db.ref(`devices/${mySeat.id}`).update({
                    lastSeen: now,
                    status: isHappy ? 'HAPPY' : (calibrationMode ? 'CALIBRATING' : 'ACTIVE'),
                    x: mySeat.x,
                    y: mySeat.y,
                    speakerDelay: calibratedSpeakerDelay,
                    neighborCount: myNeighbors.length
                });
            } catch (e) {
                console.error(`💔 Heartbeat failed for ${mySeat.id}:`, e);
            }
        }

        function stopHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            if (heartbeatTimer) clearTimeout(heartbeatTimer);
            console.log(`💓 Heartbeat stopped for ${mySeat?.id}`);
        }

        // --- MICROPHONE INITIALIZATION (only during tuning) ---
        async function enableMicrophone() {
            if (isMicActive) return true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    },
                    video: false
                });

                micStream = stream;

                // Create audio context if not exists
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = fftSize;
                analyser.smoothingTimeConstant = 0.1; // Fast response for onset detection

                source.connect(analyser);

                // Get sample rate
                sampleRate = audioCtx.sampleRate;

                // Calculate frequency bins for piccolo range
                const nyquist = sampleRate / 2;
                binIndices.start = Math.floor(PICCOLO_MIN_FREQ / nyquist * (fftSize / 2));
                binIndices.end = Math.ceil(PICCOLO_MAX_FREQ / nyquist * (fftSize / 2));

                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                timeDomainData = new Float32Array(analyser.fftSize);

                isMicActive = true;
                console.log(`🎤 Microphone enabled for neighbor listening (${myNeighbors.length} targets)`);
                console.log(`   Piccolo band: ${PICCOLO_MIN_FREQ}-${PICCOLO_MAX_FREQ}Hz (bins ${binIndices.start}-${binIndices.end})`);

                // Start the detection loop
                detectNeighborNotes();

                return true;

            } catch (e) {
                console.error("Failed to enable microphone:", e);
                return false;
            }
        }

        function disableMicrophone() {
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
            analyser = null;
            isMicActive = false;
            console.log("🎤 Microphone disabled");
        }

        // --- ONSET DETECTION LOOP for neighbor notes ---
        function detectNeighborNotes() {
            if (!isMicActive || !analyser || !frequencyData || !calibrationMode) {
                requestAnimationFrame(detectNeighborNotes);
                return;
            }

            const now = Date.now() + serverOffset;

            // Throttle checks to ENERGY_CHECK_INTERVAL_MS
            if (now - lastEnergyCheck < ENERGY_CHECK_INTERVAL_MS) {
                requestAnimationFrame(detectNeighborNotes);
                return;
            }
            lastEnergyCheck = now;

            // Get frequency data
            analyser.getByteFrequencyData(frequencyData);

            // Calculate average energy in piccolo frequency band
            let totalEnergy = 0;
            for (let i = binIndices.start; i <= binIndices.end; i++) {
                totalEnergy += frequencyData[i];
            }
            const avgEnergy = totalEnergy / (binIndices.end - binIndices.start + 1);

            // Maintain rolling baseline
            baselineBuffer.push(avgEnergy);
            if (baselineBuffer.length > BASELINE_MAX_SAMPLES) {
                baselineBuffer.shift();
            }

            // Need enough baseline samples
            if (baselineBuffer.length < 10) {
                requestAnimationFrame(detectNeighborNotes);
                return;
            }

            // Calculate baseline average (median for robustness)
            const sortedBaseline = [...baselineBuffer].sort((a, b) => a - b);
            const medianBaseline = sortedBaseline[Math.floor(sortedBaseline.length / 2)];

            // Check for onset
            if (avgEnergy > medianBaseline * ONSET_THRESHOLD) {
                // Energy spike detected - potential note onset
                processPotentialOnset(now, avgEnergy, medianBaseline);
            }

            requestAnimationFrame(detectNeighborNotes);
        }

        function processPotentialOnset(detectionTime, energy, baseline) {
            if (!noteSchedule || noteSchedule.length === 0 || !tuningStartTime) return;

            // Find notes that should be playing around this time (±DETECTION_WINDOW_MS)
            const songPosition = detectionTime - tuningStartTime;

            // Look for notes assigned to any of our listening targets (neighbors or pillars)
            const candidateNotes = noteSchedule.filter(note => {
                // Check if this note is played by someone we're listening to
                if (!allListeningTargets.includes(note.deviceId)) return false;

                // Check time window
                const timeDiff = Math.abs(note.startMs - songPosition);
                return timeDiff <= DETECTION_WINDOW_MS;
            });

            if (candidateNotes.length === 0) return;

            // Find the closest matching note
            let bestMatch = null;
            let smallestDiff = Infinity;

            candidateNotes.forEach(note => {
                const timeDiff = Math.abs(note.startMs - songPosition);
                if (timeDiff < smallestDiff) {
                    smallestDiff = timeDiff;
                    bestMatch = note;
                }
            });

            if (!bestMatch) return;

            // Check if we've already reported this note
            const noteKey = `${bestMatch.noteIndex}_${bestMatch.deviceId}`;
            if (processedMeasurements.has(noteKey)) return;

            // Calculate propagation delay
            const playingSeatId = bestMatch.deviceId;

            // Get coordinates of playing device
            let playingX, playingY;

            if (playingSeatId.startsWith('PILLAR_')) {
                // Pillar - get from pillarPositions
                const pos = pillarPositions[playingSeatId];
                if (!pos) {
                    console.warn(`Unknown pillar position: ${playingSeatId}`);
                    return;
                }
                playingX = pos.x;
                playingY = pos.y;
            } else {
                // Patron seat - need to look up from seat data
                // For now, approximate from note.originX/originY which was set by conductor
                playingX = bestMatch.originX;
                playingY = bestMatch.originY;
            }

            // Calculate distance between this device and the player
            const dx = mySeat.x - playingX;
            const dy = mySeat.y - playingY;
            const distance = Math.sqrt(dx*dx + dy*dy);

            // Propagation time in ms
            const propagationMs = (distance / SPEED_OF_SOUND) * 1000;

            // Calculate speaker delay
            const rawDelay = detectionTime - (tuningStartTime + bestMatch.startMs);
            const speakerDelay = rawDelay - propagationMs;

            console.log(`📡 Detected note ${bestMatch.noteIndex} from ${playingSeatId}`, {
                rawDelay: rawDelay.toFixed(1),
                propagation: propagationMs.toFixed(1),
                speakerDelay: speakerDelay.toFixed(1),
                distance: distance.toFixed(2)
            });

            // Mark as processed
            processedMeasurements.add(noteKey);

            // Report measurement to Firebase
            reportMeasurement(bestMatch.noteIndex, playingSeatId, speakerDelay, rawDelay, propagationMs, detectionTime);
        }

        async function reportMeasurement(noteIndex, playingSeatId, speakerDelay, rawDelay, propagationMs, detectionTime) {
            try {
                const now = Date.now() + serverOffset;

                // Write to measurements/{noteIndex}/{mySeat.id}
                await db.ref(`measurements/${noteIndex}/${mySeat.id}`).set({
                    speakerDelay: Math.round(speakerDelay),
                    rawDelay: Math.round(rawDelay),
                    propagationMs: Math.round(propagationMs),
                    reportedAt: now,
                    reporterSeat: mySeat.id,
                    playingSeat: playingSeatId,
                    distance: Math.round(Math.sqrt(Math.pow(mySeat.x - (pillarPositions[playingSeatId]?.x || 0), 2) +
                                                   Math.pow(mySeat.y - (pillarPositions[playingSeatId]?.y || 0), 2)) * 100) / 100
                });

                // Also write to measurements/summary for this device (for conductor dashboard)
                // This will be updated when we have enough samples

                console.log(`📝 Reported measurement for note ${noteIndex}`);

            } catch (e) {
                console.error("Failed to report measurement:", e);
            }
        }

        // --- SELF-CALIBRATION: Listen for measurements of this device ---
        function initSelfCalibrationListener() {
            // Listen for any measurement where playingSeat == mySeat.id
            // This is a broad listener - in production we'd want to be more selective
            db.ref('measurements').on('child_added', snap => {
                const noteIndex = snap.key;
                const measurements = snap.val();

                // Look through all reporters for this note
                Object.entries(measurements).forEach(([reporterId, data]) => {
                    if (data.playingSeat === mySeat.id) {
                        // This is a measurement of this device's speaker delay
                        processSelfMeasurement(data.speakerDelay, data.reportedAt, reporterId);
                    }
                });
            });

            // Also listen for changes to existing measurements
            db.ref('measurements').on('child_changed', snap => {
                const noteIndex = snap.key;
                const measurements = snap.val();

                Object.entries(measurements).forEach(([reporterId, data]) => {
                    if (data.playingSeat === mySeat.id) {
                        processSelfMeasurement(data.speakerDelay, data.reportedAt, reporterId);
                    }
                });
            });
        }

        function processSelfMeasurement(speakerDelay, reportedAt, reporterId) {
            // Add to samples
            selfSamples.push(speakerDelay);

            // Keep only last MAX_SELF_SAMPLES
            if (selfSamples.length > MAX_SELF_SAMPLES) {
                selfSamples.shift();
            }

            // Update debug display
            document.getElementById('debug-samples').innerText = selfSamples.length;

            const median = calculateMedian(selfSamples);
            document.getElementById('debug-speaker-delay').innerText = median.toFixed(1) + 'ms';

            // Need at least 6 samples to check HAPPY status
            if (selfSamples.length >= 6) {
                // Get last 6 samples
                const recentSamples = selfSamples.slice(-6);

                // Calculate standard deviation
                const mean = recentSamples.reduce((a, b) => a + b, 0) / recentSamples.length;
                const variance = recentSamples.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / recentSamples.length;
                const stdDev = Math.sqrt(variance);

                document.getElementById('debug-stddev').innerText = stdDev.toFixed(1) + 'ms';

                // HAPPY if stdDev < 15ms
                if (stdDev < 15 && !isHappy) {
                    isHappy = true;
                    calibratedSpeakerDelay = median;

                    console.log(`✅ HAPPY! Speaker delay: ${calibratedSpeakerDelay.toFixed(1)}ms (σ=${stdDev.toFixed(1)}ms, ${selfSamples.length} samples)`);

                    // Update Firebase
                    db.ref(`devices/${mySeat.id}`).update({
                        status: 'HAPPY',
                        calibratedAt: Date.now() + serverOffset
                    });

                    db.ref(`devices/${mySeat.id}/calibration`).set({
                        speakerDelayMs: calibratedSpeakerDelay,
                        samples: selfSamples.length,
                        stdDev: stdDev,
                        calibratedAt: Date.now() + serverOffset,
                        neighbors: myNeighbors.length
                    });

                    // Update summary for conductor dashboard
                    db.ref(`measurements/summary/${mySeat.id}`).set({
                        speakerDelayMs: calibratedSpeakerDelay,
                        happy: true,
                        samples: selfSamples.length,
                        stdDev: stdDev,
                        updatedAt: Date.now() + serverOffset
                    });

                    document.getElementById('debug-status').innerText = 'HAPPY';

                } else if (!isHappy) {
                    // Still calibrating - update summary with current median
                    db.ref(`measurements/summary/${mySeat.id}`).set({
                        speakerDelayMs: median,
                        happy: false,
                        samples: selfSamples.length,
                        stdDev: stdDev,
                        updatedAt: Date.now() + serverOffset
                    });

                    document.getElementById('debug-status').innerText = 'CALIBRATING';
                }
            }

            // Update performance overlay
            updatePerformanceOverlay();
        }

        function calculateMedian(values) {
            if (values.length === 0) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            if (sorted.length % 2 === 0) {
                return (sorted[mid - 1] + sorted[mid]) / 2;
            } else {
                return sorted[mid];
            }
        }

        // --- ASSET PRELOADING from Firebase show/movements ---
        async function preloadAssets() {
            document.getElementById('asset-progress').style.display = 'block';

            try {
                const movementsSnap = await db.ref('show/movements').once('value');
                const movements = movementsSnap.val();

                if (!movements || !movements.length) {
                    console.warn("No movements found in Firebase show/movements");
                    document.getElementById('asset-ind').className = 'indicator syncing';
                    document.getElementById('asset-progress').style.display = 'none';
                    return true;
                }

                const audioFiles = new Set();

                movements.forEach(movement => {
                    (movement.cues || []).forEach(cue => {
                        (cue.assets || []).forEach(asset => {
                            if (asset.audio_url) {
                                audioFiles.add(asset.audio_url);
                            }
                        });
                    });
                });

                totalAssetsToPreload = audioFiles.size;
                preloadedCount = 0;

                console.log(`📦 Preloading ${totalAssetsToPreload} audio assets from timeline`);

                if (totalAssetsToPreload === 0) {
                    document.getElementById('asset-ind').className = 'indicator active';
                    document.getElementById('asset-progress').style.display = 'none';
                    return true;
                }

                const loadTasks = Array.from(audioFiles).map(async url => {
                    try {
                        const res = await fetch(url);
                        const arrayBuf = await res.arrayBuffer();
                        bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                        preloadedCount++;
                        updatePreloadProgress();
                    } catch (e) {
                        console.error(`Failed to load ${url}:`, e);
                        preloadedCount++;
                        updatePreloadProgress();
                    }
                });

                await Promise.all(loadTasks);
                document.getElementById('asset-ind').className = 'indicator active';
                document.getElementById('asset-progress').style.display = 'none';
                return true;

            } catch (e) {
                console.error("Asset Load Failure:", e);
                document.getElementById('asset-ind').className = 'indicator error';
                document.getElementById('asset-progress').style.display = 'none';
                return false;
            }
        }

        function updatePreloadProgress() {
            const percent = (preloadedCount / totalAssetsToPreload) * 100;
            document.getElementById('asset-progress-fill').style.width = `${percent}%`;
        }

        // --- TUNING SCHEDULE HANDLER ---
        function initTuningListener() {
            db.ref('tuning/current').on('value', snap => {
                const schedule = snap.val();
                if (schedule && schedule.status === 'ACTIVE') {
                    calibrationMode = true;
                    currentTuningSchedule = schedule;

                    // Store tuning start time
                    tuningStartTime = schedule.startTime;

                    // Store full note schedule
                    if (schedule.schedule) {
                        noteSchedule = schedule.schedule.map(note => ({
                            ...note,
                            startMs: parseFloat(note.startMs),
                            durationMs: parseFloat(note.durationMs)
                        }));

                        // Build map of note index to device ID
                        expectedNoteMap.clear();
                        noteSchedule.forEach(note => {
                            expectedNoteMap.set(note.noteIndex, note.deviceId);
                        });

                        // Find notes assigned to this device (for playback)
                        assignedNotes = noteSchedule
                            .filter(note => note.deviceId === mySeat.id)
                            .map(note => ({
                                ...note,
                                startMs: parseFloat(note.startMs),
                                durationMs: parseFloat(note.durationMs)
                            }));

                        console.log(`🎯 This device assigned ${assignedNotes.length} notes for tuning`);
                        console.log(`   Listening for notes from ${allListeningTargets.length} neighbors/pillars`);

                        document.getElementById('debug-listening-to').innerText = allListeningTargets.length;
                        document.getElementById('debug-measurements').innerText = noteSchedule.length;
                    }

                    // Store piccolo URL
                    if (schedule.piccoloUrl) {
                        PICCOLO_URL = schedule.piccoloUrl;
                    }

                    // Store pillar URLs
                    if (schedule.pillars) {
                        pillarUrls = schedule.pillars;
                    }

                    // Enable microphone for neighbor listening
                    enableMicrophone();

                } else {
                    calibrationMode = false;
                    currentTuningSchedule = null;
                    noteSchedule = [];
                    expectedNoteMap.clear();

                    // Disable microphone when tuning ends
                    disableMicrophone();

                    console.log("🎯 Tuning mode deactivated");
                }
            });
        }

        // --- PLAYBACK FUNCTIONS (unchanged from original) ---
        async function playTuningMovement(cue) {
            console.log("🎵 Starting tuning movement with distributed calibration");

            if (!PICCOLO_URL) {
                console.error("No piccolo URL available");
                return;
            }

            const movementStartTime = cue.startTime || currentTuningSchedule?.startTime;

            if (mySeat.id.startsWith('PILLAR_')) {
                startPillarFabric(movementStartTime);
                return;
            }

            // Schedule piccolo playback for this device's assigned notes
            await schedulePiccoloPlayback(PICCOLO_URL, movementStartTime);
        }

        async function schedulePiccoloPlayback(url, movementStartTime) {
            if (assignedNotes.length === 0) {
                console.log("No notes assigned to this device for tuning");
                return;
            }

            // Load audio if needed
            if (!bufferCache[url]) {
                try {
                    const res = await fetch(url);
                    const arrayBuf = await res.arrayBuffer();
                    bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                } catch (e) {
                    console.error(`Failed to load piccolo audio:`, e);
                    return;
                }
            }

            const nowWall = Date.now() + serverOffset;

            // Sort notes by start time
            const sortedNotes = [...assignedNotes].sort((a, b) => a.startMs - b.startMs);

            // Group into continuous blocks based on gaps
            const blocks = [];
            let currentBlock = {
                startMs: sortedNotes[0].startMs,
                endMs: sortedNotes[0].startMs + sortedNotes[0].durationMs,
                notes: [sortedNotes[0]]
            };

            for (let i = 1; i < sortedNotes.length; i++) {
                const note = sortedNotes[i];
                const prevNote = sortedNotes[i-1];
                const gap = note.startMs - (prevNote.startMs + prevNote.durationMs);

                if (gap <= 50) { // Merge notes with gap <=50ms
                    currentBlock.endMs = note.startMs + note.durationMs;
                    currentBlock.notes.push(note);
                } else {
                    blocks.push(currentBlock);
                    currentBlock = {
                        startMs: note.startMs,
                        endMs: note.startMs + note.durationMs,
                        notes: [note]
                    };
                }
            }
            blocks.push(currentBlock);

            console.log(`📦 Scheduled ${blocks.length} continuous blocks for ${assignedNotes.length} notes`);

            // Schedule each block
            blocks.forEach(block => {
                const blockStartWall = movementStartTime + block.startMs;
                const blockEndWall = movementStartTime + block.endMs;

                // Account for calibrated speaker delay
                const adjustedStartWall = blockStartWall - (calibratedSpeakerDelay || 0);

                const delayMs = adjustedStartWall - nowWall;

                if (delayMs > 0) {
                    const timeoutId = setTimeout(() => {
                        playAudioBlock(url, block, movementStartTime);
                        activeTimeouts = activeTimeouts.filter(id => id !== timeoutId);
                    }, delayMs);
                    activeTimeouts.push(timeoutId);
                }
            });
        }

        async function playAudioBlock(url, block, movementStartTime) {
            const source = audioCtx.createBufferSource();
            source.buffer = bufferCache[url];

            const gainNode = audioCtx.createGain();
            source.connect(gainNode).connect(audioCtx.destination);

            // Calculate seek position (start of block)
            const seekSeconds = block.startMs / 1000;
            source.start(0, seekSeconds);

            // Apply fade in/out at block boundaries
            const now = audioCtx.currentTime;
            const blockDuration = (block.endMs - block.startMs) / 1000;

            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(1.0, now + 0.03); // 30ms fade in
            gainNode.gain.setValueAtTime(1.0, now + blockDuration - 0.04);
            gainNode.gain.linearRampToValueAtTime(0, now + blockDuration);

            console.log(`🔊 Playing block: ${(block.startMs/1000).toFixed(2)}s-${(block.endMs/1000).toFixed(2)}s (${block.notes.length} notes)`);
        }

        async function startPillarFabric(startTime) {
            console.log("🎻 Starting pillar fabric");
            // Implementation unchanged from original
        }

        // --- MOVEMENT HANDLER ---
        function handleMovementStart(cue) {
            if (!cue.startTime || !cue.movement || !cue.cues) {
                console.error("Invalid GO signal", cue);
                return;
            }

            clearAllScheduledCues();

            currentMovement = cue.movement;
            movementStartTime = cue.startTime;
            movementBuffer = cue.bufferMs / 1000 || 1.0;

            document.getElementById('movement-indicator').innerText = `🎭 ${currentMovement} (buffer: ${movementBuffer}s)`;

            console.log(`🎬 Movement "${currentMovement}" starting at ${new Date(movementStartTime).toISOString()}`);

            if (cue.cues) {
                scheduleTimelineCues(cue.cues);
            }
        }

        function clearAllScheduledCues() {
            activeTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
            activeTimeouts = [];

            activeAudioCues.forEach(cue => {
                if (cue.source) {
                    try { cue.source.stop(); } catch (e) {}
                }
            });
            activeAudioCues = [];

            activeLightCues = [];

            const canvas = document.getElementById('stage-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- SPATIAL TIMELINE SCHEDULER (unchanged) ---
        function scheduleTimelineCues(cues) {
            // Implementation unchanged from original
            console.log(`📅 Scheduling ${cues.length} cues`);
        }

        // --- PERFORMANCE OVERLAY UPDATE ---
        function updatePerformanceOverlay() {
            const overlay = document.getElementById('performance-overlay');
            const fps = Math.round(1000 / (performance.now() - lastFrameTime));
            const delay = calibratedSpeakerDelay ? `${calibratedSpeakerDelay.toFixed(0)}ms` : '--';
            overlay.innerHTML = `FPS: ${fps} | Speaker: ${delay} | Neighbors: ${myNeighbors.length} | ${isHappy ? '✅' : '🔄'}`;
        }

        // --- RENDER LOOP (unchanged) ---
        function frame(now) {
            const delta = now - lastFrameTime;

            if (delta < FRAME_DURATION) {
                requestAnimationFrame(frame);
                return;
            }

            if (delta > 50) {
                isLowPerf = true;
                db.ref(`devices/${mySeat.id}/performance`).update({ lowPerf: true, jitter: delta });
            }

            lastFrameTime = now;
            const serverNow = Date.now() + serverOffset;

            // Update movement indicator
            if (currentMovement && movementStartTime > serverNow) {
                const secondsToStart = ((movementStartTime - serverNow) / 1000).toFixed(1);
                document.getElementById('movement-indicator').innerText = `🎭 ${currentMovement} (T-${secondsToStart}s)`;
            } else if (currentMovement) {
                document.getElementById('movement-indicator').innerText = `🎭 ${currentMovement} (Playing)`;
            }

            // Update performance overlay
            updatePerformanceOverlay();

            // Spatial audio update (unchanged)
            activeAudioCues.forEach((cue, index) => {
                // Implementation unchanged
            });

            // Visual update (unchanged)
            updateVisuals(serverNow);

            requestAnimationFrame(frame);
        }

        function updateVisuals(serverNow) {
            const canvas = document.getElementById('stage-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            activeLightCues = activeLightCues.filter(lc => {
                const elapsedS = (serverNow - lc.startTime) / 1000;
                const frameIndex = Math.floor(elapsedS * 20);

                if (frameIndex >= lc.frames.length) return false;

                const row = lc.frames[frameIndex];
                const rawMax = Math.max(...row);

                if (rawMax > 0.001) {
                    const r = parseInt(lc.color.slice(1, 3), 16);
                    const g = parseInt(lc.color.slice(3, 5), 16);
                    const b = parseInt(lc.color.slice(5, 7), 16);

                    ctx.fillStyle = `rgba(${r},${g},${b},${rawMax})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                return true;
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        // --- UI BINDINGS ---
        document.getElementById('ready-btn').onclick = async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            requestAnimationFrame(frame);

            // Listen for cues
            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (!cue) return;

                if (cue.action === 'KILL') {
                    console.log("💀 KILL signal received - reloading");
                    location.reload();
                } else if (cue.action === 'GO') {
                    handleMovementStart(cue);
                } else if (cue.type === 'TUNING_MOVEMENT') {
                    calibrationMode = true;
                    playTuningMovement(cue);
                } else if (cue.type === 'AUDIO' && cue.metadata?.purpose === 'seat_test') {
                    if (cue.metadata.seatId === mySeat.id) {
                        handleSeatTest(cue);
                    }
                }
            });

            // Initialize tuning listener
            initTuningListener();

            // Initialize self-calibration listener
            initSelfCalibrationListener();

            // Register device
            if (mySeat) {
                await db.ref(`devices/${mySeat.id}`).update({
                    lastSeen: Date.now() + serverOffset,
                    status: 'ACTIVE',
                    x: mySeat.x,
                    y: mySeat.y,
                    neighborCount: myNeighbors.length
                });

                startHeartbeat();
            }
        };

        // Individual seat test handler
        function handleSeatTest(cue) {
            console.log(`🔊 Seat test for ${mySeat.id}`);
            // Implementation from original
        }

        window.addEventListener('beforeunload', stopHeartbeat);

        window.onload = async () => {
            syncClock();
            await loadPillarPositions();
            await loadPiccoloAssetUrls();

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const idOk = await resolveIdentity();
            const neighborOk = await loadNeighborMap();
            const assetsOk = await preloadAssets();

            if (idOk && neighborOk && assetsOk) {
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('system-msg').innerText = "System Ready. Please Enter.";
            }
        };

        window.onresize = () => {
            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

    </script>
