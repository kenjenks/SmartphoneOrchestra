<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
in cues.json (as represented by the RTDBMS)
as commanded by timeline.json (as represented by the RTDBMS).

devicedist.html: Feature List

1. Synchronized Spatial Audio Engine
- Firebase Real-Time Integration: Listens for 'currentCue' updates and maps
  them to local playback using a shared master clock to eliminate jitter.

- Acoustic Spatialization: Calculates real-time gain based on the distance
  between the patron's seat (from seat_config.tsv) and the sound's
  originX/Y coordinates.

- Hardware "Silent Warm-up": Triggers a 100ms silent burst immediately
  upon receiving a cue to prime the MP3 decoder and wake the mobile
  device's audio hardware before the actual scheduled start time.

- Non-Blocking Asset Preloading: Fetches and decodes all AUDIO type
  cues into a local bufferCache during the initial setup phase.

2. A9 Pillar Management (Anchor Mode)
- Identity-Based Filtering: Recognizes "PILLAR_" seat_ids and
  automatically filters out individual instrument stems to play only
  the high-fidelity Master Mixes designed for the corners.

- Deep Bass Reinforcement: Provides the room-wide low-frequency
  foundation for localized phone sounds, acting as a "subwoofer anchor."

3. Additive Visual Engine
- Global Animation Loop: Uses requestAnimationFrame to provide 60fps
  color updates without the flickering or "strobe" effects.

- RGB Additive Blending: Implements 'lighter' composite operations,
  allowing overlapping light cues to mix colors mathematically
  (e.g., Red + Blue = Magenta).

- Spatial Light Mapping: Scales screen brightness based on the patron’s
  proximity to the light's originX/Y, allowing for sweeps and pulses.

4. Decentralized Statistical Calibration (for the Bach
"Jesu, Joy of Man's Desiring" sequence)
- Ultrasonic Pulse Detection via Firebase: Listens for conductor's
  detection timestamps at tuning/last_heard
- One-Way Lag Calculation: Compares pulse playback time with heard time
- Local Storage: Maintains calibrated lag value for precise synchronization

5. Movement Control
- GO Signal Handler: Processes movement start commands with buffer timing
- Timeline Execution: Executes scheduled cues from movement manifests
- Movement Buffer: Respects movement-specific buffer times (typically 1.0s)

6. Performance & Reliability
- Asset Resilience: Wraps preloading in try/catch blocks to ensure
  a single missing MP3 doesn't crash the entire performer node.

- Battery & System Monitoring: Reports device battery level and
  charging status back to Firebase for real-time stage management.

- System Kill Switch: Listens for 'SYSTEM' cues with 'KILL' actions
  to force immediate browser reloads across all nodes.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isle of Noises - Patron Device</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        #status-registry {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            width: 80%;
            max-width: 400px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background: #222;
            margin-left: 10px;
        }

        /* Status Colors */
        .active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .syncing { background: #ffcc00; animation: pulse 1s infinite; }
        .error { background: #ff4444; }
        .happy { background: #00ffcc; border: 2px solid #fff; }

        @keyframes pulse { 50% { opacity: 0.4; } }

        #ready-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: #00ffcc;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #ready-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #ready-btn:active { transform: scale(0.95); }

        #show-screen { display: none; height: 100vh; width: 100vw; }
        canvas { width: 100%; height: 100%; display: block; }

        #performance-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #00ffcc;
            pointer-events: none;
            opacity: 0.5;
        }

        #movement-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #ffcc00;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 2px solid #00ffcc;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 id="seat-label">Identifying Seat...</h1>

        <div id="status-registry">
            <div class="status-item">
                <span>Identity Resolve</span>
                <span id="id-ind" class="indicator"></span>
            </div>
            <div class="status-item">
                <span>Clock Synchronization</span>
                <span id="sync-ind" class="indicator"></span>
            </div>
            <div class="status-item">
                <span>Acoustic Calibration</span>
                <span id="cal-ind" class="indicator"></span>
            </div>
            <div class="status-item">
                <span>Asset Manifest</span>
                <span id="asset-ind" class="indicator"></span>
            </div>
        </div>

        <button id="ready-btn" disabled>ENTER THE ISLE</button>
        <p id="system-msg" style="margin-top:20px; font-size: 0.8rem; color: #888;">Waiting for Audio Context...</p>
    </div>

    <div id="show-screen">
        <div id="performance-overlay">FPS: -- | Lag: --ms</div>
        <div id="movement-indicator">Standby</div>
        <canvas id="stage-canvas"></canvas>
    </div>

    <script>
        // --- PROTECTED BLOCK: FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB...", // Actual Key per Operational SOP
            authDomain: "tempest-theatre.firebaseapp.com",
            databaseURL: "https://tempest-theatre-default-rtdb.firebaseio.com",
            projectId: "tempest-theatre",
            storageBucket: "tempest-theatre.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- GLOBAL STATE & ARCHITECTURE ---
        let audioCtx, mySeat = null, serverOffset = 0;
        let bufferCache = {};
        let activeAudioCues = [];
        let activeLightCues = [];

        // Calibration & Stats
        let hardwareLag = 273; // Baseline hardware latency (will be updated via calibration)
        let lagSamples = [];
        let isHappy = false;
        let lastPingSent = 0;

        // Ultrasonic Calibration State
        let calibrationMode = false;
        let currentTuningSchedule = null;
        let assignedNotes = []; // Notes assigned to this device during tuning
        let pendingPulseDetections = []; // Track pulses waiting for conductor response
        let calibratedLag = null; // Final calibrated one-way lag

        // Individual seat test state
        let pendingTestPulse = null; // Track individual seat test

        // Movement state
        let currentMovement = null;
        let movementStartTime = 0;
        let movementBuffer = 1.0; // Default 1 second buffer
        let scheduledCues = []; // Queue of upcoming cues
        let movementTimer = null;

        // Performance Watchdog
        let lastFrameTime = 0;
        let isLowPerf = false;
        const FPS_TARGET = 30;
        const FRAME_DURATION = 1000 / FPS_TARGET; // 33.33ms

        // --- IDENTITY RESOLUTION ---
        async function resolveIdentity() {
            try {
                const response = await fetch('seat_config.tsv');
                const data = await response.text();
                const rows = data.split('\n').map(r => r.split('\t'));

                // For production, identity is usually URL-param or persistent cookie
                const urlParams = new URLSearchParams(window.location.search);
                const seatId = urlParams.get('seat') || 'G12'; // Default for testing

                const config = rows.find(r => r[0] === seatId);
                if (config) {
                    mySeat = { id: config[0], x: parseFloat(config[1]), y: parseFloat(config[2]) };
                    document.getElementById('seat-label').innerText = `Seat ${mySeat.id}`;
                    document.getElementById('id-ind').className = 'indicator active';
                    return true;
                }
            } catch (e) {
                console.error("Identity Error:", e);
                document.getElementById('id-ind').className = 'indicator error';
            }
            return false;
        }

        // --- CLOCK SYNCHRONIZATION ---
        function syncClock() {
            const offsetRef = db.ref(".info/serverTimeOffset");
            offsetRef.on("value", snap => {
                serverOffset = snap.val();
                document.getElementById('sync-ind').className = 'indicator active';
            });
        }

        // --- DECENTRALIZED CALIBRATION ENGINE (Bach Logic) ---
        function processAcousticReturn(tHeard) {
            if (!lastPingSent) return;

            // Calculate measured one-way lag (time from pulse play to conductor hearing)
            // This includes both hardware delay AND acoustic travel time
            const measuredLag = tHeard - lastPingSent;

            // Store the calibrated value
            calibratedLag = measuredLag;
            hardwareLag = measuredLag; // Update working lag estimate

            // Append to rolling buffer (Sample pool of 12)
            lagSamples.push(measuredLag);
            if (lagSamples.length > 12) lagSamples.shift();

            // Calculate Standard Deviation
            if (lagSamples.length >= 6) {
                const mean = lagSamples.reduce((a, b) => a + b) / lagSamples.length;
                const variance = lagSamples.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / lagSamples.length;
                const stdDev = Math.sqrt(variance);

                if (stdDev < 5 && !isHappy) {
                    isHappy = true;
                    document.getElementById('cal-ind').className = 'indicator active happy';
                    db.ref(`devices/${mySeat.id}/status`).set('HAPPY');

                    // Store calibrated lag in Firebase for monitoring
                    db.ref(`devices/${mySeat.id}/calibration`).update({
                        lag: calibratedLag,
                        samples: lagSamples.length,
                        stdDev: stdDev,
                        calibratedAt: Date.now() + serverOffset
                    });
                } else if (!isHappy) {
                    document.getElementById('cal-ind').className = 'indicator syncing';
                }
            }

            // Update overlay with current lag
            updatePerformanceOverlay();

            // Clear any pending test pulse
            pendingTestPulse = null;
        }

        // --- TUNING SCHEDULE HANDLER ---
        function initTuningListener() {
            // Listen for tuning schedule
            db.ref('tuning/current').on('value', snap => {
                const schedule = snap.val();
                if (schedule && schedule.status === 'ACTIVE') {
                    calibrationMode = true;
                    currentTuningSchedule = schedule;

                    // Find notes assigned to this device
                    if (schedule.schedule) {
                        assignedNotes = schedule.schedule.filter(note => note.deviceId === mySeat.id);
                        console.log(`🎯 Device assigned ${assignedNotes.length} notes for tuning`);
                    }

                    // Preload the flute audio if not already cached
                    if (schedule.fluteUrl && !bufferCache[schedule.fluteUrl]) {
                        preloadTuningAsset(schedule.fluteUrl);
                    }
                } else {
                    calibrationMode = false;
                    currentTuningSchedule = null;
                    assignedNotes = [];
                }
            });

            // Listen for conductor's pulse detections
            db.ref('tuning/last_heard').on('value', snap => {
                const tHeard = snap.val();
                if (tHeard) {
                    // Check if this detection matches any of our pending pulses
                    processPendingDetections(tHeard);

                    // Also check if it matches a pending individual test
                    if (pendingTestPulse && Math.abs(tHeard - pendingTestPulse.playTime) < 1000) {
                        processAcousticReturn(tHeard);
                    }
                }
            });
        }

        async function preloadTuningAsset(url) {
            try {
                const res = await fetch(url);
                const arrayBuf = await res.arrayBuffer();
                bufferCache[url] = await audioCtx.decodeAudioData(arrayBuf);
                console.log(`✅ Preloaded tuning asset: ${url}`);
            } catch (e) {
                console.error("Failed to preload tuning asset:", e);
            }
        }

        function processPendingDetections(tHeard) {
            // Look for pending pulses that haven't been matched
            const now = Date.now() + serverOffset;

            pendingPulseDetections = pendingPulseDetections.filter(pending => {
                // Only consider pulses from last 5 seconds
                if (now - pending.playTime > 5000) return false;

                // Check if this detection could be for our pulse
                // The conductor broadcasts immediately upon detection
                if (Math.abs(tHeard - pending.playTime) < 1000) { // Within 1 second window
                    lastPingSent = pending.playTime;
                    processAcousticReturn(tHeard);
                    return false; // Remove from pending
                }
                return true; // Keep in pending
            });
        }

        // --- MOVEMENT HANDLER (GO Signal) ---
        function handleMovementStart(cue) {
            if (!cue.startTime || !cue.movement || !cue.timeline) {
                console.error("Invalid GO signal: missing required fields");
                return;
            }

            // Clear any existing movement
            if (movementTimer) {
                clearTimeout(movementTimer);
                movementTimer = null;
            }

            // Clear scheduled cues
            scheduledCues = [];

            // Set movement state
            currentMovement = cue.movement;
            movementStartTime = cue.startTime;
            movementBuffer = cue.bufferMs / 1000 || 1.0; // Convert to seconds, default 1.0

            // Update UI
            document.getElementById('movement-indicator').innerText = `🎭 ${currentMovement} (buffer: ${movementBuffer}s)`;

            console.log(`🎬 Movement "${currentMovement}" starting at ${new Date(movementStartTime).toISOString()} with ${movementBuffer}s buffer`);

            // Schedule all cues from the timeline
            if (cue.timeline) {
                scheduleTimelineCues(cue.timeline);
            }
        }

        function scheduleTimelineCues(timeline) {
            const now = Date.now() + serverOffset;

            Object.entries(timeline).forEach(([cueId, cueData]) => {
                // Calculate when this cue should play relative to movement start
                // Cue times in manifest are offsets from movement start (in ms)
                const cueOffset = cueData.startTime || 0; // Offset in ms
                const absoluteStartTime = movementStartTime + cueOffset;

                // Calculate delay until this cue should play
                const delayMs = absoluteStartTime - now - (hardwareLag);

                if (delayMs > 0) {
                    // Schedule the cue
                    setTimeout(() => {
                        playSpatialCue({
                            ...cueData,
                            startTime: absoluteStartTime,
                            cueId: cueId
                        });
                    }, delayMs);

                    // Store in scheduled cues list for reference
                    scheduledCues.push({
                        cueId: cueId,
                        startTime: absoluteStartTime,
                        data: cueData
                    });

                    console.log(`📅 Scheduled cue ${cueId} at +${cueOffset}ms (in ${Math.round(delayMs)}ms)`);
                } else if (delayMs > -1000) {
                    // Cue is in the past but within 1 second - play immediately
                    console.log(`⚡ Playing cue ${cueId} immediately (was ${Math.round(-delayMs)}ms late)`);
                    playSpatialCue({
                        ...cueData,
                        startTime: absoluteStartTime,
                        cueId: cueId
                    });
                }
            });

            // Sort scheduled cues for reference
            scheduledCues.sort((a, b) => a.startTime - b.startTime);
        }

        // --- AUDIO ENGINE: SPATIAL WASH & RAMPING ---
        async function playSpatialCue(cue) {
            if (!bufferCache[cue.file]) {
                // Try to preload on-demand if not cached
                try {
                    const res = await fetch(cue.file);
                    const arrayBuf = await res.arrayBuffer();
                    bufferCache[cue.file] = await audioCtx.decodeAudioData(arrayBuf);
                } catch (e) {
                    console.error(`Failed to load cue file ${cue.file}:`, e);
                    return;
                }
            }

            const source = audioCtx.createBufferSource();
            source.buffer = bufferCache[cue.file];

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Start silent

            source.connect(gainNode).connect(audioCtx.destination);

            const scheduledStart = cue.startTime - serverOffset - hardwareLag;
            const startTime = Math.max(audioCtx.currentTime, (scheduledStart / 1000));

            // Prime decoder (Silent warm-up) - always do this for all audio
            const silentSource = audioCtx.createBufferSource();
            silentSource.start(0);

            source.start(startTime);

            // Register for frame-by-frame updates
            activeAudioCues.push({
                ...cue,
                source,
                gainNode,
                localStartTime: Date.now() + (startTime * 1000) - audioCtx.currentTime * 1000
            });

            // Special handling for individual seat tests
            if (cue.metadata && cue.metadata.purpose === 'seat_test' && cue.metadata.seatId === mySeat.id) {
                handleSeatTest(cue, startTime);
            }

            // Special handling for tuning mode - track pulse playback time
            if (calibrationMode && cue.metadata && cue.metadata.purpose === 'tuning_movement') {
                trackTuningPulse(cue, startTime);
            }
        }

        // --- INDIVIDUAL SEAT TEST HANDLER ---
        function handleSeatTest(cue, startTime) {
            console.log(`🔊 Received seat test for ${mySeat.id}`);

            // conductor.html uses startMs:100 to skip the silence, so the pulse plays immediately
            // No need to add an offset - the FSK starts at time 0 in the playback
            const pulseTime = cue.startTime; // Pulse plays immediately when audio starts

            // Schedule the pulse tracking
            const now = Date.now() + serverOffset;
            const delayMs = pulseTime - now - hardwareLag;

            if (delayMs > 0) {
                setTimeout(() => {
                    // This is when the ultrasonic pulse actually plays
                    const playTime = Date.now() + serverOffset;

                    // Store as pending test pulse
                    pendingTestPulse = {
                        playTime: playTime,
                        cueId: cue.metadata?.seatId
                    };

                    // Also set lastPingSent for the calibration engine
                    lastPingSent = playTime;

                    // Flash the screen for visual feedback
                    flashScreenForPulse();

                    console.log(`📡 Test pulse played at ${playTime}`);
                }, delayMs);
            }
        }

        function trackTuningPulse(cue, startTime) {
            // For tuning, we need to know when the pulse at the center of the note plays
            // The pulse is at the center of each note (see bach_barber.py)

            // Calculate when the center of the note occurs
            const pulsePositionMs = cue.metadata?.pulsePositionMs || 0;
            if (pulsePositionMs > 0) {
                const pulseTime = cue.startTime + pulsePositionMs;

                // Check if this note is assigned to this device
                const isAssigned = assignedNotes.some(note =>
                    Math.abs(note.startMs - pulsePositionMs) < 50 &&
                    note.deviceId === mySeat.id
                );

                if (isAssigned) {
                    // Schedule a callback at the pulse time
                    const now = Date.now() + serverOffset;
                    const delayMs = pulseTime - now - hardwareLag;

                    if (delayMs > 0) {
                        setTimeout(() => {
                            // This is when the ultrasonic pulse actually plays
                            const playTime = Date.now() + serverOffset;
                            lastPingSent = playTime;

                            // Add to pending detections
                            pendingPulseDetections.push({
                                playTime: playTime,
                                noteId: cue.metadata?.noteId
                            });

                            // Flash the screen for visual feedback
                            flashScreenForPulse();

                            console.log(`📡 Tuning pulse played at ${playTime}`);
                        }, delayMs);
                    }
                }
            }
        }

        function flashScreenForPulse() {
            // Visual feedback that this device played a pulse
            // Use the same illumination pattern as other notes
            const canvas = document.getElementById('stage-canvas');
            const ctx = canvas.getContext('2d');

            // White flash
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Fade out over 100ms
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 100);
        }

        // --- THE UNIFIED 30FPS RENDER LOOP ---
        function frame(now) {
            const delta = now - lastFrameTime;

            // Throttle to 30fps
            if (delta < FRAME_DURATION) {
                requestAnimationFrame(frame);
                return;
            }

            // Performance Watchdog Logic
            if (delta > 50) { // If a frame takes > 50ms (dropping significantly below 30fps)
                isLowPerf = true;
                db.ref(`devices/${mySeat.id}/performance`).update({ lowPerf: true, jitter: delta });
            }

            lastFrameTime = now;
            const serverNow = Date.now() + serverOffset;

            // Update movement indicator with countdown if movement is pending
            if (currentMovement && movementStartTime > serverNow) {
                const secondsToStart = ((movementStartTime - serverNow) / 1000).toFixed(1);
                document.getElementById('movement-indicator').innerText =
                    `🎭 ${currentMovement} (T-${secondsToStart}s)`;
            }

            // 1. Update Spatial Audio (The "Wash")
            activeAudioCues.forEach((cue, index) => {
                const elapsed = (serverNow - cue.startTime) / cue.duration;
                const t = Math.max(0, Math.min(1, elapsed));

                // Sine-based Ease-In-Out (SlowFastSlow)
                const easedT = -(Math.cos(Math.PI * t) - 1) / 2;

                // Interpolate Movement
                const curX = cue.originX + (cue.destX - cue.originX) * easedT;
                const curY = cue.originY + (cue.destY - cue.originY) * easedT;

                // Calculate Distance vs Radius
                const dist = Math.sqrt(Math.pow(mySeat.x - curX, 2) + Math.pow(mySeat.y - curY, 2));
                let intensity = 0;

                if (dist < cue.radius) {
                    // Linear Rolloff
                    intensity = 1 - (dist / cue.radius);
                }

                // Special handling for tuning mode - only play if this device is assigned to the current note
                if (calibrationMode && cue.metadata?.purpose === 'tuning_movement') {
                    // For tuning, we need to check if this moment corresponds to an assigned note
                    const currentTimeMs = serverNow - cue.startTime;
                    const isNoteTime = assignedNotes.some(note =>
                        Math.abs(currentTimeMs - note.startMs) < note.durationMs / 2
                    );

                    if (!isNoteTime) {
                        intensity = 0; // Mute if not this device's note
                    } else {
                        // Ramp up/down for the note
                        const note = assignedNotes.find(n =>
                            Math.abs(currentTimeMs - n.startMs) < n.durationMs / 2
                        );
                        if (note) {
                            const noteProgress = (currentTimeMs - note.startMs) / note.durationMs;
                            // Raised cosine ramp for smooth entry/exit
                            intensity *= (1 - Math.cos(noteProgress * Math.PI)) / 2;
                        }
                    }
                }

                // Special handling for test pulses - play at full volume only at the pulse moment
                if (cue.metadata?.purpose === 'seat_test' && cue.metadata?.seatId === mySeat.id) {
                    const currentTimeMs = serverNow - cue.startTime;
                    // The ultrasonic pulse is at 100ms into the file (50ms duration)
                    if (currentTimeMs >= 100 && currentTimeMs <= 150) {
                        // Full volume during the pulse
                        intensity = 1.0;
                    } else {
                        intensity = 0; // Silent otherwise
                    }
                }

                // Apply Gain with anti-click ramp (15ms)
                cue.gainNode.gain.setTargetAtTime(intensity * (cue.volume || 1), audioCtx.currentTime, 0.015);

                // Remove finished cues
                if (t >= 1) activeAudioCues.splice(index, 1);
            });

            // 2. Update Visuals (Only if not in Low Performance mode)
            if (!isLowPerf) {
                updateVisuals(serverNow);
            } else {
                // Clear canvas to black to save CPU
                const ctx = document.getElementById('stage-canvas').getContext('2d');
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            }

            requestAnimationFrame(frame);
        }

        function updateVisuals(serverNow) {
            const canvas = document.getElementById('stage-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            activeLightCues.forEach((cue, index) => {
                const elapsed = (serverNow - cue.startTime) / cue.duration;
                const t = Math.max(0, Math.min(1, elapsed));

                if (t >= 1) {
                    activeLightCues.splice(index, 1);
                    return;
                }

                // Draw spatial wash based on intensity
                const state = calculateSpatialState(cue, serverNow);
                ctx.fillStyle = `rgba(${cue.rgb}, ${state.intensity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });
        }

        // Helper for spatial logic shared between audio/visual
        function calculateSpatialState(cue, serverNow) {
            const elapsed = (serverNow - cue.startTime) / cue.duration;
            const t = Math.max(0, Math.min(1, elapsed));
            const easedT = -(Math.cos(Math.PI * t) - 1) / 2;
            const curX = cue.originX + (cue.destX - cue.originX) * easedT;
            const curY = cue.originY + (cue.destY - cue.originY) * easedT;
            const dist = Math.sqrt(Math.pow(mySeat.x - curX, 2) + Math.pow(mySeat.y - curY, 2));
            const intensity = (dist < cue.radius) ? (1 - (dist / cue.radius)) : 0;
            return { intensity, x: curX, y: curY };
        }

        // --- ASSET MANAGEMENT ---
        async function preloadAssets() {
            try {
                const response = await fetch('cues.json');
                const cues = await response.json();

                const loadTasks = Object.keys(cues).map(async key => {
                    const cue = cues[key];
                    if (cue.type === 'AUDIO') {
                        const res = await fetch(cue.file);
                        const arrayBuf = await res.arrayBuffer();
                        bufferCache[cue.file] = await audioCtx.decodeAudioData(arrayBuf);
                    }
                });

                await Promise.all(loadTasks);
                document.getElementById('asset-ind').className = 'indicator active';
                return true;
            } catch (e) {
                console.error("Asset Load Failure:", e);
                document.getElementById('asset-ind').className = 'indicator error';
            }
            return false;
        }

        // --- PERFORMANCE OVERLAY UPDATE ---
        function updatePerformanceOverlay() {
            const overlay = document.getElementById('performance-overlay');
            const fps = Math.round(1000 / (performance.now() - lastFrameTime));
            const lag = calibratedLag ? `${calibratedLag}ms` : '--';
            overlay.innerHTML = `FPS: ${fps} | Lag: ${lag} | ${isHappy ? '✅' : '🔄'}`;
        }

        // --- EVENT HANDLERS ---
        document.getElementById('ready-btn').onclick = async () => {
            // Wake Audio Hardware
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Start Render Loop
            requestAnimationFrame(frame);

            // 1. Listen for Show Cues
            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) {
                    if (cue.action === 'KILL') {
                        location.reload();
                    } else if (cue.action === 'GO') {
                        // Handle movement start signal
                        handleMovementStart(cue);
                    } else if (cue.type === 'TUNING_MOVEMENT') {
                        // Handle tuning movement specially
                        calibrationMode = true;
                        playSpatialCue(cue);
                    } else {
                        // Regular audio/visual cue
                        playSpatialCue(cue);
                    }
                }
            });

            // 2. Listen for Calibration Broadcast (Conductor Mic)
            db.ref('tuning/last_heard').on('value', snap => {
                const tHeard = snap.val();
                if (tHeard) processAcousticReturn(tHeard);
            });

            // 3. Listen for Personal Calibration Polling (Bach Sequence)
            db.ref(`tuning/active_poll/${mySeat.id}`).on('value', snap => {
                const noteAsset = snap.val();
                if (noteAsset) {
                    lastPingSent = Date.now() + serverOffset;
                    // Trigger note with ultrasound overlay (already baked into MP3)
                    playSpatialCue({
                        file: noteAsset,
                        startTime: lastPingSent,
                        duration: 1000,
                        originX: mySeat.x,
                        originY: mySeat.y,
                        radius: 1, // Fixed to device
                        rolloff: 'none'
                    });
                }
            });

            // 4. Initialize tuning schedule listener
            initTuningListener();
        };

        window.onload = async () => {
            syncClock();
            const idOk = await resolveIdentity();

            // Audio Context initialization requires user gesture,
            // so we wait for ready-btn.
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const assetsOk = await preloadAssets();

            if (idOk && assetsOk) {
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('system-msg').innerText = "System Ready. Please Enter.";
            }
        };

        // Resize Canvas on orientation change
        window.onresize = () => {
            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

    </script>
</body>
</html>
