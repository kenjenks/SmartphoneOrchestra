<!DOCTYPE html>
<!--
devicedist.html

Webapp for patron devices. Plays sounds and lightshow
in cues.json (as represented by the RTDBMS)
as commanded by timeline.json (as represented by the RTDBMS).

-->
<!DOCTYPE html>
<html lang="en">
<head>    <meta charset="UTF-8">
    <title>Smartphone Orchestra: Performer Node</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        #setup-screen { padding: 20px; max-width: 400px; }
        .checklist { text-align: left; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .btn-ready { padding: 20px 40px; font-size: 1.5rem; background: #007bff; color: #fff; border: none; border-radius: 50px; cursor: pointer; }
        #status { margin-top: 20px; font-family: monospace; color: #666; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Welcome to the Orchestra</h1>
        <div class="checklist">
            <label><input type="checkbox" id="chk-audio"> Silence Ringer / Max Volume</label>
            <label><input type="checkbox" id="chk-wifi"> Connected to Theater Wi-Fi</label>
        </div>
        <button id="ready-btn" class="btn-ready">I'M READY</button>
        <div id="status">INITIALIZING...</div>
    </div>

    <div id="show-screen" style="display:none;">
        <div id="performance-status">Awaiting Conductor...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
            messagingSenderId: "722537253165",
            appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx, masterGain, highPassFilter;
        let mySeat = { id: 'UNKNOWN', x: 0, y: 0 };
        let clockOffset = 0;
        const bufferCache = {};

        async function resolveIdentity() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || 'GUEST_' + Math.floor(Math.random()*1000);
            const urlX = params.get('x');
            const urlY = params.get('y');
            mySeat.id = id;

            if (urlX !== null && urlY !== null) {
                mySeat.x = parseFloat(urlX);
                mySeat.y = parseFloat(urlY);
            } else {
                const snap = await db.ref(`survey_results/${id}`).once('value');
                if (snap.exists()) {
                    mySeat.x = snap.val().x;
                    mySeat.y = snap.val().y;
                }
            }
            document.getElementById('status').innerText = `ID: ${mySeat.id} (Ready)`;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();

            if (mySeat.id.includes('PILLAR')) {
                masterGain.connect(audioCtx.destination);
            } else {
                highPassFilter = audioCtx.createBiquadFilter();
                highPassFilter.type = "highpass";
                highPassFilter.frequency.setValueAtTime(350, audioCtx.currentTime);
                masterGain.connect(highPassFilter).connect(audioCtx.destination);
            }
        }

        function playSpatialAudio(cue) {
            if (!audioCtx) return;

            let volume = 1.0;

            // Spatial Calculation
            if (cue.originX !== undefined && cue.radius !== undefined) {
                const dist = Math.sqrt(Math.pow(mySeat.x - cue.originX, 2) + Math.pow(mySeat.y - cue.originY, 2));

                if (dist > cue.radius) return; // Silent if outside radius

                const rolloff = cue.rolloff || "linear";

                if (rolloff === "linear") {
                    volume = 1 - (dist / cue.radius);
                } else if (rolloff === "inverse-square") {
                    // Inverse Square: Volume drops sharply. (dist+1) prevents division by zero at origin.
                    // Normalized so it reaches ~0 at the radius edge.
                    const intensity = 1 / Math.pow(dist + 1, 2);
                    const edgeIntensity = 1 / Math.pow(cue.radius + 1, 2);
                    volume = (intensity - edgeIntensity) / (1 - edgeIntensity);
                } else if (rolloff === "none") {
                    volume = 1.0;
                }
            }

            const scheduledStartTime = (cue.triggerTime + clockOffset) / 1000;
            const currentTime = audioCtx.currentTime;

            if (scheduledStartTime < currentTime - 0.5) return;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.connect(masterGain);

            if (cue.type === 'AUDIO' && bufferCache[cue.url]) {
                const source = audioCtx.createBufferSource();
                source.buffer = bufferCache[cue.url];
                source.connect(gainNode);
                source.start(Math.max(currentTime, scheduledStartTime));
            } else if (cue.type === 'OSCILLATOR') {
                const osc = audioCtx.createOscillator();
                osc.type = cue.waveform || 'sine';
                osc.frequency.setValueAtTime(cue.frequency || 440, audioCtx.currentTime);
                osc.connect(gainNode);
                osc.start(Math.max(currentTime, scheduledStartTime));
                osc.stop(Math.max(currentTime, scheduledStartTime) + (cue.duration || 1));
            }
        }

        function handleCue(cue) {
            if (cue.action === 'KILL') location.reload();
            if (cue.type === 'AUDIO' || cue.type === 'OSCILLATOR') {
                playSpatialAudio(cue);
            }
        }

        document.getElementById('ready-btn').onclick = async () => {
            const c1 = document.getElementById('chk-audio').checked;
            const c2 = document.getElementById('chk-wifi').checked;
            if (!c1 || !c2) return alert("Please complete the checklist.");

            await resolveIdentity();
            initAudio();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            db.ref(`devices/${mySeat.id}`).set({ ...mySeat, online: true, lastSeen: Date.now() });

            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();
                if (cue) handleCue(cue);
            });
        };

        db.ref('laptop/clock').on('value', snap => {
            if (snap.exists()) clockOffset = Date.now() - snap.val();
        });

        window.onload = resolveIdentity;
    </script>
</body>
</html>
