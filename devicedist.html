        db.ref('show/currentCue').on('value', async snap => {
            const cue = snap.val();
            if (!cue) return;
            if (cue.action === 'KILL') {
                log("💀 KILL signal");
                location.reload();
            } else if (cue.action === 'GO') {
                handleMovementStart(cue);
            } else if (cue.type === 'SPEAKER_CAL' && cue.instrument === 'oboe') {
                const nowWall = Date.now() + serverOffset;
                log(`📨 Oboe cue received at ${nowWall}, scheduled startTime=${cue.startTime}, delay=${(cue.startTime - nowWall).toFixed(1)}ms`, 'debug');
                if (mySeat.id === cue.targetSeat) {
                    // This device is the target – play the oboe
                    const oboeUrl = cue.audio_url;
                    if (!bufferCache[oboeUrl]) {
                        try {
                            const res = await fetch(oboeUrl);
                            const arrayBuf = await res.arrayBuffer();
                            bufferCache[oboeUrl] = await audioCtx.decodeAudioData(arrayBuf);
                        } catch (e) {
                            log(`❌ Failed to load oboe audio: ${e.message}`);
                            return;
                        }
                    }
                    const buffer = bufferCache[oboeUrl];
                    // Prime the hardware for oboe playback
                    await primeBuffer(buffer);
                    const startDelay = cue.startTime - nowWall - (currentSpeakerDelay || 0) - (myMicDelayMs || 0);
                    log(`🔊 Oboe playback startDelay=${startDelay.toFixed(1)}ms`, 'debug');
                    if (startDelay > 0 && startDelay < 30000) {
                        setTimeout(() => {
                            const source = audioCtx.createBufferSource();
                            source.buffer = buffer;
                            const gain = audioCtx.createGain();
                            gain.gain.value = MASTER_PLAYBACK_GAIN;
                            source.connect(gain).connect(masterGain || audioCtx.destination);
                            source.start(0);
                            log(`🎵 Oboe sequence playing (${cue.notes.length} notes)`);
                        }, startDelay);
                    } else if (startDelay > -5000) {  // Increased tolerance to 5 seconds
                        log(`⚠️ Oboe start is ${Math.round(-startDelay)}ms late, playing immediately`, 'warn');
                        const source = audioCtx.createBufferSource();
                        source.buffer = buffer;
                        const gain = audioCtx.createGain();
                        gain.gain.value = MASTER_PLAYBACK_GAIN;
                        source.connect(gain).connect(masterGain || audioCtx.destination);
                        source.start(0);
                        log(`🎵 Oboe sequence playing (${cue.notes.length} notes) - LATE`);
                    } else {
                        log(`❌ Oboe start is too late (${Math.round(-startDelay)}ms), skipping`, 'error');
                    }
                } else {
                    // Check if we are a neighbor of the target seat
                    const neighborSnap = await db.ref(`neighbor_map/${cue.targetSeat}`).once('value');
                    const neighbors = neighborSnap.val() || [];
                    log(`🔍 Neighbor check: mySeat=${mySeat.id}, targetNeighbors=${neighbors.join(',')}, amINeighbor=${neighbors.includes(mySeat.id)}`, 'debug');
                    if (neighbors.includes(mySeat.id)) {
                        log(`👂 Listening for oboe calibration from ${cue.targetSeat}`);
                        startListeningForOboe(cue);
                    }
                }
            }
        });
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    const initBtn = document.getElementById('init-permissions-btn');
    if (initBtn) {
        initBtn.onclick = async () => {
            log("🖱️ Button pressed");
            initBtn.disabled = true;
            const granted = await window.requestMicrophonePermission();
            if (granted) {
                log("✅ Mic granted");
                await setupMicrophone();
                if (audioCtx && audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                    log("🎛️ Audio context resumed");
                }
                if (mySeat && mySeat.id && assetsPreloaded) {
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('show-screen').style.display = 'block';
                    const canvas = document.getElementById('stage-canvas');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    await requestWakeLock();
                    requestAnimationFrame(frame);
                    initShowCueListener();
                    initTuningListener();
                    startHeartbeat();
                    log("🚀 Entered show mode");
                } else {
                    log("⚠️ Not ready: assets still loading?");
                    initBtn.disabled = false;
                    updateDeviceStatusDisplay();
                }
            } else {
                log("❌ Mic permission denied");
                initBtn.disabled = false;
            }
        };
    }

    window.onload = async () => {
        log("🚀 Loading...");
        try {
            await resolveIdentity();
            await loadNeighborMap();
            await loadTuningConfig();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = MASTER_PLAYBACK_GAIN;
            masterGain.connect(audioCtx.destination);
            await preloadAssets();
            await loadPillarData();

            // URL override for speaker/mic delays
            const urlParams = new URLSearchParams(window.location.search);
            const speakerParam = urlParams.get('speaker');
            const micParam = urlParams.get('mic');
            if (speakerParam !== null && micParam !== null) {
                const speaker = parseFloat(speakerParam);
                const mic = parseFloat(micParam);
                if (!isNaN(speaker) && !isNaN(mic)) {
                    currentSpeakerDelay = speaker;
                    myMicDelayMs = mic;
                    isHappy = true;
                    phase1Complete = true;
                    log(`🔧 Using URL overrides: speaker=${speaker}ms, mic=${mic}ms`);
                    saveCalibration();
                } else {
                    log(`⚠️ Invalid speaker/mic params: ${speakerParam}/${micParam}`);
                }
            } else {
                await loadStoredCalibration();
            }

            if (mySeat.id) initLogging();
            updateDeviceStatusDisplay();
            log("✅ Initialization complete");
        } catch (err) {
            log(`❌ Init error: ${err.message}`);
        }
    };

    window.onresize = () => {
        const canvas = document.getElementById('stage-canvas');
        if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    };
    window.addEventListener('beforeunload', () => { stopHeartbeat(); flushLogs(); });
</script>
</body>
</html>
