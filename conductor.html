<!DOCTYPE html>
<!--
conductor.html

Webapp for leading the SmartphoneOrchestra, sending cues
to patron devices over Firebase.

Includes Dynamic Tuning Mode for Bach "Jesu, Joy of Man's Desiring"
with real-time device discovery and spiral path generation.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra SM Conductor</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Controls */
        #control-panel { width: 350px; background: #252525; border-right: 1px solid #444; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        h2 { font-size: 1.1rem; color: #00ffcc; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Seat Map GUI */
        #map-container { flex-grow: 1; position: relative; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { background: #111; cursor: crosshair; }

        .btn {
            background: #444; color: white; border: none; padding: 10px 15px;
            margin: 5px 0; cursor: pointer; border-radius: 4px; font-weight: bold;
            transition: background 0.2s; width: 100%; text-align: left;
        }
        .btn:hover { background: #555; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: #00887a; }
        .btn-primary:hover { background: #00a896; }
        .btn-danger { background: #880e0e; }

        #detection-log {
            height: 150px; background: #000; font-family: monospace;
            font-size: 0.85rem; padding: 10px; overflow-y: auto; border: 1px solid #333;
            color: #00ffcc;
        }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-active { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .status-stale { background: #ffcc00; }
        .status-off { background: #555; }

        #bach-status { font-size: 0.8rem; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="section">
            <h2>System Health</h2>
            <div id="connection-status"><span class="status-dot status-off"></span>Firebase Disconnected</div>
            <div id="mic-status"><span class="status-dot status-off"></span>Mic Offline</div>
            <canvas id="fft-viz" width="300" height="60" style="margin-top:10px; border:1px solid #444;"></canvas>
        </div>

        <div class="section">
            <h2>Performance Registry</h2>
            <button class="btn btn-primary" id="load-config-btn">Load Seat Map (TSV)</button>
            <div id="registry-stats" style="margin-top:10px; font-size: 0.9rem;">
                Seats Loaded: <span id="count-seats">0</span><br>
                Active Devices: <span id="count-active">0</span>
            </div>
        </div>

        <div class="section">
            <h2>Bach Tuning Movement</h2>
            <button class="btn" id="load-bach-btn">Load Tuning Manifest</button>
            <div id="bach-status">Ready to initialize.</div>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button class="btn btn-primary" id="play-bach-btn" disabled>Play Bach</button>
                <button class="btn btn-danger" id="pause-bach-btn" disabled>Pause</button>
            </div>
            <button class="btn" id="reset-tuning-btn" style="margin-top:10px; font-size: 0.8rem;">Reset All Latencies</button>
        </div>

        <div class="section">
            <h2>Global Commands</h2>
            <button class="btn btn-danger" id="kill-all-btn">Emergency Reset (Refresh All)</button>
        </div>

        <div class="section">
            <h2>Detection Log</h2>
            <div id="detection-log">System initialized...</div>
        </div>
    </div>

    <div id="map-container">
        <canvas id="seat-map"></canvas>
    </div>

<script>
    // PROTECTED BLOCK: Firebase Configuration
    // Security restricted to authorized domains in Google Cloud Console
    const firebaseConfig = {
        apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
        authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
        databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
        projectId: "smartphoneorchestra-dwt",
        storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
        messagingSenderId: "722537253165",
        appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
    };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- STATE MANAGEMENT ---
        let seats = [];
        let activeDevices = {};
        let tuningManifest = null;
        let isBachPlaying = false;
        let audioCtx, analyser, dataArray;

        // FSK State Machine Constants
        const FREQ_HIGH = 19500;
        const FREQ_LOW = 19400;
        const SAMPLE_RATE = 44100;

        // --- SEAT MAP LOGIC ---
        async function loadSeatConfig() {
            try {
                // Fetching from Firebase Hosting root
                const response = await fetch('/seat_config.tsv');
                const text = await response.text();
                seats = text.split('\n').slice(1).map(line => {
                    const [id, x, y, section] = line.split('\t');
                    return { id, x: parseFloat(x), y: parseFloat(y), section };
                }).filter(s => s.id);

                document.getElementById('count-seats').innerText = seats.length;
                drawMap();
                logDetection(`Loaded ${seats.length} seats from TSV.`);
            } catch (e) {
                logDetection("Error loading seat_config.tsv: " + e.message);
            }
        }

        function drawMap() {
            const canvas = document.getElementById('seat-map');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 350;
            canvas.height = window.innerHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 50;
            const minX = Math.min(...seats.map(s => s.x));
            const maxX = Math.max(...seats.map(s => s.x));
            const minY = Math.min(...seats.map(s => s.y));
            const maxY = Math.max(...seats.map(s => s.y));

            seats.forEach(seat => {
                const screenX = padding + (seat.x - minX) / (maxX - minX) * (canvas.width - padding * 2);
                const screenY = padding + (seat.y - minY) / (maxY - minY) * (canvas.height - padding * 2);

                const status = activeDevices[seat.id] ? activeDevices[seat.id].status : 'OFFLINE';

                ctx.beginPath();
                ctx.arc(screenX, screenY, 6, 0, Math.PI * 2);

                if (status === 'READY') ctx.fillStyle = '#00ffcc';
                else if (status === 'CALIBRATING') ctx.fillStyle = '#ffcc00';
                else ctx.fillStyle = '#333';

                ctx.fill();

                if (seat.id.startsWith('PILLAR')) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.fillStyle = '#666';
                ctx.font = '8px Arial';
                ctx.fillText(seat.id, screenX - 10, screenY + 15);
            });
        }

        // --- BACH TUNING ORCHESTRATOR ---
        async function loadBachManifest() {
            try {
                const response = await fetch('/tuning_mode.json');
                tuningManifest = await response.json();

                document.getElementById('bach-status').innerHTML =
                    `Manifest Loaded: ${tuningManifest.piano_notes.length} notes.<br>` +
                    `Unique Assets: ${tuningManifest.metadata.unique_assets}`;

                document.getElementById('play-bach-btn').disabled = false;
                logDetection("Bach Manifest loaded successfully.");
            } catch (e) {
                logDetection("Error loading tuning_mode.json: " + e.message);
            }
        }

        async function syncBachToDatabase() {
            if (!tuningManifest) return;

            // Get currently active devices (including seeds)
            const activeSeatIds = Object.keys(activeDevices).filter(id => activeDevices[id].status !== 'OFFLINE');

            // Separate Pillars from Patrons
            const pillars = activeSeatIds.filter(id => id.startsWith('PILLAR_'));
            const patrons = activeSeatIds.filter(id => !id.startsWith('PILLAR_'));

            logDetection(`Orchestrating for ${patrons.length} patrons and ${pillars.length} pillars.`);

            const timeline = {};
            const startTime = Date.now() + 2000; // 2 second lead time

            // 1. Assign Pillar Beds (Continuous Strings)
            pillars.forEach(id => {
                // Map ID (PILLAR_FR) to registry keys
                let key = '';
                if (id.includes('_FR')) key = 'front_right';
                if (id.includes('_FL')) key = 'front_left';
                if (id.includes('_BR')) key = 'back_right';
                if (id.includes('_BL')) key = 'back_left';

                if (tuningManifest.pillars[key]) {
                    timeline[`cue_${id}_bed`] = {
                        targetSeat: id,
                        url: tuningManifest.pillars[key],
                        startTime: startTime,
                        action: 'PLAY_LOOP',
                        type: 'AUDIO'
                    };
                }
            });

            // 2. Distribute Flute Melody (Massacred Notes)
            if (patrons.length > 0) {
                tuningManifest.piano_notes.forEach((note, index) => {
                    // DEGENERATE CASE HANDLED: % operator cycles through available devices
                    const targetId = patrons[index % patrons.length];

                    timeline[`note_${index}`] = {
                        targetSeat: targetId,
                        url: note.url,
                        startTime: startTime + note.ms_offset,
                        action: 'PLAY_ONCE',
                        type: 'AUDIO',
                        noteId: note.id
                    };
                });
            } else {
                logDetection("WARNING: No patron/seed devices active for melody.");
            }

            // Upload the Movement to the RTDB
            await db.ref('show/timeline').set(timeline);
            await db.ref('show/currentCue').set({
                action: 'START_BACH',
                startTime: startTime,
                totalNotes: tuningManifest.piano_notes.length
            });

            isBachPlaying = true;
            document.getElementById('pause-bach-btn').disabled = false;
        }

        // --- AUDIO ENGINE ---
        async function initMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                document.getElementById('mic-status').innerHTML = '<span class="status-dot status-active"></span>Mic Listening';
                drawFFT();
                logDetection("Microphone initialized for FSK detection.");
            } catch (e) {
                logDetection("Mic Access Denied: " + e.message);
            }
        }

        function drawFFT() {
            const vCtx = document.getElementById('fft-viz').getContext('2d');
            analyser.getByteFrequencyData(dataArray);
            vCtx.fillStyle = '#000';
            vCtx.fillRect(0,0,300,60);
            vCtx.fillStyle = '#00ffcc';
            for(let i=0; i<dataArray.length; i++) {
                vCtx.fillRect(i, 60 - dataArray[i]/4, 1, dataArray[i]/4);
            }
            requestAnimationFrame(drawFFT);
        }

        // --- FIREBASE LISTENERS ---
        db.ref('.info/connected').on('value', snap => {
            const el = document.getElementById('connection-status');
            if (snap.val() === true) {
                el.innerHTML = '<span class="status-dot status-active"></span>Firebase Connected';
            } else {
                el.innerHTML = '<span class="status-dot status-off"></span>Firebase Disconnected';
            }
        });

        db.ref('devices').on('value', snap => {
            activeDevices = snap.val() || {};
            document.getElementById('count-active').innerText = Object.keys(activeDevices).length;
            drawMap();
        });

        // --- UI HANDLERS ---
        document.getElementById('load-config-btn').onclick = loadSeatConfig;
        document.getElementById('load-bach-btn').onclick = loadBachManifest;

        document.getElementById('play-bach-btn').onclick = async () => {
            if (!audioCtx) await initMicrophone();
            syncBachToDatabase();
        };

        document.getElementById('pause-bach-btn').onclick = () => {
            db.ref('show/currentCue/action').set('PAUSE');
            isBachPlaying = false;
            logDetection("Bach Movement Paused.");
        };

        document.getElementById('kill-all-btn').onclick = () => {
            if(confirm("Refresh all patron devices? This will stop all movements.")) {
                db.ref('show/currentCue').set({ action: 'KILL', startTime: Date.now() });
                db.ref('show/timeline').remove();
            }
        };

        document.getElementById('reset-tuning-btn').onclick = () => {
            if(confirm("Reset all stored hardware latencies?")) {
                Object.keys(activeDevices).forEach(id => {
                    db.ref(`devices/${id}/latency`).set(0);
                    db.ref(`devices/${id}/status`).set('CALIBRATING');
                });
            }
        };

        function logDetection(msg) {
            const log = document.getElementById('detection-log');
            const now = new Date().toLocaleTimeString().split(' ')[0];
            log.innerHTML = `[${now}] ${msg}<br>` + log.innerHTML;
        }

        window.onload = () => {
            loadSeatConfig();
        };

        window.onresize = drawMap;

    </script>
</body>
</html>
