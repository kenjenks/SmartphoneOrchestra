<!DOCTYPE html>
<!--
seat_survey.html

Webapp for crew to scan the QR code on each seat bag
to determine and record the XY location in the theater.
Can use sonic beacons to determine XY location or
operator can manually enter the XY location from laser
rangefinder or yardstick, expressed as meters from the
front left corner of the orchestra section in the house.

This version does not map XY locations of balcony, box,
or mezzanine seats.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orchestra Surveyor: Production</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; }
        #res-x, #res-y, #res-delay { font-family: monospace; font-size: 1.2rem; color: #00ff00; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; background: #111; }
        button { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; }
        .btn-main { background: #007bff; color: white; }
        .btn-qr { background: #6f42c1; color: white; }
        #log { height: 150px; overflow-y: auto; background: #000; font-family: monospace; font-size: 0.75rem; padding: 10px; color: #0f0; border: 1px solid #222; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Identify Seat or Pillar</h2>
        <div id="reader"></div>
        <button class="btn-qr" id="qr-toggle-btn" onclick="toggleScanner()">SCAN QR CODE</button>
        <div id="current-id-display" style="margin-top:10px; font-weight:bold; color:#6f42c1;">No ID Scanned</div>
    </div>

    <div class="card">
        <h2>2. Acoustic Map & Calibrate</h2>
        <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Calculated X (m)</span><span id="res-x">0.00</span></div>
            <div class="stat-item"><span class="stat-label">Calculated Y (m)</span><span id="res-y">0.00</span></div>
            <div class="stat-item"><span class="stat-label">Mic Delay (ms)</span><span id="res-delay">20.00</span></div>
            <div class="stat-item"><span class="stat-label">Status</span><span id="status-text" style="color:#888;">READY</span></div>
        </div>
        <button class="btn-main" id="survey-btn" onclick="startAcousticSurvey()">START SURVEY SCAN</button>
    </div>

    <div id="log">Ready. Scan a Pillar first to calibrate mic delay.</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.appspot.com",
            messagingSenderId: "389274027412",
            appId: "1:389274027412:web:681498263948b89412"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode;
        let currentSeatId = null;
        let micDelay = 20.0; // Default estimate
        let pillarConfigs = {};
        let speedOfSound = 344.0;

        [cite_start]// Load Pillar XY locations from database [cite: 1]
        db.ref('active_pillars').on('value', snap => {
            const data = snap.val();
            if (data) {
                pillarConfigs = data;
                speedOfSound = data.speed_of_sound || 344.0;
            }
        });

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function toggleScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
                document.getElementById('qr-toggle-btn').innerText = "STOP SCANNER";
            } else {
                html5QrCode.stop().then(() => { html5QrCode = null; });
                document.getElementById('qr-toggle-btn').innerText = "SCAN QR CODE";
            }
        }

        function onScanSuccess(decodedText) {
            try {
                const url = new URL(decodedText);
                currentSeatId = url.searchParams.get("id");
                document.getElementById('current-id-display').innerText = `Target: ${currentSeatId}`;
                log(`Scanned ID: ${currentSeatId}`);
            } catch(e) {
                log("Invalid QR Data.");
            }
        }

        async function startAcousticSurvey() {
            if (!currentSeatId) return alert("Scan a Seat or Pillar QR first!");

            document.getElementById('status-text').innerText = "LISTENING...";
            log("Starting acoustic measurements...");

            const measurements = await captureChirps(); // Assumed helper for FFT detection

            // Is this a calibration scan?
            if (pillarConfigs[currentSeatId]) {
                calibrateMic(measurements);
            } else {
                calculatePosition(measurements);
            }
        }

        function calibrateMic(measurements) {
            const targetPillar = pillarConfigs[currentSeatId];
            log(`Calibrating against ${currentSeatId} at (${targetPillar.x}, ${targetPillar.y})`);

            let totalDelay = 0;
            let count = 0;

            Object.keys(measurements).forEach(pid => {
                const p = pillarConfigs[pid];
                if (!p) return;

                [cite_start]// Known distance between surveyor (at targetPillar) and the chirping pillar (p) [cite: 1]
                const dist = Math.sqrt(Math.pow(targetPillar.x - p.x, 2) + Math.pow(targetPillar.y - p.y, 2));
                const theoreticalTravelTime = (dist / speedOfSound) * 1000; // ms

                // Measured time - theoretical time = internal processing delay
                const measuredTime = measurements[pid]; // ms from chip trigger
                const derivedDelay = measuredTime - theoreticalTravelTime;

                totalDelay += derivedDelay;
                count++;
            });

            if (count > 0) {
                micDelay = totalDelay / count;
                document.getElementById('res-delay').innerText = micDelay.toFixed(2);
                log(`Recalibrated! New Mic Delay: ${micDelay.toFixed(2)}ms`);
            }
        }

        function calculatePosition(measurements) {
            let correctedDists = {};
            Object.keys(measurements).forEach(pid => {
                const travelTime = measurements[pid] - micDelay;
                correctedDists[pid] = (travelTime / 1000) * speedOfSound;
            });

            // Perform trilateration logic
            const pos = trilaterate(correctedDists);
            document.getElementById('res-x').innerText = pos.x.toFixed(2);
            document.getElementById('res-y').innerText = pos.y.toFixed(2);

            [cite_start]// Save to database [cite: 1]
            db.ref(`survey_results/${currentSeatId}`).set({
                x: pos.x,
                y: pos.y,
                status: "SURVEYED",
                timestamp: Date.now()
            });
            log(`Seat ${currentSeatId} saved at X:${pos.x} Y:${pos.y}`);
        }

        // --- STUB HELPERS FOR SIMULATION ---
        async function captureChirps() {
            [cite_start]// In production, this uses AudioContext/FFT to detect chirp arrivals [cite: 1]
            return new Promise(res => setTimeout(() => {
                res({ "PILLAR_FL": 50, "PILLAR_FR": 85, "PILLAR_BL": 120 });
            }, 2000));
        }

        function trilaterate(dists) {
            // Simplified centroid trilateration
            return { x: 5.2, y: 10.4 };
        }
    </script>
</body>
</html>
