<!DOCTYPE html>
<!--
seat_survey.html

Webapp for crew to scan the QR code on each seat bag
to determine and record the XY location in the theater.
Can use sonic beacons to determine XY location or
operator can manually enter the XY location from laser
rangefinder or yardstick, expressed as meters from the
front left corner of the orchestra section in the house.

This version does not map XY locations of balcony, box,
or mezzanine seats.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra Surveyor</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }

        /* Pillar Status Lights */
        .pillar-monitor { display: flex; justify-content: space-between; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .pillar-led { text-align: center; flex: 1; }
        .led-dot { width: 12px; height: 12px; background: #400; border-radius: 50%; display: inline-block; margin-bottom: 5px; box-shadow: 0 0 5px rgba(0,0,0,1); transition: background 0.2s, box-shadow 0.2s; }
        .led-dot.active { background: #0f0; box-shadow: 0 0 10px #0f0; }
        .led-dot.inactive { background: #f00; box-shadow: 0 0 10px #f00; }
        .pillar-label { font-size: 0.6rem; color: #888; display: block; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; }
        #res-x, #res-y, #res-delay, #cur-x, #cur-y { font-family: monospace; font-size: 1.2rem; color: #00ff00; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; background: #111; }
        button { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; }
        .btn-main { background: #007bff; color: white; }
        .btn-qr { background: #6f42c1; color: white; }
        #log { height: 120px; overflow-y: auto; background: #000; font-family: monospace; font-size: 0.75rem; padding: 10px; color: #0f0; border: 1px solid #222; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Identify Target (Seat/Pillar)</h2>
        <div id="reader"></div>
        <button class="btn-qr" id="qr-toggle-btn" onclick="toggleScanner()">SCAN QR CODE</button>
        <div id="current-id-display" style="margin-top:10px; font-weight:bold; color:#6f42c1; text-align:center;">No ID Scanned</div>
    </div>

    <div class="card">
        <h2>2. Acoustic Environment & XY</h2>

        <div class="pillar-monitor">
            <div class="pillar-led"><div id="led-PILLAR_FL" class="led-dot"></div><span class="pillar-label">FL</span></div>
            <div class="pillar-led"><div id="led-PILLAR_FR" class="led-dot"></div><span class="pillar-label">FR</span></div>
            <div class="pillar-led"><div id="led-PILLAR_BL" class="led-dot"></div><span class="pillar-label">BL</span></div>
            <div class="pillar-led"><div id="led-PILLAR_BR" class="led-dot"></div><span class="pillar-label">BR</span></div>
        </div>

        <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Device X (m)</span><span id="cur-x">?</span></div>
            <div class="stat-item"><span class="stat-label">Device Y (m)</span><span id="cur-y">?</span></div>
            <div class="stat-item"><span class="stat-label">Mic Delay (ms)</span><span id="res-delay">20.00</span></div>
            <div class="stat-item"><span class="stat-label">Status</span><span id="status-text" style="color:#888;">IDLE</span></div>
        </div>

        <button class="btn-main" id="survey-btn" onclick="startAcousticSurvey()">START SURVEY SCAN</button>
    </div>

    <div id="log">Ready. Scan a Pillar first to calibrate.</div>

    <script>
        // Firebase Config (Replace with your actual keys)
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.appspot.com",
            messagingSenderId: "389274027412",
            appId: "1:389274027412:web:681498263948b89412"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode;
        let currentSeatId = null;
        let micDelay = 20.0;
        let pillarConfigs = {};
        let speedOfSound = 344.0;
        let deviceXY = { x: null, y: null };

        // Real-time listener for Pillar positions
        db.ref('active_pillars').on('value', snap => {
            const data = snap.val();
            if (data) {
                pillarConfigs = data;
                speedOfSound = data.speed_of_sound || 344.0;
            }
        });

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function updatePillarLights(measurements) {
            // Set all to inactive first
            ["PILLAR_FL", "PILLAR_FR", "PILLAR_BL", "PILLAR_BR"].forEach(id => {
                document.getElementById(`led-${id}`).className = "led-dot inactive";
            });

            // Light up those we actually heard
            Object.keys(measurements).forEach(id => {
                const led = document.getElementById(`led-${id}`);
                if (led) led.className = "led-dot active";
            });
        }

        function toggleScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
                document.getElementById('qr-toggle-btn').innerText = "STOP SCANNER";
            } else {
                html5QrCode.stop().then(() => { html5QrCode = null; });
                document.getElementById('qr-toggle-btn').innerText = "SCAN QR CODE";
            }
        }

        function onScanSuccess(decodedText) {
            log(`Raw Scan: ${decodedText}`); // See exactly what was read
            try {
                const url = new URL(decodedText);
                currentSeatId = url.searchParams.get("id");
                document.getElementById('current-id-display').innerText = `TARGET: ${currentSeatId}`;
                log(`Locked Target: ${currentSeatId}`);
            } catch(e) { log("Invalid QR."); }
        }

        async function startAcousticSurvey() {
            if (!currentSeatId) return alert("Scan a Seat or Pillar QR first!");

            document.getElementById('status-text').innerText = "LISTENING";
            log("Opening microphone...");

            // captureChirps returns an object: { pillarId: arrivalTimeMs }
            const measurements = await captureChirps();
            updatePillarLights(measurements);

            if (pillarConfigs[currentSeatId]) {
                calibrateDevice(measurements);
            } else {
                surveySeat(measurements);
            }
            document.getElementById('status-text').innerText = "DONE";
        }

        function calibrateDevice(measurements) {
            const pLoc = pillarConfigs[currentSeatId];
            deviceXY = { x: pLoc.x, y: pLoc.y }; // Device is physically at this pillar

            document.getElementById('cur-x').innerText = deviceXY.x.toFixed(2);
            document.getElementById('cur-y').innerText = deviceXY.y.toFixed(2);

            let delays = [];
            Object.keys(measurements).forEach(pid => {
                if (pid === currentSeatId) return; // Don't calibrate against yourself
                const p = pillarConfigs[pid];
                if (!p) return;

                const dist = Math.sqrt(Math.pow(deviceXY.x - p.x, 2) + Math.pow(deviceXY.y - p.y, 2));
                const theoreticalTime = (dist / speedOfSound) * 1000;
                delays.push(measurements[pid] - theoreticalTime);
            });

            if (delays.length > 0) {
                micDelay = delays.reduce((a, b) => a + b) / delays.length;
                document.getElementById('res-delay').innerText = micDelay.toFixed(2);
                log(`RECALIBRATED: Mic delay is ${micDelay.toFixed(2)}ms`);
            }
        }

        function surveySeat(measurements) {
            let dists = {};
            Object.keys(measurements).forEach(pid => {
                const travelTime = measurements[pid] - micDelay;
                dists[pid] = (travelTime / 1000) * speedOfSound;
            });

            const pos = trilaterate(dists);

            db.ref(`survey_results/${currentSeatId}`).set({
                x: pos.x, y: pos.y, status: "SURVEYED", timestamp: Date.now()
            });

            log(`SAVED: Seat ${currentSeatId} at (${pos.x}, ${pos.y})`);
        }

        // --- MOCK ACOUSTIC LOGIC (Integrate your real FFT here) ---
        async function captureChirps() {
            return new Promise(res => {
                setTimeout(() => {
                    res({ "PILLAR_FL": 45, "PILLAR_FR": 78, "PILLAR_BL": 110 });
                }, 1500);
            });
        }

        function trilaterate(dists) {
            // Simplified return for prototype UI
            return { x: 4.5, y: 12.2 };
        }
    </script>
</body>
</html>
