<!DOCTYPE html>
<!--
seat_survey.html

Webapp for crew to scan the QR code on each seat bag
to determine and record the XY location in the theater.
Can use sonic beacons to determine XY location or
operator can manually enter the XY location from laser
rangefinder or yardstick, expressed as meters from the
front left corner of the orchestra section in the house.

This version does not map XY locations of balcony, box,
or mezzanine seats.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra Surveyor</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }

        .mode-selector { display: flex; background: #333; border-radius: 8px; margin-bottom: 15px; padding: 5px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; background: transparent; color: #888; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: #007bff; color: white; }

        .pillar-monitor { display: flex; justify-content: space-between; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .led-dot { width: 12px; height: 12px; background: #400; border-radius: 50%; display: inline-block; margin-bottom: 5px; }
        .led-dot.active { background: #0f0; box-shadow: 0 0 10px #0f0; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; }
        button { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; }
        .btn-main { background: #007bff; color: white; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; }
        #res-delay, #cur-x, #cur-y { font-family: monospace; font-size: 1.2rem; color: #00ff00; }

        #log { height: 120px; overflow-y: auto; background: #000; font-family: monospace; font-size: 0.75rem; padding: 10px; color: #0f0; border: 1px solid #222; margin-top: 10px; }
        input[type="number"] { background: #000; color: #0f0; border: 1px solid #444; padding: 8px; width: 60px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Identification</h2>
        <div class="mode-selector">
            <button id="btn-mode-acoustic" class="mode-btn active" onclick="setMode('acoustic')">ACOUSTIC</button>
            <button id="btn-mode-manual" class="mode-btn" onclick="setMode('manual')">MANUAL XY</button>
        </div>
        <div id="reader"></div>
        <button id="qr-toggle-btn" style="background:#6f42c1; color:white;" onclick="toggleScanner()">START SCANNER</button>
        <div id="current-id-display" style="margin-top:10px; font-weight:bold; color:#00ff00; text-align:center;">READY TO SCAN</div>
    </div>

    <div class="card">
        <h2>2. Survey</h2>
        <div id="view-acoustic">
            <div class="pillar-monitor">
                <div style="text-align:center;"><div id="led-PILLAR_FL" class="led-dot"></div><br><small>FL</small></div>
                <div style="text-align:center;"><div id="led-PILLAR_FR" class="led-dot"></div><br><small>FR</small></div>
                <div style="text-align:center;"><div id="led-PILLAR_BL" class="led-dot"></div><br><small>BL</small></div>
                <div style="text-align:center;"><div id="led-PILLAR_BR" class="led-dot"></div><br><small>BR</small></div>
            </div>
            <button class="btn-main" onclick="startAcousticSurvey()">START ACOUSTIC SCAN</button>
        </div>
        <div id="view-manual" style="display:none; text-align:center;">
            <div style="margin-bottom:10px;">
                X: <input type="number" id="man-x" step="0.01">
                Y: <input type="number" id="man-y" step="0.01">
            </div>
            <button style="background:#28a745; color:white;" onclick="saveManualXY()">SAVE MANUAL XY</button>
        </div>
        <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Device X (m)</span><span id="cur-x">?</span></div>
            <div class="stat-item"><span class="stat-label">Device Y (m)</span><span id="cur-y">?</span></div>
            <div class="stat-item"><span class="stat-label">Mic Delay (ms)</span><span id="res-delay">20.00</span></div>
        </div>
    </div>

    <div id="log">Console initialized.</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode, audioCtx, analyser, currentSeatId = null;
        let isManualMode = false, micDelay = 20.0, lastScanTime = 0;
        let pillarConfigs = {}, speedOfSound = 344.0;
        const CHIRP_THRESHOLD = 150;

        db.ref('active_pillars').on('value', snap => {
            const data = snap.val();
            if(data) {
                pillarConfigs = data;
                speedOfSound = data.speed_of_sound || 344.0;
            }
        });

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function setMode(mode) {
            isManualMode = (mode === 'manual');
            document.getElementById('btn-mode-acoustic').classList.toggle('active', !isManualMode);
            document.getElementById('btn-mode-manual').classList.toggle('active', isManualMode);
            document.getElementById('view-acoustic').style.display = isManualMode ? 'none' : 'block';
            document.getElementById('view-manual').style.display = isManualMode ? 'block' : 'none';
        }

        function toggleScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
                document.getElementById('qr-toggle-btn').innerText = "STOP SCANNER";
            } else {
                html5QrCode.stop().then(() => { html5QrCode = null; });
                document.getElementById('qr-toggle-btn').innerText = "START SCANNER";
            }
        }

        function onScanSuccess(decodedText) {
            if (Date.now() - lastScanTime < 3000) return;
            lastScanTime = Date.now();
            try {
                const url = new URL(decodedText);
                currentSeatId = url.searchParams.get("id");
                document.getElementById('current-id-display').innerText = `LOCKED: ${currentSeatId}`;
                log(`Locked Target: ${currentSeatId}`);
                if(isManualMode && pillarConfigs[currentSeatId]) {
                    document.getElementById('man-x').value = pillarConfigs[currentSeatId].x;
                    document.getElementById('man-y').value = pillarConfigs[currentSeatId].y;
                }
            } catch(e) { log("QR Error."); }
        }

        async function captureChirps() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            return new Promise((resolve) => {
                const results = {};
                const startTime = performance.now();
                const sampleRate = audioCtx.sampleRate;
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                const check = () => {
                    analyser.getByteFrequencyData(dataArray);
                    Object.entries(pillarConfigs).forEach(([pid, cfg]) => {
                        if (results[pid] || !cfg.freq) return;
                        const bin = Math.round(cfg.freq / (sampleRate / analyser.fftSize));
                        if (dataArray[bin] > CHIRP_THRESHOLD) {
                            results[pid] = (performance.now() - startTime);
                            document.getElementById(`led-${pid}`).classList.add('active');
                            log(`Heard ${pid} at ${results[pid].toFixed(1)}ms`);
                        }
                    });
                    if (Object.keys(results).length === 4 || (performance.now() - startTime) > 3000) resolve(results);
                    else requestAnimationFrame(check);
                };
                requestAnimationFrame(check);
            });
        }

        /**
         * Robust solver that handles 2, 3, or 4 pillars.
         * For 2 pillars, it uses the theater boundaries to resolve the mirror-point.
         */
        function solveXY(measurements) {
            let points = [];
            let minX = 0, maxX = 0, minY = 0, maxY = 0;

            Object.entries(pillarConfigs).forEach(([pid, cfg], idx) => {
                if (measurements[pid]) {
                    const dist = ((measurements[pid] - micDelay) / 1000) * speedOfSound;
                    points.push({ x: cfg.x, y: cfg.y, r: dist });
                }
                // Establish theater boundaries
                if (idx === 0) { minX = maxX = cfg.x; minY = maxY = cfg.y; }
                else {
                    minX = Math.min(minX, cfg.x); maxX = Math.max(maxX, cfg.x);
                    minY = Math.min(minY, cfg.y); maxY = Math.max(maxY, cfg.y);
                }
            });

            if (points.length < 2) return null;

            let bestX = 0, bestY = 0, minError = Infinity;

            // Define search bounds slightly larger than the pillar box
            const buffer = 2.0;
            const startX = minX - buffer, endX = maxX + buffer;
            const startY = minY - buffer, endY = maxY + buffer;

            // Grid search optimization
            for (let tx = startX; tx <= endX; tx += 0.25) {
                for (let ty = startY; ty <= endY; ty += 0.25) {
                    let err = 0;
                    points.forEach(p => {
                        let d = Math.sqrt((tx - p.x)**2 + (ty - p.y)**2);
                        err += Math.abs(d - p.r);
                    });

                    // Boundary penalty: favor points inside the theater box
                    const inside = (tx >= minX && tx <= maxX && ty >= minY && ty <= maxY);
                    let finalErr = inside ? err : err * 5.0;

                    if (finalErr < minError) {
                        minError = finalErr;
                        bestX = tx; bestY = ty;
                    }
                }
            }
            return { x: bestX, y: bestY };
        }

        async function startAcousticSurvey() {
            if (!currentSeatId) return alert("Scan QR first!");
            ["PILLAR_FL", "PILLAR_FR", "PILLAR_BL", "PILLAR_BR"].forEach(id => {
                document.getElementById(`led-${id}`).classList.remove('active');
            });

            const measurements = await captureChirps();

            if (pillarConfigs[currentSeatId]) {
                calibrate(measurements);
            } else {
                const pos = solveXY(measurements);
                if (pos) {
                    document.getElementById('cur-x').innerText = pos.x.toFixed(2);
                    document.getElementById('cur-y').innerText = pos.y.toFixed(2);
                    await db.ref(`survey_results/${currentSeatId}`).set({ ...pos, status: "ACOUSTIC", timestamp: Date.now() });
                    log(`SAVED: (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)})`);
                } else {
                    log("ERROR: Need at least 2 pillars.");
                }
            }
        }

        function calibrate(measurements) {
            const me = pillarConfigs[currentSeatId];
            let totalDelay = 0, count = 0;
            Object.entries(measurements).forEach(([pid, time]) => {
                if (pid === currentSeatId) return;
                const p = pillarConfigs[pid];
                const theoreticalTime = (Math.sqrt((me.x - p.x)**2 + (me.y - p.y)**2) / speedOfSound) * 1000;
                totalDelay += (time - theoreticalTime);
                count++;
            });
            if (count > 0) {
                micDelay = totalDelay / count;
                document.getElementById('res-delay').innerText = micDelay.toFixed(2);
                log(`CALIBRATED: Delay ${micDelay.toFixed(1)}ms`);
            }
        }

        async function saveManualXY() {
            if (!currentSeatId) return alert("Scan QR first!");
            const x = parseFloat(document.getElementById('man-x').value);
            const y = parseFloat(document.getElementById('man-y').value);
            await db.ref(`survey_results/${currentSeatId}`).set({ x, y, status: "MANUAL", timestamp: Date.now() });
            log(`MANUAL SAVE: (${x}, ${y})`);
        }
    </script>
</body>
</html>
