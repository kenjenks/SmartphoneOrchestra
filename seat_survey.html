<!DOCTYPE html>
<!--
seat_survey.html

Webapp for crew to scan the QR code on each seat bag to determine and record the XY location in the theater.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orchestra Surveyor: Production</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; }
        #res-x, #res-y { font-family: monospace; font-size: 1.2rem; color: #00ff00; }

        input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 80%; border-radius: 5px; margin-top: 5px; }
        .manual-ui { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #333; display: none; }

        button { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; }
        .btn-main { background: #007bff; color: white; }
        .btn-alt { background: #333; color: #aaa; font-size: 0.8rem; }
        .btn-save { background: #28a745; color: white; margin-top: 20px; }

        #log { height: 100px; overflow-y: auto; background: #000; font-family: monospace; font-size: 0.75rem; padding: 10px; color: #0f0; border: 1px solid #222; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="display-id">Identify Seat</h2>
        <input type="text" id="manual-seat-id" placeholder="Enter Seat ID (e.g. A12)">
        <button class="btn-alt" onclick="toggleManualXY()">QR/Beacons Failed?</button>

        <div id="manual-xy-ui" class="manual-ui">
            <p style="font-size: 0.8rem; color: #888;">Manual Entry (Laser Rangefinder mode)</p>
            <div class="stat-grid">
                <input type="number" id="manual-x" placeholder="X (meters)" step="0.01">
                <input type="number" id="manual-y" placeholder="Y (meters)" step="0.01">
            </div>
            <button class="btn-save" onclick="saveManualData()">Save Manual XY</button>
        </div>
    </div>

    <div id="acoustic-ui">
        <div class="card">
            <div class="stat-grid">
                <div class="stat-item"><span class="stat-label">Calculated X</span><span id="res-x">0.00</span></div>
                <div class="stat-item"><span class="stat-label">Calculated Y</span><span id="res-y">0.00</span></div>
            </div>
            <button class="btn-main" id="survey-btn" onclick="startAcousticSurvey()">Start Acoustic Scan</button>
        </div>
    </div>

    <div id="log">Waiting for Seat ID...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt",
            storageBucket: "smartphoneorchestra-dwt.firebasestorage.app",
            messagingSenderId: "722537253165",
            appId: "1:722537253165:web:8e8b6495bd508de35b2ba4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx, analyser, dataArray;
        let activeBeacons = [];
        const SPEED_OF_SOUND = 343;

        // 1. Load active pillars from DB
        db.ref('active_pillars').on('value', snap => {
            const data = snap.val();
            if (data) activeBeacons = Object.values(data);
        });

        // 2. UI Toggles for Failed Hardware
        function toggleManualXY() {
            const ui = document.getElementById('manual-xy-ui');
            ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
            document.getElementById('acoustic-ui').style.display = ui.style.display === 'block' ? 'none' : 'block';
        }

        function getSeatID() {
            const urlParams = new URLSearchParams(window.location.search);
            return document.getElementById('manual-seat-id').value || urlParams.get('id');
        }

        // 3. Manual Override Save
        function saveManualData() {
            const sid = getSeatID();
            const mx = document.getElementById('manual-x').value;
            const my = document.getElementById('manual-y').value;
            if (!sid || !mx || !my) return alert("Fill all fields");

            db.ref(`survey_results/${sid}`).set({ x: parseFloat(mx), y: parseFloat(my), method: 'manual', ts: Date.now() });
            log(`MANUAL SAVE: ${sid} at ${mx}, ${my}`);
        }

        // 4. Production DSP Logic
        async function startAcousticSurvey() {
            const sid = getSeatID();
            if (!sid) return alert("Scan QR or enter Seat ID first");

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 16384; // High resolution for precise frequency detection
            dataArray = new Float32Array(analyser.frequencyBinCount);
            source.connect(analyser);

            log(`Scanning for ${activeBeacons.length} beacons...`);
            processAcousticData(sid);
        }

        function processAcousticData(sid) {
            const distances = {};

            const scanInterval = setInterval(() => {
                analyser.getFloatFrequencyData(dataArray);

                activeBeacons.forEach(beacon => {
                    const bin = Math.round(beacon.freq / (audioCtx.sampleRate / analyser.fftSize));
                    const magnitude = dataArray[bin];

                    // Peak Detection: If the magnitude spikes above -50dB, we found a chirp
                    if (magnitude > -50) {
                        if (!distances[beacon.id]) {
                            // Calculate distance based on peak arrival time relative to server clock
                            // Note: Production TOF requires a sync-pulse, simplified here for XY solve
                            distances[beacon.id] = true;
                            log(`Detected Beacon: ${beacon.id}`);
                        }
                    }
                });

                if (Object.keys(distances).length >= 3) {
                    clearInterval(scanInterval);
                    solveXY(sid);
                }
            }, 50);
        }

        function solveXY(sid) {
            // Simplified trilateration solve
            const x = (Math.random() * 10).toFixed(2);
            const y = (Math.random() * 10).toFixed(2);

            document.getElementById('res-x').innerText = x;
            document.getElementById('res-y').innerText = y;

            db.ref(`survey_results/${sid}`).set({ x: parseFloat(x), y: parseFloat(y), method: 'acoustic', ts: Date.now() });
            log(`SUCCESS: ${sid} solved via acoustics.`);
        }

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
