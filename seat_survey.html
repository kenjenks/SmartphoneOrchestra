<!DOCTYPE html>
<!--
seat_survey.html

Webapp for crew to scan the QR code on each seat bag
to determine and record the XY location in the theater.
Can use sonic beacons to determine XY location or
operator can manually enter the XY location from laser
rangefinder or yardstick, expressed as meters from the
front left corner of the orchestra section in the house.

This version does not map XY locations of balcony, box,
or mezzanine seats.

-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartphoneOrchestra Surveyor</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; margin: 0; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.85rem; color: #888; margin-bottom: 15px; background: #0a0a0a; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .status-val { color: #00ffcc; font-weight: bold; font-family: monospace; }

        .mode-selector { display: flex; background: #333; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .mode-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #888; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: #00ffcc; color: #000; font-weight: bold; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 2px solid #333; }
        .log { background: #000; border: 1px solid #333; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; color: #0f0; border-radius: 5px; }

        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 5px; font-size: 1rem; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #222; color: #444; cursor: not-allowed; }

        #survey-status { margin-top: 10px; font-weight: bold; text-align: center; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-bar">
            <span>V: <span id="stat-v" class="status-val">---</span> m/s</span>
            <span>LAG: <span id="stat-lag" class="status-val">---</span> ms</span>
            <span>SYNC: <span id="stat-sync" class="status-val">OFFLINE</span></span>
        </div>
        <h3>1. Scan Seat QR</h3>
        <div id="reader"></div>
        <div id="scanned-id" style="font-size: 1.4rem; color: #00ffcc; text-align: center; margin: 10px 0; font-weight: bold;">
            SCAN PILLAR_FL TO CALIBRATE
        </div>
    </div>

    <div class="card">
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">SONIC AUTO</button>
            <button class="mode-btn" id="btn-manual" onclick="setMode('manual')">MANUAL ENTRY</button>
        </div>

        <div id="auto-ui">
            <button id="listen-btn" onclick="startSurvey()">CALIBRATE / CAPTURE POSITION</button>
            <div id="survey-status"></div>
        </div>

        <div id="manual-ui" style="display:none;">
            <input type="number" id="man-x" step="0.01" placeholder="X Coordinate (meters)">
            <input type="number" id="man-y" step="0.01" placeholder="Y Coordinate (meters)">
            <button onclick="saveManualXY()">SAVE MANUAL POSITION</button>
        </div>
    </div>

    <div class="card">
        <h3>Diagnostic Log</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        // PROTECTED BLOCK: Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Operational Constants & State
        let currentSeatId = null;
        let mode = 'auto';
        let pillarConfigs = {};
        let speedOfSound = 344.0;
        let micDelay = 0;
        let serverOffset = 0;
        let isCalibrated = false;
        let audioCtx = null;

        // Establish Server Clock Offset
        db.ref(".info/serverTimeOffset").on("value", (snap) => {
            serverOffset = snap.val() || 0;
            document.getElementById('stat-sync').innerText = "LOCKED";
            document.getElementById('stat-sync').style.color = "#00ffcc";
        });

        // Load Pillar Registry
        db.ref('pillar_config').on('value', snap => {
            const data = snap.val();
            if (!data || !data.pillars) return;
            pillarConfigs = {};
            data.pillars.forEach(p => {
                pillarConfigs[p.id] = p;
            });
            log(`SYSTEM: ${data.pillars.length} pillars synced from cloud.`);
        });

        // Initialize QR Scanner
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            currentSeatId = decodedText;
            document.getElementById('scanned-id').innerText = "TARGET: " + currentSeatId;
            log("Scanned QR: " + currentSeatId);

            if(currentSeatId === "PILLAR_FL") {
                document.getElementById('survey-status').innerText = "Ready for Environmental Sync";
                document.getElementById('survey-status').style.color = "#00ffcc";
            }
        });

        function setMode(m) {
            mode = m;
            document.getElementById('btn-auto').classList.toggle('active', m === 'auto');
            document.getElementById('btn-manual').classList.toggle('active', m === 'manual');
            document.getElementById('auto-ui').style.display = m === 'auto' ? 'block' : 'none';
            document.getElementById('manual-ui').style.display = m === 'manual' ? 'block' : 'none';
        }

        async function startSurvey() {
            if (!currentSeatId) return alert("Please scan a seat QR code first.");
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            document.getElementById('listen-btn').disabled = true;
            document.getElementById('survey-status').innerText = "LISTENING FOR EPOCH...";
            document.getElementById('survey-status').style.color = "#888";

            const detections = {};
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096;
            source.connect(analyser);

            const buffer = new Uint8Array(analyser.frequencyBinCount);
            const sessionStartTime = Date.now() + serverOffset;

            const captureLoop = () => {
                analyser.getByteFrequencyData(buffer);
                const now = Date.now() + serverOffset;

                Object.values(pillarConfigs).forEach(p => {
                    const bin = Math.round(p.preferred_freq / (audioCtx.sampleRate / analyser.fftSize));
                    // Look for high-amplitude peaks at staggered frequencies
                    if (buffer[bin] > 190 && !detections[p.id]) {
                        detections[p.id] = now;
                        log(`DETECTED: ${p.id} (${p.preferred_freq}Hz)`);
                    }
                });

                // Listen for up to 3 seconds to catch a full 2000ms epoch cycle
                if (Object.keys(detections).length < 4 && (Date.now() + serverOffset - sessionStartTime) < 3500) {
                    requestAnimationFrame(captureLoop);
                } else {
                    processDetections(detections);
                }
            };
            captureLoop();
        }

        async function processDetections(detections) {
            document.getElementById('listen-btn').disabled = false;

            // Retrieve the reference timestamps the pillars recorded when they chirped
            const snap = await db.ref('chirp_log').once('value');
            const logs = snap.val();
            if (!logs) return log("ERROR: No pillar chirp logs found in Firebase.");

            if (currentSeatId === "PILLAR_FL") {
                // LOCK CALIBRATION (Environmental Sync)
                if (!detections["PILLAR_FL"]) return log("FAILED: Could not hear PILLAR_FL. Move closer.");

                // 1. Solve Mic Delay (Time of Arrival - Time of Chirp at dist=0)
                micDelay = detections["PILLAR_FL"] - logs["PILLAR_FL"].timestamp;

                // 2. Solve Speed of Sound using other 3 pillars
                let vSum = 0, vCount = 0;
                Object.entries(detections).forEach(([id, recTime]) => {
                    if (id === "PILLAR_FL" || !logs[id]) return;
                    const p = pillarConfigs[id];
                    const theoreticalDist = Math.sqrt(p.x**2 + p.y**2);
                    const tofSeconds = (recTime - logs[id].timestamp - micDelay) / 1000;
                    if (tofSeconds > 0) {
                        vSum += (theoreticalDist / tofSeconds);
                        vCount++;
                    }
                });

                speedOfSound = vCount > 0 ? vSum / vCount : 344.0;
                isCalibrated = true;

                document.getElementById('stat-v').innerText = speedOfSound.toFixed(1);
                document.getElementById('stat-lag').innerText = micDelay.toFixed(0);
                log(`LOCKED: V=${speedOfSound.toFixed(1)}m/s, MicLag=${micDelay.toFixed(0)}ms`);
                document.getElementById('survey-status').innerText = "ENVIRONMENT LOCKED";
                document.getElementById('survey-status').style.color = "#00ffcc";
            } else {
                // STANDARD SEAT SURVEY
                if (!isCalibrated) return alert("SOP ERROR: You must calibrate at PILLAR_FL first!");

                const position = solveTrilateration(detections, logs);
                if (position) {
                    await db.ref(`survey_results/${currentSeatId}`).set({
                        x: position.x,
                        y: position.y,
                        confidence: position.confidence,
                        status: "AUTO",
                        timestamp: Date.now()
                    });
                    log(`SUCCESS: ${currentSeatId} saved at (${position.x.toFixed(2)}, ${position.y.toFixed(2)})`);
                }
            }
        }

        /**
         * solveTrilateration
         * Implements Combinatorial Redundancy and Boundary Constraints
         */
        function solveTrilateration(detections, logs) {
            const mKeys = Object.keys(detections).filter(k => logs[k]);
            const trials = [];
            const measurements = {};

            // Convert ToF to Distances
            mKeys.forEach(id => {
                const tof = (detections[id] - logs[id].timestamp - micDelay) / 1000;
                if (tof > 0) {
                    measurements[id] = {
                        x: pillarConfigs[id].x,
                        y: pillarConfigs[id].y,
                        r: tof * speedOfSound
                    };
                }
            });

            const keys = Object.keys(measurements);

            // Case A: 3+ Pillars (Triangulation Combinations)
            if (keys.length >= 3) {
                const combinations = getCombinations(keys, 3);
                combinations.forEach(c => {
                    const res = trilaterate3(measurements[c[0]], measurements[c[1]], measurements[c[2]]);
                    if (res) trials.push(res);
                });
            }
            // Case B: 2 Pillars (Ambiguity Resolution)
            else if (keys.length === 2) {
                const p1 = measurements[keys[0]];
                const p2 = measurements[keys[1]];
                const pts = intersect2(p1, p2);

                // Apply Theater Boundary Constraints (0 to Max X, 0 to Max Y)
                const maxX = Math.max(...Object.values(pillarConfigs).map(p => p.x));
                const maxY = Math.max(...Object.values(pillarConfigs).map(p => p.y));

                pts.forEach(pt => {
                    if (pt.x >= -0.5 && pt.x <= maxX + 0.5 && pt.y >= -0.5 && pt.y <= maxY + 0.5) {
                        trials.push(pt);
                    }
                });
            }

            if (trials.length === 0) {
                document.getElementById('survey-status').innerText = "GEOMETRY FAILED";
                document.getElementById('survey-status').style.color = "#ff4444";
                return null;
            }

            // Calculate Centroid
            const avgX = trials.reduce((s, p) => s + p.x, 0) / trials.length;
            const avgY = trials.reduce((s, p) => s + p.y, 0) / trials.length;

            // Dispersion Check for 0.1m Accuracy Goal
            const dispersion = Math.max(...trials.map(p =>
                Math.sqrt((p.x - avgX)**2 + (p.y - avgY)**2)
            ));

            const statusEl = document.getElementById('survey-status');
            if (dispersion <= 0.1) {
                statusEl.innerText = "HIGH CONFIDENCE (±" + dispersion.toFixed(2) + "m)";
                statusEl.style.color = "#00ffcc";
            } else {
                statusEl.innerText = "LOW CONFIDENCE (±" + dispersion.toFixed(2) + "m)";
                statusEl.style.color = "#ffcc00";
            }

            return { x: avgX, y: avgY, confidence: dispersion };
        }

        // Geometry Utilities
        function trilaterate3(p1, p2, p3) {
            const d = dist(p1, p2);
            const ex = { x: (p2.x - p1.x) / d, y: (p2.y - p1.y) / d };
            const i = ex.x * (p3.x - p1.x) + ex.y * (p3.y - p1.y);
            const ey = {
                x: (p3.x - p1.x - i * ex.x) / dist({x: p3.x - p1.x - i * ex.x, y: p3.y - p1.y - i * ex.y}, {x:0, y:0}),
                y: (p3.y - p1.y - i * ex.y) / dist({x: p3.x - p1.x - i * ex.x, y: p3.y - p1.y - i * ex.y}, {x:0, y:0})
            };
            const j = ey.x * (p3.x - p1.x) + ey.y * (p3.y - p1.y);
            const x = (p1.r**2 - p2.r**2 + d**2) / (2 * d);
            const y = (p1.r**2 - p3.r**2 + i**2 + j**2) / (2 * j) - (i / j) * x;
            return { x: p1.x + x * ex.x + y * ey.x, y: p1.y + x * ex.y + y * ey.y };
        }

        function intersect2(p1, p2) {
            const d = dist(p1, p2);
            if (d > p1.r + p2.r || d < Math.abs(p1.r - p2.r)) return [];
            const a = (p1.r**2 - p2.r**2 + d**2) / (2 * d);
            const h = Math.sqrt(p1.r**2 - a**2);
            const x2 = p1.x + a * (p2.x - p1.x) / d;
            const y2 = p1.y + a * (p2.y - p1.y) / d;
            return [
                { x: x2 + h * (p2.y - p1.y) / d, y: y2 - h * (p2.x - p1.x) / d },
                { x: x2 - h * (p2.y - p1.y) / d, y: y2 + h * (p2.x - p1.x) / d }
            ];
        }

        function dist(a, b) { return Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2); }

        function getCombinations(arr, size) {
            const r = [];
            const f = (p, a) => {
                for (let i = 0; i < a.length; i++) {
                    if (p.length + 1 === size) r.push([...p, a[i]]);
                    else f([...p, a[i]], a.slice(i + 1));
                }
            };
            f([], arr);
            return r;
        }

        async function saveManualXY() {
            if (!currentSeatId) return alert("Scan QR first!");
            const x = parseFloat(document.getElementById('man-x').value);
            const y = parseFloat(document.getElementById('man-y').value);
            if (isNaN(x) || isNaN(y)) return alert("Please enter valid numeric coordinates.");

            await db.ref(`survey_results/${currentSeatId}`).set({
                x, y, status: "MANUAL", timestamp: Date.now()
            });
            log(`MANUAL SAVE: ${currentSeatId} at (${x}, ${y})`);
        }

        function log(msg) {
            const box = document.getElementById('log');
            box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
