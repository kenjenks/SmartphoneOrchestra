<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ePillar - Smartphone Orchestra Pillar</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        #status-registry {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            width: 80%;
            max-width: 400px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background: #222;
            margin-left: 10px;
        }
        .active { background: #ffaa44; box-shadow: 0 0 8px #ffaa44; }
        .ready { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        #ready-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: #ffaa44;
            color: #000;
            cursor: pointer;
        }
        #ready-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #show-screen { display: none; height: 100vh; width: 100vw; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
        #performance-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #ffaa44;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .pillar-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-family: monospace;
            font-size: 9px;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .visualizer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .visualizer-fill {
            height: 100%;
            width: 0%;
            background: #ffaa44;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h1 id="seat-label">Identifying Pillar...</h1>
        <div id="status-registry">
            <div class="status-item">
                <span>Identity Resolve</span>
                <span id="id-ind" class="indicator"></span>
            </div>
            <div class="status-item">
                <span>Clock Synchronization</span>
                <span id="sync-ind" class="indicator"></span>
            </div>
            <div class="status-item">
                <span>Audio Loaded</span>
                <span id="audio-ind" class="indicator"></span>
            </div>
        </div>
        <button id="ready-btn" disabled>ACTIVATE PILLAR</button>
        <p id="system-msg" style="margin-top:20px; font-size: 0.8rem; color: #888;">Waiting for Audio Context...</p>
    </div>
    <div id="show-screen">
        <div id="performance-overlay">Pillar: -- | Status: Waiting</div>
        <canvas id="stage-canvas"></canvas>
        <div class="pillar-badge" id="pillar-badge">ePillar v1.0</div>
        <div class="visualizer" id="visualizer">
            <div class="visualizer-fill" id="visualizer-fill"></div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBnzYesqka3zruOPjEE9eJ2ty4LZjKIlIU",
            authDomain: "smartphoneorchestra-dwt.firebaseapp.com",
            databaseURL: "https://smartphoneorchestra-dwt-default-rtdb.firebaseio.com/",
            projectId: "smartphoneorchestra-dwt"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==================== STATE VARIABLES ====================
        let audioCtx = null;
        let mySeat = null;
        let serverOffset = 0;
        let isActive = false;
        let activeTimeout = null;
        let heartbeatInterval = null;
        let pillarAudioElement = null;
        let animationFrame = null;
        let isPlaying = false;
        let currentPlaybackType = null; // 'tuning' or 'show'

        // Constants
        const SPEED_OF_SOUND = 343;
        const HEARTBEAT_INTERVAL_MS = 10000;

        // ==================== UTILITY FUNCTIONS ====================

        let currentSessionId = null;

        function log(message, eventType = "log", meta = {}) {
            const timestamp = Date.now() + (serverOffset || 0);
            const pillarId = mySeat?.id || myPillarId || 'unknown';

            // Always send to Firebase
            if (currentSessionId) {
                const payload = {
                    pillarId,
                    type: eventType,
                    message,
                    t: timestamp,
                    ...meta
                };

                db.ref(`tuningLogs/${currentSessionId}/${pillarId}`)
                  .push(payload)
                  .catch(() => {});
            }

            // Optional: still console log (helps during desktop testing)
            console.log(`[${pillarId}] ${message}`);

            // Optional: update on-screen debug UI (xplaypillar already has this)
        }

        // ==================== CLOCK SYNC ====================
        db.ref(".info/serverTimeOffset").on("value", snap => {
            serverOffset = snap.val() || 0;
            document.getElementById('sync-ind').className = 'indicator active';
            log(`⏱️ Server offset: ${serverOffset}ms`);
        });

        // ==================== IDENTITY RESOLUTION ====================
        async function resolveIdentity() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const seatId = urlParams.get('seat');

                if (!seatId || !seatId.startsWith('PILLAR_')) {
                    log(`Invalid pillar ID: ${seatId}`);
                    document.getElementById('id-ind').className = 'indicator error';
                    return false;
                }

                mySeat = { id: seatId };
                document.getElementById('seat-label').innerText = `Pillar ${seatId}`;
                document.getElementById('id-ind').className = 'indicator active';
                document.getElementById('pillar-badge').innerHTML = `🎵 ${seatId} | ePillar v1.0`;
                document.getElementById('performance-overlay').innerHTML = `Pillar: ${seatId} | Status: Ready`;
                log(`✅ Resolved pillar: ${mySeat.id}`);
                return true;
            } catch (e) {
                log(`❌ Identity Resolution Error: ${e.message}`);
                document.getElementById('id-ind').className = 'indicator error';
                return false;
            }
        }

        // ==================== PILLAR CONFIGURATION ====================
        let pillarConfig = {};

        async function loadPillarConfig() {
            try {
                const snap = await db.ref('pillar_config').once('value');
                const data = snap.val();
                if (data && data.pillars) {
                    data.pillars.forEach(p => {
                        pillarConfig[p.id] = {
                            id: p.id,
                            label: p.label,
                            x: p.x,
                            y: p.y,
                            speakerDelayMs: p.speakerDelayMs || 45,
                            micDelayMs: p.micDelayMs || 18,
                            audioUrl: p.audioUrl
                        };
                    });
                    log(`📡 Loaded ${Object.keys(pillarConfig).length} pillar configs`);

                    // Check if this pillar has an audio URL
                    const myConfig = pillarConfig[mySeat?.id];
                    if (myConfig && myConfig.audioUrl) {
                        document.getElementById('audio-ind').className = 'indicator active';
                        log(`   Audio URL: ${myConfig.audioUrl.split('/').pop()}`);
                    } else {
                        log(`⚠️ No audio URL found for ${mySeat?.id}`);
                        document.getElementById('audio-ind').className = 'indicator error';
                    }
                }
            } catch (e) {
                log(`⚠️ Failed to load pillar config: ${e.message}`);
                document.getElementById('audio-ind').className = 'indicator error';
            }
        }

        // ==================== VISUALIZER ====================
        function startVisualizer() {
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function updateVisualizer() {
                if (pillarAudioElement && isPlaying) {
                    const duration = pillarAudioElement.duration;
                    const currentTime = pillarAudioElement.currentTime;
                    if (duration && !isNaN(duration)) {
                        const percent = (currentTime / duration) * 100;
                        document.getElementById('visualizer-fill').style.width = percent + '%';
                    }
                }
                animationFrame = requestAnimationFrame(updateVisualizer);
            }
            updateVisualizer();
        }

        function stopVisualizer() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            document.getElementById('visualizer-fill').style.width = '0%';
        }

        // ==================== PLAY PILLAR AUDIO ====================

        function logSyncStatus(expectedStartTime, actualStartTime, pillarId) {
            const syncData = {
                pillarId: pillarId,
                expectedStart: expectedStartTime,
                actualStart: actualStartTime,
                deviation: actualStartTime - expectedStartTime,
                timestamp: Date.now() + serverOffset
            };

            db.ref('pillar_sync_log').push(syncData);

            log(`📊 Sync deviation for ${pillarId}: ${syncData.deviation > 0 ? '+' : ''}${syncData.deviation.toFixed(1)}ms`);
        }

        function playPillarAudio(audioUrl) {
            if (!audioUrl) {
                audioUrl = pillarConfig[mySeat.id]?.audioUrl;
            }
            if (!audioUrl) {
                log(`❌ No audio URL for ${mySeat.id}`);
                return;
            }

            try {
                // Stop any existing playback
                if (pillarAudioElement) {
                    pillarAudioElement.pause();
                    pillarAudioElement = null;
                }

                // Record load start time
                const audioLoadStart = Date.now() + serverOffset;
                log(`📀 Loading audio for ${mySeat.id}: ${audioUrl.split('/').pop()}`);

                // Create new audio element
                pillarAudioElement = new Audio(audioUrl);
                pillarAudioElement.volume = 1.0;
                pillarAudioElement.loop = false;
                pillarAudioElement.preload = 'auto';

                // Track load completion
                let loadCompleted = false;
                pillarAudioElement.oncanplaythrough = () => {
                    if (!loadCompleted) {
                        loadCompleted = true;
                        const loadTime = (Date.now() + serverOffset) - audioLoadStart;
                        log(`✅ Audio loaded for ${mySeat.id} in ${loadTime}ms`);
                    }
                };

                // Listen for playback events
                pillarAudioElement.onplay = () => {
                    const actualPlayTime = Date.now() + serverOffset;
                    const expectedPlayTime = currentPlaybackStartTime || 0;
                    const playDelay = actualPlayTime - expectedPlayTime;
                    const timeSinceLoad = actualPlayTime - audioLoadStart;

                    isPlaying = true;

                    // Format timestamps with milliseconds
                    const actualStr = new Date(actualPlayTime).toISOString().substr(11, 12) + '.' + String(actualPlayTime % 1000).padStart(3, '0');
                    const expectedStr = expectedPlayTime ?
                        new Date(expectedPlayTime).toISOString().substr(11, 12) + '.' + String(expectedPlayTime % 1000).padStart(3, '0') :
                        'unknown';

                    log(`🔊 Pillar ${mySeat.id} STARTED playing at ${actualStr}`);
                    log(`   Expected start: ${expectedStr}`);
                    log(`   Playback deviation: ${playDelay > 0 ? '+' : ''}${playDelay.toFixed(1)}ms relative to expected`);
                    log(`   Time from load to play: ${timeSinceLoad}ms`);

                    // Log sync status to Firebase for cross-pillar comparison
                    const syncData = {
                        pillarId: mySeat.id,
                        expectedStart: expectedPlayTime,
                        actualStart: actualPlayTime,
                        deviation: playDelay,
                        timeSinceLoad: timeSinceLoad,
                        timestamp: actualPlayTime,
                        playbackType: currentPlaybackType,
                        speakerDelay: pillarConfig[mySeat.id]?.speakerDelayMs || 45
                    };

                    // Send to Firebase for conductor monitoring
                    db.ref(`pillar_sync/${mySeat.id}/${Date.now()}`).set(syncData).catch(e => {
                        log(`⚠️ Failed to log sync data: ${e.message}`);
                    });

                    // Update UI
                    document.getElementById('performance-overlay').innerHTML =
                        `Pillar: ${mySeat.id} | Status: PLAYING (${currentPlaybackType || ''}) | ` +
                        `Delay: ${pillarConfig[mySeat.id]?.speakerDelayMs || 45}ms | ` +
                        `Deviation: ${playDelay > 0 ? '+' : ''}${playDelay.toFixed(0)}ms | ` +
                        `Load: ${timeSinceLoad}ms`;

                    // Visual flash on start
                    const canvas = document.getElementById('stage-canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffaa44';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 200);

                    startVisualizer();
                };

                pillarAudioElement.onended = () => {
                    const endTime = Date.now() + serverOffset;
                    const duration = pillarAudioElement.duration;
                    const actualDuration = (endTime - (currentPlaybackStartTime || endTime)) / 1000;

                    log(`🔊 Pillar ${mySeat.id} FINISHED playing`);
                    log(`   Expected duration: ${duration?.toFixed(2)}s, Actual: ${actualDuration.toFixed(2)}s`);
                    log(`   Deviation: ${(actualDuration - (duration || 0)).toFixed(2)}s`);

                    isPlaying = false;
                    document.getElementById('performance-overlay').innerHTML =
                        `Pillar: ${mySeat.id} | Status: Ready`;
                    stopVisualizer();
                };

                pillarAudioElement.onerror = (e) => {
                    const errorTime = Date.now() + serverOffset;
                    log(`❌ Pillar audio error for ${mySeat.id}: ${e.message || 'Unknown error'}`);
                    log(`   Audio URL: ${audioUrl}`);
                    log(`   Network state: ${pillarAudioElement.networkState}`);
                    log(`   Ready state: ${pillarAudioElement.readyState}`);
                    isPlaying = false;
                    document.getElementById('performance-overlay').innerHTML =
                        `Pillar: ${mySeat.id} | Status: ERROR`;
                };

                // Start playing with promise handling
                const playPromise = pillarAudioElement.play();
                if (playPromise) {
                    playPromise
                        .then(() => {
                            // Playback started successfully
                            const playStartTime = Date.now() + serverOffset;
                            log(`🎵 Playback initiated for ${mySeat.id} at ${new Date(playStartTime).toISOString().substr(11, 12)}.${String(playStartTime % 1000).padStart(3, '0')}`);
                        })
                        .catch(e => {
                            log(`❌ Playback failed for ${mySeat.id}: ${e.message}`);
                            isPlaying = false;
                            document.getElementById('performance-overlay').innerHTML =
                                `Pillar: ${mySeat.id} | Status: PLAYBACK FAILED`;
                        });
                }

            } catch (e) {
                log(`❌ Failed to create audio element for ${mySeat.id}: ${e.message}`);
                document.getElementById('performance-overlay').innerHTML =
                    `Pillar: ${mySeat.id} | Status: INIT ERROR`;
            }
        }

        // ==================== SCHEDULE PLAYBACK ====================
        function schedulePlayback(startTime, audioUrl, type = 'show') {
            const myConfig = pillarConfig[mySeat.id];
            if (!myConfig || !myConfig.audioUrl) {
                log(`❌ Cannot schedule - no audio URL for ${mySeat.id}`);
                return;
            }

            const nowWall = Date.now() + serverOffset;
            const pillarSpeakerDelay = myConfig.speakerDelayMs || 45;
            const urlToPlay = audioUrl || myConfig.audioUrl;

            const adjustedStartTime = startTime - pillarSpeakerDelay;
            const delayMs = adjustedStartTime - nowWall;

            // Log with microsecond precision
            const nowStr = new Date(nowWall).toISOString().substr(11, 12) + '.' + String(nowWall % 1000).padStart(3, '0');
            const startStr = new Date(startTime).toISOString().substr(11, 12) + '.' + String(startTime % 1000).padStart(3, '0');
            const adjustedStr = new Date(adjustedStartTime).toISOString().substr(11, 12) + '.' + String(adjustedStartTime % 1000).padStart(3, '0');

            log(`🎵 Scheduling pillar ${mySeat.id} playback (${type})`);
            log(`   Current wall time: ${nowStr}`);
            log(`   Conductor start: ${startStr}`);
            log(`   Adjusted start (start - ${pillarSpeakerDelay}ms): ${adjustedStr}`);
            log(`   Delay: ${delayMs.toFixed(1)}ms`);

            // Check if we're receiving the schedule late
            if (delayMs < 0) {
                log(`⚠️ SCHEDULE RECEIVED LATE: ${Math.abs(delayMs).toFixed(1)}ms after adjusted start time`);
            }

            // Clear any existing scheduled playback
            if (activeTimeout) {
                clearTimeout(activeTimeout);
                activeTimeout = null;
            }

            // Schedule the playback
            if (delayMs > 0) {
                const scheduledFireTime = nowWall + delayMs;
                const scheduledFireStr = new Date(scheduledFireTime).toISOString().substr(11, 12) + '.' + String(scheduledFireTime % 1000).padStart(3, '0');

                log(`   Scheduled to fire at: ${scheduledFireStr} (in ${(delayMs/1000).toFixed(3)}s)`);

                const startTimer = Date.now();
                activeTimeout = setTimeout(() => {
                    const actualFireTime = Date.now() + serverOffset;
                    const timerDrift = actualFireTime - scheduledFireTime;

                    log(`⏱️ setTimeout fired at ${new Date(actualFireTime).toISOString().substr(11, 12)}.${String(actualFireTime % 1000).padStart(3, '0')}`);
                    log(`   Timer drift: ${timerDrift > 0 ? '+' : ''}${timerDrift.toFixed(1)}ms`);

                    currentPlaybackType = type;

                    const playStartTime = Date.now();
                    playPillarAudio(urlToPlay);
                    const playStartLatency = Date.now() - playStartTime;

                    log(`   Audio.play() initiated, startup latency: ${playStartLatency}ms`);

                    activeTimeout = null;
                }, delayMs);

            } else if (delayMs > -1000) {
                log(`⚠️ Playback is ${Math.round(-delayMs)}ms late, playing immediately`);
                currentPlaybackType = type;
                playPillarAudio(urlToPlay);
            } else {
                log(`❌ Playback too late (${Math.round(-delayMs)}ms), skipping`);
            }
        }

        // ==================== STOP PLAYBACK ====================
        function stopPlayback() {
            if (pillarAudioElement) {
                pillarAudioElement.pause();
                pillarAudioElement = null;
                log(`⏹️ Playback stopped`);
            }
            if (activeTimeout) {
                clearTimeout(activeTimeout);
                activeTimeout = null;
            }
            isPlaying = false;
            currentPlaybackType = null;
            stopVisualizer();
        }

        // ==================== HEARTBEAT ====================
        function startHeartbeat() {
            if (!mySeat) return;
            if (heartbeatInterval) clearInterval(heartbeatInterval);

            heartbeatInterval = setInterval(() => {
                if (mySeat) {
                    db.ref(`devices/${mySeat.id}`).update({
                        lastSeen: Date.now() + serverOffset,
                        status: isPlaying ? 'PLAYING' : 'ACTIVE',
                        type: 'pillar',
                        audioUrl: pillarConfig[mySeat.id]?.audioUrl?.split('/').pop() || 'none',
                        speakerDelay: pillarConfig[mySeat.id]?.speakerDelayMs || 45,
                        micDelay: pillarConfig[mySeat.id]?.micDelayMs || 18,
                        isPlaying: isPlaying,
                        playbackType: currentPlaybackType
                    });
                }
            }, HEARTBEAT_INTERVAL_MS);
            log(`💓 Heartbeat started for ${mySeat.id}`);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
                log(`💓 Heartbeat stopped for ${mySeat?.id}`);
            }
        }

        // ==================== TUNING LISTENER ====================
        function listenForTuning() {
            db.ref('tuning/current').on('value', snap => {
                const schedule = snap.val();

                if (!schedule) {
                    if (activeTimeout) {
                        log(`⚠️ Tuning schedule cleared`);
                        stopPlayback();
                    }
                    return;
                }

                if (!schedule.startTime) {
                    log(`⚠️ Schedule has no startTime`);
                    return;
                }

                const now = Date.now() + serverOffset;
                const receiptTime = now;
                const conductorStartTime = schedule.startTime;
                const timeToStart = conductorStartTime - now;

                // Log precise receipt timing
                log(`🎵 Tuning schedule received at ${new Date(receiptTime).toISOString().substr(11, 12)}.${String(receiptTime % 1000).padStart(3, '0')}`);
                log(`   Conductor start time: ${new Date(conductorStartTime).toISOString().substr(11, 12)}.${String(conductorStartTime % 1000).padStart(3, '0')}`);
                log(`   Time to start: ${(timeToStart / 1000).toFixed(3)}s`);

                // Check if we received the schedule too late
                if (timeToStart < 0) {
                    log(`❌ SCHEDULE RECEIVED TOO LATE: ${Math.abs(timeToStart).toFixed(0)}ms after conductor start time`);
                    log(`   Pillar will attempt to play but may be out of sync`);
                } else if (timeToStart < 1000) {
                    log(`⚠️ Schedule received with only ${(timeToStart / 1000).toFixed(2)}s buffer - may cause timing issues`);
                } else {
                    log(`✅ Schedule received with ${(timeToStart / 1000).toFixed(2)}s buffer`);
                }

                // Store receipt time for comparison across pillars
                window.pillarReceiptTime = receiptTime;
                window.pillarConductorStartTime = conductorStartTime;

                // Log schedule details if available
                if (schedule.metadata) {
                    log(`   Tuning duration: ${(schedule.metadata.total_duration_ms / 1000).toFixed(1)}s`);
                    if (schedule.uncalibratedCount !== undefined) {
                        log(`   Uncalibrated patrons: ${schedule.uncalibratedCount}, Calibrated: ${schedule.calibratedCount || 0}`);
                    }
                }

                // Stop any ongoing show playback
                stopPlayback();

                // Schedule tuning playback
                schedulePlayback(schedule.startTime, null, 'tuning');

                // Also log the current device state for debugging
                const myConfig = pillarConfig[mySeat?.id];
                if (myConfig) {
                    log(`   Pillar config: speakerDelay=${myConfig.speakerDelayMs}ms, micDelay=${myConfig.micDelayMs}ms`);
                }
            });
        }

        // ==================== SHOW MOVEMENT LISTENER ====================
        function listenForShowMovement() {
            db.ref('show/currentCue').on('value', snap => {
                const cue = snap.val();

                if (!cue) return;

                // Handle KILL signal
                if (cue.action === 'KILL') {
                    log(`💀 KILL signal received - stopping playback`);
                    stopPlayback();
                    stopHeartbeat();
                    setTimeout(() => location.reload(), 500);
                    return;
                }

                // Handle GO signal (show movement)
                if (cue.action === 'GO' && cue.startTime && cue.movement && cue.cues) {
                    log(`🎭 Show movement received: "${cue.movement}"`);
                    log(`   Start time: ${new Date(cue.startTime).toISOString().substr(11, 12)}.${String(cue.startTime % 1000).padStart(3, '0')}`);

                    // Find pillar assets in this movement's cues
                    let foundPillarAsset = null;

                    for (const movementCue of cue.cues) {
                        if (movementCue.assets) {
                            for (const asset of movementCue.assets) {
                                if (asset.type === 'pillar' && asset.id === mySeat.id) {
                                    foundPillarAsset = asset;
                                    break;
                                }
                            }
                        }
                        if (foundPillarAsset) break;
                    }

                    if (foundPillarAsset && foundPillarAsset.audio_url) {
                        log(`🎵 Found pillar asset for ${mySeat.id}: ${foundPillarAsset.audio_url.split('/').pop()}`);
                        // Stop any ongoing tuning playback
                        stopPlayback();
                        // Schedule show playback
                        schedulePlayback(cue.startTime, foundPillarAsset.audio_url, 'show');
                    } else {
                        log(`⚠️ No pillar asset found for ${mySeat.id} in movement "${cue.movement}"`);
                    }
                }
            });
        }

        // ==================== AUDIO CONTEXT (for visualizer sync) ====================
        async function initAudio() {
            try {
                // Create audio context for visualizer sync (optional)
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                log(`🎛️ Audio context created (state: ${audioCtx.state})`);

                if (audioCtx.state === 'suspended') {
                    // Resume on user interaction
                    document.body.addEventListener('click', () => {
                        if (audioCtx && audioCtx.state === 'suspended') {
                            audioCtx.resume();
                            log(`🎛️ Audio context resumed by user interaction`);
                        }
                    }, { once: true });
                }
                return true;
            } catch (e) {
                log(`⚠️ Audio context not available: ${e.message}`);
                return false;
            }
        }

        // ==================== TEST TONE (verify audio output) ====================
        function playTestTone() {
            if (!pillarAudioElement) {
                // Create a quick test tone using Web Audio if available
                if (audioCtx && audioCtx.state === 'running') {
                    try {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.5);
                        log(`🔊 Test tone played (440Hz)`);
                    } catch (e) {
                        log(`⚠️ Could not play test tone: ${e.message}`);
                    }
                }
            }
        }

        // ==================== ACTIVATE PILLAR ====================
        async function activatePillar() {
            await initAudio();

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('show-screen').style.display = 'block';

            const canvas = document.getElementById('stage-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            isActive = true;

            startHeartbeat();

            log(`🔊 Pillar ${mySeat.id} activated`);
            log(`   Audio: ${pillarConfig[mySeat.id]?.audioUrl?.split('/').pop() || 'none'}`);
            log(`   Speaker delay: ${pillarConfig[mySeat.id]?.speakerDelayMs || 45}ms`);

            // Play test tone to verify audio output
            setTimeout(() => playTestTone(), 500);

            // Start listening for both tuning and show movements
            listenForTuning();
            listenForShowMovement();
        }

        // ==================== INITIALIZATION ====================
        window.onload = async () => {
            log(`🎧 ePillar starting`);

            const idOk = await resolveIdentity();
            if (!idOk) {
                document.getElementById('system-msg').innerText = "Failed to identify pillar";
                return;
            }

            await loadPillarConfig();

            // Check if audio URL is configured
            const hasAudio = pillarConfig[mySeat.id]?.audioUrl;
            if (!hasAudio) {
                document.getElementById('system-msg').innerText = "No audio URL configured for this pillar";
                document.getElementById('ready-btn').disabled = true;
            } else {
                document.getElementById('ready-btn').disabled = false;
                document.getElementById('system-msg').innerHTML = "✅ Ready. Tap to activate.";
            }

            document.getElementById('ready-btn').onclick = async () => {
                await activatePillar();
            };
        };

        window.onresize = () => {
            const canvas = document.getElementById('stage-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        };

        window.addEventListener('beforeunload', () => {
            stopPlayback();
            stopHeartbeat();
            if (activeTimeout) clearTimeout(activeTimeout);
        });
    </script>
</body>
</html>
